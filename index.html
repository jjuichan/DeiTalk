<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #BACEE0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        #root { position: fixed; inset: 0; display: flex; flex-direction: column; background-color: #BACEE0; }
        .msg-anim { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-dot { animation: dot-blink 1.4s infinite both; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 입력하신 Firebase 설정이 적용되었습니다.
        const manualFirebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'deitalk-app';
        let auth = null, db = null, provider = null;
        let isFirebaseReady = false;

        const initFirebase = () => {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(manualFirebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
                provider = new firebase.auth.GoogleAuthProvider();
                isFirebaseReady = true;
                return true;
            } catch (e) {
                console.error("Firebase 초기화 실패:", e);
                return false;
            }
        };

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
채팅 앱의 채팅방이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
틱틱대지만 속으로는 잘 챙겨주는 츤데레 성격. 문장 끝에는 가끔 '음!'을 붙여.
        `;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [errorMessage, setErrorMessage] = useState(null);

            const chatEndRef = useRef(null);
            const geminiKey = localStorage.getItem('gemini_api_key') || '';

            useEffect(() => {
                const ready = initFirebase();
                if (ready && auth) {
                    const unsubscribe = auth.onAuthStateChanged((u) => {
                        setUser(u);
                        if (u) loadChatRooms(u.uid);
                        setView(u ? 'main' : 'login');
                    });
                    return () => unsubscribe();
                } else {
                    setTimeout(() => setView('login'), 1500);
                }
            }, []);

            const getPath = (uid, col) => `/artifacts/${appId}/users/${uid}/${col}`;

            const loadChatRooms = (uid) => {
                if (!db) return;
                db.collection(getPath(uid, 'rooms')).orderBy('updatedAt', 'desc').onSnapshot((sn) => {
                    const rooms = []; 
                    sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); 
                    setChatRooms(rooms);
                });
            };

            useEffect(() => {
                if (view === 'chatRoom' && currentRoomId && user && db) {
                    const unsubscribe = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages')
                        .orderBy('createdAt', 'asc').onSnapshot((sn) => {
                            const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); 
                            setMessages(msgs);
                            setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
                        });
                    return () => unsubscribe();
                }
            }, [view, currentRoomId]);

            const handleGoogleLogin = async () => {
                try {
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    setErrorMessage("로그인 실패: " + e.message);
                }
            };

            const handleGuestLogin = async () => {
                try {
                    await auth.signInAnonymously();
                } catch (e) {
                    setErrorMessage("게스트 로그인 실패: " + e.message);
                }
            };

            const handleSend = async () => {
                if (!inputText.trim() || !user || !db || !currentRoomId) return;
                const text = inputText; 
                setInputText(''); 
                setIsTyping(true);
                
                const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                
                await roomRef.collection('messages').add({ 
                    sender: 'me', text, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                });

                // 임시 응답 (실제 Gemini 연동 시 fetchAPI 호출 필요)
                setTimeout(async () => {
                    const resp = "음, 예술은 폭발이다! 무슨 말인지 알겠어.";
                    await roomRef.collection('messages').add({ 
                        sender: 'deidara', text: resp, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    await roomRef.set({ lastMessage: resp, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    setIsTyping(false);
                }, 1000);
            };

            if (view === 'loading') return (
                <div className="w-full h-full flex flex-col items-center justify-center bg-[#BACEE0]">
                    <div className="w-16 h-16 rounded-[24px] bg-white flex items-center justify-center text-3xl shadow-lg mb-6 animate-bounce">🎨</div>
                    <div className="flex gap-1">
                        <span className="font-black text-white text-lg tracking-widest uppercase">Connecting</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    {errorMessage && <div className="fixed top-10 bg-white p-4 rounded-2xl shadow-2xl border-l-4 border-red-500 z-50 text-sm font-bold">{errorMessage}</div>}
                    <div className="w-24 h-24 rounded-[32px] bg-white mb-8 shadow-2xl flex items-center justify-center text-4xl">🎨</div>
                    <h1 className="text-4xl font-black text-gray-800 mb-2 italic">DeiTalk</h1>
                    <p className="text-gray-600 mb-12 font-bold opacity-80 italic">Art is an Explosion, Hm!</p>
                    
                    <button onClick={handleGoogleLogin} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-xl font-black active:scale-95 transition-all mb-4 text-gray-800">GOOGLE LOGIN</button>
                    <button onClick={handleGuestLogin} className="w-full max-w-xs bg-black/10 py-4 rounded-2xl font-bold text-gray-700 text-sm active:scale-95 transition-all">GUEST START</button>
                    <p className="mt-8 text-[11px] text-black/40 font-bold text-center uppercase tracking-tighter">데이터 동기화를 위해 로그인을 권장합니다</p>
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col bg-white overflow-hidden">
                    {view === 'main' ? (
                        <Fragment>
                            <header className="px-6 py-6 flex justify-between items-center border-b border-gray-50 bg-white">
                                <h1 className="font-black text-2xl uppercase italic tracking-tighter text-gray-800">{activeTab}</h1>
                                <div className="flex gap-4">
                                    {activeTab === 'chat' && <button onClick={() => { const n = prompt("방 이름?"); if(n && db) db.collection(getPath(user.uid, 'rooms')).add({name:n, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); }} className="font-black text-xl">＋</button>}
                                    <button onClick={() => { auth.signOut(); setView('login'); }} className="text-xs font-black text-gray-300">OUT</button>
                                </div>
                            </header>
                            <main className="flex-1 overflow-y-auto pb-24 px-4 py-4 space-y-4 custom-scrollbar">
                                {activeTab === 'friends' && (
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-4 p-4 hover:bg-gray-50 rounded-3xl transition-all">
                                            <div className="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center text-2xl overflow-hidden">👤</div>
                                            <div className="flex-1">
                                                <h3 className="font-black text-gray-800">연지 (나)</h3>
                                                <p className="text-xs text-gray-400 font-bold">문창과 4학년. 졸업하고 싶어…</p>
                                            </div>
                                        </div>
                                        <div onClick={() => { if(chatRooms.length > 0) { setCurrentRoomId(chatRooms[0].id); setView('chatRoom'); } else { setActiveTab('chat'); } }} className="flex items-center gap-4 p-4 bg-orange-50 rounded-[32px] cursor-pointer active:scale-95 transition-all shadow-sm">
                                            <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-2xl shadow-sm">💣</div>
                                            <div className="flex-1">
                                                <h3 className="font-black text-gray-800">데이다라</h3>
                                                <p className="text-xs text-orange-400 font-bold">점토 빚는 중, 음!</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && chatRooms.map(r => (
                                    <div key={r.id} onClick={() => { setCurrentRoomId(r.id); setView('chatRoom'); }} className="flex items-center gap-4 p-5 bg-white border border-gray-100 rounded-[32px] cursor-pointer active:scale-95 transition-all shadow-sm">
                                        <div className="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-xl">💬</div>
                                        <div className="flex-1 min-w-0"><h3 className="font-black text-gray-800 truncate">{r.name}</h3><p className="text-xs text-gray-400 truncate font-bold">{r.lastMessage || '대화가 없습니다.'}</p></div>
                                    </div>
                                ))}
                            </main>
                            <nav className="fixed bottom-0 w-full bg-white/95 border-t border-gray-50 flex justify-around py-6 pb-10 backdrop-blur-md">
                                <button onClick={()=>setActiveTab('friends')} className={`font-black text-[10px] uppercase tracking-widest ${activeTab==='friends'?'text-gray-900':'text-gray-300'}`}>Friends</button>
                                <button onClick={()=>setActiveTab('chat')} className={`font-black text-[10px] uppercase tracking-widest ${activeTab==='chat'?'text-gray-900':'text-gray-300'}`}>Chat</button>
                            </nav>
                        </Fragment>
                    ) : (
                        <Fragment>
                            <header className="px-4 py-4 flex items-center justify-between bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md border-b border-black/5">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setView('main')} className="p-2 active:scale-90 font-black text-gray-700 text-xl">←</button>
                                    <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-xl shadow-sm">💣</div>
                                    <h1 className="font-black text-gray-800">데이다라</h1>
                                </div>
                            </header>
                            <main className="flex-1 bg-[#BACEE0] overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar">
                                {messages.map((m) => (
                                    <div key={m.id} className={`flex flex-col ${m.sender === 'me' ? 'items-end' : 'items-start'} msg-anim`}>
                                        <div className={`px-5 py-3 rounded-2xl text-[15px] shadow-sm font-bold tracking-tight max-w-[80%] ${m.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}>{m.text}</div>
                                        <span className="text-[10px] text-black/20 mt-1 font-bold">{m.time}</span>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-2 text-[10px] font-black text-white/50 animate-pulse uppercase tracking-widest">Deidara is typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-4 bg-white flex gap-2 pb-10">
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-full px-6 py-3.5 text-sm font-bold outline-none focus:bg-white transition-all" placeholder="메시지를 입력해, 음!" />
                                <button onClick={handleSend} className="w-12 h-12 bg-[#FEE500] rounded-full flex items-center justify-center font-black shadow-md active:scale-90 transition-all text-xl">↑</button>
                            </footer>
                        </Fragment>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
