<html lang="ko">
<head>

    <meta name="robots" content="noindex, nofollow">

    <script type="module">

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 주변 인물 및 성격 설정
        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌. 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격. 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 과하게 문장부호를 남발하지 않는다면 물음표, 느낌표, 물결표 등을 자유롭게 사용해도 됨.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        // 🌟 이미지 압축 로직
        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
                img.onerror = () => resolve(base64Str); // 에러 방어
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleString('ko-KR'); } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts) => {
            if (!ts) return '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return '방금 전'; }
        };

        // 🌟 SVG 아이콘 모음 (카카오톡 스타일)
        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;
        const IconSend = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>;
        const IconPlus = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" className="w-full h-full"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTabFriend = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTabChat = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const IconTabFeed = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;

        const FullImageViewer = ({ src, onClose }) => <div className="fixed inset-0 z-[3000] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>;
        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

        // 🌟 프로필 모달 컴포넌트
        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            const [editStatus, setEditStatus] = useState(isMe ? myStatus : deidaraStatus);
            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-gray-50'} overflow-hidden relative`}>
                    {/* 모달 레이어 - 프로필 모달 포함 */}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {showCallModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-lg font-bold mb-4">📞 통화 기록 남기기</h2>
                                <div className="space-y-4 mb-6">
                                    <select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 text-sm outline-none">
                                        <option value="me">내가 걸음</option><option value="deidara">상대방이 걸음</option>
                                    </select>
                                    <input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-200 rounded-lg bg-gray-50 px-3 py-2 text-sm outline-none" placeholder="통화 시간 (예: 0:08)" />
                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="어떤 대화를 나눴나요? (AI 인식용)" className="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm h-24 resize-none outline-none" />
                                </div>
                                <div className="flex gap-2"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-2.5 rounded-lg bg-gray-100 font-bold text-gray-500 text-sm">취소</button><button onClick={handleCallSubmit} className="flex-1 py-2.5 rounded-lg bg-blue-500 text-white font-bold text-sm">기록</button></div>
                            </div>
                        </div>
                    )}

                    {/* 설정 모달 */}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                        <h2 className="text-lg font-bold mb-4">설정</h2>
                        <div className="flex items-center justify-between mb-4 bg-gray-50 px-4 py-3 rounded-lg border border-gray-100"><span className="text-sm font-bold text-gray-700">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-4 h-4" /></div>
                        <p className="text-xs mb-1 font-bold text-gray-400">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 mb-6 outline-none text-sm" />
                        <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-3 rounded-lg font-bold mb-2 text-gray-900">저장</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-500 py-3 rounded-lg font-bold">로그아웃</button>
                    </div></div>}

                    {/* 상단 헤더 */}
                    <header className={`px-4 py-3 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-xl text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-4">
                                    <button onClick={() => { setShowSettings(true); pushHistory('settings'); }} className="text-gray-500 w-6 h-6"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                                    {activeTab==='chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="text-gray-500 w-6 h-6"><IconPlus /></button>}
                                </div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1 w-full">
                                    <button onClick={() => { setView('main'); window.history.back(); }} className="p-1 -ml-1 text-gray-700 w-8 h-8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <div className="w-9 h-9 rounded-xl bg-white overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-[16px] ml-2 truncate max-w-[180px]">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {view === 'main' ? (
                            <Fragment>
                                {/* 친구 탭 */}
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-semibold">내 프로필</p>
                                            <div onClick={() => { setProfileTarget('me'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                                <div className="w-14 h-14 rounded-[22px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        {/* 회색 구분선 */}
                                        <div className="h-[1px] bg-gray-100 mx-5 my-1"></div>
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-semibold">친구 1</p>
                                            <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                                <div className="w-12 h-12 rounded-[18px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {/* 채팅 탭 */}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 bg-white">
                                        {chatRooms.length === 0 ? (
                                            <div className="text-center text-gray-400 py-10 text-sm">대화방이 없습니다. 상단 + 버튼을 눌러보세요.</div>
                                        ) : chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); pushHistory('chatRoom'); }} className="flex items-center gap-4 px-5 py-3 bg-white hover:bg-gray-50 cursor-pointer relative group">
                                                <div className="w-12 h-12 rounded-[18px] bg-gray-100 overflow-hidden shrink-0 border border-gray-50">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-16"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-500 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                {/* 🌟 명시적인 방 이름 수정 버튼 */}
                                                <div className="absolute right-4 flex gap-1">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="p-2 text-gray-400 hover:text-blue-500 text-sm font-bold border border-gray-200 rounded-lg shadow-sm bg-white">수정</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {/* 게시물(피드) 탭 */}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-[#f3f4f6]">
                                        <div className="bg-white px-5 py-5 mb-3 shadow-sm">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="데이다라에게 할 말이 있나요?" className="w-full bg-transparent p-2 text-[15px] outline-none resize-none font-medium" rows="3" />
                                            {feedAttachedImage && <div className="relative inline-block mt-2"><img src={feedAttachedImage} className="w-20 h-20 object-cover rounded-xl shadow-sm border border-gray-200" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 text-xs">✕</button></div>}
                                            <div className="flex justify-between items-center mt-2 border-t border-gray-100 pt-3">
                                                <div className="flex gap-2">
                                                    <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400 hover:bg-gray-100 rounded-lg"><div className="w-6 h-6"><IconCamera /></div></button>
                                                    <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                    <button onClick={handleDeidaraNewPost} disabled={isPosting} className="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg font-bold text-[12px]">AI 게시물 요구</button>
                                                </div>
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-5 py-2 bg-[#FEE500] text-gray-900 rounded-lg font-bold text-sm shadow-sm">올리기</button>
                                            </div>
                                        </div>
                                        {/* 🌟 피드 레이아웃 카카오스타일 복구 (p-8, mb-10, 내부 댓글박스 bg-gray-50) */}
                                        <div className="space-y-10 px-4 pb-20">
                                            {posts.length === 0 ? (
                                                <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없습니다.</div>
                                            ) : posts.map(post=>(
                                                <div key={post.id || Math.random()} className="bg-white rounded-2xl shadow-sm p-8">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-gray-100">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-bold text-[15px] text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[11px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                        <button onClick={() => { if(confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 w-5 h-5"><IconTrash/></button>
                                                    </div>
                                                    {post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-4">{post.content}</p>}
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => { setShowFullImage(post.imageUrl); pushHistory('fullImage'); }} className="w-full h-auto rounded-xl mb-4 shadow-sm" />}
                                                    
                                                    {/* 🌟 댓글 영역 (회색 박스 안으로 통합) */}
                                                    <div className="bg-gray-50 rounded-xl p-4 mt-4">
                                                        <p className="text-[12px] font-bold text-gray-500 mb-3">댓글 {(post.comments||[]).length}개</p>
                                                        <div className="space-y-4 mb-4">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-3">
                                                                    <div className="w-8 h-8 rounded-full overflow-hidden shrink-0 bg-white">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1"><span className="font-bold text-[13px] text-gray-900">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[14px] text-gray-800 leading-snug">{c.content}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 items-center">
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글을 남겨보세요." className="flex-1 min-w-0 bg-white border border-gray-200 rounded-lg px-3 py-2 text-[13px] outline-none" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="shrink-0 whitespace-nowrap font-bold text-[13px] px-4 py-2 bg-white border border-gray-200 text-gray-800 rounded-lg active:bg-gray-100">등록</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-4 space-y-3 custom-scrollbar pb-32" onClick={() => setShowAttachMenu(false)}>
                                {messages.length === 0 && !isTyping ? (
                                    <div className="flex justify-center items-center h-full text-xs text-gray-400 font-medium">메시지를 입력해 대화를 시작해보세요.</div>
                                ) : messages.map((msg, i) => (
                                    <div key={msg.id || i} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[80%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div className="w-9 h-9 rounded-xl bg-white mr-2 shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-500 mb-1 ml-1">{msg.sender === 'deidara' ? '데이다라' : msg.sender}</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div className="flex flex-col gap-1">
                                                        {msg.imageUrl && <img src={msg.imageUrl} onClick={() => { setShowFullImage(msg.imageUrl); pushHistory('fullImage'); }} className={`max-w-[200px] w-full h-auto rounded-xl shadow-sm cursor-pointer ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`} />}
                                                        {msg.type === 'call' ? (
                                                            <div className="px-4 py-2 rounded-xl bg-white border border-gray-200 flex items-center gap-2">
                                                                <div className="w-4 h-4 text-gray-700"><IconPhoneFilled /></div>
                                                                <span className="font-bold text-[14px] text-gray-800">{msg.duration}</span>
                                                            </div>
                                                        ) : (
                                                            msg.text && <div className={`px-3 py-2 text-[14px] shadow-sm whitespace-pre-wrap ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`}>{msg.text}</div>
                                                        )}
                                                    </div>
                                                    <span className="text-[9px] text-gray-400 whitespace-nowrap">{msg.time || "방금 전"}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-11 bg-white border border-gray-100 px-3 py-1.5 rounded-lg text-[10px] w-fit animate-pulse text-gray-400">입력 중...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 🌟 하단 탭 바 / 채팅 바 (카카오톡 SVG 스타일) */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[60px] pb-safe z-30 ${view==='main'?'justify-around':'px-2 gap-1'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='friends'?'tab-active':'tab-inactive'}`}><IconTabFriend active={activeTab==='friends'} /><span className="text-[10px]">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='chat'?'tab-active':'tab-inactive'}`}><IconTabChat active={activeTab==='chat'} /><span className="text-[10px]">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='feed'?'tab-active':'tab-inactive'}`}><IconTabFeed active={activeTab==='feed'} /><span className="text-[10px]">게시물</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                {showAttachMenu && (
                                    <div className="absolute bottom-[65px] left-2 bg-white border border-gray-200 rounded-lg shadow-lg p-2 w-40 flex flex-col gap-1 z-40">
                                        <button onClick={() => chatFileInputRef.current.click()} className="text-left px-3 py-2 text-[13px] text-gray-800 hover:bg-gray-100 rounded-md">사진 전송</button>
                                        <button onClick={handleRequestDeidaraPhoto} className="text-left px-3 py-2 text-[13px] text-gray-800 hover:bg-gray-100 rounded-md">사진 요구</button>
                                        <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                    </div>
                                )}
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center text-gray-400 p-2"><IconPlus /></button>
                                <button onClick={() => { setShowCallModal(true); pushHistory('callModal'); }} className="w-8 h-8 shrink-0 flex items-center justify-center text-gray-400 mr-1 p-1.5"><IconPhoneOutline /></button>
                                <div className="flex-1 bg-gray-100 rounded-full flex items-center pr-1 mr-1">
                                    <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-transparent px-4 py-2.5 text-[14px] outline-none" placeholder="메시지 입력" />
                                    {inputText.trim() && <button onClick={handleSend} className="w-8 h-8 bg-[#FEE500] rounded-full flex items-center justify-center shrink-0 mr-0.5"><div className="w-5 h-5"><IconSend /></div></button>}
                                </div>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
