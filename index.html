<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지. 여기는 메신저 앱 채팅방이야. 행동 묘사를 하지 마. 사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너는 츤데레이며 다혈질이야. 연지를 짝사랑하고 있어. 말투 끝에 가끔 '음'을 붙여. 짧게 대답해.`;

        // 이미지 압축
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; 
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleString('ko-KR'); } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('loading'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [profileTarget, setProfileTarget] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);
            const chatEndRef = useRef(null);

            // 초기화 감지
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(checkFirebase);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { 
                                setUser(u); setView('main'); 
                                loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb);
                            } else {
                                setView('login');
                            }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, db, view]);

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text.trim();
                } catch (e) { return "통신 장애 났다. 음!"; }
            };

            const handleSend = async () => {
                if (!inputText.trim() || !currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const text = inputText; setInputText(''); setIsTyping(true);
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });

                const resp = await fetchAPI([{ role: 'user', parts: [{ text }] }]);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            if (view === 'loading') return <div className="w-full h-full flex items-center justify-center bg-[#BACEE0] text-white font-bold">로딩 중...</div>;

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0]">
                    <h1 className="text-4xl font-black text-gray-800 mb-8">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-lg font-bold">구글로 시작하기</button>
                </div>
            );

            if (view === 'chatRoom') return (
                <div className="w-full h-full flex flex-col bg-[#BACEE0] slide-in">
                    <header className="p-4 flex items-center gap-3 border-b bg-white/90 sticky top-0 z-20">
                        <button onClick={() => setView('main')} className="font-bold text-xl">←</button>
                        <h1 className="font-bold flex-1">데이다라</h1>
                    </header>
                    <main className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map(msg => (
                            <div key={msg.id} className={`flex ${msg.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl text-sm shadow-sm ${msg.sender === 'me' ? 'bg-[#FEE500]' : 'bg-white'}`}>
                                    {msg.text}
                                </div>
                            </div>
                        ))}
                        {isTyping && <div className="text-xs text-gray-500 animate-pulse">데이다라가 입력 중...</div>}
                        <div ref={chatEndRef} />
                    </main>
                    <footer className="p-3 bg-white border-t flex gap-2 pb-safe">
                        <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none" placeholder="메시지..." />
                        <button onClick={handleSend} className="bg-[#FEE500] px-4 py-2 rounded-full font-bold">전송</button>
                    </footer>
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col bg-white">
                    {showSettings && (
                        <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-6">
                            <div className="bg-white p-6 rounded-2xl w-full max-w-sm">
                                <h2 className="font-bold mb-4">Gemini API Key 입력</h2>
                                <input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border p-2 rounded mb-4" />
                                <button onClick={()=>{localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false);}} className="w-full bg-[#FEE500] py-2 rounded font-bold">저장</button>
                            </div>
                        </div>
                    )}
                    <header className="p-4 border-b flex justify-between items-center">
                        <h1 className="text-xl font-black">{activeTab === 'friends' ? '친구' : '채팅'}</h1>
                        <button onClick={()=>setShowSettings(true)}>⚙️</button>
                    </header>
                    <main className="flex-1 overflow-y-auto">
                        {activeTab === 'friends' ? (
                            <div className="p-4">
                                <div onClick={()=>{setCurrentRoomId('main_room'); setView('chatRoom');}} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-xl cursor-pointer">
                                    <div className="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center text-2xl">💣</div>
                                    <div><p className="font-bold">데이다라</p><p className="text-sm text-gray-500">예술은 폭발이다. 음!</p></div>
                                </div>
                            </div>
                        ) : (
                            <div className="p-4 text-center text-gray-400 mt-10">채팅 목록은 친구 탭에서 데이다라를 눌러 시작하세요.</div>
                        )}
                    </main>
                    <nav className="h-16 border-t flex justify-around items-center bg-gray-50 pb-safe">
                        <button onClick={()=>setActiveTab('friends')} className={activeTab==='friends'?'font-bold':''}>친구</button>
                        <button onClick={()=>setActiveTab('chat')} className={activeTab==='chat'?'font-bold':''}>채팅</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
