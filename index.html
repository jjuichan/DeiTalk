<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>DeiTalk</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #FFFFFF; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.05); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Kakao Style Bubble */
        .bubble-me { background-color: #FEE500; border-radius: 15px 2px 15px 15px; }
        .bubble-other { background-color: #FFFFFF; border-radius: 2px 15px 15px 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌이며 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격이며 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-300"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);

        // 🌟 프로필 모달 (Kakao style)
        const ProfileModal = ({ target, setTarget, isEditing, setIsEditing, myP, deiP, myB, deiB, myS, deiS, setMyS, setFull, uploadUI, setTab }) => {
            const isMe = target === 'me';
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden shadow-2xl" style={{ backgroundImage: `url('${isMe ? myB : deiB}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditing) setIsEditing(false); else setTarget(null); }} className="text-white p-2">✕</button>
                        {!isEditing && <button onClick={() => setIsEditing(true)} className="text-white px-3 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        <div onClick={() => { if(!isEditing) setFull(isMe ? myP : deiP); }} className="w-24 h-24 rounded-[32px] bg-white/20 flex items-center justify-center shadow-2xl mb-4 border border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {renderProfilePicCommon(isMe ? myP : deiP)}
                            {isEditing && <label htmlFor="p-up" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer">📷</label>}
                            {isEditing && <input type="file" id="p-up" onChange={(e) => uploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-xl font-bold mb-1 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-8 mt-2 mx-auto">
                            {isEditing && isMe ? <input type="text" defaultValue={myS} onBlur={(e) => { setMyS(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border-b border-white/50 py-2 text-sm text-white text-center outline-none" /> : <p className="text-[14px] opacity-80 text-shadow">{isMe ? myS : deiS}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/10 pt-8 flex justify-around mx-auto">
                            {isEditing ? <button onClick={() => setIsEditing(false)} className="bg-white text-gray-900 font-bold px-10 py-3 rounded-xl w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setTarget(null); setTab('chat'); }}><div className="text-2xl">💬</div><span className="text-[11px] font-medium text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const chatEndRef = useRef(null);
            const feedFileInputRef = useRef(null);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else setView('login');
                        });
                    }
                }, 100);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), window.firebaseAPI.orderBy('createdAt', 'asc'));
                const unsub = window.firebaseAPI.onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                    });
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵한다.)";
                    return text.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                } catch (e) { return "통신 장애 났다. 음!"; }
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("채팅방 이름을 수정하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text: "(이어서 한 마디 더 해줘.)" }] }));
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                    setIsTyping(false); return;
                }
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => ({
                    role: m.sender === 'me' ? 'user' : 'model',
                    parts: [{ text: m.type === 'call' ? `[통화 기록: ${m.duration}]` : (m.text || "[사진]") }]
                }));
            };

            const handleAddPost = async () => {
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput.trim(), imageUrl: feedAttachedImage, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어: "${postInput}". 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const commentText = commentInputs[post.id]?.trim();
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) {
                    setIsPosting(true);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `데이다라, 연지의 피드에 댓글 남겨줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [post.id]: ''}));
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 남겨줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    if(target==='me') { if(type==='profile') setMyProfileImgUrl(b64); else setMyBgImgUrl(b64); localStorage.setItem(type==='profile'?'my_profile_url':'my_bg_url', b64); }
                    else { if(type==='profile') setProfileImgUrl(b64); else setBgImgUrl(b64); localStorage.setItem(type==='profile'?'deidara_profile_url':'deidara_bg_url', b64); }
                };
                reader.readAsDataURL(file);
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    <h1 className="text-3xl font-black text-gray-800 mb-8">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-xl shadow-md font-bold active:scale-95 transition-all">Google 계정으로 로그인</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-white'} overflow-hidden relative`}>
                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUI} setTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/50 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl"><h2 className="text-lg font-bold mb-4">설정</h2><p className="text-xs text-gray-400 mb-2">Gemini API KEY</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-lg px-4 py-3 mb-6 outline-none text-sm font-bold" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-3 rounded-lg font-bold text-gray-900 shadow-sm">저장</button></div></div>}

                    {/* 헤더 */}
                    <header className={`px-5 py-4 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white border-b border-gray-100':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-xl text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <button onClick={() => setShowSettings(true)} className="text-xl">⚙️</button>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setView('main')} className="p-2 mr-1">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                    </button>
                                    <div onClick={() => setProfileTarget('deidara')} className="w-9 h-9 rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-[17px] ml-2 truncate max-w-[150px]">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        {/* 내 프로필 */}
                                        <div className="px-5 py-3">
                                            <div onClick={() => setProfileTarget('me')} className="flex items-center gap-4 py-2 cursor-pointer">
                                                <div className="w-14 h-14 rounded-[22px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-400 mt-0.5 truncate">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        {/* 🌟 회색 구분선 */}
                                        <hr className="mx-4 border-gray-100" />
                                        {/* 친구 목록 */}
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-medium">친구 1</p>
                                            <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-4 py-2 cursor-pointer">
                                                <div className="w-12 h-12 rounded-[18px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-400 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-4 px-5 py-3 bg-white hover:bg-gray-50 cursor-pointer relative group">
                                                <div className="w-12 h-12 rounded-[18px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-12"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-500 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="absolute right-12 p-2 text-gray-300 hover:text-blue-500">✎</button>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm("방 삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="absolute right-4 p-2 text-gray-300">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100">
                                        {/* 피드 작성 */}
                                        <div className="bg-white p-5 mb-3 shadow-sm">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-4 text-[14px] outline-none resize-none focus:bg-white transition-all" rows="3" />
                                            <div className="flex justify-between items-center mt-3">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></button>
                                                <input type="file" accept="image/*" ref={feedFileInputRef} onChange={async (e) => setFeedAttachedImage(await compressImage(e.target.files[0]))} className="hidden" />
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold text-sm active:scale-95 transition-all">올리기</button>
                                            </div>
                                        </div>
                                        {/* 피드 목록 - 여백 p-8, mb-10 적용 */}
                                        <div className="space-y-10 px-4 pb-32">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-3xl shadow-sm p-8 relative msg-anim border border-gray-100/50">
                                                    <div className="flex items-center gap-3 mb-6">
                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-gray-100">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-bold text-sm text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400">{safeDateStr(post.createdAt)}</div></div>
                                                        <button onClick={() => { if(confirm("삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 p-2">✕</button>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-2xl mb-6 shadow-sm" />}
                                                    {post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-8 whitespace-pre-wrap">{post.content}</p>}
                                                    
                                                    <div className="bg-gray-50 rounded-2xl p-6 shadow-inner">
                                                        <p className="text-[11px] font-bold text-gray-300 mb-4 ml-1 uppercase tracking-wider">Comments</p>
                                                        <div className="space-y-6 mb-8">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-3 items-start">
                                                                    <div className="w-[30px] h-[30px] rounded-full overflow-hidden shrink-0 mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1"><span className="font-bold text-[12px] text-gray-900 mb-0.5">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[13px] text-gray-700 leading-snug">{c.content}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 items-center"><input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 남기기..." className="flex-1 bg-white border border-gray-100 rounded-xl px-4 py-2.5 text-[13px] outline-none shadow-sm focus:border-gray-300 transition-colors" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} /><button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-bold text-[13px] px-5 py-2.5 bg-gray-900 text-white rounded-xl active:scale-95 transition-all shadow-md">게시</button></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-6 space-y-4 custom-scrollbar pb-32">
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div className="w-10 h-10 rounded-[14px] bg-white mr-2 shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-bold">데이다라</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div className={`px-4 py-2 rounded-xl text-[14px] shadow-sm ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`}>{msg.text || "[사진]"}</div>
                                                    <span className="text-[9px] text-gray-500 mb-0.5 font-bold">{msg.time || "방금"}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-12 bg-white/70 px-4 py-2 rounded-xl text-[10px] w-fit animate-pulse shadow-sm text-gray-400 font-bold border border-black/5 tracking-widest uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 탭 바 / 채팅 하단 바 */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[76px] pb-safe z-30 ${view==='main'?'justify-around':'px-4 gap-2'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='friends'?'text-gray-900':'text-gray-300'}`}>🏠<span className="text-[10px] font-bold">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='chat'?'text-gray-900':'text-gray-300'}`}>💬<span className="text-[10px] font-bold">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='feed'?'text-gray-900':'text-gray-300'}`}>🖼️<span className="text-[10px] font-bold">피드</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 active:scale-90 font-bold text-xl">+</button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-2xl px-4 py-3 text-[14px] outline-none" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-2xl flex items-center justify-center shadow-sm">🚀</button>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
