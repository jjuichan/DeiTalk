<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- 🌟 React & Tailwind 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- 🌟 Firebase Compat 라이브러리 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; background-color: #BACEE0; }
        .loading-dot { animation: dot-blink 1.4s infinite both; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 Firebase 초기화 로직 개선
        let auth = null, db = null, provider = null;
        let isFirebaseReady = false;

        const initFirebase = () => {
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                const firebaseConfig = JSON.parse(configStr);
                
                if (firebaseConfig && firebaseConfig.apiKey) {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    auth = firebase.auth();
                    db = firebase.firestore();
                    provider = new firebase.auth.GoogleAuthProvider();
                    isFirebaseReady = true;
                    return true;
                }
            } catch (e) {
                console.error("Firebase Initialization Error:", e);
            }
            return false;
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'deitalk-app';

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, '메신저 앱'의 채팅방이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
틱틱대지만 속으로는 잘 챙겨주는 츤데레 성격.
        `;

        // 헬퍼 함수들
        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center bg-gray-100 text-gray-400 text-2xl font-black italic">D</div>);

        const IconSend = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            // 설정값들
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash-preview-09-2025'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");
            
            const [showSettings, setShowSettings] = useState(false);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [analysisResult, setAnalysisResult] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const chatEndRef = useRef(null);

            // 🌟 무한 로딩 해결을 위한 핵심 이펙트
            useEffect(() => {
                const ready = initFirebase();
                
                // Firebase가 준비되지 않았을 경우 (Config 없음 등) 즉시 로그인 화면으로 전환
                if (!ready || !auth) {
                    console.warn("Firebase config is missing or invalid. Standing by for manual input or guest login.");
                    setTimeout(() => setView('login'), 500);
                    return;
                }

                // 인증 상태 감시
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        loadChatRooms(u.uid);
                        setView('main');
                    } else {
                        setView('login');
                    }
                });

                // 비상 타임아웃: 5초 이상 반응 없으면 로그인 화면 시도
                const timer = setTimeout(() => {
                    if (view === 'loading') setView('login');
                }, 5000);

                return () => {
                    unsubscribe();
                    clearTimeout(timer);
                };
            }, []);

            const getPath = (uid, col) => `/artifacts/${appId}/users/${uid}/${col}`;

            const loadChatRooms = (uid) => {
                if (!db) return;
                db.collection(getPath(uid, 'rooms')).orderBy('updatedAt', 'desc').onSnapshot((sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); 
                    setChatRooms(rooms);
                }, err => console.error("Room Load Error:", err));
            };

            useEffect(() => {
                if (view === 'chatRoom' && currentRoomId && user && db) {
                    const unsubscribe = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages')
                        .orderBy('createdAt', 'asc').onSnapshot((sn) => {
                            const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); 
                            setMessages(msgs);
                            setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                        }, err => console.error("Msg Load Error:", err));
                    return () => unsubscribe();
                }
            }, [view, currentRoomId, user]);

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const resp = await fetch(url, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } }) 
                    });
                    const data = await resp.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵 중...)";
                } catch (e) { return "통신 장애 발생! API 키를 확인해주세요."; }
            };

            const analyzeChat = async () => {
                if (messages.length < 3) return alert("대화가 더 필요해!");
                setIsAnalyzing(true);
                try {
                    const history = messages.slice(-20).map(m => `${m.sender}: ${m.text}`).join('\n');
                    const result = await fetchAPI([{role:'user', parts:[{text: `지금까지의 대화 흐름을 보고 연지와 데이다라의 관계를 짧고 굵게 분석해줘. 말투는 츤데레 친구처럼:\n${history}`}]}]);
                    setAnalysisResult(result);
                } finally {
                    setIsAnalyzing(false); 
                }
            };

            const handleLogin = () => {
                if (!isFirebaseReady) return alert("서버 설정이 올바르지 않습니다.");
                auth.signInWithRedirect(provider).catch(() => setView('login'));
            };

            const handleGuestLogin = () => {
                if (!isFirebaseReady) {
                    // Firebase가 아예 안 잡힐 때의 더미 진입 (개발용/긴급용)
                    setUser({ uid: 'guest_' + Date.now(), isAnonymous: true });
                    setView('main');
                    return;
                }
                auth.signInAnonymously().catch(() => setView('login'));
            };

            const handleSend = async () => {
                if (!currentRoomId || !user || !inputText.trim() || !db) return;
                const text = inputText; 
                setInputText(''); 
                setIsTyping(true);
                try {
                    const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    
                    await roomRef.collection('messages').add({ 
                        sender: 'me', text, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    
                    const chatHistory = messages.slice(-10).map(m => ({role: m.sender==='me'?'user':'model', parts:[{text: m.text}]}));
                    const resp = await fetchAPI([...chatHistory, {role:'user', parts:[{text}]}]);
                    
                    await roomRef.collection('messages').add({ 
                        sender: 'deidara', text: resp, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    await roomRef.set({ lastMessage: resp, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                } finally { 
                    setIsTyping(false); 
                }
            };

            // 로딩 화면 UI
            if (view === 'loading') return (
                <div className="w-full h-full flex flex-col items-center justify-center bg-[#BACEE0]">
                    <div className="w-16 h-16 rounded-[24px] bg-white flex items-center justify-center text-3xl shadow-lg mb-6 animate-bounce">🎨</div>
                    <div className="flex gap-1">
                        <span className="font-black text-white text-lg tracking-widest uppercase">Loading</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                        <span className="loading-dot font-black text-white text-lg">.</span>
                    </div>
                </div>
            );

            // 로그인 화면 UI
            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    <div className="w-24 h-24 rounded-[32px] bg-white mb-8 shadow-2xl flex items-center justify-center text-4xl">🎨</div>
                    <h1 className="text-4xl font-black text-gray-800 mb-2 tracking-tighter italic text-shadow">DeiTalk</h1>
                    <p className="text-gray-600 mb-12 font-bold opacity-80">예술은 폭발이다, 음!</p>
                    
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-xl font-black active:scale-95 transition-all mb-4 text-gray-800">GOOGLE LOGIN</button>
                    <button onClick={handleGuestLogin} className="w-full max-w-xs bg-black/10 py-4 rounded-2xl font-bold text-gray-700 text-sm active:scale-95 transition-all">GUEST START</button>
                    
                    {!isFirebaseReady && <p className="mt-8 text-[10px] text-red-500 font-bold bg-white/50 px-4 py-2 rounded-full">환경 설정이 비어있습니다. 게스트 모드로 사용 가능합니다.</p>}
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col overflow-hidden relative bg-[#BACEE0]">
                    {/* 설정 모달 */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[4000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-8 text-gray-800">Settings</h2>
                                <div className="space-y-6 mb-10">
                                    <div>
                                        <p className="text-[10px] font-black text-gray-400 mb-2 uppercase ml-1">AI Model</p>
                                        <select value={apiModel} onChange={e=>{ setApiModel(e.target.value); localStorage.setItem('gemini_api_model', e.target.value); }} className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3.5 text-sm font-bold outline-none">
                                            <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash (추천)</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                        </select>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-gray-400 mb-2 uppercase ml-1">Gemini API Key</p>
                                        <input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} placeholder="AI 답변을 위해 키를 입력하세요" className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3.5 outline-none text-sm font-bold" />
                                    </div>
                                </div>
                                <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-black mb-3 text-gray-900 shadow-md active:scale-95">SAVE</button>
                                <button onClick={() => { auth?.signOut(); setView('login'); setShowSettings(false); }} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95">LOGOUT</button>
                            </div>
                        </div>
                    )}

                    {/* 관계 분석 결과 */}
                    {analysisResult && (
                        <div className="fixed inset-0 z-[5000] bg-black/80 flex items-center justify-center p-6 backdrop-blur-md" onClick={() => setAnalysisResult(null)}>
                            <div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-xl font-black mb-6 text-orange-500 flex items-center gap-2">✨ 관계 분석 리포트</h3>
                                <div className="text-[15px] text-gray-700 leading-relaxed font-bold whitespace-pre-wrap bg-orange-50 p-5 rounded-3xl">{analysisResult}</div>
                                <button onClick={() => setAnalysisResult(null)} className="w-full mt-8 py-4 bg-[#BACEE0] rounded-2xl font-black text-white active:scale-95 shadow-lg">알았어, 음!</button>
                            </div>
                        </div>
                    )}

                    {view === 'main' ? (
                        <Fragment>
                            <header className="px-6 py-6 bg-white flex justify-between items-center sticky top-0 z-20">
                                <h1 className="font-black text-2xl tracking-tighter text-gray-900 uppercase italic">
                                    {activeTab==='friends'?"Friends":activeTab==='chat'?"Chat":"Feed"}
                                </h1>
                                <div className="flex gap-4">
                                    {activeTab === 'chat' && <button onClick={() => { const n = prompt("채팅방 이름?"); if(n && db) db.collection(getPath(user.uid, 'rooms')).add({name:n, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); }} className="text-xl font-black">＋</button>}
                                    <button onClick={() => setShowSettings(true)} className="text-xl">⚙️</button>
                                </div>
                            </header>
                            <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                                {activeTab === 'friends' && (
                                    <div className="flex-1">
                                        <div className="px-6 py-4">
                                            <div className="flex items-center gap-5 p-3 hover:bg-gray-50 rounded-3xl transition-all active:scale-[0.98]">
                                                <div className="w-[64px] h-[64px] rounded-[24px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-50">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-lg tracking-tight">연지</h3><p className="text-xs text-gray-500 mt-1 truncate font-bold">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-6 py-2">
                                            <p className="text-[10px] font-black text-gray-300 ml-4 mb-3 uppercase tracking-widest">Favorite Friends</p>
                                            <div onClick={() => { setCurrentRoomId(chatRooms[0]?.id || 'default'); setView('chatRoom'); }} className="flex items-center gap-5 p-3 hover:bg-orange-50 rounded-3xl cursor-pointer transition-all active:scale-[0.98]">
                                                <div className="w-[56px] h-[56px] rounded-[22px] bg-orange-100 flex items-center justify-center overflow-hidden border border-orange-50">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-[17px] tracking-tight">데이다라</h3><p className="text-xs text-gray-500 mt-1 truncate font-bold">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-2 space-y-4">
                                        {chatRooms.length === 0 && <div className="text-center py-20 text-gray-300 font-bold">오른쪽 위 +를 눌러 채팅을 시작해, 음!</div>}
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-5 p-5 bg-white border border-gray-100 rounded-[32px] cursor-pointer shadow-sm active:scale-95 transition-all">
                                                <div className="w-[54px] h-[54px] rounded-[20px] bg-gray-50 flex items-center justify-center overflow-hidden shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-6"><h3 className="font-black text-gray-900 truncate tracking-tight">{room.name}</h3><p className="text-xs text-gray-500 truncate mt-1 font-bold italic">{room.lastMessage || "대화가 없습니다."}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </Fragment>
                    ) : (
                        <Fragment>
                            <header className="px-4 py-4 flex items-center justify-between bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md border-b border-black/5">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setView('main')} className="p-2 active:scale-90 rounded-full font-black text-gray-700 text-xl">←</button>
                                    <div className="w-10 h-10 rounded-[14px] bg-white overflow-hidden shadow-sm shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-black text-gray-800 text-lg">데이다라</h1>
                                </div>
                                <button onClick={analyzeChat} disabled={isAnalyzing} className={`p-3 rounded-2xl bg-white/30 active:scale-90 transition-all font-black text-xl shadow-sm ${isAnalyzing?'animate-spin':''}`}>✨</button>
                            </header>
                            <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar bg-[#BACEE0]">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'} msg-anim`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div className="w-10 h-10 rounded-[14px] bg-white mr-3 shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-black uppercase tracking-tighter">Deidara</span>}
                                                <div className={`px-5 py-3.5 rounded-[22px] text-[15px] shadow-sm font-bold leading-relaxed tracking-tight ${msg.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}>{msg.text}</div>
                                                <span className={`text-[10px] text-black/30 mt-1 font-bold ${msg.sender === 'me' ? 'text-right mr-1' : 'text-left ml-1'}`}>{msg.time}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-14 text-[10px] text-white font-black animate-pulse tracking-widest uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-4 bg-white border-t border-gray-100 pb-safe flex items-center gap-3 relative z-30">
                                <button className="w-11 h-11 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-black text-xl">+</button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 border-none rounded-full px-5 py-3.5 text-sm outline-none font-bold focus:bg-white transition-all" placeholder="메시지를 입력해, 음!" />
                                <button onClick={handleSend} className="w-11 h-11 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition-all shadow-md"><IconSend /></button>
                            </footer>
                        </Fragment>
                    )}

                    {view === 'main' && (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-50 flex justify-around items-center h-[85px] pb-safe z-30 shadow-2xl backdrop-blur-md px-6">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full transition-all ${activeTab==='friends'?'text-gray-900 scale-110 font-black':'text-gray-300 font-bold'}`}><span className="text-2xl">👤</span><span className="text-[9px] uppercase tracking-tighter">Friends</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full transition-all ${activeTab==='chat'?'text-gray-900 scale-110 font-black':'text-gray-300 font-bold'}`}><span className="text-2xl">💬</span><span className="text-[9px] uppercase tracking-tighter">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full transition-all ${activeTab==='feed'?'text-gray-900 scale-110 font-black':'text-gray-300 font-bold'}`}><span className="text-2xl">🎨</span><span className="text-[9px] uppercase tracking-tighter">Art</span></div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
