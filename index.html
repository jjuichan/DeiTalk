[주변 인물 (현대 AU 설정)]

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

            const pushHistory = (stateName) => {

            };

            useEffect(() => {
                const handlePopState = () => {
                    if (showFullImage) setShowFullImage(null);
                    else if (cropModalData) setCropModalData(null);
                    else if (isEditingProfile) setIsEditingProfile(false);
                    else if (profileTarget) setProfileTarget(null);

                    else if (showSettings) setShowSettings(false);
                    else if (view === 'chatRoom') setView('main');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [showFullImage, cropModalData, isEditingProfile, profileTarget, showCallModal, showSettings, view]);

            // 사진 자르기(Crop)
            const [cropScale, setCropScale] = useState(1);
            const cropPos = useRef({ x: 0, y: 0 }); 
            const isDragging = useRef(false);
            const lastPos = useRef({ x: 0, y: 0 });
            const cropImgRef = useRef(null);

            const drawCrop = () => {
                if (!cropImgRef.current || !cropCanvasRef.current) return;
                const canvas = cropCanvasRef.current, ctx = canvas.getContext('2d'), img = cropImgRef.current;
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * cropScale;
                const imgW = img.width * baseScale, imgH = img.height * baseScale;
                const maxDx = Math.max(0, (imgW - canvas.width) / 2), maxDy = Math.max(0, (imgH - canvas.height) / 2);
                cropPos.current.x = Math.max(-maxDx, Math.min(maxDx, cropPos.current.x)); 
                cropPos.current.y = Math.max(-maxDy, Math.min(maxDy, cropPos.current.y));
                ctx.drawImage(img, (canvas.width - imgW) / 2 + cropPos.current.x, (canvas.height - imgH) / 2 + cropPos.current.y, imgW, imgH);
            };

            useEffect(() => { 
                if (cropModalData) { 
                    const i = new Image(); i.src = cropModalData.src; 
                    i.onload = () => { cropImgRef.current = i; cropPos.current = {x:0, y:0}; setCropScale(1); drawCrop(); }; 
                } 
            }, [cropModalData]);

            useEffect(() => { if(cropModalData) drawCrop(); }, [cropScale, cropModalData]);

            const handleCropDown = (e) => { isDragging.current = true; const c = e.touches ? e.touches[0] : e; lastPos.current = { x: c.clientX, y: c.clientY }; };
            const handleCropMove = (e) => { 
                if (!isDragging.current) return; const c = e.touches ? e.touches[0] : e; 
                cropPos.current.x += (c.clientX - lastPos.current.x); cropPos.current.y += (c.clientY - lastPos.current.y); 
                lastPos.current = { x: c.clientX, y: c.clientY }; requestAnimationFrame(drawCrop); 
            };

            // DB 로딩
            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), window.firebaseAPI.orderBy('createdAt', 'asc'));
                const unsub = window.firebaseAPI.onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: m.imageUrl.includes('image/png') ? 'image/png' : 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵한다.)";
                } catch (e) { return "통신 장애 났다, 음!"; }
            };

            const generateImageAPI = async (theme) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${geminiKey}`;
                const payload = { instances: [{ prompt: `A photorealistic casual smartphone snapshot. Subject: ${theme || 'daily life'}. No text.` }], parameters: { sampleCount: 1 } };
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                return await compressBase64Image(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("방 이름을 수정하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: `(시스템 지침: 네가 방금 한 말에 이어서 한 마디 더 덧붙여봐.)` }] });
                    const resp = await fetchAPI(history);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });

                    await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'deidara', content: resp, imageUrl: b64, createdAt: serverTimestamp(), comments: [] });
                } catch (e) { setAlertMsg("이미지 생성 실패"); } finally { setIsPosting(false); }
            };

            const handleChatUploadMyPhoto = async (e) => {

                setShowAttachMenu(false); setIsTyping(true);
                const reader = new FileReader();

                reader.onload = async (ev) => {

                    const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;

                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: '[사진]', updatedAt: serverTimestamp() }, { merge: true });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "사진 보냈어." }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    const textResp = await fetchAPI(history.concat({ role: 'user', parts: [{ text: "(지침: 연지가 방금 사진을 보냈어. 틱틱거리며 반응해봐.)" }] }));
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, time, createdAt: serverTimestamp() });
                    setIsTyping(false);
                };

            const handleRequestDeidaraPhoto = async () => {

                setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                try {
                    const b64Image = await generateImageAPI(theme);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{text: `야, ${theme} 사진 좀 보내봐.`}] });
                    const textResp = await fetchAPI(history.concat({ role: 'user', parts: [{ text: "(지침: 요청받은 사진을 보내며 말해줘.)" }] }));
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, imageUrl: b64Image, time, createdAt: serverTimestamp() });
                } catch (err) { setAlertMsg(`생성 실패: ${err.message}`); } finally { setIsTyping(false); }
            };

            const handleEditPost = async (postId) => {

            };

            const handleEditMessage = async (msgId) => {

                setEditingMessageId(null); setSelectedMsgId(null);
            };

                if(!confirm('메시지를 삭제하시겠습니까?')) return;

                await deleteDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`));
                setSelectedMsgId(null);
            };

                const targetIndex = messages.findIndex(m => m.id === msgId);
                if(targetIndex === -1) return;
                setIsTyping(true);
                const { doc: fdoc, updateDoc } = window.firebaseAPI;
                const historyContext = buildHistory(messages.slice(Math.max(0, targetIndex - 100), targetIndex), 100);
                const resp = await fetchAPI(historyContext.concat({ role: 'user', parts: [{ text: "(지침: 네가 방금 한 대답을 취소하고, 다른 표현으로 다시 대답해 봐.)" }] }));
                await updateDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: resp });
                setIsTyping(false); setSelectedMsgId(null);
            };

            const handleDeleteComment = async (postId, commentObj) => {
                if(!confirm("댓글을 삭제하시겠습니까?")) return;
                const { doc: fdoc, updateDoc, arrayRemove } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayRemove(commentObj) });
            };

            const handleEditComment = async (postId, commentIndex) => {
                if (!editingCommentInfo || !editingCommentInfo.text.trim()) return;

                    const postData = postSnap.data();

                    await updateDoc(postRef, { comments: newComments });

                setEditingCommentInfo(null);
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0] relative">
                    <div className="w-28 h-28 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-8 tracking-tighter">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-[#FEE500] py-4 rounded-xl shadow-md font-bold active:scale-95 transition-transform text-gray-900">카카오계정으로 시작하기</button>
                </div>
            );

            // 🌟 배경 찌그러짐 원천 차단: 채팅방 배경색 분리 적용
            return (
                <div className={`w-full h-full flex flex-col overflow-hidden relative ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-white'}`}>
                    
                    {/* 크롭 모달 */}
                    {cropModalData && (
                        <div className="fixed inset-0 z-[6000] bg-black flex flex-col">
                            <div className="flex justify-between p-4 text-white font-bold"><button onClick={() => setCropModalData(null)}>취소</button><button onClick={() => {
                                const dataURL = cropCanvasRef.current.toDataURL('image/jpeg', 0.8);
                                if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(dataURL); else setMyBgImgUrl(dataURL); localStorage.setItem(cropModalData.type==='profile'?'my_profile_url':'my_bg_url', dataURL); } 
                                else { if(cropModalData.type==='profile')setProfileImgUrl(dataURL); else setBgImgUrl(dataURL); localStorage.setItem(cropModalData.type==='profile'?'deidara_profile_url':'deidara_bg_url', dataURL); }
                                setCropModalData(null);

                                <div className="relative border border-white/30 overflow-hidden bg-gray-900" onMouseDown={handleCropDown} onMouseMove={handleCropMove} onMouseUp={() => isDragging.current=false} onTouchStart={handleCropDown} onTouchMove={handleCropMove} onTouchEnd={() => isDragging.current=false} style={{ width: 300, height: cropModalData.type === 'profile' ? 300 : 450 }}>
                                    <canvas ref={cropCanvasRef} width={300} height={cropModalData.type === 'profile' ? 300 : 450} className="w-full h-full cursor-move" />
                                </div>
                                <input type="range" min="1" max="3" step="0.01" value={cropScale} onChange={e => setCropScale(parseFloat(e.target.value))} className="w-64 mt-10 accent-[#FEE500]" />

                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setDeiS={setDeidaraStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUIFunc} setTab={setActiveTab} />}

                    {showCallModal && (

                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="통화 내용 요약 (AI에게 전달할 상황)" className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-[13px] h-24 resize-none outline-none font-semibold" />
                                </div>
                                <div className="flex gap-2"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-3.5 rounded-2xl bg-gray-100 font-bold text-gray-500 text-sm">취소</button><button onClick={handleCallSubmit} className="flex-1 py-3.5 rounded-2xl bg-blue-500 text-white font-bold text-sm">기록 완료</button></div>

                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                        <h2 className="text-xl font-bold mb-4">설정</h2>
                        <div className="flex items-center justify-between mb-6 bg-gray-50 px-4 py-3 rounded-2xl border border-gray-100"><span className="text-[13px] font-bold text-gray-700">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-5 h-5" /></div>
                        <p className="text-xs mb-1 font-bold text-gray-400 ml-1">API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 mb-6 outline-none text-sm font-bold" />
                        <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 shadow-sm active:scale-95 transition-transform text-gray-900">저장</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-transform text-xs uppercase tracking-widest">LOGOUT</button>
                    </div></div>}

                    {/* 상단 헤더 */}
                    <header className={`px-4 py-3 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white border-b border-gray-100':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-[20px] tracking-tight text-gray-900 ml-1">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-2">
                                    <button onClick={() => { setShowSettings(true); pushHistory('settings'); }} className="p-2 text-gray-500 hover:text-gray-800 flex items-center justify-center w-10 h-10"><div className="w-6 h-6"><IconSettings /></div></button>
                                    {activeTab==='chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="p-2 text-gray-500 hover:text-gray-800 flex items-center justify-center w-10 h-10"><div className="w-6 h-6"><IconPlus /></div></button>}
                                </div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1 w-full">
                                    <button onClick={() => { setView('main'); window.history.back(); }} className="p-1 -ml-1 text-gray-700 w-8 h-8 flex items-center justify-center"><div className="w-6 h-6"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></div></button>
                                    <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-9 h-9 rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm ml-1 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-[16px] ml-2 truncate max-w-[180px]">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    {/* 메인 컨텐츠 영역 분리 */}
                    {view === 'main' ? (
                        <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-20 bg-white custom-scrollbar">
                            {/* 친구 탭 */}
                            {activeTab === 'friends' && (
                                <div className="flex-1">
                                    <div className="px-5 py-3 mt-1">
                                        <p className="text-[11px] text-gray-400 mb-2 font-semibold tracking-tighter">내 프로필</p>
                                        <div onClick={() => { setProfileTarget('me'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                            <div className="w-14 h-14 rounded-[20px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                            <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{myStatus}</p></div>
                                        </div>
                                    </div>
                                    <hr className="mx-5 border-gray-100 my-1" />
                                    <div className="px-5 py-3">
                                        <p className="text-[11px] text-gray-400 mb-2 font-semibold tracking-tighter">친구 1</p>
                                        <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                            <div className="w-12 h-12 rounded-[16px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                            <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* 채팅 목록 탭 */}
                            {activeTab === 'chat' && (
                                <div className="flex-1">
                                    {chatRooms.length === 0 ? (
                                        <div className="text-center text-gray-400 py-16 text-sm font-bold">상단 + 버튼을 눌러 채팅방을 만드세요!</div>
                                    ) : chatRooms.map(room => (
                                        <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); pushHistory('chatRoom'); }} className="flex items-center gap-4 px-5 py-3.5 hover:bg-gray-50 cursor-pointer active:bg-gray-100 transition-colors relative border-b border-gray-50/50">
                                            <div className="w-12 h-12 rounded-[16px] bg-gray-100 flex items-center justify-center overflow-hidden shrink-0 border border-gray-50 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                            <div className="flex-1 min-w-0 pr-12"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-400 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                            <div className="absolute right-5 flex items-center">
                                                <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-blue-500 bg-white border border-gray-100 shadow-sm rounded-full active:scale-95 transition-all"><div className="w-3.5 h-3.5"><IconEdit /></div></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 게시물(피드) 탭 */}
                            {activeTab === 'feed' && (
                                <div className="flex-1 bg-[#f3f4f6]">
                                    <div className="bg-white px-5 py-5 mb-3 shadow-sm border-b border-gray-100">
                                        <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="지금 이 기분은 어떤가요?" className="w-full bg-gray-50 rounded-xl p-4 text-[14px] outline-none resize-none focus:bg-white transition-all border border-transparent focus:border-gray-200" rows="3" />
                                        {feedAttachedImage && <div className="relative inline-block mt-3"><img src={feedAttachedImage} className="w-20 h-20 object-cover rounded-xl shadow-sm border border-gray-200" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 text-xs font-bold">✕</button></div>}
                                        <div className="flex justify-between items-center mt-3 pt-2">
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400 hover:bg-gray-100 rounded-lg active:scale-95 transition-all w-10 h-10 flex items-center justify-center"><div className="w-6 h-6"><IconCamera /></div></button>
                                                <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                <button onClick={handleDeidaraNewPost} disabled={isPosting} className="px-3 py-2 bg-gray-100 text-gray-600 font-bold text-[12px] rounded-lg active:scale-95">AI 피드 몰래보기</button>
                                            </div>
                                            <button onClick={handleAddPost} disabled={isPosting} className="px-5 py-2 bg-[#FEE500] text-gray-900 rounded-lg font-bold text-[13px] active:scale-95 shadow-sm">올리기</button>
                                        </div>
                                    </div>
                                    <div className="space-y-10 px-4 pb-24 pt-2">
                                        {posts.length === 0 ? (
                                            <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없습니다.</div>
                                        ) : posts.map(post=>(
                                            <div key={post.id || Math.random()} className="bg-white rounded-3xl shadow-sm p-8 relative border border-gray-100/50">
                                                <div className="flex items-center gap-3.5 mb-5">
                                                    <div onClick={() => { setProfileTarget(post.author==='me'?'me':'deidara'); pushHistory('modal'); }} className="w-11 h-11 rounded-full overflow-hidden border border-gray-100 shadow-sm cursor-pointer flex items-center justify-center">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                    <div className="flex-1 min-w-0"><div className="font-bold text-[15px] text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[11px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setEditingPostId(post.id); setEditingPostText(post.content); }} className="text-gray-400 w-4 h-4 hover:text-blue-500"><IconEdit/></button>
                                                        <button onClick={() => { if(confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-400 w-4 h-4 hover:text-red-500"><IconTrash/></button>
                                                    </div>
                                                </div>
                                                {post.imageUrl && <img src={post.imageUrl} onClick={() => { setShowFullImage(post.imageUrl); pushHistory('fullImage'); }} className="w-full h-auto rounded-2xl mb-6 shadow-sm active:scale-[0.99] transition-transform cursor-pointer" />}
                                                {editingPostId === post.id ? (
                                                    <div className="mb-6"><textarea value={editingPostText} onChange={e=>setEditingPostText(e.target.value)} className="w-full bg-gray-50 rounded-xl p-3 text-[14px] outline-none border border-gray-200" rows="3" /><div className="flex justify-end gap-2 mt-2"><button onClick={() => setEditingPostId(null)} className="px-4 py-1.5 rounded-lg text-xs font-bold text-gray-500 bg-gray-100">취소</button><button onClick={() => handleEditPost(post.id)} className="px-4 py-1.5 rounded-lg bg-[#FEE500] text-gray-900 text-xs font-bold">저장</button></div></div>
                                                ) : ( post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-6 whitespace-pre-wrap">{post.content}</p> )}
                                                
                                                <div className="bg-gray-50 rounded-2xl p-5 border border-gray-100/50">
                                                    <p className="text-[12px] font-bold text-gray-500 mb-4 uppercase tracking-wider">댓글 {(post.comments||[]).length}개</p>
                                                    <div className="space-y-4 mb-5">
                                                        {(post.comments||[]).map((c,i)=>(
                                                            <div key={i} className="flex gap-3 items-start relative group">
                                                                <div className="w-8 h-8 rounded-full overflow-hidden shrink-0 bg-white border border-gray-100 shadow-sm mt-0.5 flex items-center justify-center">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                <div className="flex flex-col flex-1 pr-6">
                                                                    {editingCommentInfo && editingCommentInfo.postId === post.id && editingCommentInfo.commentIndex === i ? (
                                                                        <div className="flex flex-col gap-1 w-full"><input type="text" value={editingCommentInfo.text} onChange={e => setEditingCommentInfo({...editingCommentInfo, text: e.target.value})} className="w-full text-[13px] p-1.5 border border-gray-200 rounded outline-none bg-white" /><div className="flex gap-1 justify-end"><button onClick={()=>setEditingCommentInfo(null)} className="text-[10px] bg-gray-200 px-2 py-1 rounded">취소</button><button onClick={()=>handleEditComment(post.id, i)} className="text-[10px] bg-[#FEE500] px-2 py-1 rounded font-bold">저장</button></div></div>
                                                                    ) : (
                                                                        <Fragment>
                                                                            <span className="font-bold text-[13px] text-gray-900 mb-0.5">{c.author==='me'?'연지':'데이다라'}</span>
                                                                            <span className="text-[14px] text-gray-800 leading-snug">{c.content}</span>
                                                                        </Fragment>
                                                                    )}
                                                                </div>
                                                                {(!editingCommentInfo || editingCommentInfo.postId !== post.id || editingCommentInfo.commentIndex !== i) && (
                                                                    <div className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 flex gap-2">
                                                                        <button onClick={() => setEditingCommentInfo({ postId: post.id, commentIndex: i, text: c.content })} className="text-gray-400 w-3.5 h-3.5 hover:text-blue-500"><IconEdit/></button>
                                                                        <button onClick={() => handleDeleteComment(post.id, c)} className="text-gray-400 w-3.5 h-3.5 hover:text-red-500"><IconTrash/></button>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="flex gap-2 items-center mt-4">
                                                        <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글을 남겨보세요." className="flex-1 min-w-0 bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-[13px] outline-none shadow-sm focus:border-gray-400 transition-colors" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                        {/* 등록 버튼 찌그러짐 방지 */}
                                                        <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="shrink-0 whitespace-nowrap font-bold text-[13px] px-4 py-2.5 bg-white border border-gray-200 text-gray-800 rounded-xl active:bg-gray-100">등록</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    ) : (
                        /* 🌟 채팅방 내부: 하얀 여백 방지를 위해 배경색 통일 및 pb-20(80px) 적용 */
                        <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-5 space-y-4 custom-scrollbar pb-20 bg-[#BACEE0]" onClick={() => setShowAttachMenu(false)}>
                            {messages.length === 0 && !isTyping ? (
                                <div className="flex justify-center items-center h-full text-xs text-gray-500 font-bold">메시지를 입력해 대화를 시작해보세요.</div>
                            ) : messages.map((msg, i) => (
                                <div key={msg.id || i} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                    <div className={`flex max-w-[80%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                        {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-10 h-10 rounded-[14px] bg-white mr-2 shrink-0 overflow-hidden shadow-sm border border-orange-50 flex items-center justify-center cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>}
                                        <div className="flex flex-col w-full relative group">
                                            {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1.5 ml-1 font-bold">{msg.sender === 'deidara' ? '데이다라' : msg.sender}</span>}
                                            <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className="flex flex-col gap-1">
                                                    {msg.imageUrl && <img src={msg.imageUrl} onClick={() => { setShowFullImage(msg.imageUrl); pushHistory('fullImage'); }} className={`max-w-[200px] w-full h-auto rounded-xl shadow-sm cursor-pointer ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`} />}
                                                    {msg.type === 'call' ? (
                                                        <div className="px-5 py-2.5 rounded-xl bg-white border border-gray-100 shadow-sm flex items-center gap-2">
                                                            <div className="w-4 h-4 text-gray-700"><IconPhoneFilled /></div>
                                                            <span className="font-bold text-[14px] text-gray-800">{msg.duration}</span>
                                                        </div>
                                                    ) : editingMessageId === msg.id ? (
                                                        <div className="flex gap-1.5 items-end bg-white p-2 rounded-xl shadow-sm">
                                                            <textarea value={editingMessageText} onChange={e=>setEditingMessageText(e.target.value)} className="w-[160px] border border-gray-200 rounded-lg p-2 text-[13px] outline-none resize-none bg-gray-50" rows="2" />
                                                            <div className="flex flex-col gap-1"><button onClick={()=>setEditingMessageId(null)} className="text-[10px] bg-gray-200 px-2 py-1 rounded font-bold">취소</button><button onClick={()=>handleEditMessage(msg.id)} className="text-[10px] bg-[#FEE500] px-2 py-1 rounded font-bold">저장</button></div>
                                                        </div>
                                                    ) : (
                                                        msg.text && <div className={`px-4 py-2 text-[14px] shadow-sm whitespace-pre-wrap ${msg.sender === 'me' ? 'bubble-me text-gray-900' : 'bubble-other text-gray-800'}`}>{msg.text}</div>
                                                    )}
                                                </div>
                                                <span className="text-[9px] text-gray-500 font-bold mb-0.5 whitespace-nowrap">{msg.time || "방금 전"}</span>
                                            </div>
                                            
                                            {/* 메시지 호버 메뉴 */}
                                            {selectedMsgId === msg.id && !editingMessageId && msg.text && (
                                                <div className={`flex gap-2.5 mt-2 text-[11px] font-bold ${msg.sender === 'me' ? 'justify-end mr-1' : 'justify-start ml-2'}`}>
                                                    <button onClick={() => { setEditingMessageId(msg.id); setEditingMessageText(msg.text); }} className="text-gray-400 hover:text-blue-500 bg-white/70 px-2 py-1 rounded shadow-sm">수정</button>
                                                    {msg.sender === 'deidara' && <button onClick={() => handleRegenerateMessage(msg.id)} className="text-gray-400 hover:text-green-500 bg-white/70 px-2 py-1 rounded shadow-sm">재생성</button>}
                                                    <button onClick={() => handleDeleteMessage(msg.id)} className="text-gray-400 hover:text-red-500 bg-white/70 px-2 py-1 rounded shadow-sm">삭제</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="ml-12 bg-white/60 px-3 py-1.5 rounded-lg text-[10px] w-fit animate-pulse text-gray-500 font-bold shadow-sm">음...</div>}
                            <div ref={chatEndRef} />
                        </main>
                    )}

                    {/* 하단 탭 바 / 채팅 바 */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[65px] pb-safe z-30 ${view==='main'?'justify-around':'px-2 gap-1.5'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='friends'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabFriend /></div><span className="text-[10px] font-bold">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='chat'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabChat /></div><span className="text-[10px] font-bold">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='feed'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabFeed /></div><span className="text-[10px] font-bold">게시물</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                {showAttachMenu && (
                                    <div className="absolute bottom-[70px] left-2 bg-white border border-gray-200 rounded-xl shadow-lg p-2.5 w-44 flex flex-col gap-1 z-40 slide-in">
                                        <button onClick={() => chatFileInputRef.current.click()} className="text-left px-3 py-2.5 text-[13px] font-bold text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">🖼️ 사진 전송하기</button>
                                        <button onClick={handleRequestDeidaraPhoto} className="text-left px-3 py-2.5 text-[13px] font-bold text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">📸 데이다라에게 사진 요구</button>
                                        <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                    </div>
                                )}
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center text-gray-400 active:scale-90"><div className="w-6 h-6"><IconPlus /></div></button>
                                <button onClick={() => { setShowCallModal(true); pushHistory('callModal'); }} className="w-9 h-9 shrink-0 flex items-center justify-center text-gray-400 mr-1 active:scale-90 transition-transform"><div className="w-6 h-6"><IconPhoneOutline /></div></button>
                                <div className="flex-1 bg-gray-100 rounded-full flex items-center pr-1.5 mr-1 h-10">
                                    <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-transparent px-4 text-[14px] outline-none" placeholder="메시지 입력" />
                                    {inputText.trim() && <button onClick={handleSend} className="w-8 h-8 bg-[#FEE500] rounded-full flex items-center justify-center shrink-0 active:scale-90 transition-transform"><div className="w-4 h-4 text-gray-800"><IconSend /></div></button>}
                                </div>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
