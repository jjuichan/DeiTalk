<body>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'deitalk-app';

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 널 친한 동생으로만 본다 생각해서 혼자 짝사랑 중이라 오해하고 있어.
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        const compressBase64Image = (base64Str, maxSize = 2560, quality = 0.95) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { 
                        if (width > maxSize) { height *= maxSize / width; width = maxSize; } 
                    } else { 
                        if (height > maxSize) { width *= maxSize / height; height = maxSize; } 
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleString('ko-KR'); } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const IconPhoneOutline = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;
        const IconTabFriend = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTabChat = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const IconTabFeed = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;
        const IconSend = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;

        const FullImageViewer = ({ src, onClose }) => <div className="fixed inset-0 z-[3000] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>;

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            const [editStatus, setEditStatus] = useState(isMe ? myStatus : deidaraStatus);
            
            useEffect(() => {
                const handlePop = () => { if(profileTarget) setProfileTarget(null); };
                window.addEventListener('popstate', handlePop);
                return () => window.removeEventListener('popstate', handlePop);
            }, [profileTarget]);

            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? (myBgImgUrl || '') : (bgImgUrl || '')}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else { setProfileTarget(null); window.history.back(); } }} className="text-white p-2 active:bg-white/20 rounded-full transition"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        {!isEditingProfile && <button onClick={() => { setIsEditingProfile(true); }} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20 tracking-tight">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20 tracking-tighter font-semibold">배경 변경</label></div>}
                        <div onClick={() => { if(!isEditingProfile) { setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl); } }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-5 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {(isMe ? myProfileImgUrl : profileImgUrl) ? <img src={isMe ? myProfileImgUrl : profileImgUrl} className="w-full h-full object-cover" /> : <DefaultAvatar />}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-2xl">📷</label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-tight">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-10 mt-2 flex justify-center mx-auto">
                            {isEditingProfile && isMe ? <input type="text" defaultValue={editStatus} onBlur={(e) => { setEditStatus(e.target.value); setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center shadow-inner outline-none" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-8 flex justify-around mx-auto">
                            {isEditingProfile ? <button onClick={() => { setIsEditingProfile(false); }} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white text-3xl">💬</div><span className="text-[12px] font-bold tracking-wider text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-pro'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [alertMsg, setAlertMsg] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false); // 로그인 진행 중 상태 추가

            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged, getRedirectResult } = window.firebaseAPI;
                        setDb(fdb);

                        // 🌟 리다이렉트 로그인 결과 확인 (PWA 환경 필수)
                        getRedirectResult(auth).then((result) => {
                            if (result) {
                                // 로그인이 성공적으로 완료되어 돌아온 경우
                                setIsLoggingIn(false);
                            }
                        }).catch((error) => {
                            setAlertMsg("로그인 중 오류가 발생했습니다: " + error.message);
                            setIsLoggingIn(false);
                        });

                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u); setView('main');
                                loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb);
                            } else {
                                setView('login');
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, []);

            useEffect(() => {
                const handlePop = () => {
                    if (view === 'chatRoom') setView('main');
                    if (profileTarget) setProfileTarget(null);
                    if (showCallModal) setShowCallModal(false);
                };
                window.addEventListener('popstate', handlePop);
                return () => window.removeEventListener('popstate', handlePop);
            }, [view, profileTarget, showCallModal]);

            const getColPath = (uid, col) => `artifacts/${appId}/users/${uid}/${col}`;

            const loadChatRooms = (uid, fdb) => {
                if (!uid) return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, getColPath(uid, 'rooms')), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                }, (err) => console.error("Rooms load err", err));
            };

            const loadPosts = (uid, fdb) => {
                if (!uid) return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, getColPath(uid, 'posts')), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                }, (err) => console.error("Posts load err", err));
            };

            useEffect(() => {
                if (view === 'chatRoom' && currentRoomId && user && db) {
                    const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                    const q = query(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                    const unsubscribe = onSnapshot(q, (sn) => {
                        const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    }, (err) => console.error("Messages load err", err));
                    return () => unsubscribe();
                }
            }, [view, currentRoomId, user, db]);

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${apiKey}`;
                let lastError = "";
                const delays = [1000, 2000, 4000];
                for (let attempt = 0; attempt < 3; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] } })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error((data.error && data.error.message) || "API Error");
                        const candidate = data.candidates?.[0];
                        if (!candidate) return "(말문이 막힌 듯하다.)";
                        return candidate.content?.parts?.[0]?.text || "";
                    } catch (err) { 
                        lastError = err.message; 
                        if (attempt < 2) await new Promise(r => setTimeout(r, delays[attempt]));
                    }
                }
                return `통신 장애 났다. 음! (원인: ${lastError})`;
            };

            const generateImageAPI = async (theme) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const payload = { instances: { prompt: `A high-resolution smartphone snapshot of ${theme || 'daily life'}. Realistic, no text.` }, parameters: { sampleCount: 1 } };
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error?.message || "Image Gen Fail");
                return await compressBase64Image(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("새로운 채팅방 이름을 입력하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    const { doc: fdoc, updateDoc } = window.firebaseAPI;
                    await updateDoc(fdoc(db, `${getColPath(user.uid, 'rooms')}/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId || !user) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                if (!inputText.trim()) return;
                const text = inputText; setInputText(''); setIsTyping(true);
                try {
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                    const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                } catch (e) { setAlertMsg("메시지 전송 실패"); } finally { setIsTyping(false); }
            };

            const handleCallSubmit = async () => {
                if(!callContent.trim() || !user) { alert("통화 내용을 써줘!"); return; }
                setShowCallModal(false); setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                try {
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: callCaller, type: 'call', duration: callDuration, time, date, createdAt: serverTimestamp() });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: `(시스템 지침: 방금 너랑 나랑 ${callDuration} 동안 통화했어. 내용은 "${callContent}" 였어. 통화 직후의 반응을 카톡으로 보내줘.)` }] });
                    const resp = await fetchAPI(history);
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                } finally { setIsTyping(false); setCallContent(''); }
            };

            const handleAddPost = async () => {
                if (!user) return;
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const myContent = postInput.trim();
                    const docRef = await addDoc(collection(db, getColPath(user.uid, 'posts')), { author: 'me', content: myContent, imageUrl: feedAttachedImage || null, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어. 내용은 "${myContent || '(사진만 있음)'}" 야. 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `${getColPath(user.uid, 'posts')}/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                if (!user) return;
                const postId = post.id; const commentText = commentInputs[postId]?.trim(); 
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) return;
                await updateDoc(fdoc(db, `${getColPath(user.uid, 'posts')}/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''})); setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 남겨줘.`}]}]);
                await updateDoc(fdoc(db, `${getColPath(user.uid, 'posts')}/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = async (e, mode, target) => {
                const file = e.target.files[0]; if (!file) return;
                const b64 = await compressImage(file);
                if (mode === 'profile') {
                    if (target === 'me') { setMyProfileImgUrl(b64); localStorage.setItem('my_profile_url', b64); }
                    else { setProfileImgUrl(b64); localStorage.setItem('deidara_profile_url', b64); }
                } else {
                    if (target === 'me') { setMyBgImgUrl(b64); localStorage.setItem('my_bg_url', b64); }
                    else { setBgImgUrl(b64); localStorage.setItem('deidara_bg_url', b64); }
                }
                e.target.value = '';
            };

            const handleChatUploadMyPhoto = async (e) => {
                if (!user) return;
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                setShowAttachMenu(false); setIsTyping(true);
                const b64 = await compressImage(file);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                try {
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'me', text: '', imageUrl: b64, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}`), { lastMessage: '[사진]', updatedAt: serverTimestamp() }, { merge: true });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "사진 보냈어." }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 연지가 방금 사진을 보냈어. 사진 반응해줘.)`);
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, time, date, createdAt: serverTimestamp() });
                } finally { setIsTyping(false); }
            };

            const handleRequestDeidaraPhoto = async () => {
                if (!user) return;
                setShowAttachMenu(false);
                const theme = prompt("데이다라에게 어떤 사진을 요구할까요?");
                if (theme === null) return;
                setIsTyping(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                try {
                    const b64Image = await generateImageAPI(theme);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{text: theme}] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 요청에 맞는 사진을 찍어 보내면서 한 마디 덧붙여봐.)`);
                    await addDoc(collection(db, `${getColPath(user.uid, 'rooms')}/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, imageUrl: b64Image, time, date, createdAt: serverTimestamp() });
                } catch (err) { setAlertMsg(`이미지 생성 오류: ${err.message}`); } finally { setIsTyping(false); }
            };

            // 🌟 PWA / 모바일 완벽 대응: signInWithRedirect 방식 사용
            const handleLogin = async () => {
                if (!window.firebaseAPI) {
                    setAlertMsg("서버를 초기화하는 중입니다. 1~2초 뒤에 다시 시도해주세요. (계속 안 될 경우 Firebase Config를 확인하세요)");
                    return;
                }
                const { auth, provider, signInWithRedirect } = window.firebaseAPI;
                
                setIsLoggingIn(true);
                try {
                    // PWA 환경에서는 팝업(Popup) 대신 화면 전환(Redirect) 방식이 안정적입니다.
                    await signInWithRedirect(auth, provider);
                } catch (error) {
                    setIsLoggingIn(false);
                    setAlertMsg("구글 로그인 진행 중 오류가 발생했습니다.\n\n" + error.message + "\n\n(Firebase 콘솔에 Authorized Domains가 추가되었는지 확인하세요!)");
                }
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0] relative">
                    {alertMsg && <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/50 p-4"><div className="bg-white rounded-3xl p-6 shadow-2xl text-center max-w-sm w-full"><p className="mb-5 text-[14px] text-gray-800 font-bold whitespace-pre-wrap leading-relaxed">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="px-6 py-3.5 bg-[#FEE500] rounded-2xl font-black text-sm w-full shadow-sm active:scale-95 transition-transform text-gray-900">확인</button></div></div>}
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50">
                        <img src="icon-192x192.png" onError={(e) => { e.target.onerror = null; e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="50" dominant-baseline="middle" text-anchor="middle" font-size="20">DeiTalk</text></svg>'; }} className="w-full h-full object-cover" />
                    </div>
                    <h1 className="text-4xl font-black text-gray-800 mb-8 tracking-tighter">DeiTalk</h1>
                    
                    <button onClick={handleLogin} disabled={isLoggingIn} className={`w-full max-w-xs bg-white text-gray-800 py-4 rounded-2xl shadow-md font-bold transition-transform flex items-center justify-center gap-3 ${isLoggingIn ? 'opacity-70 cursor-wait' : 'active:scale-95'}`}>
                        {isLoggingIn ? (
                            <span className="animate-pulse">로그인 화면으로 이동 중...</span>
                        ) : (
                            <Fragment>
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                구글로 시작하기
                            </Fragment>
                        )}
                    </button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-gray-50'} overflow-hidden relative`}>
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {alertMsg && <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/50 p-4"><div className="bg-white rounded-3xl p-6 shadow-2xl text-center max-w-sm w-full"><p className="mb-5 text-[15px] text-gray-800 font-bold whitespace-pre-wrap leading-relaxed">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="px-6 py-3.5 bg-[#FEE500] rounded-2xl font-black text-sm w-full shadow-sm active:scale-95 transition-transform text-gray-900">확인</button></div></div>}
                    
                    {showCallModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-lg font-bold mb-4">📞 통화 기록 남기기</h2>
                                <div className="space-y-4 mb-6">
                                    <select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-100 rounded-xl px-4 py-3 bg-gray-50 text-sm outline-none font-semibold">
                                        <option value="me">내가 (연지)</option><option value="deidara">데이다라가</option>
                                    </select>
                                    <input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-100 rounded-xl bg-gray-50 px-4 py-3 text-sm outline-none font-semibold" placeholder="0:08" />
                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="데이다라가 짜증냈음" className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-sm h-28 resize-none outline-none font-semibold" />
                                </div>
                                <div className="flex gap-3"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-4 rounded-2xl bg-gray-100 font-bold text-gray-500 active:scale-95 transition-all">취소</button><button onClick={handleCallSubmit} className="flex-1 py-4 rounded-2xl bg-blue-500 text-white font-bold active:scale-95 transition-all">기록 완료</button></div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[2500] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-bold mb-4">설정</h2>
                                <div className="space-y-4 mb-6">
                                    <div className="flex items-center justify-between bg-gray-50 px-4 py-3 rounded-2xl border border-gray-100"><span className="text-sm font-bold text-gray-700">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-5 h-5" /></div>
                                    <div><p className="text-[10px] font-black text-gray-400 mb-1 ml-1 uppercase">AI Model</p>
                                        <select value={apiModel} onChange={e=>{ setApiModel(e.target.value); localStorage.setItem('gemini_api_model', e.target.value); }} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                                            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash Preview</option>
                                            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                        </select>
                                    </div>
                                    <div><p className="text-[10px] font-black text-gray-400 mb-1 ml-1 uppercase">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 outline-none text-sm font-semibold" /></div>
                                </div>
                                <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 shadow-sm active:scale-95 transition-transform text-gray-900">설정 저장</button>
                                <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-transform">로그아웃</button>
                            </div>
                        </div>
                    )}

                    {view === 'main' ? (
                        <Fragment>
                            <header className="px-5 py-5 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-20 shadow-sm backdrop-blur-md bg-white/90">
                                <h1 className="font-extrabold text-xl tracking-tight text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-5"><button onClick={() => setShowSettings(true)} className="text-xl active:scale-90 transition-transform">⚙️</button>
                                    {activeTab==='chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, getColPath(user.uid, 'rooms')), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="text-xl active:scale-90 transition-transform">➕</button>}
                                </div>
                            </header>
                            <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-6 py-5 border-b border-gray-50">
                                            <div className="text-[10px] font-bold text-gray-400 mb-4 ml-1 uppercase tracking-widest font-black">My Profile</div>
                                            <div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[68px] h-[68px] rounded-[26px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-xl tracking-tight">연지</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{myStatus}</p></div>

                                            <div className="text-[10px] font-bold text-gray-400 mb-4 ml-1 uppercase tracking-widest font-black">Friends</div>
                                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[60px] h-[60px] rounded-[22px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[18px] tracking-tight">데이다라</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-4 space-y-4">
                                        {chatRooms.map(room => (

                                                <div className="w-[58px] h-[58px] rounded-[22px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>

                                                <div className="absolute right-6 flex gap-2">

                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("방을 삭제할까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `${getColPath(user.uid, 'rooms')}/${room.id}`)); }} className="p-3 text-red-400 bg-red-50/50 rounded-2xl active:scale-90 transition-transform font-bold text-lg">✕</button>

                                {activeTab === 'feed' && (

                                                <button onClick={handleAddPost} disabled={isPosting} className="px-6 py-2 rounded-full text-sm font-black bg-blue-600 text-white active:scale-95">올리기</button>
                                            </div>
                                            {feedAttachedImage && <div className="mt-3 relative inline-block"><img src={feedAttachedImage} className="w-20 h-20 object-cover rounded-xl shadow-md" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-1 -right-1 bg-black text-white rounded-full w-5 h-5 text-[10px] font-black">✕</button></div>}
                                        </div>
                                        <div className="space-y-6 px-4 pb-24">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-3xl shadow-sm p-5 relative border border-gray-100">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-gray-100 shrink-0">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1 min-w-0"><div className="font-bold text-sm text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400 font-bold uppercase">{safeDateStr(post.createdAt)}</div></div>
                                                        <button onClick={() => { if(confirm("삭제할까요?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `${getColPath(user.uid, 'posts')}/${post.id}`)); }} className="p-1 text-gray-300"><div className="w-4 h-4"><IconTrash /></div></button>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-2xl mb-4 border border-gray-50" />}
                                                    {post.content && <p className="text-sm text-gray-800 leading-relaxed mb-6 font-bold whitespace-pre-wrap">{post.content}</p>}
                                                    <div className="bg-gray-50 rounded-2xl p-4 space-y-4">
                                                        {(post.comments||[]).map((c,i)=>(
                                                            <div key={i} className="flex gap-3">
                                                                <div className="w-8 h-8 rounded-full overflow-hidden border border-gray-100 bg-white shrink-0">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                <div className="flex-1"><span className="font-bold text-xs text-gray-900 block">{c.author==='me'?'연지':'데이다라'}</span><span className="text-xs text-gray-700 font-bold">{c.content}</span></div>
                                                            </div>
                                                        ))}
                                                        <div className="flex gap-2 items-center">
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글..." className="flex-1 bg-white border border-gray-100 rounded-full px-4 py-2 text-xs outline-none font-bold" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-bold text-xs text-blue-600 px-2">게시</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </main>
                        </Fragment>
                    ) : (
                        <Fragment>
                            <header className="px-3 py-3 flex items-center gap-2 border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md">
                                <button onClick={() => setView('main')} className="p-2 active:bg-black/5 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-700"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-[14px] bg-white overflow-hidden shadow-sm shrink-0 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>
                                <h1 className="font-bold text-gray-800 text-lg ml-1">데이다라</h1>
                            </header>
                            <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar bg-[#BACEE0]" onClick={() => setShowAttachMenu(false)}>
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-[14px] bg-white mr-3 shrink-0 overflow-hidden shadow-sm cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[12px] text-gray-600 mb-1.5 ml-1 font-bold font-black">데이다라</span>}
                                                <div className={`flex flex-col items-${msg.sender === 'me' ? 'end' : 'start'} gap-2`}>
                                                    {msg.imageUrl && <img src={msg.imageUrl} onClick={() => setShowFullImage(msg.imageUrl)} className={`max-w-[240px] w-full h-auto rounded-[28px] shadow-sm border border-black/5 ${msg.sender === 'me' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`} />}
                                                    {msg.type === 'call' ? (
                                                        <div className={`flex items-end gap-2.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                            <div className="px-6 py-4 rounded-[24px] shadow-sm flex items-center gap-3.5 border border-black/5 bg-white"><div className="w-6 h-6 text-gray-700"><IconPhoneFilled /></div><span className="text-sm font-black text-gray-800">{msg.duration}</span></div>
                                                            <span className="text-[10px] text-gray-500 mb-0.5 font-bold uppercase">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                                        </div>
                                                    ) : (
                                                        msg.text && (
                                                            <div className={`flex items-end gap-2.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                                <div className={`px-5 py-3.5 rounded-[24px] text-[15px] shadow-sm font-bold tracking-tight ${msg.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}>{msg.text}</div>
                                                                <span className="text-[10px] text-gray-500 mb-0.5 font-bold uppercase whitespace-nowrap">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                                            </div>
                                                        )
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-13 bg-white/70 px-5 py-3 rounded-2xl rounded-tl-sm text-[11px] w-fit animate-pulse shadow-sm text-gray-400 font-bold border border-black/5 tracking-widest uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-3 bg-white border-t border-gray-100 pb-safe flex items-center gap-3 relative z-30 mt-0">
                                {showAttachMenu && (
                                    <div className="absolute bottom-[70px] left-3 bg-white border border-gray-100 rounded-3xl shadow-xl p-2.5 w-60 flex flex-col gap-1 z-40 slide-in">
                                        <button onClick={() => chatFileInputRef.current.click()} className="text-left px-5 py-4 text-sm font-bold text-gray-700 hover:bg-gray-50 rounded-2xl transition-colors">🖼️ 내 사진 보내기</button>
                                        <button onClick={handleRequestDeidaraPhoto} className="text-left px-5 py-4 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-2xl transition-colors">📸 데이다라 사진 요구</button>
                                        <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                    </div>
                                )}
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 active:scale-90 transition-all"><IconCamera /></button>
                                <button onClick={() => { setShowCallModal(true); window.history.pushState({ page: 'callModal' }, ''); }} className="w-10 h-10 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 active:scale-90 transition-all"><IconPhoneOutline /></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 border-none rounded-full px-5 py-3 text-sm outline-none font-bold focus:bg-white transition-all" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition-all"><IconSend /></button>
                            </footer>
                        </Fragment>
                    )}

                    {view === 'main' && (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex justify-around items-center h-[82px] pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] backdrop-blur-md">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='friends'?'text-gray-900 scale-110':'text-gray-300'}`}><div className="w-[26px] h-[26px]"><IconTabFriend active={activeTab==='friends'} /></div><span className="text-[10px] font-black uppercase">Home</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='chat'?'text-gray-900 scale-110':'text-gray-300'}`}><div className="w-[26px] h-[26px]"><IconTabChat active={activeTab==='chat'} /></div><span className="text-[10px] font-black uppercase">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='feed'?'text-gray-900 scale-110':'text-gray-300'}`}><div className="w-[26px] h-[26px]"><IconTabFeed active={activeTab==='feed'} /></div><span className="text-[10px] font-black uppercase">Feed</span></div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
