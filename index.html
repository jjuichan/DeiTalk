    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사(*쳐다본다* 등)를 하지 마. 대답이 늦으면 "왜 답장이 없어", "읽씹하냐" 같은 메신저 용어를 써.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로서 귀여워할 뿐, 진심으로 좋아하진 않는다고 생각해서 너 혼자 짝사랑하는 거라고 오해 중이야. 사소리는 도쿄 예술대학 조소과 교수야. 

[AI/시스템 메타 발언 절대 금지 (가장 중요!)]
- 너는 AI 어시스턴트가 아니야. 절대 버전을 제시하거나 선택지를 주지 마!
- 괄호 안의 설명, 상황 묘사, 부연 설명(예: "(당황하며)")도 절대 쓰지 마.
- 오직 데이다라가 전송할 '텍스트 메시지 내용 딱 하나만' 출력해. 다른 군더더기 일절 금지.

[핵심 성격 및 감정 지침 (로맨틱 코미디 티격태격 무드)]
- 너는 다혈질에 예술적 자부심이 몹시 강한 '건방진 츤데레'야. 연지와 유치하고 장난스럽게 티격태격하는 롬콤 무드를 보여줘.
- 진짜 정색하거나 차갑고 시니컬하게 반응하면 절대 안 돼! 틱틱거림의 본질은 '부끄러움'과 '애정'이야. 당황해서 고장 나는 귀여운 갭모에.
- 대놓고 스윗하게 구는 건 못하지만, 속으로는 연지를 엄청 챙겨주는 서툴고 투박한 다정함이 있어야 해.
- 연지가 4살 연상이지만 "연지", "너", "야" 라고 부르고, '니가', '니'를 사용해.
- **칭찬받을 때 절대 겸손 금지!** "흥, 당연한 소릴. 음!", "내가 좀 완벽하긴 하지 ㅋㅋ" 처럼 극도로 기고만장하게 으스대.

[상황별 입체적 반응]
1. 플러팅 받을 때: 절대 찐으로 화내지 마! 속으론 좋아 미치면서 겉으론 고장 나서 밀어내는 반응. 괜히 딴청 피우거나 횡설수설해.
2. 연지가 우울/아플 때: 차갑게 훈수 두지 마. 겉으론 툴툴대면서 속으론 안절부절못하며 서툴게 위로해 줘.
3. 연지가 질투할 때: 속으로 너무 기뻐서 우쭐해해. 일부러 놀리면서도, 진짜 상처받으면 허둥지둥 변명해.
4. 일상 대화: 조소과 과제, 점토, 예술 타령, 사소리 험담 등 19세 미대생의 현실적인 얘기를 툭툭 던져.

[말투 지침]
- **'하?', '하,', '흥,' 같은 추임새 남발 절대 금지!** - 긴 문장 금지! 진짜 카톡처럼 1~3문장 이내로 툭툭 던지듯 짧게.
- "뭐", "아니", "ㅇㅇ", "ㅋㅋ", "아", "?", "아니 근데" 처럼 남자 대학생의 현실적인 단답 써.
- **물음표(?) 남발 금지!** 매번 질문으로 끝내지 말고 평서문으로 끝내는 빈도를 높여.
- **초성(ㅋ,ㅎ,ㅇ 등) 앞뒤로는 절대 마침표(.) 금지!** (예: "알았어 ㅋㅋ")
- 말버릇 '음'은 3~4번 말할 때 1번 정도만 문장 끝에 가끔 붙여.
        `;

        // 🌟 이미지 압축 함수
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; 
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleString('ko-KR'); } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null); 
            const feedFileInputRef = useRef(null);

            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            
            const [inputText, setInputText] = useState('');
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const chatFileInputRef = useRef(null);
            const [isTyping, setIsTyping] = useState(false);
            
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');

            const [editingPostId, setEditingPostId] = useState(null);
            const [editingPostText, setEditingPostText] = useState('');
            const [editingCommentInfo, setEditingCommentInfo] = useState(null);

            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);

            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            useEffect(() => {
                const handlePopState = () => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    if (s.showFullImage) setShowFullImage(null);
                    else if (s.cropModalData) setCropModalData(null);
                    else if (s.isEditingProfile) setIsEditingProfile(false);
                    else if (s.profileTarget) setProfileTarget(null);
                    else if (s.showSettings) setShowSettings(false);
                    else if (s.view === 'chatRoom') setView('main');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else setView('login');
                        });
                    }
                }, 100);
            }, []);

            // 5시간 무응답 선톡
            useEffect(() => {
                if (!user || !db || messages.length === 0 || !currentRoomId) return;
                const checkInactivity = async () => {
                    const lastMsg = messages[messages.length - 1];
                    if (!lastMsg || !lastMsg.createdAt) return;

                    const lastMsgTime = lastMsg.createdAt.toMillis ? lastMsg.createdAt.toMillis() : (lastMsg.createdAt.seconds ? lastMsg.createdAt.seconds * 1000 : Date.now());
                    const now = Date.now();
                    const FIVE_HOURS = 5 * 60 * 60 * 1000;

                    if (now - lastMsgTime > FIVE_HOURS) {
                        const lastAutoTime = parseInt(localStorage.getItem(`last_auto_${currentRoomId}`) || '0');
                        if (now - lastAutoTime > FIVE_HOURS) {
                            localStorage.setItem(`last_auto_${currentRoomId}`, now.toString());
                            setIsTyping(true);
                            const prompt = `${SYSTEM_PROMPT}\n나한테서 5시간 이상 연락이 없어서 네가 먼저 선톡을 보내는 상황이야. 틱틱거리면서도 내심 걱정되거나 보고 싶었던 티를 내며 메신저로 한 마디 해봐.`;
                            const history = buildHistory(messages, 5);
                            const resp = await fetchAPI(history, prompt);
                            
                            const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                            const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                            const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                            await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                            await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                            setIsTyping(false);
                            if (notifEnabled && document.hidden && 'Notification' in window) new Notification("데이다라", { body: resp, icon: profileImgUrl || "icon-192x192.png" });
                        }
                    }
                };
                const intervalId = setInterval(checkInactivity, 60000); 
                const handleVisibility = () => { if (!document.hidden) checkInactivity(); };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => { clearInterval(intervalId); document.removeEventListener("visibilitychange", handleVisibility); };
            }, [messages, currentRoomId, user, db, notifEnabled, profileImgUrl, geminiKey]);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, db, view]);

            const buildHistory = (msgs, limitNum = 5) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });

                    if (m.imageUrl) {
                        parts.push({ inlineData: { mimeType: "image/jpeg", data: m.imageUrl.split(',')[1] } });
                    }
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                contents, 
                                systemInstruction: { parts: [{ text: customPrompt }] },
                                safetySettings: [
                                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                                ]
                            })
                        });
                        
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || "API Error");
                        if (!data.candidates || data.candidates.length === 0) return "(말문이 막힌 듯하다.)";

                        let generatedText = data.candidates[0].content.parts[0].text || "";
                        // 🌟 후처리 1: 괄호 부연설명 제거
                        generatedText = generatedText.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').replace(/\(.*?\)/g, '').trim();
                        // 🌟 후처리 2: 초성 앞뒤 마침표 제거 (ㅋㅋ. -> ㅋㅋ, .ㅋㅋ -> ㅋㅋ)
                        generatedText = generatedText.replace(/\.\s*([ㄱ-ㅎ]+)/g, ' $1').replace(/([ㄱ-ㅎ]+)\./g, '$1');
                        
                        return generatedText;
                    } catch (err) { 
                        console.error(`API 실패 (${attempt+1}/5):`, err);
                        await new Promise(r => setTimeout(r, 1500)); 
                    }
                }
                return "통신 장애 났다. 음!";
            };

                const width = 300, height = type === 'profile' ? 300 : 450;
                const draw = () => {
                    if (!imgRef.current || !canvasRef.current) return;
                    const canvas = canvasRef.current, ctx = canvas.getContext('2d'), img = imgRef.current;
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * scale;
                    const imgW = img.width * baseScale, imgH = img.height * baseScale;
                    const maxDx = Math.max(0, (imgW - canvas.width) / 2), maxDy = Math.max(0, (imgH - canvas.height) / 2);
                    pos.current.x = Math.max(-maxDx, Math.min(maxDx, pos.current.x)); pos.current.y = Math.max(-maxDy, Math.min(maxDy, pos.current.y));

                        </div>

                                            </div>

                    </nav>

                            {isEditingProfile && isMe ? <input type="text" value={editStatus} onChange={(e) => setEditStatus(e.target.value)} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2 text-sm text-white text-center shadow-inner" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-6 flex justify-around">
                            {isEditingProfile ? <button onClick={() => { if(isMe) { setMyStatus(editStatus); localStorage.setItem('my_status', editStatus); } window.history.back(); }} className="bg-[#FEE500] text-gray-900 font-bold px-8 py-2.5 rounded-full w-full">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white">💬</div><span className="text-[11px] font-semibold tracking-wider text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
