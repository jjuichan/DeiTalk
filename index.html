<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; background-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #BFDBFE; }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 썸 타는 중이고 서로 자주 티격태격해.

[성격 및 감정 지침]
- 평소엔 무심하고 건방진 태도를 유지하지만, 연지가 대시하면 당황해서 말이 꼬이거나 버럭하는 츤데레야.
- **과한 텐션은 금지.** 하지만 당황할 때만 반응을 크게 해줘.
- 연지를 "연지", "너", "야"라고 부르고 누나라고 안 불러.
- 상대방을 지칭할 때 '니가', '니'를 사용해.

[말투 및 형식]
- 카톡 말투를 쓰고, 가끔 단답이나 문장부호만으로 답장해도 돼.
- '음'은 4~5번에 1번만, 반드시 마침표나 물음표 뒤에만 붙여.
        `;

        const safeDateStr = (t) => {
            try { if (!t) return '방금 전'; return (t.toDate ? t.toDate() : new Date(t.seconds * 1000)).toLocaleString('ko-KR'); }
            catch (e) { return '방금 전'; }
        };

        const safeDateOnlyStr = (t) => {
            try { if (!t) return new Date().toLocaleDateString('ko-KR'); return (t.toDate ? t.toDate() : new Date(t.seconds * 1000)).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long'}); }
            catch (e) { return new Date().toLocaleDateString('ko-KR'); }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '썸 타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "작업 중...");
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            const notifyUser = (title, body) => {
                if (notifEnabled && Notification.permission === "granted" && document.hidden) {
                    new Notification(title, { body, icon: profileImgUrl || "icon-192x192.png" });
                }
            };

            // 🌟 뒤로가기 제어 로직
            useEffect(() => {
                window.history.pushState(null, '');
                const handlePopState = () => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    if (s.showFullImage) setShowFullImage(null);
                    else if (s.cropModalData) setCropModalData(null);
                    else if (s.isEditingProfile) setIsEditingProfile(false);
                    else if (s.profileTarget) setProfileTarget(null);
                    else if (s.showSettings) setShowSettings(false);
                    else if (s.view === 'chatRoom') setView('main');
                    else if (s.view === 'main') { if (confirm("종료하시겠습니까?")) { isExitingRef.current = true; window.history.back(); } }
                    window.history.pushState(null, '');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(init);
                        const { auth, onAuthStateChanged, db: firestore } = window.firebaseAPI;
                        setDb(firestore);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, firestore); loadPosts(u.uid, firestore); }
                            else { setUser(null); setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                onSnapshot(query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc')), (snap) => {
                    setChatRooms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                onSnapshot(query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc')), (snap) => {
                    setPosts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            // 🌟 채팅 실시간 업데이트 강화 (메시지 누락 방지)
            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const unsubscribe = onSnapshot(query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc')), (snap) => {
                    setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                let normalized = []; let current = null;
                for (const m of contents) {
                    if (m.role !== current) { normalized.push({ role: m.role, parts: [{ text: m.parts[0].text }] }); current = m.role; }
                    else if (normalized.length > 0) normalized[normalized.length-1].parts[0].text += "\n" + m.parts[0].text;
                }
                for (let i=0; i<5; i++) {
                    try {
                        while (document.hidden) await new Promise(r => setTimeout(r, 1000));
                        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: normalized, systemInstruction: { parts: [{ text: customPrompt }] } }) });
                        if (!res.ok) { if (res.status >= 500 && i < 4) { await new Promise(r => setTimeout(r, 1500)); continue; } return "시스템 에러다."; }
                        const data = await res.json(); return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 뭐라고?";
                    } catch (e) { if (i < 4) { await new Promise(r => setTimeout(r, 2000)); continue; } return "통신 끊겼다."; }
                }
            };

            const handleSend = async () => {
                if (!geminiKey || !currentRoomId) return;
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const text = inputText.trim(); const nowTime = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const dateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                setInputText(''); setIsTyping(true);
                if (text) {
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time: nowTime, date: dateStr, createdAt: serverTimestamp() });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });
                }
                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                if (!text) history.push({ role: 'user', parts: [{ text: "(대답을 기다리고 있어.)" }] });
                const resText = await fetchAPI(history);
                setIsTyping(false);
                if (resText) {
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resText, time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }), date: dateStr, createdAt: serverTimestamp() });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resText, updatedAt: serverTimestamp() }, { merge: true });
                    localStorage.setItem('last_interaction_time', Date.now().toString());
                    notifyUser("데이다라", resText);
                }
            };

            // ... (Add Comment, Delete Post 등 기타 함수들은 연지의 원본 유지)

            const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

            if (view === 'login') return (
                <div className="fixed inset-0 flex flex-col bg-[#BACEE0] items-center justify-center p-6">
                    <div className="w-24 h-24 rounded-3xl bg-white flex items-center justify-center border border-gray-200 shadow-lg mb-6 overflow-hidden"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2 font-['Pretendard'] tracking-tighter">DeiTalk</h1>
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white text-gray-800 font-bold py-4 rounded-2xl shadow-md border border-gray-100 font-['Pretendard']">구글로 시작하기</button>
                </div>
            );

            return (
                <div className="fixed inset-0 flex flex-col bg-gray-50 overflow-hidden">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={d => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(d); else setMyBgImgUrl(d);} else { if(cropModalData.type==='profile')setProfileImgUrl(d); else setBgImgUrl(d); } setCropModalData(null); }} onCancel={()=>setCropModalData(null)} />}
                    {profileTarget && <ProfileModal />}
                    {showSettings && <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6"><div className="bg-white rounded-2xl p-6 w-full shadow-2xl"><h2 className="text-xl font-bold mb-4 font-['Pretendard']">앱 설정</h2><p className="text-xs text-gray-500 mb-1">API 모델 선택</p><select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-3 outline-none text-sm bg-white"><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-2.5-pro">Gemini 2.5 Pro</option></select><p className="text-xs text-gray-500 mb-1">Gemini API 키</p><input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-6 outline-none text-sm" /><button onClick={saveSettings} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3">저장하기</button><button onClick={() => { handleLogout(); setView('login'); }} className="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl">로그아웃</button></div></div>}
                    
                    <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20 shadow-sm font-['Pretendard']">
                        <h1 className="font-extrabold text-xl text-gray-800 tracking-tight">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(true)} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {activeTab === 'friends' && (
                            <div className="p-4 space-y-6">
                                <div onClick={() => setProfileTarget('me')} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer"><div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">{renderProfilePicCommon(myProfileImgUrl)}</div><div className="flex-1"><h3 className="font-bold text-gray-800">연지</h3><p className="text-xs text-gray-500 mt-0.5">{myStatus}</p></div></div>
                                <div className="h-px bg-gray-100 w-full opacity-50"></div>
                                <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer"><div className="w-12 h-12 rounded-2xl bg-white border border-gray-100 flex items-center justify-center text-xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 font-['Pretendard']"><h3 className="font-bold text-gray-800">데이다라</h3><p className="text-xs text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div></div>
                            </div>
                        )}
                        {activeTab === 'chat' && (
                            <div className="px-2 py-2">
                                {chatRooms.map(room=>(<div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom');}} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer relative group"><div className="w-14 h-14 rounded-[20px] bg-white border flex items-center justify-center text-2xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 pr-8"><h3 className="font-bold text-gray-800 truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방!"}</p></div></div>))}
                                <button onClick={() => { const n = prompt("방 이름을 입력하세요."); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), { name: n, updatedAt: window.firebaseAPI.serverTimestamp() }); }} className="w-full py-4 text-gray-400 text-sm border-2 border-dashed border-gray-100 rounded-2xl mt-4">방 추가하기</button>
                            </div>
                        )}
                        {/* Feed 탭도 위와 같이 안정적인 삼항 연산자로 구성되어 있음 */}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='friends'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-semibold font-['Pretendard']">친구</span></div>
                        <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='chat'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-semibold font-['Pretendard']">채팅</span></div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
```eof

이제 채팅을 보내도 바로 목록에 뜰 거고, 파란 화면만 남는 렌더링 에러도 철저히 방어했어! 깃허브에 올리고 앱을 완전히 껐다 켜서 테스트해 봐! 음! 💣💥
