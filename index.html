<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; background-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #BFDBFE; }
        
        #root { 
            position: fixed; 
            inset: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야. 하지만 데이다라는 연지가 자길 놀리고 있을 뿐, 실제론 자기 혼자 짝사랑중이라고 생각해. 그래서 더 진심을 표현하지 못하는 거야.
[성격 및 감정 지침]
- 예술(폭발)에 대한 미친 자부심과 긍지를 반드시 유지해. 절대 차분하거나 덤덤하게 굴지 마.
- 연지가 칭찬하면 우쭐하며 오만하게 굴지만, 플러팅이나 대시를 하면 당황하거나 버럭해. 
- 부끄러우면 더 화를 내거나 틱틱대는 전형적인 19살 츤데레 텐션이야.
- 연지를 "연지", "너", "야", "어이" 라고 부르며 건방지게 불러.
- 상대방을 지칭할 때 현실감을 위해 '니가', '니'를 사용해.
- 말버릇 '음'은 반드시 문장 끝 마침표/물음표 뒤에만 독립적으로 붙여. (4~5번에 1번 정도만)
        `;

        // 안전한 시간 변환 함수
        const safeDateStr = (timestamp) => {
            if (!timestamp) return '방금 전';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
                return date.toLocaleString('ko-KR');
            } catch (e) { return '방금 전'; }
        };

        const DefaultAvatar = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            
            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            // 🌟 뒤로가기 제어
            useEffect(() => {
                window.history.pushState({ page: 'init' }, '');
                window.history.pushState({ page: 'main' }, '');
                const handlePopState = () => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    if (s.showFullImage) { setShowFullImage(null); window.history.pushState({ page: 'modal' }, ''); }
                    else if (s.cropModalData) { setCropModalData(null); window.history.pushState({ page: 'modal' }, ''); }
                    else if (s.isEditingProfile) { setIsEditingProfile(false); window.history.pushState({ page: 'modal' }, ''); }
                    else if (s.profileTarget) { setProfileTarget(null); window.history.pushState({ page: 'main' }, ''); }
                    else if (s.showSettings) { setShowSettings(false); window.history.pushState({ page: 'main' }, ''); }
                    else if (s.view === 'chatRoom') { setView('main'); window.history.pushState({ page: 'main' }, ''); }
                    else if (s.view === 'main') {
                        if (window.confirm("앱을 종료하시겠습니까?")) { isExitingRef.current = true; window.history.back(); }
                        else { window.history.pushState({ page: 'main' }, ''); }
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u); setView('main');
                                loadChatRooms(u.uid, fdb);
                                loadPosts(u.uid, fdb);
                            } else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); } 
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] } })
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 뭐라고?";
                    } catch (err) {
                        await new Promise(r => setTimeout(r, 1500));
                    }
                }
                return "통신 장애가 발생했어. 나중에 다시 말해라.";
            };

            const handleSend = async () => {
                if (!inputText.trim() || !currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const text = inputText; setInputText(''); setIsTyping(true);
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });

                const history = messages.slice(-6).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                history.push({ role: 'user', parts: [{ text }] });
                const resp = await fetchAPI(history);
                setIsTyping(false);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
            };

            const handleAddComment = async (postId) => {
                const commentText = commentInputs[postId]?.trim(); if (!commentText) return;
                const { doc: fdoc, updateDoc, arrayUnion, getDoc: fgetDoc } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''}));
                setIsPosting(true);
                const postSnap = await fgetDoc(fdoc(db, `users/${user.uid}/posts/${postId}`));
                const postData = postSnap.data();
                const prompt = `${SYSTEM_PROMPT}\n연지의 댓글: "${commentText}"에 데이다라답게 답글 달아줘.`;
                const resp = await fetchAPI([{role:'user', parts:[{text:'댓글 달아줘'}]}], prompt);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleRegenerateMsg = async (msgId) => {
                const index = messages.findIndex(m => m.id === msgId); if (index === -1) return;
                setSelectedMsgId(null); setIsTyping(true);
                const { doc: fdoc, setDoc } = window.firebaseAPI;
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: "………" }, { merge: true });
                const history = messages.slice(0, index).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                history.push({ role: 'user', parts: [{ text: "(다른 방식으로 다시 말해줘)" }] });
                const resp = await fetchAPI(history);
                setIsTyping(false);
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: resp }, { merge: true });
            };

            // 🌟 부드러운 이동 & 검은 여백 방지 캔버스 크롭
            const ImageCropModal = ({ src, type, onApply, onCancel }) => {
                const canvasRef = useRef(null); const [scale, setScale] = useState(1);
                const posRef = useRef({ x: 0, y: 0 }); const isDragging = useRef(false);
                const lastPos = useRef({ x: 0, y: 0 }); const imgRef = useRef(null);
                const width = 300, height = type === 'profile' ? 300 : 450;
                
                const draw = () => {
                    if (!imgRef.current || !canvasRef.current) return;
                    const canvas = canvasRef.current, ctx = canvas.getContext('2d'), img = imgRef.current;
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * scale;
                    const imgW = img.width * baseScale, imgH = img.height * baseScale;
                    const maxDx = Math.max(0, (imgW - canvas.width) / 2);
                    const maxDy = Math.max(0, (imgH - canvas.height) / 2);
                    posRef.current.x = Math.max(-maxDx, Math.min(maxDx, posRef.current.x));
                    posRef.current.y = Math.max(-maxDy, Math.min(maxDy, posRef.current.y));
                    ctx.drawImage(img, (canvas.width - imgW) / 2 + posRef.current.x, (canvas.height - imgH) / 2 + posRef.current.y, imgW, imgH);
                };
                useEffect(() => { const img = new Image(); img.onload = () => { imgRef.current = img; draw(); }; img.src = src; }, [src]);
                useEffect(() => draw(), [scale]);
                const handleDown = (e) => { isDragging.current = true; const c = e.touches ? e.touches[0] : e; lastPos.current = { x: c.clientX, y: c.clientY }; };
                const handleMove = (e) => { if (!isDragging.current) return; const c = e.touches ? e.touches[0] : e; posRef.current.x += (c.clientX - lastPos.current.x); posRef.current.y += (c.clientY - lastPos.current.y); lastPos.current = { x: c.clientX, y: c.clientY }; requestAnimationFrame(draw); };
                return (
                    <div className="fixed inset-0 z-[500] bg-black flex flex-col">
                        <div className="flex justify-between p-4 text-white font-bold"><button onClick={onCancel}>취소</button><button onClick={() => onApply(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="text-blue-400">적용</button></div>
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="relative border border-white/30" onMouseDown={handleDown} onMouseMove={handleMove} onMouseUp={() => isDragging.current = false} onTouchStart={handleDown} onTouchMove={handleMove} onTouchEnd={() => isDragging.current = false} style={{ width, height }}>
                                <canvas ref={canvasRef} width={width} height={height} className="w-full h-full cursor-move" />
                            </div>
                            <input type="range" min="1" max="3" step="0.01" value={scale} onChange={e => setScale(parseFloat(e.target.value))} className="w-64 mt-10" />
                        </div>
                    </div>
                );
            };

            // 🌟 메인 렌더링
            if (view === 'login') return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-[#BACEE0]">
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50">
                        <img src="icon-192x192.png" className="w-full h-full object-cover" onError={e => e.target.src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>'} />
                    </div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-md font-bold">구글로 시작하기</button>
                </div>
            );

            if (view === 'chatRoom') return (
                <div className="flex-1 flex flex-col bg-[#BACEE0] slide-in overflow-hidden relative">
                    {profileTarget && <ProfileModal />}
                    <header className="px-3 py-3 flex items-center gap-2 border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20">
                        <button onClick={() => setView('main')} className="p-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-xl bg-white overflow-hidden border border-orange-200">{renderProfilePicCommon(profileImgUrl)}</div>
                        <h1 className="font-bold text-gray-800">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                    </header>
                    <main className="flex-1 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar pb-24">
                        {messages.map((msg, i) => (
                            <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                    {msg.sender !== 'me' && <div onClick={() => setProfileTarget('deidara')} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 overflow-hidden border mt-3">{renderProfilePicCommon(profileImgUrl)}</div>}
                                    <div className="flex flex-col">
                                        {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold">데이다라</span>}
                                        <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div onClick={() => setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id)} className={`px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm ${msg.sender === 'me' ? 'bg-[#FEE500]' : 'bg-white'}`}>{msg.text}</div>
                                            <span className="text-[9px] text-gray-500 mb-0.5">{msg.time}</span>
                                        </div>
                                    </div>
                                </div>
                                {selectedMsgId === msg.id && <div className="flex gap-2 mt-1 mx-12">
                                    {msg.sender === 'me' ? <button onClick={() => { const t = prompt("수정", msg.text); if(t) updateDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`), {text:t}); setSelectedMsgId(null); }} className="text-[10px] bg-white px-2 py-1 rounded shadow">수정</button> : <button onClick={() => handleRegenerateMsg(msg.id)} className="text-[10px] bg-white px-2 py-1 rounded shadow">재생성</button>}
                                    <button onClick={() => { if(confirm("삭제?")) deleteDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`)); setSelectedMsgId(null); }} className="text-[10px] bg-white text-red-500 px-2 py-1 rounded shadow">삭제</button>
                                </div>}
                            </div>
                        ))}
                        {isTyping && <div className="ml-11 bg-white/70 px-3 py-2 rounded-2xl text-xs w-fit animate-pulse">작성 중……</div>}
                        <div ref={chatEndRef} />
                    </main>
                    <footer className="p-3 bg-white border-t flex gap-2 pb-safe">
                        <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none" placeholder="메시지 입력..." />
                        <button onClick={handleSend} className="w-9 h-9 bg-[#FEE500] rounded-full flex items-center justify-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </footer>
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-gray-50 overflow-hidden relative">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={data => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(data); else setMyBgImgUrl(data);} else { if(cropModalData.type==='profile')setProfileImgUrl(data); else setBgImgUrl(data); } setCropModalData(null); }} onCancel={()=>setCropModalData(null)} />}
                    {profileTarget && <ProfileModal />}
                    {showSettings && <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll">
                        <h2 className="text-xl font-bold mb-4">앱 설정</h2>
                        <h3 className="font-bold text-gray-800 mb-2">알림 설정</h3>
                        <div className="flex items-center justify-between mb-6 bg-gray-50 px-4 py-3 rounded-xl border">
                            <span className="text-sm font-bold">푸시 알림 받기</span>
                            <input type="checkbox" checked={notifEnabled} onChange={e=>{setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked);}} className="w-5 h-5" />
                        </div>
                        <p className="text-xs mb-1">API 모델 선택</p>
                        <select value={apiModel} onChange={e=>setApiModel(e.target.value)} className="w-full border rounded-xl px-4 py-2 mb-4"><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-2.5-pro">Gemini 2.5 Pro</option></select>
                        <p className="text-xs mb-1">API 키</p>
                        <input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border rounded-xl px-4 py-2 mb-6" placeholder="API 키 입력..." />
                        <button onClick={() => setShowSettings(false)} className="w-full bg-[#FEE500] py-3 rounded-xl font-bold mb-3 shadow">저장</button>
                        <button onClick={handleLogout} className="w-full bg-gray-100 py-3 rounded-xl">로그아웃</button>
                    </div></div>}

                    <header className="px-5 py-4 bg-white border-b flex justify-between items-center sticky top-0 z-20">
                        <h1 className="font-extrabold text-xl">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(true)} className="text-gray-500">⚙️</button>
                            {activeTab==='chat' && <button onClick={() => { const n = prompt("방 이름"); if(n) addDoc(collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: serverTimestamp()}); }} className="text-gray-500">➕</button>}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {activeTab === 'friends' && (
                            <div className="p-4 space-y-6">
                                <div onClick={() => setProfileTarget('me')} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer">
                                    <div className="w-14 h-14 rounded-[20px] bg-white border overflow-hidden">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                    <div className="flex-1"><h3 className="font-bold">연지</h3><p className="text-xs text-gray-500">{myStatus}</p></div>
                                </div>
                                <div className="h-px bg-gray-100 w-full opacity-50"></div>
                                <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer">
                                    <div className="w-12 h-12 rounded-2xl bg-white border overflow-hidden">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <div className="flex-1"><h3 className="font-bold">데이다라</h3><p className="text-xs text-gray-500 truncate">{deidaraStatus}</p></div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'chat' && (
                            <div className="px-2 py-2">
                                {chatRooms.length === 0 ? <p className="text-center mt-10 text-gray-400">채팅방이 없습니다.</p> : chatRooms.map(room => (
                                    <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer group relative">
                                        <div className="w-14 h-14 rounded-[20px] bg-white border overflow-hidden">{renderProfilePicCommon(profileImgUrl)}</div>
                                        <div className="flex-1 min-w-0 pr-8"><h3 className="font-bold truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate">{room.lastMessage || "대화를 시작해보세요!"}</p></div>
                                        <button onClick={(e) => { e.stopPropagation(); if(confirm("삭제?")) deleteDoc(doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="absolute right-4 p-2 opacity-0 group-hover:opacity-100 text-red-500"><IconTrash /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                        {activeTab === 'feed' && (
                            <div className="bg-gray-100 min-h-full pb-10">
                                <div className="bg-white p-4 mb-3 shadow-sm">
                                    <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border" rows="3"></textarea>
                                    <div className="flex justify-between items-center mt-2">
                                        <button onClick={handleDeidaraNewPost} className="text-xs font-bold text-orange-500">피드 업데이트</button>
                                        <button onClick={handleAddPost} className="px-5 py-2 rounded-xl text-sm font-bold bg-blue-500 text-white shadow-sm">올리기</button>
                                    </div>
                                </div>
                                <div className="space-y-3 px-3">
                                    {posts.map(post=>(
                                        <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim">
                                            <button onClick={() => deleteDoc(doc(db, `users/${user.uid}/posts/${post.id}`))} className="absolute top-4 right-4 text-gray-300"><IconTrash /></button>
                                            <div className="flex items-center gap-3 mb-3">
                                                <div className="w-10 h-10 rounded-full border overflow-hidden">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                <div><div className="font-bold text-[14px]">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400">{safeDateStr(post.createdAt)}</div></div>
                                            </div>
                                            <p className="text-[14px] mb-4 whitespace-pre-wrap">{post.content}</p>
                                            <div className="bg-gray-50 rounded-xl p-3">
                                                <div className="space-y-3 mb-3">
                                                    {(post.comments||[]).map((c,i)=>(
                                                        <div key={i} className="flex gap-2 relative group items-start">
                                                            <div className="w-6 h-6 rounded-full border overflow-hidden">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                            <div className="flex-1"><span className="font-bold text-[12px] mr-2">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[12px] text-gray-600">{c.content}</span></div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 mt-2 items-center">
                                                    <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 달기..." className="flex-1 bg-white border rounded-lg px-3 py-1.5 text-xs outline-none" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post.id)} />
                                                    <button onClick={()=>handleAddComment(post.id)} className="font-bold text-xs px-3 py-1.5 bg-blue-500 text-white rounded-lg">게시</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='friends'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-semibold">친구</span></div>
                        <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='chat'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-semibold">채팅</span></div>
                        <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='feed'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-semibold">게시물</span></div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
