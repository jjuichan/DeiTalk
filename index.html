<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- 🌟 React & Tailwind 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- 🌟 Firebase Compat 라이브러리 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; background-color: #BACEE0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 Firebase 초기화 로직
        const manualFirebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const appId = 'deitalk-app';
        let auth = null, db = null, provider = null;
        let isFirebaseReady = false;

        const initFirebase = () => {
            try {
                let config = manualFirebaseConfig;
                if (typeof __firebase_config !== 'undefined' && __firebase_config) config = JSON.parse(__firebase_config);

                if (config && config.apiKey) {
                    if (!firebase.apps.length) firebase.initializeApp(config);
                    auth = firebase.auth();
                    db = firebase.firestore();
                    provider = new firebase.auth.GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    isFirebaseReady = true;
                    return true;
                }
            } catch (e) { console.error("Firebase Init Fail:", e); }
            return false;
        };

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 메신저와 SNS 피드 앱이야. 행동 묘사나 괄호체는 절대 하지 말고 자연스러운 카톡/SNS 댓글 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
말 끝에 '음!'이나 '음.'을 자주 붙이는 게 너의 말버릇이야.
틱틱대고 무심한 척 하지만 속으로는 연지를 엄청 아끼고 챙겨주는 츤데레 성격.
        `;

        // 🌟 이미지 압축 (Firestore 1MB 용량 제한을 위해 1024px로 안전하게 압축)
        const compressBase64Image = (base64Str, maxSize = 1024, quality = 0.8) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { 
                const date = ts.toDate ? ts.toDate() : new Date(ts);
                return date.toLocaleTimeString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); 
            } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center bg-gray-100 text-gray-400 text-2xl font-black italic">D</div>);
        const IconSend = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;

        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab, chatRooms, setView, setCurrentRoomId }) => {
            const isMe = profileTarget === 'me';
            const bg = isMe ? (myBgImgUrl || '') : (bgImgUrl || '');
            
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: bg ? `url('${bg}')` : 'none', backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else setProfileTarget(null); }} className="text-white p-2 active:bg-white/20 rounded-full font-black text-xl">✕</button>
                        {!isEditingProfile && isMe && <button onClick={() => setIsEditingProfile(true)} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', 'me')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20 font-semibold">배경 변경</label></div>}
                        
                        <div onClick={() => !isEditingProfile && setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl)} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-5 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {renderProfilePicCommon(isMe ? myProfileImgUrl : profileImgUrl)}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-2xl">📷</label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', 'me')} className="hidden" />}
                        </div>
                        
                        <h2 className="text-2xl font-black mb-1 text-shadow tracking-tight">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-10 mt-2 flex justify-center mx-auto">
                            {isEditingProfile && isMe ? <input type="text" defaultValue={myStatus} onBlur={(e) => { setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center outline-none font-bold" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md font-bold">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-8 flex justify-around mx-auto">
                            {isEditingProfile ? <button onClick={() => setIsEditingProfile(false)} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full shadow-lg">완료</button> : 
                                <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { 
                                    setProfileTarget(null); 
                                    if(chatRooms.length > 0) {
                                        setCurrentRoomId(chatRooms[0].id);
                                        setView('chatRoom');
                                    } else {
                                        setActiveTab('chat');
                                    }
                                }}>
                                    <div className="text-white text-3xl">💬</div>
                                    <span className="text-[12px] font-bold text-shadow uppercase">Chat</span>
                                </div>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        const FullImageViewer = ({ src, onClose }) => (
            <div className="fixed inset-0 z-[5000] bg-black flex items-center justify-center" onClick={onClose}>
                <img src={src} className="max-w-full max-h-full object-contain" />
                <button className="absolute top-8 right-8 text-white text-2xl font-black p-2 bg-black/50 rounded-full">✕</button>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [activeTab, setActiveTab] = useState('chat'); 
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]); 
            
            const [inputText, setInputText] = useState('');
            const [newPostText, setNewPostText] = useState(''); 
            const [isTyping, setIsTyping] = useState(false);
            const [isPosting, setIsPosting] = useState(false);
            const [errorMessage, setErrorMessage] = useState(null);

            const [activeMsgId, setActiveMsgId] = useState(null);

            const [profileTarget, setProfileTarget] = useState(null);
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            // 🌟 초기값으로 gemini-2.5-pro 설정
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-pro'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");
            
            const [showSettings, setShowSettings] = useState(false);
            const [pathMode, setPathMode] = useState(localStorage.getItem('deitalk_path_mode') || 'artifacts');

            const chatEndRef = useRef(null);

            const getPath = (uid, col) => {
                if (pathMode === 'root') return col; 
                if (pathMode === 'user') return `users/${uid}/${col}`; 
                return `/artifacts/${appId}/users/${uid}/${col}`; 
            };

            useEffect(() => {
                const ready = initFirebase();
                if (!ready || !auth) { setView('login'); return; }

                let isRedirectChecking = true;
                auth.getRedirectResult().then((result) => {
                    isRedirectChecking = false;
                    if (!result.user && !auth.currentUser) setView('login');
                }).catch(e => {
                    isRedirectChecking = false;
                    setView('login');
                });

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u); loadChatRooms(u.uid); loadPosts(u.uid); setView('main');
                    } else {
                        if (!isRedirectChecking) setView('login');
                    }
                });

                const safeTimeout = setTimeout(() => {
                    setView(prev => { if (prev === 'loading' && !auth.currentUser) return 'login'; return prev; });
                }, 3000);

                return () => { unsubscribe(); clearTimeout(safeTimeout); };
            }, [pathMode]);

            const loadChatRooms = (uid) => {
                if (!db) return;
                db.collection(getPath(uid, 'rooms')).orderBy('updatedAt', 'desc').onSnapshot((sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); 
                    setChatRooms(rooms);
                });
            };

            const loadPosts = (uid) => {
                if (!db) return;
                db.collection(getPath(uid, 'posts')).orderBy('createdAt', 'desc').onSnapshot((sn) => {
                    const loadedPosts = []; sn.forEach(d => loadedPosts.push({ id: d.id, ...d.data() })); 
                    setPosts(loadedPosts);
                });
            };

            useEffect(() => {
                if (view === 'chatRoom' && currentRoomId && user && db) {
                    const unsubscribe = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages')
                        .orderBy('createdAt', 'asc').onSnapshot((sn) => {
                            const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); 
                            setMessages(msgs);
                            setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                        });
                    return () => unsubscribe();
                }
            }, [view, currentRoomId, user, pathMode]);

            const handleLogin = async () => {
                if (!isFirebaseReady) return;
                try {
                    setView('loading');
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    setView('login');
                    if (e.code !== 'auth/popup-closed-by-user') setErrorMessage(`로그인 오류: ${e.message}`);
                }
            };

            const handleGuestLogin = async () => {
                if (!isFirebaseReady) { setUser({ uid: 'local_guest', isAnonymous: true }); setView('main'); return; }
                try { await auth.signInAnonymously(); } catch (e) { setErrorMessage("게스트 로그인 실패"); }
            };

            // 🌟 텍스트 전용 일반 API 호출
            const fetchAPI = async (chatHistory) => {
                if(!geminiKey) return "연지야, 설정에서 내 API 키(Gemini Key)부터 넣어줘라, 음!";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const resp = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: chatHistory, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } }) });
                    const data = await resp.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵 중...)";
                } catch (e) { return "통신 장애 발생! API 키를 확인해라, 음!"; }
            };

            // 🌟 나노바나나 AI (이미지 생성 전용 API)
            const fetchImageAPI = async (promptText) => {
                if(!geminiKey) return { text: "연지야, 설정에서 API 키를 먼저 넣어줘라, 음!", base64: null };
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${geminiKey}`;
                try {
                    const payload = {
                        contents: [{ role: "user", parts: [{ text: `너는 데이다라야. 다음 내용에 맞는 이미지를 생성하고, 데이다라의 말투(끝에 '음!' 붙이기)로 코멘트를 남겨줘: ${promptText}` }] }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] },
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                    };
                    const resp = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    const data = await resp.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    
                    const parts = data.candidates?.[0]?.content?.parts || [];
                    const textPart = parts.find(p => p.text)?.text || "여깄다, 음!";
                    const imgPart = parts.find(p => p.inlineData)?.inlineData?.data;
                    
                    return { text: textPart, base64: imgPart ? `data:image/jpeg;base64,${imgPart}` : null };
                } catch(e) {
                    console.error(e);
                    return { text: "사진 생성에 실패했어. 에러가 났나봐, 음!", base64: null };
                }
            };

            const buildHistoryForAPI = (msgList) => {
                return msgList.map(m => {
                    const parts = [];
                    if (m.text) parts.push({ text: m.text });
                    if (m.imageUrl && m.sender === 'me') {
                        parts.push({ inlineData: { mimeType: "image/jpeg", data: m.imageUrl.split(',')[1] } });
                    }
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const handleSend = async () => {
                if (!currentRoomId || !user || !inputText.trim() || !db) return;
                const text = inputText; setInputText(''); setIsTyping(true);
                try {
                    const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    
                    await roomRef.collection('messages').add({ sender: 'me', text, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    
                    const history = buildHistoryForAPI(messages.slice(-14));
                    history.push({ role: 'user', parts: [{ text }] });
                    
                    const resp = await fetchAPI(history);
                    
                    await roomRef.collection('messages').add({ sender: 'deidara', text: resp, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await roomRef.update({ lastMessage: resp, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } finally { setIsTyping(false); setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100); }
            };

            const handleSendImage = async (e) => {
                const file = e.target.files[0];
                if (!file || !currentRoomId || !user || !db) return;
                e.target.value = '';
                setIsTyping(true);
                try {
                    const b64 = await compressImage(file);
                    const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    
                    await roomRef.collection('messages').add({ sender: 'me', text: '(사진 전송)', imageUrl: b64, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    
                    const history = buildHistoryForAPI(messages.slice(-14));
                    history.push({ role: 'user', parts: [{ text: '(사진을 보냈어)' }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    
                    const resp = await fetchAPI(history);
                    
                    await roomRef.collection('messages').add({ sender: 'deidara', text: resp, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await roomRef.update({ lastMessage: '사진 전송됨', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } catch(err) {
                    console.error(err);
                    alert("이미지 전송 실패!");
                } finally { setIsTyping(false); setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100); }
            };

            const requestNanoBanana = async () => {
                if (!currentRoomId || !user || !db) return;
                const promptText = prompt("데이다라에게 어떤 사진을 만들어 달라고 할까? (예: 네가 만든 기폭점토 새)");
                if (!promptText) return;
                
                setIsTyping(true);
                try {
                    const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    
                    await roomRef.collection('messages').add({ sender: 'me', text: `[사진 요청] ${promptText}`, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    
                    const result = await fetchImageAPI(promptText);
                    
                    await roomRef.collection('messages').add({ sender: 'deidara', text: result.text, imageUrl: result.base64, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await roomRef.update({ lastMessage: '사진이 도착했어, 음!', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } catch(err) {
                    console.error(err);
                    alert("사진 생성 실패!");
                } finally { setIsTyping(false); setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100); }
            };

            const deleteMsg = async (id) => {
                if(confirm('이 메시지를 삭제할까, 음?')) {
                    await db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages').doc(id).delete();
                    setActiveMsgId(null);
                }
            };

            const editMsg = async (msg) => {
                const newText = prompt('메시지 수정:', msg.text);
                if (newText !== null && newText.trim() !== '') {
                    await db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages').doc(msg.id).update({ text: newText });
                    setActiveMsgId(null);
                }
            };

            const regenMsg = async (msg) => {
                setActiveMsgId(null);
                setIsTyping(true);
                try {
                    const idx = messages.findIndex(m => m.id === msg.id);
                    if (idx === -1) return;
                    const historyToUse = buildHistoryForAPI(messages.slice(Math.max(0, idx - 15), idx));
                    const resp = await fetchAPI(historyToUse);
                    await db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages').doc(msg.id).update({ text: resp });
                } catch (e) {
                    alert('재생성 실패!');
                } finally { setIsTyping(false); }
            };

            const handleImageUploadUI = async (e, mode, target) => {
                const file = e.target.files[0]; if (!file) return;
                const b64 = await compressImage(file);
                if (mode === 'profile') {
                    if (target === 'me') { setMyProfileImgUrl(b64); localStorage.setItem('my_profile_url', b64); }
                    else { setProfileImgUrl(b64); localStorage.setItem('deidara_profile_url', b64); }
                } else {
                    if (target === 'me') { setMyBgImgUrl(b64); localStorage.setItem('my_bg_url', b64); }
                    else { setBgImgUrl(b64); localStorage.setItem('deidara_bg_url', b64); }
                }
            };

            const handleCreatePost = async () => {
                if (!user || !newPostText.trim() || !db) return;
                const text = newPostText; setNewPostText(''); setIsPosting(true);
                try {
                    const postRef = await db.collection(getPath(user.uid, 'posts')).add({
                        author: 'me',
                        content: text,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        comments: []
                    });
                    
                    const aiResp = await fetchAPI([{role: 'user', parts: [{text: `내가 방금 SNS 피드에 이런 글을 올렸어: "${text}". 여기에 네가 데이다라로서 짧고 츤데레 같은 댓글(1~2문장)을 달아줘. 음!`}]}]);
                    
                    await postRef.update({
                        comments: firebase.firestore.FieldValue.arrayUnion({
                            id: Date.now().toString(),
                            author: 'deidara',
                            text: aiResp,
                            createdAt: new Date().toISOString()
                        })
                    });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (postId, text) => {
                if (!user || !text.trim() || !db) return;
                const postRef = db.collection(getPath(user.uid, 'posts')).doc(postId);
                
                await postRef.update({
                    comments: firebase.firestore.FieldValue.arrayUnion({
                        id: Date.now().toString(),
                        author: 'me',
                        text: text,
                        createdAt: new Date().toISOString()
                    })
                });

                const aiResp = await fetchAPI([{role: 'user', parts: [{text: `내가 네가 있는 피드에서 이런 대댓글을 달았어: "${text}". 데이다라로서 짧게 반응하는 대댓글을 달아줘. 음!`}]}]);
                
                await postRef.update({
                    comments: firebase.firestore.FieldValue.arrayUnion({
                        id: (Date.now()+1).toString(),
                        author: 'deidara',
                        text: aiResp,
                        createdAt: new Date().toISOString()
                    })
                });
            };

            if (view === 'loading') return <div className="w-full h-full flex flex-col items-center justify-center bg-[#BACEE0]"><div className="w-16 h-16 rounded-[24px] bg-white flex items-center justify-center text-3xl shadow-lg mb-6 animate-bounce">🎨</div><div className="flex gap-1"><span className="font-black text-white text-lg tracking-widest uppercase">Connecting...</span></div></div>;

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    {errorMessage && <div className="fixed top-10 left-6 right-6 z-[6000] bg-white p-4 rounded-2xl shadow-xl border-l-4 border-red-500 msg-anim"><p className="text-sm font-bold text-red-600 leading-snug break-keep">{errorMessage}</p><button onClick={() => setErrorMessage(null)} className="mt-2 text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1.5 rounded-full uppercase">닫기</button></div>}
                    <div className="w-24 h-24 rounded-[32px] bg-white mb-8 shadow-2xl flex items-center justify-center text-4xl">🎨</div>
                    <h1 className="text-4xl font-black text-gray-800 mb-2 tracking-tighter italic">DeiTalk</h1>
                    <p className="text-gray-600 mb-10 font-bold opacity-70">예술은 폭발이다, 음!</p>
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-xl font-black mb-4 text-gray-800 active:scale-95 transition-all flex items-center justify-center gap-2"><svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> GOOGLE LOGIN</button>
                    <button onClick={handleGuestLogin} className="w-full max-w-xs bg-black/10 py-4 rounded-2xl font-bold text-gray-700 text-sm active:scale-95 transition-all">GUEST START</button>
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col overflow-hidden relative bg-[#BACEE0]">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {profileTarget && <ProfileModal 
                        profileTarget={profileTarget} setProfileTarget={setProfileTarget} 
                        isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile}
                        myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl}
                        myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl}
                        myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus}
                        setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI}
                        setActiveTab={setActiveTab} chatRooms={chatRooms} setView={setView} setCurrentRoomId={setCurrentRoomId}
                    />}

                    {showSettings && (
                        <div className="fixed inset-0 z-[4000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <h2 className="text-2xl font-black mb-6 text-gray-800">Settings</h2>
                                <div className="bg-gray-50 p-3 rounded-2xl text-[10px] font-bold text-gray-400 break-all mb-4">UID: {user?.uid}</div>
                                <div className="bg-red-50 p-4 rounded-[20px] border border-red-200 mb-6">
                                    <p className="text-[12px] font-black text-red-500 mb-1">🚨 잃어버린 데이터 복구 스위치</p>
                                    <select value={pathMode} onChange={e => { setPathMode(e.target.value); localStorage.setItem('deitalk_path_mode', e.target.value); }} className="w-full bg-white border border-red-200 rounded-xl px-3 py-2 text-sm font-bold outline-none text-red-500 shadow-sm cursor-pointer">
                                        <option value="artifacts">기본 모드</option>
                                        <option value="root">복구 모드 1 (일반적인 방식 - 추천!)</option>
                                        <option value="user">복구 모드 2 (유저별 분리 방식)</option>
                                    </select>
                                </div>
                                <div className="space-y-5 mb-8">
                                    <div><p className="text-[10px] font-black text-gray-400 mb-2 uppercase ml-1">AI Model</p>
                                        {/* 🌟 gemini-2.5-pro 모델 옵션 다시 추가 완료 */}
                                        <select value={apiModel} onChange={e=>{ setApiModel(e.target.value); localStorage.setItem('gemini_api_model', e.target.value); }} className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3.5 text-sm font-bold outline-none">
                                            <option value="gemini-2.5-pro">Gemini 2.5 Pro (추천)</option>
                                            <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                        </select>
                                    </div>
                                    <div><p className="text-[10px] font-black text-gray-400 mb-2 uppercase ml-1">Gemini API Key</p>
                                        <input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} placeholder="키를 입력하세요" className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3.5 outline-none text-sm font-bold" />
                                    </div>
                                </div>
                                <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-black mb-3 text-gray-900 shadow-md">SAVE</button>
                                <button onClick={() => { auth?.signOut(); setView('login'); setShowSettings(false); }} className="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-bold">LOGOUT</button>
                                <button onClick={() => setShowSettings(false)} className="w-full mt-2 text-gray-400 font-bold py-2">CLOSE</button>
                            </div>
                        </div>
                    )}

                    {view === 'main' ? (
                        <Fragment>
                            <header className="px-6 py-6 bg-white flex justify-between items-center sticky top-0 z-20 shadow-sm">
                                <h1 className="font-black text-2xl tracking-tighter text-gray-900 uppercase italic">{activeTab}</h1>
                                <button onClick={() => setShowSettings(true)} className="text-xl">⚙️</button>
                            </header>
                            <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                                {activeTab === 'friends' && (
                                    <div className="flex-1">
                                        <div className="px-6 py-4">
                                            <div onClick={() => setProfileTarget('me')} className="flex items-center gap-5 p-3 hover:bg-gray-50 rounded-3xl transition-all active:scale-[0.98] cursor-pointer">
                                                <div className="w-[64px] h-[64px] rounded-[24px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-50 shrink-0 shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-lg tracking-tight">연지</h3><p className="text-xs text-gray-500 mt-1 truncate font-bold">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-6 py-2">
                                            <p className="text-[10px] font-black text-gray-300 ml-4 mb-3 uppercase tracking-widest">Favorite Friends</p>
                                            <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-5 p-3 hover:bg-orange-50 rounded-3xl cursor-pointer transition-all active:scale-[0.98]">
                                                <div className="w-[56px] h-[56px] rounded-[22px] bg-orange-100 flex items-center justify-center overflow-hidden border border-orange-50 shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-[17px] tracking-tight">데이다라</h3><p className="text-xs text-gray-500 mt-1 truncate font-bold">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-2 space-y-4">
                                        <button onClick={() => { const n = prompt("채팅방 이름?"); if(n && db) db.collection(getPath(user.uid, 'rooms')).add({name:n, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); }} className="w-full py-4 bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl text-gray-400 font-bold text-sm active:scale-95 transition-all">＋ 새 채팅방 만들기</button>
                                        {chatRooms.length === 0 && <div className="text-center py-20 text-gray-300 font-bold">대화가 안 보이면 ⚙️설정에서 복구 스위치를 눌러보세요!</div>}
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-5 p-5 bg-white border border-gray-100 rounded-[32px] cursor-pointer shadow-sm active:scale-95 transition-all">
                                                <div className="w-[54px] h-[54px] rounded-[20px] bg-gray-50 flex items-center justify-center overflow-hidden shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-6"><h3 className="font-black text-gray-900 truncate tracking-tight">{room.name}</h3><p className="text-xs text-gray-500 truncate mt-1 font-bold italic">{room.lastMessage || "대화가 없습니다."}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === 'feed' && (
                                    <div className="flex-1 px-4 py-4 space-y-6 bg-gray-50 min-h-full">
                                        <div className="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100">
                                            <textarea
                                                value={newPostText}
                                                onChange={e => setNewPostText(e.target.value)}
                                                placeholder="무슨 생각을 하고 있어, 음?"
                                                className="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none resize-none h-24 mb-3 text-gray-800"
                                            />
                                            <div className="flex justify-end">
                                                <button onClick={handleCreatePost} disabled={isPosting} className="bg-[#FEE500] text-gray-900 px-6 py-2.5 rounded-full font-black text-sm active:scale-95 transition-all shadow-sm">
                                                    {isPosting ? '게시 중...' : '게시하기'}
                                                </button>
                                            </div>
                                        </div>

                                        {posts.length === 0 && <div className="text-center py-10 text-gray-400 font-bold text-sm">피드가 안 보이면 ⚙️설정에서 복구 스위치를 눌러보세요!</div>}
                                        
                                        {posts.map(post => (
                                            <div key={post.id} className="bg-white rounded-[32px] p-5 shadow-sm border border-gray-100">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-11 h-11 rounded-[16px] bg-gray-100 overflow-hidden shrink-0 border border-gray-50">
                                                        {renderProfilePicCommon(post.author === 'me' ? myProfileImgUrl : profileImgUrl)}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-[15px] text-gray-900">{post.author === 'me' ? '연지' : '데이다라'}</h4>
                                                        <span className="text-[10px] text-gray-400 font-bold">{safeTimeStr(post.createdAt)}</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="text-[14px] font-bold text-gray-800 leading-relaxed mb-5 px-1 whitespace-pre-wrap">
                                                    {post.content}
                                                </div>
                                                
                                                <div className="bg-gray-50 rounded-[20px] p-4 space-y-3">
                                                    {(post.comments || []).map((cmt, idx) => (
                                                        <div key={idx} className="flex gap-2 text-[13px]">
                                                            <span className={`font-black shrink-0 ${cmt.author === 'me' ? 'text-gray-900' : 'text-orange-500'}`}>{cmt.author === 'me' ? '연지' : '데이다라'}</span>
                                                            <span className="font-bold text-gray-700 leading-snug">{cmt.text}</span>
                                                        </div>
                                                    ))}
                                                    
                                                    <div className="mt-3 pt-3 border-t border-gray-200 relative">
                                                        <input type="text" placeholder="댓글을 달아줘, 음!" className="w-full bg-white rounded-full pl-4 pr-10 py-3 text-xs font-bold outline-none border border-gray-200 focus:border-[#FEE500] transition-colors" onKeyPress={(e) => {
                                                            if(e.key === 'Enter') {
                                                                handleAddComment(post.id, e.target.value);
                                                                e.target.value = '';
                                                            }
                                                        }} />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </Fragment>
                    ) : (
                        <Fragment>
                            <header className="px-3 py-3 flex items-center justify-between border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setView('main')} className="p-2 active:bg-black/5 rounded-full font-black text-gray-700">←</button>
                                    <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-[14px] bg-white overflow-hidden shadow-sm shrink-0 cursor-pointer active:scale-95 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-lg ml-1">데이다라</h1>
                                </div>
                            </header>
                            
                            <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-4 space-y-3 custom-scrollbar bg-[#BACEE0]">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'} msg-anim`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div className="w-10 h-10 rounded-[14px] bg-white mr-3 shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col relative">
                                                {msg.sender !== 'me' && <span className="text-[12px] text-gray-600 mb-1 ml-1 font-bold uppercase">데이다라</span>}
                                                
                                                <div 
                                                    onClick={() => setActiveMsgId(activeMsgId === msg.id ? null : msg.id)}
                                                    className={`px-5 py-3.5 rounded-[24px] text-[15px] shadow-sm font-bold tracking-tight cursor-pointer transition-transform active:scale-[0.98] flex flex-col ${msg.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}
                                                >
                                                    {msg.imageUrl && (
                                                        <img src={msg.imageUrl} alt="첨부 이미지" className="max-w-full max-h-[220px] rounded-[16px] mb-2 object-cover" onClick={(e) => { e.stopPropagation(); setShowFullImage(msg.imageUrl); }} />
                                                    )}
                                                    {msg.text}
                                                </div>

                                                {activeMsgId === msg.id && (
                                                    <div className={`flex gap-3 text-[12px] font-black text-black/40 mt-1.5 ${msg.sender === 'me' ? 'justify-end mr-1' : 'justify-start ml-1'}`}>
                                                        {msg.sender === 'me' && <button onClick={()=>editMsg(msg)} className="hover:text-black transition-colors px-1 py-0.5">수정</button>}
                                                        <button onClick={()=>deleteMsg(msg.id)} className="hover:text-red-500 transition-colors px-1 py-0.5">삭제</button>
                                                        {msg.sender === 'deidara' && <button onClick={()=>regenMsg(msg)} className="hover:text-black transition-colors px-1 py-0.5">재생성</button>}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-13 text-[11px] text-white/70 font-black animate-pulse uppercase tracking-widest mt-2">Typing...</div>}
                                <div ref={chatEndRef} className="pb-2" />
                            </main>

                            <footer className="w-full bg-white border-t border-gray-100 px-3 py-2.5 flex items-center gap-2 relative z-30 shrink-0" style={{ paddingBottom: 'max(12px, env(safe-area-inset-bottom))' }}>
                                <label htmlFor="chat-img-upload" className="w-9 h-9 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 cursor-pointer active:scale-90 transition-all text-lg">
                                    📷
                                </label>
                                <input type="file" id="chat-img-upload" accept="image/*" className="hidden" onChange={handleSendImage} />
                                
                                <button onClick={requestNanoBanana} className="w-9 h-9 shrink-0 bg-orange-50 border border-orange-100 rounded-full flex items-center justify-center text-orange-400 active:scale-90 transition-all text-[16px]" title="나노바나나 사진 요청">
                                    🍌
                                </button>

                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 border-none rounded-full px-4 py-2.5 text-sm outline-none font-bold focus:bg-white focus:ring-2 focus:ring-[#FEE500] transition-all min-w-0 text-gray-800" placeholder="메시지 입력..." />
                                
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition-all p-2.5 shadow-sm">
                                    <IconSend />
                                </button>
                            </footer>
                        </Fragment>
                    )}

                    {view === 'main' && (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex justify-around items-center h-[82px] pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] backdrop-blur-md px-6">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='friends'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">👤</span><span className="text-[10px] font-black uppercase tracking-tighter">Friends</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='chat'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">💬</span><span className="text-[10px] font-black uppercase tracking-tighter">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='feed'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">📋</span><span className="text-[10px] font-black uppercase tracking-tighter">Feed</span></div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
