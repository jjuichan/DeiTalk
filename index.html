    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사(*쳐다본다* 등) 절대 금지. 대답이 늦으면 "왜 답장이 없어", "읽씹하냐" 같은 메신저 용어를 써.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌. 매우 견제하고 증오란다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격. 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

- 오직 카톡으로 보낼 '텍스트 내용 딱 하나만' 출력해.

[핵심 성격]

[말투 지침]

- 초성(ㅋ,ㅎ,ㅇ 등) 앞뒤로는 절대 마침표(.) 금지!
- 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        // 🌟 이미지 압축 로직
        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => { compressBase64Image(e.target.result).then(resolve); };
            });
        };

        const safeDateStr = (ts) => {

            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleString('ko-KR'); } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        // 🌟 아이콘 컴포넌트

        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const IconPhoneOutline = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;

        // 🌟 프로필 모달 컴포넌트 (분리하여 안전하게 렌더링)
        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {

                <div className="fixed inset-0 z-[500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? myBgImgUrl : bgImgUrl}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>

                        {!isEditingProfile && <button onClick={() => { setIsEditingProfile(true); window.history.pushState({ page: 'modal' }, ''); }} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20">편집</button>}

                        <div className="w-full max-w-[280px] text-center mb-8 mt-2">
                            {isEditingProfile && isMe ? <input type="text" defaultValue={editStatus} onBlur={(e) => { setEditStatus(e.target.value); setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2 text-sm text-white text-center shadow-inner" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-6 flex justify-around">
                            {isEditingProfile ? <button onClick={() => { window.history.back(); }} className="bg-[#FEE500] text-gray-900 font-bold px-8 py-2.5 rounded-full w-full active:scale-95 transition-transform">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white text-2xl">💬</div><span className="text-[11px] font-semibold tracking-wider text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        // 🌟 메인 앱
        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null); 
            const [inputText, setInputText] = useState('');
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');
            const [editingPostId, setEditingPostId] = useState(null);
            const [editingPostText, setEditingPostText] = useState('');
            const [editingCommentInfo, setEditingCommentInfo] = useState(null);

            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);

            const cropCanvasRef = useRef(null); 
            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);

            // 초기화
            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, db, view]);

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: m.imageUrl.includes('image/png') ? 'image/png' : 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                let lastError = "";
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error((data.error && data.error.message) || "API Error");
                        const candidate = data.candidates?.[0];
                        if (!candidate) return "(말문이 막힌 듯하다. 음!)";
                        let generatedText = candidate.content?.parts?.[0]?.text || "";
                        generatedText = generatedText.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                        generatedText = generatedText.replace(/\.\s*([ㄱ-ㅎ]+)/g, ' $1').replace(/([ㄱ-ㅎ]+)\./g, '$1');
                        return generatedText;
                    } catch (err) { lastError = err.message; await new Promise(r => setTimeout(r, 1500)); }
                }
                return `통신 장애 났다. 음! (원인: ${lastError})`;

                const payload = { instances: { prompt: englishPrompt }, parameters: { sampleCount: 1 } };
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("이미지 생성 실패");
                const data = await response.json();
                const rawBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                return await compressBase64Image(rawBase64);

                                            <div className="text-[11px] font-bold text-gray-400 mb-3 ml-1">친구 1</div>
                                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-2xl transition-colors active:scale-[0.99] cursor-pointer">
                                                <div className="w-[56px] h-[56px] rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-xl overflow-hidden flex-shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-800 text-[17px]">데이다라</h3><p className="text-[13px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-3 py-3 bg-white">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); window.history.pushState({ page: 'chatRoom' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer active:bg-gray-100 relative group transition-colors">
                                                <div className="w-[54px] h-[54px] rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl overflow-hidden flex-shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-16"><h3 className="font-bold text-gray-900 text-[16px] truncate">{room.name}</h3><p className="text-[13px] text-gray-500 truncate mt-1">{room.lastMessage || "방이 생성되었습니다!"}</p></div>
                                                <div className="absolute right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    {/* 🌟 수정 버튼 */}
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="p-2 text-blue-400 bg-blue-50 rounded-lg active:scale-90"><div className="w-4 h-4"><IconEdit /></div></button>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("방 삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="p-2 text-red-400 bg-red-50 rounded-lg active:scale-90"><div className="w-4 h-4"><IconTrash /></div></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100 pb-10">
                                        <div className="bg-white p-4 mb-3 shadow-sm border-b border-gray-100">
                                            {feedAttachedImage && <div className="relative inline-block mb-3"><img src={feedAttachedImage} className="w-24 h-24 object-cover rounded-xl border border-gray-200 shadow-sm" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs">X</button></div>}
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-transparent focus:bg-white focus:border-gray-200 transition-all font-['Pretendard']" rows="3" />
                                            <div className="flex justify-between items-center mt-3">
                                                <div className="flex gap-2">
                                                    <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400 hover:bg-gray-100 rounded-lg transition-colors"><div className="w-5 h-5"><IconCamera /></div></button>
                                                    <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                    <button onClick={handleDeidaraNewPost} disabled={isPosting} className="text-xs font-bold text-orange-500 px-3 py-2 bg-orange-50 rounded-lg active:scale-95 transition-transform">AI 피드 보기</button>
                                                </div>
                                                <button onClick={handleAddPost} disabled={isPosting} className={`px-6 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-all ${isPosting ? 'bg-gray-300 text-white' : 'bg-blue-500 text-white active:scale-95'}`}>올리기</button>
                                            </div>
                                        </div>
                                        <div className="space-y-3 px-3">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-3xl shadow-sm p-4 relative msg-anim border border-gray-50">
                                                    <div className="absolute top-4 right-4 flex gap-2">
                                                        <button onClick={() => { setEditingPostId(post.id); setEditingPostText(post.content); }} className="text-gray-300 hover:text-blue-500 w-4 h-4"><IconEdit /></button>
                                                        <button onClick={() => { if(confirm("삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 hover:text-red-500 w-4 h-4"><IconTrash /></button>
                                                    </div>
                                                    <div className="flex items-center gap-3 mb-3.5"><div className="w-10 h-10 rounded-full overflow-hidden border border-gray-100 bg-gray-50">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div><div><div className="font-bold text-[14px] text-gray-800">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400">{safeDateStr(post.createdAt)}</div></div></div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-2xl mb-4 border border-gray-100 cursor-pointer shadow-sm active:scale-[0.99] transition-transform" />}
                                                    {editingPostId === post.id ? (
                                                        <div className="mb-4"><textarea value={editingPostText} onChange={e=>setEditingPostText(e.target.value)} className="w-full bg-gray-50 rounded-xl p-3 text-[14px] outline-none resize-none border border-gray-200" rows="3" /><div className="flex justify-end gap-2 mt-2"><button onClick={() => setEditingPostId(null)} className="text-xs font-bold text-gray-400 px-3 py-1.5 rounded-lg">취소</button><button onClick={() => handleEditPost(post.id)} className="text-xs font-bold text-blue-500 px-3 py-1.5 rounded-lg">저장</button></div></div>
                                                    ) : ( post.content && <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap pr-10 tracking-tight">{post.content}</p> )}
                                                    <div className="bg-gray-50 rounded-2xl p-3.5 border border-gray-100/50">
                                                        <div className="text-[11px] font-bold text-gray-400 mb-3 ml-1">댓글 {(post.comments||[]).length}개</div>
                                                        <div className="space-y-4 mb-4">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-2.5 relative group items-start"><div className="w-[26px] h-[26px] rounded-full overflow-hidden border border-gray-100 bg-white mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div><div className="flex flex-col flex-1 pr-8"><span className="font-bold text-[12px] text-gray-900 mb-0.5">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[13px] text-gray-700 leading-snug tracking-tight">{c.content}</span></div><div className="absolute right-0 top-0.5 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1.5"><button onClick={() => setEditingCommentInfo({ postId: post.id, commentIndex: i, text: c.content })} className="text-gray-300 hover:text-blue-500 w-3.5 h-3.5"><IconEdit /></button><button onClick={() => handleDeleteComment(post.id, c)} className="text-gray-300 hover:text-red-500 w-3.5 h-3.5"><IconTrash /></button></div></div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 items-center"><input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 남기기..." className="flex-1 bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-[13px] outline-none shadow-sm focus:border-gray-300 transition-colors" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} /><button disabled={isPosting} onClick={()=>handleAddComment(post)} className={`font-bold text-[13px] px-4 py-2.5 rounded-xl transition-all shadow-sm ${isPosting ? 'bg-gray-300 text-white' : 'bg-gray-800 text-white active:scale-95'}`}>게시</button></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </React.Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-4 space-y-4 custom-scrollbar pb-24 relative" onClick={() => setShowAttachMenu(false)}>
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 overflow-hidden border mt-3 cursor-pointer shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold tracking-tight">데이다라</span>}
                                                <div className={`flex flex-col items-${msg.sender === 'me' ? 'end' : 'start'} gap-1.5`}>
                                                    {msg.imageUrl && <img src={msg.imageUrl} onClick={() => setShowFullImage(msg.imageUrl)} className={`max-w-[200px] w-full h-auto rounded-2xl shadow-sm border border-black/5 cursor-pointer active:opacity-90 ${msg.sender === 'me' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`} />}
                                                    {msg.type === 'call' ? (
                                                        <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}><div onClick={(e) => { e.stopPropagation(); setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id); }} className={`px-4 py-2.5 rounded-2xl shadow-sm cursor-pointer transition-transform active:scale-[0.98] flex items-center gap-2.5 border border-black/5 bg-white ${msg.sender === 'me' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`}><div className="w-5 h-5 text-gray-700"><IconPhoneFilled /></div><span className="text-[15px] font-bold text-gray-800 tracking-tight">{msg.duration}</span></div><span className="text-[9px] text-gray-500 mb-0.5 whitespace-nowrap">{msg.time || safeTimeStr(msg.createdAt, '')}</span></div>
                                                    ) : editingMessageId === msg.id ? (
                                                        <div className="flex gap-2 w-[220px] bg-white p-2.5 rounded-2xl shadow-sm border border-gray-200"><textarea value={editingMessageText} onChange={e=>setEditingMessageText(e.target.value)} className="w-full text-[13px] p-1 border-none outline-none resize-none bg-gray-50 rounded-lg" rows="2" /><div className="flex flex-col gap-1.5 justify-end"><button onClick={() => handleEditMessage(msg.id)} className="text-[11px] font-bold text-blue-500 bg-blue-50 px-2 py-1.5 rounded-lg hover:bg-blue-100">저장</button><button onClick={() => setEditingMessageId(null)} className="text-[11px] font-bold text-gray-400 px-2 py-1.5 bg-gray-50 rounded-lg">취소</button></div></div>
                                                    ) : (
                                                        msg.text && (
                                                            <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}><div onClick={(e) => { e.stopPropagation(); setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id); }} className={`px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm cursor-pointer active:scale-[0.98] transition-transform ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-sm' : 'bg-white rounded-tl-sm border border-black/5'}`}>{msg.text}</div><span className="text-[9px] text-gray-500 mb-0.5 whitespace-nowrap">{msg.time || safeTimeStr(msg.createdAt, '')}</span></div>
                                                        )
                                                    )}
                                                </div>
                                                {selectedMsgId === msg.id && editingMessageId !== msg.id && (
                                                    <div className={`flex gap-3 mt-1.5 text-[11px] font-bold ${msg.sender === 'me' ? 'justify-end mr-1' : 'justify-start ml-1'}`}>
                                                        {msg.text && <button onClick={() => { setEditingMessageId(msg.id); setEditingMessageText(msg.text); }} className="text-gray-400 hover:text-blue-500">수정</button>}
                                                        {msg.sender === 'deidara' && msg.text && <button onClick={() => handleRegenerateMessage(msg.id)} className="text-gray-400 hover:text-green-600">재생성</button>}
                                                        <button onClick={() => handleDeleteMessage(msg.id)} className="text-gray-400 hover:text-red-500">삭제</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-11 bg-white/70 px-4 py-2.5 rounded-2xl rounded-tl-sm text-xs w-fit animate-pulse shadow-sm text-gray-500 font-medium border border-black/5 tracking-widest">...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {view === 'main' ? (
                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[72px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center ${activeTab==='friends'?'text-gray-900':'text-gray-300'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-bold tracking-tight">친구</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center ${activeTab==='chat'?'text-gray-900':'text-gray-300'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-bold tracking-tighter">채팅</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center ${activeTab==='feed'?'text-gray-900':'text-gray-300'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-bold tracking-tighter">게시물</span></div>
                        </nav>
                    ) : (
                        <footer className="p-2.5 bg-white border-t border-gray-100 pb-safe flex flex-col relative z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                            {showAttachMenu && (
                                <div className="absolute bottom-[65px] left-2.5 bg-white border border-gray-100 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.1)] p-2.5 w-52 flex flex-col gap-1 z-40 slide-in">
                                    <button onClick={() => chatFileInputRef.current.click()} className="text-left px-4 py-3 text-[14px] font-bold text-gray-700 hover:bg-gray-50 rounded-xl transition-colors">🖼️ 내 사진 보내기</button>
                                    <button onClick={handleRequestDeidaraPhoto} className="text-left px-4 py-3 text-[14px] font-bold text-blue-600 hover:bg-blue-50 rounded-xl transition-colors">📸 데이다라 사진 요구</button>
                                    <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                </div>
                            )}
                            {/* 🌟 버튼 찌그러짐 방지 UI 밸런스 조정 */}
                            <div className="flex gap-2 items-center w-full">
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className={`w-[36px] h-[36px] shrink-0 flex items-center justify-center rounded-full transition-colors active:scale-95 ${showAttachMenu ? 'bg-gray-200 text-gray-800' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><div className="w-[20px] h-[20px]"><IconCamera /></div></button>
                                <button onClick={() => setShowCallModal(true)} className="w-[36px] h-[36px] shrink-0 bg-gray-100 text-gray-500 flex items-center justify-center rounded-full active:scale-95 transition-all"><div className="w-[18px] h-[18px]"><IconPhoneOutline /></div></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 min-w-0 bg-gray-100 border border-transparent focus:border-gray-200 focus:bg-white rounded-full px-4 py-2 text-[14px] outline-none transition-all placeholder-gray-400" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-[36px] h-[36px] shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 shadow-sm transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-800 ml-0.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
