    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 널 친한 동생으로만 본다 생각해서 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌이며 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격이며 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 초성 앞뒤 마침표 금지. 문장 끝에 '음'은 가끔만 사용.
        `;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try { 
                const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
                return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. ${d.toLocaleTimeString('ko-KR')}`;
            } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { 
                return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: 'numeric', minute: '2-digit', hour12: true }); 
            } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="#e5e7eb" className="w-full h-full"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

        const IconPhoneOutline = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;

        const IconSend = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>;

        const FullImageViewer = ({ src, onClose }) => <div className="fixed inset-0 z-[3000] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>;

        // 🌟 프로필 모달
        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            const [editStatus, setEditStatus] = useState(isMe ? myStatus : deidaraStatus);
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? (myBgImgUrl || '') : (bgImgUrl || '')}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else { setProfileTarget(null); window.history.back(); } }} className="text-white p-2">✕</button>
                        {!isEditingProfile && isMe && <button onClick={() => { setIsEditingProfile(true); window.history.pushState({ page: 'editProfile' }, ''); }} className="text-white px-3 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/20">프로필 관리</button>}
                    </div>
                    <div className="flex flex-col items-center pb-10 text-white z-10 mt-auto w-full px-6 text-center">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20">배경화면 변경</label></div>}
                        <div onClick={() => { if(!isEditingProfile) { setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl); window.history.pushState({ page: 'fullImage' }, ''); } }} className="w-24 h-24 rounded-[32px] bg-white/20 flex items-center justify-center shadow-lg mb-3 border border-white/20 relative overflow-hidden cursor-pointer">
                            {renderProfilePicCommon(isMe ? myProfileImgUrl : profileImgUrl)}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-white w-6 h-6 mx-auto my-auto"><IconCamera/></label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-[18px] font-bold mb-1 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-8 mt-1 mx-auto">
                            {isEditingProfile ? <input type="text" defaultValue={editStatus} onBlur={(e) => { setEditStatus(e.target.value); setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-transparent border-b border-white/50 py-1.5 text-[13px] text-white text-center outline-none" placeholder="상태메시지를 입력해주세요." /> : <p className="text-[13px] opacity-90 text-shadow px-4 py-1">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-6 flex justify-around mx-auto">
                            {isEditingProfile ? <button onClick={() => { setIsEditingProfile(false); window.history.back(); }} className="bg-white text-gray-900 font-bold px-10 py-2.5 rounded-xl w-full active:scale-95 transition-all text-sm">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer active:opacity-70 transition-opacity" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="w-6 h-6"><svg viewBox="0 0 24 24" fill="currentColor" className="text-white"><path d="M12 3c5.52 0 10 3.81 10 8.5 0 4.69-4.48 8.5-10 8.5-1.5 0-2.92-.28-4.21-.78l-3.69 1.85c-.21.1-.45.02-.55-.19-.05-.1-.05-.22 0-.32l1.1-3.15C3.12 15.69 2 13.68 2 11.5 2 6.81 6.48 3 12 3z"/></svg></div><span className="text-[11px] font-medium text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>

            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');
            const [editingPostId, setEditingPostId] = useState(null);
            const [editingPostText, setEditingPostText] = useState('');
            const [editingCommentInfo, setEditingCommentInfo] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);

            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);

            // 🌟 모바일 뒤로가기 제어
            const pushHistory = (stateName) => window.history.pushState({ page: stateName }, '');
            
            useEffect(() => {
                const handlePopState = () => {
                    if (showFullImage) setShowFullImage(null);
                    else if (isEditingProfile) setIsEditingProfile(false);
                    else if (profileTarget) setProfileTarget(null);
                    else if (showCallModal) setShowCallModal(false);
                    else if (showSettings) setShowSettings(false);
                    else if (view === 'chatRoom') setView('main');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [showFullImage, isEditingProfile, profileTarget, showCallModal, showSettings, view]);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: m.imageUrl.includes('image/png') ? 'image/png' : 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                let lastError = "";
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error((data.error && data.error.message) || "API Error");
                        const candidate = data.candidates?.[0];
                        if (!candidate) return "(말문이 막힌 듯하다.)";
                        let generatedText = candidate.content?.parts?.[0]?.text || "";
                        generatedText = generatedText.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                        generatedText = generatedText.replace(/\.\s*([ㄱ-ㅎ]+)/g, ' $1').replace(/([ㄱ-ㅎ]+)\./g, '$1');
                        return generatedText;
                    } catch (err) { lastError = err.message; await new Promise(r => setTimeout(r, 1500)); }
                }
                return `통신 장애 났다. 음! (원인: ${lastError})`;
            };

            const generateImageAPI = async (theme) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${geminiKey}`;
                const payload = { instances: [{ prompt: `A photorealistic casual smartphone snapshot. Subject: ${theme || 'daily life'}. No text.` }], parameters: { sampleCount: 1 } };
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                return await compressBase64Image(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("채팅방 이름을 수정하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    const { doc: fdoc, updateDoc } = window.firebaseAPI;
                    await updateDoc(fdoc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: `(시스템 지침: 네가 방금 한 말에 이어서 한 마디 더 덧붙여봐.)` }] });
                    const resp = await fetchAPI(history, SYSTEM_PROMPT);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                    setIsTyping(false); return;
                }
                
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const handleCallSubmit = async () => {
                if(!callContent.trim()) { alert("통화 내용을 기록해주세요."); return; }
                setShowCallModal(false); setIsTyping(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: callCaller, type: 'call', duration: callDuration, time, createdAt: serverTimestamp() });
                const history = buildHistory(messages, 100);
                history.push({ role: 'user', parts: [{ text: `(시스템 지침: 방금 너랑 ${callDuration} 동안 통화했어. 내용은 "${callContent}" 였어. 통화 직후의 반응을 카톡으로 보내줘.)` }] });
                const resp = await fetchAPI(history);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                setIsTyping(false); setCallContent('');
            };

            const handleAddPost = async () => {
                if (!postInput.trim() && !feedAttachedImage) return;
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const myContent = postInput.trim();
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: myContent, imageUrl: feedAttachedImage || null, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const promptParts = [{ text: `[피드 내용] "${myContent || '(내용 없음)'}". 방금 연지가 피드를 올렸어. 댓글 달아줘.` }];
                    if (feedAttachedImage) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: feedAttachedImage.split(',')[1] } });
                    const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } catch (e) { console.error(e); } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const postId = post.id; const commentText = commentInputs[postId]?.trim(); 
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                
                let context = `[이전 댓글]\n`;
                const safeComments = post.comments || [];
                safeComments.slice(-100).forEach(c => { context += `${c.author==='me'?'연지':'데이다라'}: ${c.content}\n`; });
                
                if (!commentText) {
                    setIsPosting(true);
                    const promptParts = [{ text: `[피드]\n"${post.content || ''}"\n\n${context}\n(지침: 이어서 댓글 달아줘.)` }];
                    if (post.imageUrl) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: post.imageUrl.split(',')[1] } });
                    const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''})); setIsPosting(true);
                const promptParts = [{ text: `[피드]\n"${post.content || ''}"\n\n${context}\n연지: ${commentText}\n(지침: 대댓글 달아줘.)` }];
                if (post.imageUrl) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: post.imageUrl.split(',')[1] } });
                const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    if(target==='me') { if(type==='profile') setMyProfileImgUrl(b64); else setMyBgImgUrl(b64); localStorage.setItem(type==='profile'?'my_profile_url':'my_bg_url', b64); }
                    else { if(type==='profile') setProfileImgUrl(b64); else setBgImgUrl(b64); localStorage.setItem(type==='profile'?'deidara_profile_url':'deidara_bg_url', b64); }
                };
                reader.readAsDataURL(file);
            };

            const handleFeedPhotoAttach = async (e) => {
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                const b64 = await compressImage(file); setFeedAttachedImage(b64);
            };

            const handleDeidaraNewPost = async () => {
                const theme = prompt("어떤 피드를 올리라고 할까요? (예: 일상, 과제, 이타치 험담 등)"); if (theme === null) return;
                setIsPosting(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                try {
                    let b64 = null; if (theme) b64 = await generateImageAPI(theme);
                    const resp = await fetchAPI([{role:'user', parts:[{text:`SNS 피드 하나 작성해줘. 주제: ${theme}`}]}], `${SYSTEM_PROMPT}\n네 일상을 피드에 짧게 남겨봐.`);
                    await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'deidara', content: resp, imageUrl: b64, createdAt: serverTimestamp(), comments: [] });
                } catch (e) { setAlertMsg("이미지 생성 실패"); } finally { setIsPosting(false); }
            };

            const handleChatUploadMyPhoto = async (e) => {
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                setShowAttachMenu(false); setIsTyping(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (ev) => {
                    const b64 = await compressBase64Image(ev.target.result);
                    const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                    const time = safeTimeStr(new Date());
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: '', imageUrl: b64, time, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: '[사진]', updatedAt: serverTimestamp() }, { merge: true });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "사진 보냈어." }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 연지가 방금 사진을 보냈어. 반응해봐.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, time, createdAt: serverTimestamp() });
                    setIsTyping(false);
                };
            };

            const handleRequestDeidaraPhoto = async () => {
                setShowAttachMenu(false);
                const theme = prompt("어떤 사진을 요구할까요?"); if (!theme) return;
                setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                try {
                    const b64Image = await generateImageAPI(theme);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{text: `야, ${theme} 사진 좀 보내봐.`}] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 요청받은 사진을 틱틱대며 보내줘.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, imageUrl: b64Image, time, createdAt: serverTimestamp() });
                } catch (err) { setAlertMsg(`생성 실패: ${err.message}`); } finally { setIsTyping(false); }
            };

            const handleEditPost = async (postId) => {
                if (!editingPostText.trim()) return;
                const { doc: fdoc, updateDoc } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { content: editingPostText });
                setEditingPostId(null);
            };

            const handleEditMessage = async (msgId) => {
                if(!editingMessageText.trim()) return;
                const { doc: fdoc, updateDoc } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: editingMessageText });
                setEditingMessageId(null); setSelectedMsgId(null);
            };

            const handleDeleteMessage = async (msgId) => {
                if(!confirm('메시지를 삭제하시겠습니까?')) return;
                const { doc: fdoc, deleteDoc } = window.firebaseAPI;
                await deleteDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`));
                setSelectedMsgId(null);
            };

            const handleRegenerateMessage = async (msgId) => {
                const targetIndex = messages.findIndex(m => m.id === msgId);
                if(targetIndex === -1) return;
                setIsTyping(true);
                const { doc: fdoc, updateDoc } = window.firebaseAPI;
                const historyContext = buildHistory(messages.slice(Math.max(0, targetIndex - 100), targetIndex), 100);
                const resp = await fetchAPI(historyContext, `${SYSTEM_PROMPT}\n(지침: 네가 방금 한 대답을 취소하고, 완전히 다른 표현으로 다시 대답해 봐.)`);
                await updateDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: resp });
                setIsTyping(false); setSelectedMsgId(null);
            };

            const handleDeleteComment = async (postId, commentObj) => {
                if(!confirm("댓글을 삭제하시겠습니까?")) return;
                const { doc: fdoc, updateDoc, arrayRemove } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayRemove(commentObj) });
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0] relative">
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-[#FEE500] py-4 rounded-xl font-bold active:scale-95 transition-transform text-gray-900">카카오계정으로 시작하기</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-white'} overflow-hidden relative`}>
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {alertMsg && <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/50 p-4"><div className="bg-white rounded-2xl p-6 shadow-xl text-center max-w-sm w-full"><p className="mb-5 text-sm text-gray-800 font-bold whitespace-pre-wrap">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="px-6 py-2 bg-[#FEE500] rounded-full font-bold text-sm w-full">확인</button></div></div>}
                    
                    {showCallModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                                <h2 className="text-lg font-bold mb-4 text-gray-800">📞 통화 기록 남기기</h2>
                                <div className="space-y-3 mb-5 text-left">
                                    <div className="flex flex-col gap-1"><label className="text-[11px] font-bold text-gray-400 ml-1">발신자</label><select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2.5 bg-white text-[13px] outline-none"><option value="me">내가 (연지) 걸음</option><option value="deidara">데이다라가 걸음</option></select></div>
                                    <div className="flex flex-col gap-1"><label className="text-[11px] font-bold text-gray-400 ml-1">통화 시간</label><input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-[13px] outline-none" placeholder="통화 시간 (예: 0:08)" /></div>
                                    <div className="flex flex-col gap-1"><label className="text-[11px] font-bold text-gray-400 ml-1">대화 요약 (AI용)</label><textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="통화 내용 요약" className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-[13px] h-20 resize-none outline-none" /></div>
                                </div>
                                <div className="flex gap-2"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-2.5 rounded-lg bg-gray-100 font-bold text-gray-500 text-[13px]">취소</button><button onClick={handleCallSubmit} className="flex-1 py-2.5 rounded-lg bg-blue-500 text-white font-bold text-[13px]">기록 완료</button></div>
                            </div>
                        </div>
                    )}

                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/50 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl"><h2 className="text-lg font-bold mb-4">설정</h2><div className="flex items-center justify-between mb-4 bg-gray-50 px-3 py-2.5 rounded-lg border border-gray-100"><span className="text-[13px] font-bold text-gray-700">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-4 h-4" /></div><p className="text-xs mb-1 text-gray-500 font-medium">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2.5 mb-5 outline-none text-sm" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-3 rounded-lg font-bold mb-2 text-gray-900 text-sm">저장</button><button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-600 py-3 rounded-lg font-bold text-sm">로그아웃</button></div></div>}

                    {/* 상단 헤더 */}
                    <header className={`px-4 py-3 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-[22px] text-gray-900 tracking-tight">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-3 items-center">
                                    <button onClick={() => { setShowSettings(true); pushHistory('settings'); }} className="w-6 h-6 text-gray-800"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                                    {activeTab==='chat' && <button onClick={() => { const n = prompt("채팅방 이름 입력"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="w-6 h-6 text-gray-800"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>}
                                </div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1 w-full">
                                    <button onClick={() => { setView('main'); window.history.back(); }} className="p-1 -ml-1 text-gray-700 w-8 h-8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-9 h-9 rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm active:scale-95 transition-transform ml-1 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-[17px] ml-2 truncate flex-1">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    {/* 메인 컨텐츠 영역 */}
                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {view === 'main' ? (
                            <Fragment>
                                {/* 친구 목록 탭 */}
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-5 py-3 mt-1">
                                            <p className="text-[11px] text-gray-400 mb-2 font-semibold">내 프로필</p>
                                            <div onClick={() => { setProfileTarget('me'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                                <div className="w-14 h-14 rounded-[22px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        {/* 🌟 회색 구분선 */}
                                        <div className="h-[1px] bg-gray-100 mx-5 my-2"></div>
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-semibold">친구 1</p>
                                            <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                                <div className="w-12 h-12 rounded-[18px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {/* 채팅 리스트 탭 */}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 bg-white">
                                        {chatRooms.length === 0 ? (
                                            <div className="text-center text-gray-400 py-10 text-sm">상단 우측 + 버튼으로 대화방을 만드세요.</div>
                                        ) : chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); pushHistory('chatRoom'); }} className="flex items-center gap-4 px-5 py-3.5 hover:bg-gray-50 cursor-pointer relative group active:bg-gray-100 transition-colors">
                                                <div className="w-12 h-12 rounded-[18px] bg-gray-100 overflow-hidden shrink-0 border border-gray-50">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-16"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-500 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                {/* 🌟 명시적인 방 이름 수정 버튼 (항상 노출) */}
                                                <div className="absolute right-4 flex items-center gap-1.5">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-blue-500 bg-gray-50 rounded-full"><IconEdit /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {/* 게시물(피드) 탭 */}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-[#f3f4f6]">
                                        <div className="bg-white px-5 py-5 mb-2 shadow-sm">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="지금 이 기분은 어떤가요?" className="w-full bg-transparent p-2 text-[15px] outline-none resize-none font-medium" rows="3" />
                                            {feedAttachedImage && <div className="relative inline-block mt-2"><img src={feedAttachedImage} className="w-20 h-20 object-cover rounded-xl shadow-sm border border-gray-200" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 text-xs font-bold">✕</button></div>}
                                            <div className="flex justify-between items-center mt-2 border-t border-gray-100 pt-3">
                                                <div className="flex gap-2">
                                                    <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-500 hover:bg-gray-100 rounded-lg"><div className="w-6 h-6"><IconCamera /></div></button>
                                                    <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                    {/* 🌟 AI 피드 게시물 요구 기능 복구 */}
                                                    <button onClick={handleDeidaraNewPost} disabled={isPosting} className="px-3 py-1.5 bg-gray-100 text-gray-600 font-bold text-[12px] rounded-lg active:scale-95">AI 피드 몰래보기</button>
                                                </div>
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-5 py-2 bg-[#FEE500] text-gray-900 rounded-lg font-bold text-[13px] active:scale-95 shadow-sm">올리기</button>
                                            </div>
                                        </div>
                                        {/* 🌟 피드 레이아웃 카카오스타일 복구 (p-5, mb-4, 둥근 회색 댓글 박스) */}
                                        <div className="space-y-4 px-4 pb-24 pt-2">
                                            {posts.length === 0 ? (
                                                <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없습니다.</div>
                                            ) : posts.map(post=>(
                                                <div key={post.id || Math.random()} className="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div onClick={() => { setProfileTarget(post.author==='me'?'me':'deidara'); pushHistory('modal'); }} className="w-10 h-10 rounded-full overflow-hidden border border-gray-100 cursor-pointer">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-bold text-[15px] text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[11px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => { setEditingPostId(post.id); setEditingPostText(post.content); }} className="text-gray-300 w-4 h-4"><IconEdit/></button>
                                                            <button onClick={() => { if(confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 w-4 h-4 hover:text-red-500"><IconTrash/></button>
                                                        </div>
                                                    </div>
                                                    {editingPostId === post.id ? (
                                                        <div className="mb-4"><textarea value={editingPostText} onChange={e=>setEditingPostText(e.target.value)} className="w-full bg-gray-50 rounded-xl p-3 text-[14px] outline-none border border-gray-200" rows="2" /><div className="flex justify-end gap-2 mt-2"><button onClick={() => setEditingPostId(null)} className="text-xs font-bold text-gray-500 px-3 py-1.5 bg-gray-100 rounded-lg">취소</button><button onClick={() => handleEditPost(post.id)} className="text-xs font-bold text-gray-900 px-3 py-1.5 bg-[#FEE500] rounded-lg">저장</button></div></div>
                                                    ) : ( post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p> )}
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => { setShowFullImage(post.imageUrl); pushHistory('fullImage'); }} className="w-full h-auto rounded-xl mb-4 shadow-sm cursor-pointer active:opacity-90" />}
                                                    
                                                    {/* 🌟 댓글 영역 (회색 둥근 박스) */}
                                                    <div className="bg-[#f8f9fa] rounded-xl p-4 mt-2">
                                                        <p className="text-[12px] font-bold text-gray-600 mb-3">댓글 {(post.comments||[]).length}개</p>
                                                        <div className="space-y-4 mb-4">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-2.5 items-start relative group">
                                                                    <div className="w-7 h-7 rounded-full overflow-hidden shrink-0 bg-white border border-gray-100">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1 pr-6">
                                                                        <span className="font-bold text-[12px] text-gray-900">{c.author==='me'?'연지':'데이다라'}</span>
                                                                        <span className="text-[13px] text-gray-800 leading-snug">{c.content}</span>
                                                                    </div>
                                                                    <button onClick={() => handleDeleteComment(post.id, c)} className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 text-gray-400 w-3.5 h-3.5 hover:text-red-500"><IconTrash/></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 items-center">
                                                            {/* 🌟 등록 버튼 찌그러짐 방지 (shrink-0, min-w-0) */}
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글을 남겨보세요." className="flex-1 min-w-0 bg-white border border-gray-200 rounded-lg px-3 py-2 text-[13px] outline-none" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="shrink-0 whitespace-nowrap font-bold text-[13px] px-3.5 py-2 bg-white border border-gray-200 text-gray-800 rounded-lg active:bg-gray-100">등록</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-4 space-y-3 custom-scrollbar pb-32" onClick={() => setShowAttachMenu(false)}>
                                {messages.length === 0 && !isTyping ? (
                                    <div className="flex justify-center items-center h-full text-xs text-gray-400 font-medium">메시지를 입력해 대화를 시작해보세요.</div>
                                ) : messages.map((msg, i) => (
                                    <div key={msg.id || i} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[80%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-9 h-9 rounded-xl bg-white mr-2 shrink-0 overflow-hidden shadow-sm cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full relative group">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-500 mb-1 ml-1">{msg.sender === 'deidara' ? '데이다라' : msg.sender}</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div className="flex flex-col gap-1">
                                                        {msg.imageUrl && <img src={msg.imageUrl} onClick={() => { setShowFullImage(msg.imageUrl); pushHistory('fullImage'); }} className={`max-w-[200px] w-full h-auto rounded-xl shadow-sm cursor-pointer ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`} />}
                                                        {msg.type === 'call' ? (
                                                            <div className="px-4 py-2 rounded-xl bg-white border border-gray-200 flex items-center gap-2">
                                                                <div className="w-4 h-4 text-gray-700"><IconPhoneFilled /></div>
                                                                <span className="font-bold text-[14px] text-gray-800">{msg.duration}</span>
                                                            </div>
                                                        ) : (
                                                            msg.text && <div className={`px-3 py-2 text-[14px] shadow-sm whitespace-pre-wrap ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`}>{msg.text}</div>
                                                        )}
                                                    </div>
                                                    <span className="text-[9px] text-gray-400 whitespace-nowrap mb-0.5">{msg.time || "방금 전"}</span>
                                                </div>
                                                {/* 수정/삭제 메뉴 */}
                                                {!editingMessageId && msg.text && (
                                                    <div className={`absolute top-0 opacity-0 group-hover:opacity-100 flex gap-2 text-[10px] text-gray-400 bg-white/80 px-2 py-0.5 rounded ${msg.sender === 'me' ? '-left-10' : '-right-10'}`}>
                                                        {msg.sender === 'deidara' && <button onClick={() => handleRegenerateMessage(msg.id)} className="hover:text-green-500">재생성</button>}
                                                        <button onClick={() => handleDeleteMessage(msg.id)} className="hover:text-red-500">삭제</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-11 bg-white border border-gray-100 px-3 py-1.5 rounded-lg text-[10px] w-fit animate-pulse text-gray-400 shadow-sm">입력 중...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 🌟 하단 탭 바 / 채팅 바 (카카오톡 SVG 스타일) */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[60px] pb-safe z-30 ${view==='main'?'justify-around':'px-2 gap-1'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='friends'?'tab-active':'tab-inactive'}`}>
                                    <svg viewBox="0 0 24 24" className="w-6 h-6"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                    <span className="text-[10px]">친구</span>
                                </div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='chat'?'tab-active':'tab-inactive'}`}>
                                    <svg viewBox="0 0 24 24" className="w-6 h-6"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                                    <span className="text-[10px]">채팅</span>
                                </div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 ${activeTab==='feed'?'tab-active':'tab-inactive'}`}>
                                    <svg viewBox="0 0 24 24" className="w-6 h-6"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                                    <span className="text-[10px]">게시물</span>
                                </div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                {showAttachMenu && (
                                    <div className="absolute bottom-[65px] left-2 bg-white border border-gray-200 rounded-lg shadow-lg p-2 w-40 flex flex-col gap-1 z-40 slide-in">
                                        <button onClick={() => chatFileInputRef.current.click()} className="text-left px-3 py-2 text-[13px] text-gray-800 hover:bg-gray-100 rounded-md">사진 전송</button>
                                        <button onClick={handleRequestDeidaraPhoto} className="text-left px-3 py-2 text-[13px] text-gray-800 hover:bg-gray-100 rounded-md">사진 요구</button>
                                        <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                    </div>
                                )}
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center text-gray-400 p-2.5 active:scale-90"><IconPlus /></button>
                                <button onClick={() => { setShowCallModal(true); pushHistory('callModal'); }} className="w-8 h-8 shrink-0 flex items-center justify-center text-gray-400 mr-1 p-1.5 active:scale-90"><IconPhoneOutline /></button>
                                <div className="flex-1 bg-gray-100 rounded-full flex items-center pr-1 mr-1">
                                    <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-transparent px-4 py-2.5 text-[14px] outline-none" placeholder="메시지 입력" />
                                    {inputText.trim() && <button onClick={handleSend} className="w-8 h-8 bg-[#FEE500] rounded-full flex items-center justify-center shrink-0 mr-0.5"><div className="w-5 h-5"><svg viewBox="0 0 24 24" fill="currentColor" className="text-gray-800"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></div></button>}
                                </div>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
