<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 메신저 앱 채팅방이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌이며 매우 견제하고 증오란다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격이며 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        // 🌟 아이콘 및 유틸리티 컴포넌트 (크래시 방지를 위해 상단 배치)
        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const IconPhoneOutline = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;
        const IconTabFriend = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTabChat = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const IconTabFeed = ({active}) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" className="w-6 h-6"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const safeTimeStr = (ts) => {
            if (!ts) return '';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; }
        };

        const FullImageViewer = ({ src, onClose }) => <div className="fixed inset-0 z-[5000] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>;

        // 🌟 프로필 모달 (데이다라 프로필 관리 가능하도록 조건 완벽 분리)
        const ProfileModal = ({ target, setTarget, isEditing, setIsEditing, myP, deiP, myB, deiB, myS, deiS, setMyS, setDeiS, setFull, uploadUI, setTab }) => {
            const isMe = target === 'me';
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden shadow-2xl" style={{ backgroundImage: `url('${isMe ? (myB || '') : (deiB || '')}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditing) setIsEditing(false); else { setTarget(null); window.history.back(); } }} className="text-white p-2 text-xl drop-shadow-md font-bold">✕</button>
                        {!isEditing && <button onClick={() => { setIsEditing(true); window.history.pushState({ page: 'editProfile' }, ''); }} className="text-white px-3 py-1.5 bg-white/20 rounded-lg text-[13px] font-bold border border-white/30 backdrop-blur-sm">프로필 관리</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        {isEditing && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => uploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-[12px] cursor-pointer border border-white/20 font-bold backdrop-blur-sm">배경화면 변경</label></div>}
                        <div onClick={() => { if(!isEditing) { setFull(isMe ? myP : deiP); window.history.pushState({ page: 'fullImage' }, ''); } }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-4 border border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {isMe ? (myP ? <img src={myP} className="w-full h-full object-cover" /> : <DefaultAvatar />) : (deiP ? <img src={deiP} className="w-full h-full object-cover" /> : <DefaultAvatar />)}
                            {isEditing && <label htmlFor="p-up" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-2xl">📷</label>}
                            {isEditing && <input type="file" id="p-up" onChange={(e) => uploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-xl font-bold mb-1 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-8 mt-2 mx-auto">
                            {isEditing ? (
                                <input type="text" defaultValue={isMe ? myS : deiS} onBlur={(e) => { 
                                    if(isMe) { setMyS(e.target.value); localStorage.setItem('my_status', e.target.value); }
                                    else { setDeiS(e.target.value); localStorage.setItem('deidara_current_status', e.target.value); }
                                }} className="w-full bg-black/40 border-b border-white/50 py-2 text-[13px] text-white text-center outline-none" placeholder="상태메시지를 입력해주세요." />
                            ) : (
                                <p className="text-[13px] opacity-90 text-shadow">{isMe ? myS : deiS}</p>
                            )}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-8 flex justify-around mx-auto">
                            {isEditing ? <button onClick={() => setIsEditing(false)} className="bg-white text-gray-900 font-bold px-10 py-3 rounded-xl w-full active:scale-95 transition-all shadow-lg text-[15px]">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setTarget(null); setTab('chat'); }}><div className="text-[26px]">💬</div><span className="text-[11px] font-bold text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showCallModal, setShowCallModal] = useState(false);
            const [cropModalData, setCropModalData] = useState(null);

            const chatEndRef = useRef(null);
            const feedFileInputRef = useRef(null);
            const cropCanvasRef = useRef(null);

            // 🌟 히스토리 관리 (뒤로가기 앱 종료 방지)
            const pushHistory = (stateName) => window.history.pushState({ page: stateName }, '');
            
            useEffect(() => {
                const handlePopState = () => {
                    if (showFullImage) setShowFullImage(null);
                    else if (cropModalData) setCropModalData(null);
                    else if (isEditingProfile) setIsEditingProfile(false);
                    else if (profileTarget) setProfileTarget(null);
                    else if (showCallModal) setShowCallModal(false);
                    else if (showSettings) setShowSettings(false);
                    else if (view === 'chatRoom') setView('main');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [showFullImage, cropModalData, isEditingProfile, profileTarget, showCallModal, showSettings, view]);

            // 🌟 크롭 렌더링 로직
            const [cropScale, setCropScale] = useState(1);
            const cropPos = useRef({ x: 0, y: 0 }); 
            const isDragging = useRef(false);
            const lastPos = useRef({ x: 0, y: 0 });
            const cropImgRef = useRef(null);

            const drawCrop = () => {
                if (!cropImgRef.current || !cropCanvasRef.current) return;
                const canvas = cropCanvasRef.current, ctx = canvas.getContext('2d'), img = cropImgRef.current;
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * cropScale;
                const imgW = img.width * baseScale, imgH = img.height * baseScale;
                const maxDx = Math.max(0, (imgW - canvas.width) / 2), maxDy = Math.max(0, (imgH - canvas.height) / 2);
                cropPos.current.x = Math.max(-maxDx, Math.min(maxDx, cropPos.current.x)); 
                cropPos.current.y = Math.max(-maxDy, Math.min(maxDy, cropPos.current.y));
                ctx.drawImage(img, (canvas.width - imgW) / 2 + cropPos.current.x, (canvas.height - imgH) / 2 + cropPos.current.y, imgW, imgH);
            };

            useEffect(() => { 
                if (cropModalData) { 
                    const i = new Image(); i.src = cropModalData.src; 
                    i.onload = () => { cropImgRef.current = i; cropPos.current = {x:0, y:0}; setCropScale(1); drawCrop(); }; 
                } 
            }, [cropModalData]);

            useEffect(() => { if(cropModalData) drawCrop(); }, [cropScale, cropModalData]);

            const handleCropDown = (e) => { isDragging.current = true; const c = e.touches ? e.touches[0] : e; lastPos.current = { x: c.clientX, y: c.clientY }; };
            const handleCropMove = (e) => { 
                if (!isDragging.current) return; const c = e.touches ? e.touches[0] : e; 
                cropPos.current.x += (c.clientX - lastPos.current.x); cropPos.current.y += (c.clientY - lastPos.current.y); 
                lastPos.current = { x: c.clientX, y: c.clientY }; requestAnimationFrame(drawCrop); 
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(timer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), window.firebaseAPI.orderBy('createdAt', 'asc'));
                const unsub = window.firebaseAPI.onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵한다.)";
                } catch (e) { return "통신 장애 났다, 음!"; }
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("방 이름을 수정하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId || !inputText.trim()) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = safeTimeStr(new Date());
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                const history = messages.slice(-100).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text || "[사진]" }] }));
                const resp = await fetchAPI(history.concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const handleAddPost = async () => {
                if (!postInput.trim() && !feedAttachedImage) return;
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput.trim(), imageUrl: feedAttachedImage, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어: "${postInput}". 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const postId = post.id; const commentText = commentInputs[postId]?.trim(); if (!commentText) return;
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''})); setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 남겨줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0] relative">
                    <div className="w-28 h-28 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-[#FEE500] py-4 rounded-xl shadow-md font-bold active:scale-95 transition-transform text-gray-900">로그인</button>
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col overflow-hidden relative bg-white">
                    {/* 크롭 모달 */}
                    {cropModalData && (
                        <div className="fixed inset-0 z-[6000] bg-black flex flex-col">
                            <div className="flex justify-between p-4 text-white font-bold"><button onClick={() => setCropModalData(null)}>취소</button><button onClick={() => {
                                const dataURL = cropCanvasRef.current.toDataURL('image/jpeg', 0.8);
                                if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(dataURL); else setMyBgImgUrl(dataURL); localStorage.setItem(cropModalData.type==='profile'?'my_profile_url':'my_bg_url', dataURL); } 
                                else { if(cropModalData.type==='profile')setProfileImgUrl(dataURL); else setBgImgUrl(dataURL); localStorage.setItem(cropModalData.type==='profile'?'deidara_profile_url':'deidara_bg_url', dataURL); }
                                setCropModalData(null);
                            }} className="text-[#FEE500] font-extrabold text-lg">적용</button></div>
                            <div className="flex-1 flex flex-col items-center justify-center overflow-hidden">
                                <div className="relative border border-white/30 overflow-hidden bg-gray-900" onMouseDown={handleCropDown} onMouseMove={handleCropMove} onMouseUp={() => isDragging.current=false} onTouchStart={handleCropDown} onTouchMove={handleCropMove} onTouchEnd={() => isDragging.current=false} style={{ width: 300, height: cropModalData.type === 'profile' ? 300 : 450 }}>
                                    <canvas ref={cropCanvasRef} width={300} height={cropModalData.type === 'profile' ? 300 : 450} className="w-full h-full cursor-move" />
                                </div>
                                <input type="range" min="1" max="3" step="0.01" value={cropScale} onChange={e => setCropScale(parseFloat(e.target.value))} className="w-64 mt-10 accent-[#FEE500]" />
                            </div>
                        </div>
                    )}

                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setDeiS={setDeidaraStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUI} setTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/50 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl"><h2 className="text-lg font-bold mb-4 text-gray-800">설정</h2><p className="text-xs mb-1 font-bold text-gray-500">API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-lg px-4 py-2.5 mb-5 outline-none text-sm font-bold" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-3 rounded-xl font-bold mb-2 text-gray-900 text-sm">저장</button><button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-600 py-3 rounded-lg font-bold text-sm">로그아웃</button></div></div>}

                    {/* 헤더 */}
                    <header className={`px-4 py-3 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white border-b border-gray-100':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-[20px] tracking-tight text-gray-900 ml-1">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-2">
                                    <button onClick={() => { setShowSettings(true); pushHistory('settings'); }} className="p-2 text-gray-500 hover:text-gray-800"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                                    {activeTab==='chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="p-2 text-gray-500 hover:text-gray-800"><IconPlus /></button>}
                                </div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1 w-full">
                                    <button onClick={() => { setView('main'); window.history.back(); }} className="p-1 -ml-1 text-gray-700 w-8 h-8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-9 h-9 rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm ml-1 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-[16px] ml-2 truncate max-w-[180px]">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    {/* 메인 영역 분리 (하얀 화면 방지) */}
                    {view === 'main' ? (
                        <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 bg-white custom-scrollbar">
                            {activeTab === 'friends' && (
                                <div className="flex-1">
                                    <div className="px-5 py-3 mt-1">
                                        <p className="text-[11px] text-gray-400 mb-2 font-semibold tracking-tighter">내 프로필</p>
                                        <div onClick={() => { setProfileTarget('me'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                            <div className="w-14 h-14 rounded-[20px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                            <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{myStatus}</p></div>
                                        </div>
                                    </div>
                                    <hr className="mx-5 border-gray-100 my-1" />
                                    <div className="px-5 py-3">
                                        <p className="text-[11px] text-gray-400 mb-2 font-semibold tracking-tighter">친구 1</p>
                                        <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="flex items-center gap-4 py-1.5 cursor-pointer active:bg-gray-50 transition-colors">
                                            <div className="w-12 h-12 rounded-[16px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                            <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'chat' && (
                                <div className="flex-1">
                                    {chatRooms.length === 0 ? (
                                        <div className="text-center text-gray-400 py-16 text-sm">상단 + 버튼을 눌러 채팅방을 만드세요!</div>
                                    ) : chatRooms.map(room => (
                                        <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); pushHistory('chatRoom'); }} className="flex items-center gap-4 px-5 py-3.5 hover:bg-gray-50 cursor-pointer active:bg-gray-100 transition-colors relative border-b border-gray-50/50">
                                            <div className="w-12 h-12 rounded-[16px] bg-gray-100 overflow-hidden shrink-0 border border-gray-50 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                            <div className="flex-1 min-w-0 pr-12"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-400 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                            <div className="absolute right-5"><button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-blue-500 bg-white border border-gray-100 shadow-sm rounded-full active:scale-95 transition-all"><div className="w-3.5 h-3.5"><IconEdit /></div></button></div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {activeTab === 'feed' && (
                                <div className="flex-1 bg-[#f3f4f6]">
                                    <div className="bg-white px-5 py-5 mb-3 shadow-sm border-b border-gray-100">
                                        <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="지금 이 기분은 어떤가요?" className="w-full bg-gray-50 rounded-xl p-4 text-[14px] outline-none resize-none focus:bg-white transition-all border border-transparent focus:border-gray-200" rows="3" />
                                        <div className="flex justify-between items-center mt-3 pt-2">
                                            <button onClick={() => feedFileInputRef.current.click()} className="p-2.5 text-gray-400 hover:bg-gray-100 rounded-lg active:scale-95 transition-all"><div className="w-6 h-6"><IconCamera /></div></button>
                                            <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                            <button onClick={handleAddPost} disabled={isPosting} className="px-5 py-2 bg-blue-600 text-white rounded-lg font-bold text-[13px] active:scale-95 shadow-sm">올리기</button>
                                        </div>
                                    </div>
                                    <div className="space-y-10 px-4 pb-24 pt-2">
                                        {posts.map(post=>(
                                            <div key={post.id || Math.random()} className="bg-white rounded-3xl shadow-sm p-8 relative border border-gray-100/50">
                                                <div className="flex items-center gap-3.5 mb-5">
                                                    <div className="w-11 h-11 rounded-full overflow-hidden border border-gray-100 shadow-sm">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                    <div className="flex-1 min-w-0"><div className="font-bold text-[15px] text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[11px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                    <button onClick={() => { if(confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 w-4 h-4"><IconTrash/></button>
                                                </div>
                                                {post.imageUrl && <img src={post.imageUrl} onClick={() => { setShowFullImage(post.imageUrl); pushHistory('fullImage'); }} className="w-full h-auto rounded-2xl mb-6 shadow-sm active:scale-[0.99] transition-transform cursor-pointer" />}
                                                {post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-6 whitespace-pre-wrap">{post.content}</p>}
                                                <div className="bg-gray-50 rounded-2xl p-5 border border-gray-100/50">
                                                    <p className="text-[11px] font-bold text-gray-500 mb-4 uppercase tracking-wider">Comments</p>
                                                    <div className="space-y-4 mb-5">
                                                        {(post.comments||[]).map((c,i)=>(
                                                            <div key={i} className="flex gap-3 items-start relative group">
                                                                <div className="w-8 h-8 rounded-full overflow-hidden shrink-0 bg-white border border-gray-100 shadow-sm mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                <div className="flex flex-col flex-1 pr-6"><span className="font-bold text-[13px] text-gray-900">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[14px] text-gray-800 leading-snug">{c.content}</span></div>
                                                                <button onClick={() => handleDeleteComment(post.id, c)} className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 text-gray-400 w-3.5 h-3.5 hover:text-red-500"><IconTrash/></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="flex gap-2 items-center"><input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 남기기..." className="flex-1 min-w-0 bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-[13px] outline-none shadow-sm" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} /><button disabled={isPosting} onClick={()=>handleAddComment(post)} className="shrink-0 font-bold text-[13px] px-4 py-2.5 bg-white border border-gray-200 text-gray-800 rounded-xl active:bg-gray-100">등록</button></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    ) : (
                        /* 🌟 채팅방 내부 영역 (배경색 꽉 차도록 고정) */
                        <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-5 space-y-4 custom-scrollbar pb-32 bg-[#BACEE0]" onClick={() => setShowAttachMenu(false)}>
                            {messages.map((msg, i) => (
                                <div key={msg.id || i} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                    <div className={`flex max-w-[80%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                        {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-10 h-10 rounded-[14px] bg-white mr-2 shrink-0 overflow-hidden shadow-sm border border-orange-50">{renderProfilePicCommon(profileImgUrl)}</div>}
                                        <div className="flex flex-col w-full">
                                            {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1.5 ml-1 font-bold">데이다라</span>}
                                            <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`px-4 py-2 text-[14px] shadow-sm whitespace-pre-wrap ${msg.sender === 'me' ? 'bubble-me text-gray-900' : 'bubble-other text-gray-800'}`}>{msg.text || "[사진]"}</div>
                                                <span className="text-[9px] text-gray-500 font-bold mb-0.5 whitespace-nowrap">{msg.time || "방금 전"}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="ml-12 bg-white/60 px-3 py-1.5 rounded-lg text-[10px] w-fit animate-pulse text-gray-500 font-bold shadow-sm">음...</div>}
                            <div ref={chatEndRef} />
                        </main>
                    )}

                    {/* 하단 네비게이션 / 채팅바 */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[65px] pb-safe z-30 ${view==='main'?'justify-around':'px-3 gap-2'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='friends'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabFriend active={activeTab==='friends'} /></div><span className="text-[10px] font-bold">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='chat'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabChat active={activeTab==='chat'} /></div><span className="text-[10px] font-bold">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-16 transition-colors ${activeTab==='feed'?'tab-active':'tab-inactive'}`}><div className="w-6 h-6"><IconTabFeed active={activeTab==='feed'} /></div><span className="text-[10px] font-bold">게시물</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 text-gray-400 p-2 text-3xl font-light mb-1">+</button>
                                <button onClick={() => { setShowCallModal(true); pushHistory('callModal'); }} className="w-9 h-9 shrink-0 text-gray-400 p-1.5 active:scale-90 transition-transform"><IconPhoneOutline /></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-full px-5 py-2.5 text-[14px] outline-none" placeholder="메시지 입력" />
                                {inputText.trim() && <button onClick={handleSend} className="w-8 h-8 bg-[#FEE500] rounded-full flex items-center justify-center shrink-0 active:scale-90 transition-transform"><div className="w-4 h-4 text-gray-800"><svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></div></button>}
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
