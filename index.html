<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>데이톡 💥</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 연지의 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, arrayUnion };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야.
말투: 문장 끝에 "~음.", "~음!", "~음ㅋㅋ" 등을 잦은 빈도로 자연스럽게 사용해 (모든 문장에 강제할 필요는 없어). 연지를 "연지"라고 부르고 4살 연상이지만 누나라고 안 부르려고 버텨.
연지의 일상과 감정에 관심 가져주고 츤데레처럼 굴어. 짧고 현실적인 메신저/SNS 말투를 써.
        `;

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            
            // 🌟 앱 뷰 상태 (login, main, chatRoom)
            const [view, setView] = useState('login'); 
            // 🌟 메인 탭 상태 (friends, chat, feed)
            const [activeTab, setActiveTab] = useState('friends');
            
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            
            // 피드(게시물) 상태
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); // 게시물별 댓글 입력창 상태
            
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [showProfile, setShowProfile] = useState(false);
            
            const chatEndRef = useRef(null);

            // 초기화
            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, onAuthStateChanged, db: firestoreDb } = window.firebaseAPI;
                        setDb(firestoreDb);
                        
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                setView('main');
                                loadChatRooms(currentUser.uid, firestoreDb);
                                loadPosts(currentUser.uid, firestoreDb);
                            } else {
                                setUser(null);
                                setView('login');
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, []);

            // 데이터 불러오기 로직 (방 목록, 피드)
            const loadChatRooms = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const rooms = [];
                    snapshot.forEach((doc) => rooms.push({ id: doc.id, ...doc.data() }));
                    setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const loadedPosts = [];
                    snapshot.forEach((doc) => loadedPosts.push({ id: doc.id, ...doc.data() }));
                    setPosts(loadedPosts);
                });
            };

            // 특정 채팅방 메시지 불러오기
            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = [];
                    snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
                    setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db, view]);

            // 공통 API 통신 함수
            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 에러 났다!";
                } catch (err) {
                    return "인터넷 끊겼냐, 음?!";
                }
            };

            // 인증 관련
            const handleLogin = async () => {
                const { auth, provider, signInWithPopup } = window.firebaseAPI;
                try { await signInWithPopup(auth, provider); } catch (error) { alert("로그인 실패: " + error.message); }
            };
            const handleLogout = async () => {
                const { auth, signOut } = window.firebaseAPI;
                await signOut(auth);
            };

            // 채팅방 관련 함수
            const createNewRoom = async () => {
                const roomName = prompt("새로운 채팅방 이름을 입력해, 음!");
                if (!roomName || !roomName.trim()) return;
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const newRoomRef = await addDoc(collection(db, `users/${user.uid}/rooms`), {
                    name: roomName, lastMessage: "방이 생성되었어, 음!", updatedAt: serverTimestamp(), createdAt: serverTimestamp()
                });
                setCurrentRoomId(newRoomRef.id);
                setView('chatRoom');
            };

            const handleSend = async () => {
                if (!inputText.trim() || !geminiKey || !currentRoomId) return;
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const textToSend = inputText;
                const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                setInputText('');
                setIsTyping(true);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: textToSend, time: nowTime, createdAt: serverTimestamp() });
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: textToSend, updatedAt: serverTimestamp() }, { merge: true });

                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                history.push({ role: 'user', parts: [{ text: textToSend }] });

                const responseText = await fetchAPI(history);
                setIsTyping(false);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), createdAt: serverTimestamp() });
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
            };

            // ==========================================
            // 🌟 피드(게시물) 관련 로직 추가
            // ==========================================
            
            // 1. 연지가 피드에 새 글 쓰기 -> 데이다라 자동 댓글
            const handleAddPost = async () => {
                if (!postInput.trim() || !geminiKey) {
                    if(!geminiKey) alert("API 설정(오른쪽 위 톱니바퀴)에서 키를 먼저 넣어줘!");
                    return;
                }
                setIsPosting(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp, arrayUnion } = window.firebaseAPI;
                
                // 내 글 등록
                const postRef = await addDoc(collection(db, `users/${user.uid}/posts`), {
                    author: 'me',
                    content: postInput,
                    createdAt: serverTimestamp(),
                    comments: []
                });
                const myContent = postInput;
                setPostInput('');

                // 데이다라 댓글 생성
                const commentPrompt = `${SYSTEM_PROMPT}\n지침: 연지가 SNS 게시물에 "${myContent}"라고 글을 올렸다. 데이다라로서 이 게시물에 짧고 반응성 좋은 댓글(2~3문장 이내)을 달아줘.`;
                const replyText = await fetchAPI([{role: 'user', parts: [{text: "(게시물에 댓글을 달아줘)"}]}], commentPrompt);
                
                // 댓글 업데이트
                await updateDoc(doc(db, `users/${user.uid}/posts/${postRef.id}`), {
                    comments: arrayUnion({ author: 'deidara', content: replyText, createdAt: new Date().getTime() })
                });
                setIsPosting(false);
            };

            // 2. 데이다라가 새 글 쓰게 유도 (버튼 클릭)
            const handleDeidaraNewPost = async () => {
                if (!geminiKey) return alert("API 키가 필요해!");
                setIsPosting(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                
                const postPrompt = `${SYSTEM_PROMPT}\n지침: 데이다라로서 너의 오늘 기분, 일상, 조소과 과제 불만, 혹은 연지를 향한 츤데레 멘트 등을 SNS 피드 게시물 느낌으로 짧게 작성해줘. 150자 이내.`;
                const postText = await fetchAPI([{role: 'user', parts: [{text: "(새로운 근황 게시물을 하나 작성해줘)"}]}], postPrompt);

                await addDoc(collection(db, `users/${user.uid}/posts`), {
                    author: 'deidara',
                    content: postText,
                    createdAt: serverTimestamp(),
                    comments: []
                });
                setIsPosting(false);
            };

            // 3. 기존 게시물에 댓글 달기 (연지가 댓글 달기)
            const handleAddComment = async (postId) => {
                const commentText = commentInputs[postId];
                if (!commentText || !commentText.trim()) return;

                const { doc, updateDoc, arrayUnion } = window.firebaseAPI;
                await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), {
                    comments: arrayUnion({ author: 'me', content: commentText, createdAt: new Date().getTime() })
                });
                
                // 댓글 입력창 비우기
                setCommentInputs(prev => ({...prev, [postId]: ''}));
            };

            const deletePost = async (postId) => {
                if(confirm("이 게시물을 지울까, 음?")) {
                    const { doc, deleteDoc } = window.firebaseAPI;
                    await deleteDoc(doc(db, `users/${user.uid}/posts/${postId}`));
                }
            };

            // ==========================================

            // 설정 및 프로필 로직
            const handleImageUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = type === 'profile' ? 300 : 800;
                        let width = img.width, height = img.height;
                        if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
                        else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        if (type === 'profile') setProfileImgUrl(compressedDataUrl);
                        else setBgImgUrl(compressedDataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveSettings = () => {
                localStorage.setItem('gemini_api_key', geminiKey);
                localStorage.setItem('deidara_profile_url', profileImgUrl);
                localStorage.setItem('deidara_bg_url', bgImgUrl);
                setShowSettings(false);
            };

            const renderProfilePic = (className, emoji = "💥") => {
                return profileImgUrl ? (
                    <img src={profileImgUrl} alt="데이다라" className={`${className} object-cover w-full h-full`} />
                ) : (
                    <span className="text-xl flex items-center justify-center w-full h-full">{emoji}</span>
                );
            };

            const ProfileModal = () => (
                <div className="absolute inset-0 z-[100] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" 
                     style={{ backgroundImage: bgImgUrl ? `url('${bgImgUrl}')` : 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)', backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => setShowProfile(false)} className="text-white p-2 hover:bg-white/20 rounded-full transition">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div className="flex flex-col items-center pb-10 text-white z-10 mt-auto">
                        <div className="w-24 h-24 rounded-[36px] bg-orange-100 flex items-center justify-center text-5xl shadow-2xl mb-4 border-2 border-white/30 relative overflow-hidden">
                            {renderProfilePic("w-full h-full")}
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-wide">데이다라</h2>
                        <div className="px-6 text-center mb-8 mt-2">
                            <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">
                                과제 다 부수고 싶다. 예술은 찰나의 폭발이다! 음!
                            </p>
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-6 flex justify-around">
                            <div className="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80" onClick={() => { setShowProfile(false); setActiveTab('chat'); }}>
                                <div className="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                                <span className="text-[11px] font-semibold tracking-wider text-shadow">1:1 채팅</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ==========================================
            // 🌟 렌더링 뷰 영역
            // ==========================================

            if (view === 'login') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] items-center justify-center p-6">
                        <div className="w-24 h-24 rounded-3xl bg-orange-100 flex items-center justify-center text-5xl border-2 border-orange-200 shadow-lg mb-6 animate-bounce overflow-hidden">
                            {renderProfilePic("w-full h-full", "💥")}
                        </div>
                        <h1 className="text-3xl font-extrabold text-gray-800 mb-2">데이톡</h1>
                        <p className="text-gray-600 mb-10 text-center text-sm font-medium">데이다라와의 비밀 대화방</p>
                        <button onClick={handleLogin} className="w-full max-w-xs bg-white text-gray-800 font-bold py-4 rounded-2xl shadow-md flex items-center justify-center gap-3 hover:bg-gray-50 border border-gray-100">
                            구글로 시작하기
                        </button>
                    </div>
                );
            }

            // 채팅방 내부 화면 (하단 탭이 없음)
            if (view === 'chatRoom') {
                const currentRoomName = chatRooms.find(r => r.id === currentRoomId)?.name || "채팅방";
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] overflow-hidden slide-in">
                        {showProfile && <ProfileModal />}
                        <header className="flex items-center justify-between px-3 py-3 bg-[#BACEE0] bg-opacity-95 sticky top-0 z-20 shadow-sm">
                            <div className="flex items-center gap-2">
                                <button onClick={() => setView('main')} className="p-2 -ml-1 text-gray-700 hover:bg-white/20 rounded-full">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                </button>
                                <div onClick={() => setShowProfile(true)} className="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center text-xl border border-orange-200 cursor-pointer hover:opacity-80 overflow-hidden">
                                    {renderProfilePic("w-full h-full", "💥")}
                                </div>
                                <div className="ml-1 flex flex-col justify-center">
                                    <h1 className="font-bold text-[16px] text-gray-800 leading-tight">{currentRoomName}</h1>
                                </div>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar pb-20">
                            {messages.map((msg) => (
                                <div key={msg.id} className={`flex flex-col msg-anim ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                    <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                        {msg.sender !== 'me' && (
                                            <div onClick={() => setShowProfile(true)} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 flex items-center justify-center text-lg border border-gray-100 mt-3 cursor-pointer overflow-hidden">
                                                {renderProfilePic("w-full h-full", "💣")}
                                            </div>
                                        )}
                                        <div className="flex flex-col">
                                            {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold">데이다라</span>}
                                            <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`msg-bubble px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm leading-relaxed ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-none text-gray-800' : 'bg-white rounded-tl-none text-gray-800'}`}>
                                                    {msg.text}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="animate-pulse ml-11 bg-white/70 px-3 py-2 rounded-2xl rounded-tl-none text-[12px] text-gray-500 italic shadow-sm w-fit">데이다라가 답장 쓰는 중... 음!</div>}
                            <div ref={chatEndRef} />
                        </main>
                        <footer className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-100 pb-safe z-30">
                            <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} placeholder="메시지 입력..." className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none" />
                            <button onClick={handleSend} disabled={!inputText.trim()} className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 ${inputText.trim() ? 'bg-[#FEE500] text-gray-800' : 'bg-gray-100 text-gray-300'}`}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </footer>
                    </div>
                );
            }

            // ==========================================
            // 🌟 메인 화면 (친구, 채팅, 게시물 탭 포함)
            // ==========================================
            if (view === 'main') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-gray-50">
                        {showProfile && <ProfileModal />}
                        
                        {/* 설정 모달 */}
                        {showSettings && (
                            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                                <div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll">
                                    <h2 className="text-xl font-bold mb-4">⚙️ 앱 설정</h2>
                                    <p className="text-xs text-gray-500 mb-1">Gemini API 키 (필수)</p>
                                    <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-4 outline-none text-sm" placeholder="API 키 입력..." />
                                    
                                    <h3 className="font-bold text-gray-800 mb-2">🎨 프로필 꾸미기</h3>
                                    <div className="mb-4">
                                        <p className="text-xs text-gray-500 mb-2">데이다라 프사 (사진첩에서 선택)</p>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'profile')} id="profile-upload" className="hidden" />
                                        <label htmlFor="profile-upload" className="flex items-center justify-center w-full bg-orange-50 text-orange-600 border border-orange-200 py-3 rounded-xl cursor-pointer text-sm font-medium">📷 내 앨범에서 프사 고르기</label>
                                    </div>
                                    <div className="mb-6">
                                        <p className="text-xs text-gray-500 mb-2">데이다라 배사 (사진첩에서 선택)</p>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'bg')} id="bg-upload" className="hidden" />
                                        <label htmlFor="bg-upload" className="flex items-center justify-center w-full bg-blue-50 text-blue-600 border border-blue-200 py-3 rounded-xl cursor-pointer text-sm font-medium">🖼️ 내 앨범에서 배사 고르기</label>
                                    </div>

                                    <button onClick={saveSettings} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3">저장하기</button>
                                    <button onClick={() => {handleLogout(); setShowSettings(false);}} className="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl">로그아웃</button>
                                </div>
                            </div>
                        )}

                        {/* 공통 상단 헤더 */}
                        <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20">
                            <h1 className="font-extrabold text-xl text-gray-800">
                                {activeTab === 'friends' && "친구"}
                                {activeTab === 'chat' && "채팅"}
                                {activeTab === 'feed' && "게시물"}
                            </h1>
                            <div className="flex gap-3">
                                <button onClick={() => setShowSettings(true)} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">⚙️</button>
                                {activeTab === 'chat' && <button onClick={createNewRoom} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">➕</button>}
                            </div>
                        </header>

                        {/* 🌟 탭별 내용 영역 */}
                        <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar">
                            
                            {/* 1. 친구 탭 */}
                            {activeTab === 'friends' && (
                                <div className="p-4 space-y-6">
                                    {/* 내 프로필 */}
                                    <div>
                                        <h2 className="text-xs text-gray-400 font-bold mb-3 px-1">내 프로필</h2>
                                        <div className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl transition-colors">
                                            <div className="w-14 h-14 rounded-[20px] bg-gray-200 flex items-center justify-center text-2xl flex-shrink-0">🧑‍💻</div>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-gray-800">연지</h3>
                                                <p className="text-xs text-gray-500 mt-0.5">문창과 4학년. 데이다라랑 썸타는 중!</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="h-px bg-gray-100 w-full"></div>
                                    {/* 친구 목록 */}
                                    <div>
                                        <h2 className="text-xs text-gray-400 font-bold mb-3 px-1">친구 (1)</h2>
                                        <div onClick={() => setShowProfile(true)} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl cursor-pointer transition-colors">
                                            <div className="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-xl border border-orange-200 overflow-hidden flex-shrink-0">
                                                {renderProfilePic("w-full h-full", "💥")}
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-gray-800">데이다라</h3>
                                                <p className="text-xs text-gray-500 mt-0.5 truncate">과제 다 부수고 싶다. 예술은 찰나의 폭발이다! 음!</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 2. 채팅 탭 */}
                            {activeTab === 'chat' && (
                                <div className="px-2 py-2">
                                    {chatRooms.length === 0 ? (
                                        <div className="text-center text-gray-400 mt-10">
                                            <p>아직 대화방이 없어, 음!</p>
                                        </div>
                                    ) : (
                                        chatRooms.map(room => (
                                            <div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom');}} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl cursor-pointer relative group">
                                                <div className="w-14 h-14 rounded-[20px] bg-orange-100 flex items-center justify-center text-2xl border border-orange-200 overflow-hidden flex-shrink-0">
                                                    {renderProfilePic("w-full h-full", "💥")}
                                                </div>
                                                <div className="flex-1 min-w-0 pr-8">
                                                    <h3 className="font-bold text-gray-800 truncate">{room.name}</h3>
                                                    <p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방!"}</p>
                                                </div>
                                                <button onClick={(e) => deleteRoom(room.id, e)} className="absolute right-4 p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100">🗑️</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )}

                            {/* 3. 게시물(피드) 탭 */}
                            {activeTab === 'feed' && (
                                <div className="bg-gray-100 min-h-full pb-10">
                                    {/* 내 게시물 쓰기 영역 */}
                                    <div className="bg-white p-4 mb-3 shadow-sm">
                                        <textarea 
                                            value={postInput} 
                                            onChange={(e) => setPostInput(e.target.value)}
                                            placeholder="무슨 생각을 하고 계신가요?" 
                                            className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-gray-100"
                                            rows="3"
                                        ></textarea>
                                        <div className="flex justify-between items-center mt-2">
                                            <button onClick={handleDeidaraNewPost} disabled={isPosting} className="text-xs font-bold text-orange-500 bg-orange-50 px-3 py-2 rounded-lg hover:bg-orange-100 transition flex items-center gap-1">
                                                💥 데이다라 근황 묻기
                                            </button>
                                            <button onClick={handleAddPost} disabled={!postInput.trim() || isPosting} className={`px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition ${postInput.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                                올리기
                                            </button>
                                        </div>
                                    </div>

                                    {/* 게시물 목록 */}
                                    {isPosting && <div className="text-center py-4 text-xs text-gray-500 animate-pulse">업데이트 중... 음!</div>}
                                    
                                    <div className="space-y-3 px-3">
                                        {posts.map(post => (
                                            <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim">
                                                {/* 삭제 버튼 */}
                                                <button onClick={() => deletePost(post.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-sm">🗑️</button>
                                                
                                                {/* 글 작성자 프로필 */}
                                                <div className="flex items-center gap-3 mb-3">
                                                    {post.author === 'me' ? (
                                                        <div className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-lg">🧑‍💻</div>
                                                    ) : (
                                                        <div className="w-10 h-10 bg-orange-100 border border-orange-200 rounded-full flex items-center justify-center overflow-hidden">
                                                            {renderProfilePic("w-full h-full", "💥")}
                                                        </div>
                                                    )}
                                                    <div>
                                                        <div className="font-bold text-[14px] text-gray-800">{post.author === 'me' ? '연지' : '데이다라'}</div>
                                                        <div className="text-[10px] text-gray-400">
                                                            {post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : '방금 전'}
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 본문 */}
                                                <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p>

                                                {/* 댓글 영역 */}
                                                <div className="bg-gray-50 rounded-xl p-3">
                                                    <div className="text-[11px] font-bold text-gray-500 mb-2">댓글 {post.comments ? post.comments.length : 0}개</div>
                                                    
                                                    <div className="space-y-2 mb-3">
                                                        {(post.comments || []).map((c, i) => (
                                                            <div key={i} className="flex gap-2">
                                                                <span className="font-bold text-[12px] text-gray-800 whitespace-nowrap">{c.author === 'me' ? '연지' : '데이다라'}</span>
                                                                <span className="text-[12px] text-gray-600">{c.content}</span>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    {/* 댓글 달기 인풋 (연지가 데이다라 글에 댓글 달기 위함) */}
                                                    <div className="flex gap-2 mt-2">
                                                        <input 
                                                            type="text" 
                                                            value={commentInputs[post.id] || ''} 
                                                            onChange={(e) => setCommentInputs(prev => ({...prev, [post.id]: e.target.value}))}
                                                            placeholder="댓글 달기..." 
                                                            className="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-xs outline-none"
                                                            onKeyPress={(e) => e.key === 'Enter' && handleAddComment(post.id)}
                                                        />
                                                        <button onClick={() => handleAddComment(post.id)} className="text-blue-500 font-bold text-xs px-2">게시</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {posts.length === 0 && !isPosting && <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없어!</div>}
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* 🌟 하단 네비게이션 탭 바 */}
                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                            {/* 친구 탭 버튼 */}
                            <div onClick={() => setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'friends' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'friends' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span className="text-[10px] font-semibold">친구</span>
                            </div>
                            
                            {/* 채팅 탭 버튼 */}
                            <div onClick={() => setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'chat' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'chat' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                <span className="text-[10px] font-semibold">채팅</span>
                            </div>
                            
                            {/* 피드 탭 버튼 */}
                            <div onClick={() => setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'feed' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'feed' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                                <span className="text-[10px] font-semibold">게시물</span>
                            </div>
                        </nav>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
