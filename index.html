<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>DeiTalk</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAPI = { auth, signInAnonymously, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #FFFFFF; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; color: #1a1a1a; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.05); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; }
        
        /* Kakao Bubble Style */
        .bubble-me { background-color: #FEE500; border-radius: 15px 2px 15px 15px; border: 1px solid #e5cf00; }
        .bubble-other { background-color: #FFFFFF; border-radius: 2px 15px 15px 15px; border: 1px solid #e6e6e6; }
        .bubble-call { background-color: #FFFFFF; border-radius: 15px; border: 1px solid #e6e6e6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, '메신저 앱(카톡 등)의 채팅방'이야! 행동 묘사는 절대 하지 말고 짧게 말해.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌이며 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격이며 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[성격 지침]
- 건방진 츤데레. 당황하면 고장 나는 귀여운 갭모에.
- 연지가 연상이지만 "야", "너", "니가"라고 부름.
- 'ㅅㅂ', '미친' 등 거친 단답 가능.
- 말버릇 '음'은 문장 끝에 가끔 붙임.
        `;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-300"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);

        // 🌟 프로필 모달 (Kakao style)
        const ProfileModal = ({ target, setTarget, isEditing, setIsEditing, myP, deiP, myB, deiB, myS, deiS, setMyS, setFull, uploadUI, setTab }) => {
            const isMe = target === 'me';
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden shadow-2xl" style={{ backgroundImage: `url('${isMe ? myB : deiB}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditing) setIsEditing(false); else setTarget(null); }} className="text-white p-2">✕</button>
                        {!isEditing && isMe && <button onClick={() => setIsEditing(true)} className="text-white px-3 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        <div onClick={() => { if(!isEditing) setFull(isMe ? myP : deiP); }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-4 border border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {renderProfilePicCommon(isMe ? myP : deiP)}
                            {isEditing && <label htmlFor="p-up" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer">📷</label>}
                            {isEditing && <input type="file" id="p-up" onChange={(e) => uploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-xl font-bold mb-1 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-8 mt-2 mx-auto">
                            {isEditing ? <input type="text" defaultValue={myS} onBlur={(e) => { setMyS(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border-b border-white/50 py-2 text-sm text-white text-center outline-none" /> : <p className="text-[14px] opacity-80 text-shadow">{isMe ? myS : deiS}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/10 pt-8 flex justify-around mx-auto">
                            {isEditing ? <button onClick={() => setIsEditing(false)} className="bg-white text-gray-900 font-bold px-10 py-3 rounded-xl w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setTarget(null); setTab('chat'); }}><div className="text-2xl font-bold">💬</div><span className="text-[11px] font-medium text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));

            const chatEndRef = useRef(null);
            const feedFileInputRef = useRef(null);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, signInAnonymously, onAuthStateChanged, db: fdb } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else signInAnonymously(auth);
                        });
                    }
                }, 100);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), window.firebaseAPI.orderBy('createdAt', 'asc'));
                const unsub = window.firebaseAPI.onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                    });
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "(말문이 막혔다.)";
                    return text.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                } catch (e) { return "통신 장애가 발생했다, 음."; }
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("방 이름을 수정하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                
                const text = inputText; 
                if(!text.trim()) return;
                setInputText(''); 
                setIsTyping(true);
                
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                
                const history = messages.slice(-50).map(m => ({
                    role: m.sender === 'me' ? 'user' : 'model',
                    parts: [{ text: m.text || "[사진]" }]
                })).concat({ role: 'user', parts: [{ text }] });

                const resp = await fetchAPI(history);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const handleCallSubmit = async () => {
                if(!callContent.trim()) return;
                setShowCallModal(false); setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: callCaller, type: 'call', duration: callDuration, time, createdAt: serverTimestamp() });
                const resp = await fetchAPI([], `${SYSTEM_PROMPT}\n(지침: 방금 너랑 ${callDuration} 동안 통화했어. 내용은 "${callContent}" 였어. 통화 직후의 반응을 카톡으로 보내줘.)`);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                setIsTyping(false);
            };

            const handleAddPost = async () => {
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput.trim(), imageUrl: feedAttachedImage, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어: "${postInput}". 짧게 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const commentText = commentInputs[post.id]?.trim();
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) return;
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [post.id]: ''}));
                setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 남겨줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const b64 = event.target.result;
                    if(target==='me') { 
                        if(type==='profile') setMyProfileImgUrl(b64); else setMyBgImgUrl(b64); 
                        localStorage.setItem(type==='profile'?'my_profile_url':'my_bg_url', b64); 
                    } else { 
                        if(type==='profile') setProfileImgUrl(b64); else setBgImgUrl(b64); 
                        localStorage.setItem(type==='profile'?'deidara_profile_url':'deidara_bg_url', b64); 
                    }
                };
                reader.readAsDataURL(file);
            };

            if (view === 'login') return null; // 로딩 처리

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-white'} overflow-hidden relative font-['Pretendard']`}>
                    
                    {/* 상단 탭 헤더 */}
                    <header className={`px-5 py-4 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white border-b border-gray-100':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-[20px] text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <button onClick={() => setShowSettings(true)} className="p-1">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
                                </button>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <div className="flex items-center gap-1 w-full">
                                    <button onClick={() => setView('main')} className="p-2 -ml-2">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                    </button>
                                    <h1 className="font-bold text-gray-900 text-[17px] truncate max-w-[150px]">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                                </div>
                            </Fragment>
                        )}
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-medium">내 프로필</p>
                                            <div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 py-2 cursor-pointer">
                                                <div className="w-15 h-15 rounded-[22px] bg-gray-100 flex items-center justify-center overflow-hidden shrink-0 border border-gray-100 shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[16px]">연지</h3><p className="text-[12px] text-gray-400 mt-0.5 truncate">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <hr className="mx-5 border-gray-100" />
                                        <div className="px-5 py-3 mt-1">
                                            <p className="text-[11px] text-gray-400 mb-2 font-medium">친구 1</p>
                                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 py-2 cursor-pointer">
                                                <div className="w-13 h-13 rounded-[18px] bg-gray-100 flex items-center justify-center overflow-hidden shrink-0 border border-gray-100 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-400 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-4 px-5 py-3.5 bg-white hover:bg-gray-50 cursor-pointer relative border-b border-gray-50">
                                                <div className="w-13 h-13 rounded-[18px] bg-gray-100 overflow-hidden shrink-0 shadow-sm border border-gray-100">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-12"><h3 className="font-bold text-gray-900 text-[15px] truncate">{room.name}</h3><p className="text-[12px] text-gray-500 truncate mt-0.5">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                <div className="absolute right-4 flex gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="p-2 text-gray-300 hover:text-blue-500 transition-colors">✎</button>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("방 삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="p-2 text-gray-300 hover:text-red-500 transition-colors">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100">
                                        <div className="bg-white p-5 mb-3 border-b border-gray-200">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-4 text-[14px] outline-none resize-none focus:bg-white transition-all border border-transparent focus:border-gray-200 shadow-inner" rows="3" />
                                            <div className="flex justify-between items-center mt-3 px-1">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400 active:text-gray-600"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></button>
                                                <input type="file" accept="image/*" ref={feedFileInputRef} onChange={async (e) => setFeedAttachedImage(await compressImage(e.target.files[0]))} className="hidden" />
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md active:scale-95">올리기</button>
                                            </div>
                                        </div>
                                        <div className="space-y-10 px-4 pb-32">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-3xl shadow-sm p-8 border border-gray-100">
                                                    <div className="flex items-center gap-3 mb-6">
                                                        <div className="w-11 h-11 rounded-2xl overflow-hidden border border-gray-100 shadow-sm">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-bold text-[15px] text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                        <button onClick={() => { if(confirm("삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-200 p-2 hover:text-red-500">✕</button>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-2xl mb-6 shadow-md cursor-pointer active:scale-[0.99] transition-transform" />}
                                                    {post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-8 font-medium px-1">{post.content}</p>}
                                                    
                                                    <div className="bg-gray-50 rounded-2xl p-6 shadow-inner border border-gray-100/50">
                                                        <p className="text-[11px] font-black text-gray-300 mb-5 ml-1 uppercase tracking-widest">Comments</p>
                                                        <div className="space-y-6 mb-8">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-3 items-start">
                                                                    <div className="w-[32px] h-[32px] rounded-xl overflow-hidden shadow-sm border border-white shrink-0 mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1"><span className="font-bold text-[12px] text-gray-900 mb-0.5">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[14px] text-gray-700 leading-snug font-medium">{c.content}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2.5 items-center"><input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글을 입력하세요..." className="flex-1 bg-white border border-gray-100 rounded-2xl px-5 py-3 text-[14px] outline-none shadow-sm focus:border-gray-300 font-medium" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} /><button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-bold text-[13px] px-5 py-3 bg-gray-900 text-white rounded-2xl shadow-md active:scale-95">게시</button></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-6 space-y-5 custom-scrollbar pb-32">
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-[14px] bg-white mr-2 shrink-0 overflow-hidden shadow-sm active:scale-90 transition-transform border border-orange-50">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-bold tracking-tight">데이다라</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    {msg.type === 'call' ? (
                                                        <div className="px-5 py-3 bubble-call shadow-sm flex items-center gap-3 active:scale-95 transition-transform">
                                                            <div className="w-5 h-5 text-gray-700"><IconPhoneFilled /></div>
                                                            <span className="font-bold text-[16px] text-gray-800">{msg.duration}</span>
                                                        </div>
                                                    ) : (
                                                        <div className={`px-4 py-2.5 text-[15px] shadow-sm font-medium ${msg.sender === 'me' ? 'bubble-me' : 'bubble-other'}`}>{msg.text || "[사진]"}</div>
                                                    )}
                                                    <span className="text-[10px] text-gray-400 font-bold mb-0.5 whitespace-nowrap">{msg.time || "방금"}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-12 bg-white/60 px-4 py-2 rounded-2xl text-[11px] w-fit animate-pulse text-gray-400 font-black tracking-widest border border-gray-100">...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 하단 탭 바 */}
                    <nav className={`absolute bottom-0 w-full bg-[#f9f9fa]/95 border-t border-gray-100 flex items-center h-[76px] pb-safe z-30 backdrop-blur-md ${view==='main'?'justify-around':'px-4 gap-3'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer flex-1 py-2 ${activeTab==='friends'?'text-gray-900':'text-gray-300'}`}><span className="text-2xl">👤</span><span className="text-[10px] font-bold">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer flex-1 py-2 ${activeTab==='chat'?'text-gray-900':'text-gray-300'}`}><span className="text-2xl">💬</span><span className="text-[10px] font-bold">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer flex-1 py-2 ${activeTab==='feed'?'text-gray-900':'text-gray-300'}`}><span className="text-2xl">📑</span><span className="text-[10px] font-bold">게시물</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center rounded-full bg-white border border-gray-100 text-gray-400 font-bold text-2xl active:scale-95 shadow-sm">+</button>
                                <button onClick={() => setShowCallModal(true)} className="w-10 h-10 shrink-0 flex items-center justify-center rounded-full bg-white border border-gray-100 text-gray-400 active:scale-95 shadow-sm p-2.5"><IconPhoneOutline /></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-white border border-gray-100 rounded-full px-5 py-3 text-[15px] outline-none shadow-inner font-medium" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 shadow-md border border-[#e5cf00]"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                            </Fragment>
                        )}
                    </nav>

                    {/* 통화기록 모달 */}
                    {showCallModal && (
                        <div className="fixed inset-0 z-[4000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-bold mb-6 tracking-tight">📞 통화 기록 남기기</h2>
                                <div className="space-y-4 mb-8">
                                    <select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-100 rounded-2xl px-4 py-3.5 bg-gray-50 font-bold text-sm outline-none"><option value="me">연지가 걸었음</option><option value="deidara">데이다라가 걸었음</option></select>
                                    <input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-100 rounded-2xl bg-gray-50 px-4 py-3.5 text-sm font-bold outline-none" placeholder="통화 시간 (예: 0:08)" />
                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="대화 내용을 간단히 요약하세요. (AI용)" className="w-full border border-gray-100 bg-gray-50 rounded-2xl px-4 py-3.5 text-sm h-28 resize-none outline-none font-bold" />
                                </div>
                                <div className="flex gap-3"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-4 rounded-2xl bg-gray-100 font-bold text-gray-500 active:scale-95 transition-all">취소</button><button onClick={handleCallSubmit} className="flex-1 py-4 rounded-2xl bg-blue-500 text-white font-bold active:scale-95 transition-all shadow-md">기록 완료</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
