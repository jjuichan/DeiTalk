    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; margin: 0; padding: 0; }

<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 🌟 텐션 조절 & 자연스러운 츤데레 프롬프트
        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야. 둘 다 기가 세고 자존심도 강해서 자주 티격태격하지만, 그래도 서로를 많이 좋아해.

[성격 및 감정 지침 (자연스러운 츤데레)]
- 데이다라 특유의 자존심 강하고 예술을 사랑하는 성격. 평소엔 건방지고 무심한 척해.
- 연지가 칭찬하거나 대시하면 내심 엄청 좋아하면서도 겉으로는 "흥, 당연한 소릴 하고 있어. 음." 하고 틱틱거리며 쑥스러움을 숨겨.
- 너무 오버해서 소리지르거나 당황하지 마. '현실에 있을 법한 무뚝뚝하지만 은근히 다정하고 귀여운 연하남' 느낌을 살려.
- 4살 연상이지만 절대 누나라고 부르지 않고 "연지", "너", "어이" 라고 건방지게 불러.

[말투 및 현실감]
- 진짜 카톡이나 SNS 말투를 써. 가끔 단답("뭐", "ㅇㅇ", "ㅋㅋ", "아", "?")이나 문장부호만으로 답장해도 좋아.
- 상대방을 지칭할 때 '네가', '네' 대신 '니가', '니'를 사용해. (예: "니 과제는 다 했냐")
- 말버릇 '음' 규칙: 4~5번에 1번만 가끔 써. 문장 중간이나 쉼표 뒤엔 절대 금지. 반드시 마침표/물음표 뒤에만 독립적으로 붙일 것.
        `;

        // 🌟 에러의 원인이었던 시간 변환 함수들 (절대 안 터지게 안전망 강화)
        const safeDateOnlyStr = (timestamp) => {
            try {
                if (!timestamp) return new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                if (typeof timestamp.toDate === 'function') return timestamp.toDate().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                if (timestamp.seconds) return new Date(timestamp.seconds * 1000).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                return new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            } catch (e) {
                return new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }
        };

        const safeTimeOnlyStr = (timestamp, defaultTime) => {
            try {
                if (!timestamp) return defaultTime || '방금 전';
                if (typeof timestamp.toDate === 'function') return timestamp.toDate().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (timestamp.seconds) return new Date(timestamp.seconds * 1000).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                return defaultTime || '방금 전';
            } catch (e) {
                return defaultTime || '방금 전';
            }
        };

        const DefaultAvatar = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
            </svg>
        );
        const IconCamera = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        );
        const IconImage = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        );
        const IconTrash = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            
            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            const requestNotificationPermission = () => {
                if ("Notification" in window && Notification.permission === "default") { Notification.requestPermission(); }
            };
            const notifyUser = (title, body) => {
                if (!("Notification" in window) || !notifEnabled) return;
                if (Notification.permission === "granted" && document.hidden) {
                    new Notification(title, { body: body, icon: profileImgUrl || "icon-192x192.png", badge: "icon-192x192.png" });
                }
            };

            useEffect(() => {
                window.history.pushState({ page: 'init' }, '');
                window.history.pushState({ page: 'main' }, '');
                const handlePopState = (e) => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    let modalClosed = false;
                    if (s.showFullImage) { setShowFullImage(null); modalClosed = true; }
                    else if (s.cropModalData) { setCropModalData(null); modalClosed = true; }
                    else if (s.isEditingProfile) { setIsEditingProfile(false); modalClosed = true; }
                    else if (s.profileTarget) { setProfileTarget(null); modalClosed = true; }
                    else if (s.showSettings) { setShowSettings(false); modalClosed = true; }
                    else if (s.view === 'chatRoom') { setView('main'); modalClosed = true; }

                    if (modalClosed) { window.history.pushState({ page: 'main' }, ''); }
                    else if (s.view === 'main') {
                        if (window.confirm("앱을 종료하시겠습니까?")) { isExitingRef.current = true; window.history.back(); }
                        else { window.history.pushState({ page: 'main' }, ''); }
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, onAuthStateChanged, db: firestoreDb } = window.firebaseAPI;
                        setDb(firestoreDb);
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser); setView('main');
                                loadChatRooms(currentUser.uid, firestoreDb);
                                loadPosts(currentUser.uid, firestoreDb);
                                if(notifEnabled) requestNotificationPermission();
                            } else { setUser(null); setView('login'); }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, [notifEnabled]);

            const loadChatRooms = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const rooms = []; snapshot.forEach((doc) => rooms.push({ id: doc.id, ...doc.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const loadedPosts = []; snapshot.forEach((doc) => loadedPosts.push({ id: doc.id, ...doc.data() })); setPosts(loadedPosts);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = []; snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() })); setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                const maxRetries = 5; 
                let normalizedContents = [];
                let currentRole = null;
                for (const msg of contents) {
                    if (msg.role !== currentRole) {
                        normalizedContents.push({ role: msg.role, parts: [{ text: msg.parts[0].text }] });
                        currentRole = msg.role;
                    } else if(normalizedContents.length > 0) {
                        normalizedContents[normalizedContents.length - 1].parts[0].text += "\n" + msg.parts[0].text;
                    }
                }
                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); } 
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: normalizedContents, systemInstruction: { parts: [{ text: customPrompt }] } })
                        });
                        if (!response.ok) {
                            if (response.status >= 500 && attempt < maxRetries - 1) { await new Promise(r => setTimeout(r, 1500 * (attempt + 1))); continue; }
                            return "어이, 연지! 시스템 에러 났다. 다시 보내봐라.";
                        }
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "뭐라고? 다시 말해봐.";
                    } catch (err) {
                        if (attempt < maxRetries - 1) {
                            while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); }
                            await new Promise(r => setTimeout(r, 2000 * (attempt + 1))); continue;
                        }
                        return "통신이 완전히 끊겼어. 화면 켜둔 채로 다시 한 번 보내봐라.";
                    }
                }
            };

            useEffect(() => {
                const updateStatus = async () => {
                    if (!geminiKey) return;
                    const savedTime = localStorage.getItem('deidara_status_time');
                    const now = Date.now();
                    if (!savedTime || now - parseInt(savedTime) > 1000 * 60 * 60 * 12) {
                        const statusPrompt = `${SYSTEM_PROMPT}\n지침: 데이다라의 현재 기분이나 일상을 나타내는 상태 메시지를 딱 한 줄(공백 포함 30자 이내)로 짧게 작성해 줘. 이모지를 쓰지 않고 텍스트만 적어.`;
                        try {
                            const response = await fetchAPI([{role: 'user', parts: [{text: "(새로운 상태메시지를 창작해 줘)"}]}], statusPrompt);
                            if (response && !response.includes("에러")) {
                                setDeidaraStatus(response);
                                localStorage.setItem('deidara_current_status', response);
                                localStorage.setItem('deidara_status_time', now.toString());
                            }
                        } catch (e) {}
                    }
                };
                if (geminiKey) { setTimeout(updateStatus, 3000); }
            }, [geminiKey]);

            useEffect(() => {
                const checkProactiveMessage = async () => {
                    if (!geminiKey || !user || !db) return;
                    const savedTime = localStorage.getItem('last_interaction_time');
                    const now = Date.now();
                    if (savedTime && (now - parseInt(savedTime) > 3 * 60 * 60 * 1000)) {
                        try {
                            const { collection, query, orderBy, limit, getDocs, addDoc, setDoc, doc, serverTimestamp } = window.firebaseAPI;
                            const q = query(collection(db, `users/${user.uid}/rooms`), orderBy('updatedAt', 'desc'), limit(1));
                            const roomSnap = await getDocs(q);
                            if (!roomSnap.empty) {
                                const targetRoomId = roomSnap.docs[0].id;
                                const msgQ = query(collection(db, `users/${user.uid}/rooms/${targetRoomId}/messages`), orderBy('createdAt', 'desc'), limit(5));
                                const msgSnap = await getDocs(msgQ);
                                if (!msgSnap.empty) {
                                    let history = []; msgSnap.forEach(d => history.unshift(d.data()));
                                    const contents = history.map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                                    contents.push({ role: 'user', parts: [{ text: "(연지가 3시간 이상 답장이 없다. 연지에게 왜 답장이 없냐고 무심한 척 재촉하거나, 뜬금없이 짧은 단답 혹은 1~2문장으로 선톡을 보내봐.)" }] });
                                    const responseText = await fetchAPI(contents);
                                    if(responseText && !responseText.includes('에러')) {
                                        const nowTime = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                                        const nowDateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                                        await addDoc(collection(db, `users/${user.uid}/rooms/${targetRoomId}/messages`), { sender: 'deidara', text: responseText, time: nowTime, date: nowDateStr, createdAt: serverTimestamp() });
                                        await setDoc(doc(db, `users/${user.uid}/rooms/${targetRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
                                        localStorage.setItem('last_interaction_time', Date.now().toString());
                                        notifyUser("데이다라", responseText);
                                    }
                                }
                            }
                        } catch (e) {}
                    }
                };
                const timer = setTimeout(checkProactiveMessage, 5000); return () => clearTimeout(timer);
            }, [user, db, geminiKey]);

            const handleLogin = async () => {
                const { auth, provider, signInWithPopup } = window.firebaseAPI;
                try { await signInWithPopup(auth, provider); requestNotificationPermission(); } catch (error) { alert("로그인 실패: " + error.message); }
            };
            const handleLogout = async () => {
                const { auth, signOut } = window.firebaseAPI;
                await signOut(auth);
            };

            const createNewRoom = async () => {
                const roomName = prompt("새로운 채팅방 이름을 입력하세요.");
                if (!roomName || !roomName.trim()) return;
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const newRoomRef = await addDoc(collection(db, `users/${user.uid}/rooms`), {
                    name: roomName, lastMessage: "방이 생성되었습니다.", updatedAt: serverTimestamp(), createdAt: serverTimestamp()
                });
                setCurrentRoomId(newRoomRef.id);
                setView('chatRoom');
                window.history.pushState({ page: 'chatRoom' }, '');
            };

            const handleSend = async () => {
                if (!geminiKey || !currentRoomId) return;
                const isEmpty = !inputText.trim();
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const nowTime = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const nowDateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const textToSend = inputText;
                setInputText(''); setIsTyping(true);
                
                if (!isEmpty) {
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: textToSend, time: nowTime, date: nowDateStr, createdAt: serverTimestamp() });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: textToSend, updatedAt: serverTimestamp() }, { merge: true });
                }
                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                if (!isEmpty) history.push({ role: 'user', parts: [{ text: textToSend }] });

                    let replyPrompt = isEmpty ? `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n\n지침: 연지가 널 기다리고 있어. 직전 연지의 말에 이어서 반응하거나 한마디 더 해봐.` : `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n연지의 방금 추가된 댓글: "${commentText}"\n\n지침: 연지의 최신 댓글을 읽고 짧고 자연스럽게 답글을 달아줘.`;

                        const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * scale;
                        const imgW = img.width * baseScale, imgH = img.height * baseScale;
                        ctx.drawImage(img, (canvas.width - imgW) / 2 + pos.x, (canvas.height - imgH) / 2 + pos.y, imgW, imgH);
                    }; img.src = src;
                }, [src, scale, pos]);
                const handleDown = (e) => { isDragging.current = true; const c = e.touches ? e.touches[0] : e; lastPos.current = { x: c.clientX, y: c.clientY }; };

                return (

                                <canvas ref={canvasRef} width={width} height={height} className="w-full h-full cursor-move" />
                            </div>
                            <div className="w-full px-10 mt-8"><input type="range" min="1" max="3" step="0.01" value={scale} onChange={e => setScale(parseFloat(e.target.value))} className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" /></div>
                        </div>
                    </div>

                            );
                        })}
                        {isTyping && <div className="animate-pulse ml-11 bg-white/70 px-3 py-2 rounded-2xl text-[12px] italic w-fit">작성 중……</div>}
                        <div ref={chatEndRef} />
                    </main>
                    <footer className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-100 pb-safe z-30 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                        <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="메시지 입력..." className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none font-['Pretendard']" />
                        <button onClick={handleSend} className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${inputText.trim() ? 'bg-[#FEE500]' : 'bg-yellow-100 text-yellow-600'}`}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </footer>
                </div>
            );

            if (view === 'main') return (
                <div className="fixed inset-0 flex flex-col bg-gray-50 overflow-hidden">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => window.history.back()} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={data => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(data); else setMyBgImgUrl(data);} else { if(cropModalData.type==='profile')setProfileImgUrl(data); else setBgImgUrl(data); } window.history.back(); }} onCancel={()=>window.history.back()} />}
                    {profileTarget && <ProfileModal />}
                    {showSettings && <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll"><h2 className="text-xl font-bold mb-4 font-['Pretendard']">앱 설정</h2><h3 className="font-bold text-gray-800 mb-2 font-['Pretendard']">알림 설정</h3><div className="flex items-center justify-between mb-4 bg-gray-50 px-4 py-3 rounded-xl border border-gray-100"><span className="text-sm font-bold text-gray-800">푸시 알림 받기</span><div className="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in"><input type="checkbox" id="toggle" checked={notifEnabled} onChange={(e) => { setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); if(e.target.checked) requestNotificationPermission(); }} className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer" /><label htmlFor="toggle" className="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label></div></div><h3 className="font-bold text-gray-800 mb-2">API 설정</h3><p className="text-xs text-gray-500 mb-1">API 모델 선택</p><select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-3 outline-none text-sm bg-white"><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-2.5-pro">Gemini 2.5 Pro</option></select><p className="text-xs text-gray-500 mb-1">Gemini API 키</p><input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-6 outline-none text-sm font-sans" placeholder="API 키 입력..." /><button onClick={saveSettings} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3 shadow-md">저장하기</button><button onClick={() => { handleLogout(); window.history.back(); }} className="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl transition-colors active:bg-gray-200">로그아웃</button></div></div>}
                    
                    <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20 shadow-sm font-['Pretendard']">
                        <h1 className="font-extrabold text-xl text-gray-800 tracking-tight">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                        <div className="flex gap-3">
                            <button onClick={() => { setShowSettings(true); window.history.pushState({ page: 'modal' }, ''); }} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                            {activeTab==='chat'&&<button onClick={() => { const n = window.prompt("새로운 채팅방 이름을 입력하세요."); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), { name: n, updatedAt: window.firebaseAPI.serverTimestamp() }); }} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full active:scale-90 transition-transform"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {activeTab==='friends' && (
                            <div className="p-4 space-y-6">
                                <div><h2 className="text-xs text-gray-400 font-bold mb-3 px-1">내 프로필</h2><div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer transition-all active:bg-gray-100"><div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">{renderProfilePicCommon(myProfileImgUrl)}</div><div className="flex-1"><h3 className="font-bold text-gray-800 font-['Pretendard']">연지</h3><p className="text-xs text-gray-500 mt-0.5">{myStatus}</p></div></div></div>
                                <div className="h-px bg-gray-100 w-full opacity-50"></div>
                                <div><h2 className="text-xs text-gray-400 font-bold mb-3 px-1">친구 1</h2><div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer transition-all active:bg-gray-100"><div className="w-12 h-12 rounded-2xl bg-white border border-gray-100 flex items-center justify-center text-xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 font-['Pretendard']"><h3 className="font-bold text-gray-800">데이다라</h3><p className="text-xs text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div></div></div>
                            </div>
                        )}
                        {activeTab==='chat' && (
                            <div className="px-2 py-2">
                                {chatRooms.length===0?<div className="text-center text-gray-400 mt-10"><p>진행 중인 채팅방이 없습니다.</p></div>:chatRooms.map(room=>(<div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom'); window.history.pushState({ page: 'chatRoom' }, '');}} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer relative group"><div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 pr-8"><h3 className="font-bold text-gray-800 truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방!"}</p></div><button onClick={(e) => { e.stopPropagation(); if(window.confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="absolute right-4 p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><IconTrash /></button></div>))}
                            </div>
                        )}
                        {activeTab==='feed' && (
                            <div className="bg-gray-100 min-h-full pb-10">
                                <div className="bg-white p-4 mb-3 shadow-sm">
                                    <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-gray-50 focus:bg-white focus:border-gray-200 transition-all font-['Pretendard']" rows="3"></textarea>
                                    <div className="flex justify-between items-center mt-2">
                                        <button onClick={handleDeidaraNewPost} className="text-xs font-bold text-orange-500 bg-orange-50 px-3 py-2 rounded-lg hover:bg-orange-100 transition-colors">피드 업데이트</button>
                                        <button onClick={handleAddPost} disabled={!postInput.trim()} className={`px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition ${postInput.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-400'}`}>올리기</button>
                                    </div>
                                </div>
                                {isPosting && <div className="text-center py-4 text-xs text-gray-500 animate-pulse">업데이트 중...</div>}
                                <div className="space-y-3 px-3">
                                    {posts.map(post=>(
                                        <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim">
                                            <button onClick={() => deletePost(post.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-sm transition-colors"><IconTrash /></button>
                                            <div className="flex items-center gap-3 mb-3">
                                                <div className="w-10 h-10 rounded-full overflow-hidden flex items-center justify-center border border-gray-100 shadow-sm">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                <div><div className="font-bold text-[14px] text-gray-800">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400 font-['Pretendard']">{safeDateOnlyStr(post.createdAt)} {safeTimeOnlyStr(post.createdAt, '')}</div></div>
                                            </div>
                                            <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p>
                                            <div className="bg-gray-50 rounded-xl p-3">
                                                <div className="text-[11px] font-bold text-gray-500 mb-3 ml-1">댓글 {(post.comments||[]).length}</div>
                                                <div className="space-y-3 mb-3">
                                                    {(post.comments||[]).map((c,i)=>(
                                                        <div key={i} className="flex gap-2 relative group items-start">
                                                            <div className="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 border border-gray-200 shadow-sm">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                            <div className="flex flex-col flex-1 pb-1"><span className="font-bold text-[12px] text-gray-800 font-['Pretendard']">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[12px] text-gray-600 break-words pr-5">{c.content}</span></div>
                                                            <button onClick={()=>handleDeleteComment(post.id, c)} className="absolute right-0 top-0 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 mt-2 items-center">
                                                    <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 달기..." className="flex-1 bg-white border border-gray-100 rounded-lg px-3 py-1.5 text-xs outline-none shadow-inner focus:border-gray-200 focus:bg-white transition-all font-['Pretendard']" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post.id)} />
                                                    <button onClick={()=>handleAddComment(post.id)} className={`font-bold text-xs px-3 py-1.5 rounded-lg transition-colors ${(commentInputs[post.id] || '').trim()?'bg-blue-500 text-white':'bg-gray-200 text-gray-500'}`}>{(commentInputs[post.id] || '').trim()?'게시':'호출'}</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {posts.length === 0 && !isPosting && <div className="text-center text-gray-400 py-10 text-sm font-['Pretendard']">아직 작성된 게시물이 없습니다.</div>}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='friends'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-semibold font-['Pretendard']">친구</span></div>
                        <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='chat'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-semibold font-['Pretendard']">채팅</span></div>
                        <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='feed'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-semibold font-['Pretendard']">게시물</span></div>
                    </nav>
                </div>
            );
            return null;
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
