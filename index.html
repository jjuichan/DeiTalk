        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 주변 인물 설정 적용 (오타 포함 그대로 복사)
        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌. 매우 견제하고 증오란다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격. 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 과하게 문장부호를 남발하지 않는다면 물음표, 느낌표, 물결표 등을 자유롭게 사용해도 됨.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeDateStr = (ts) => {

        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

        const IconPhoneOutline = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;

        const FullImageViewer = ({ src, onClose }) => <div className="fixed inset-0 z-[3000] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>;
        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

        // 🌟 프로필 모달 컴포넌트
        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            const [editStatus, setEditStatus] = useState(isMe ? myStatus : deidaraStatus);
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? (myBgImgUrl || '') : (bgImgUrl || '')}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else { setProfileTarget(null); window.history.back(); } }} className="text-white p-2 active:bg-white/20 rounded-full transition"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        {!isEditingProfile && <button onClick={() => { setIsEditingProfile(true); window.history.pushState({ page: 'editProfile' }, ''); }} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20 tracking-tight">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20 tracking-tighter font-semibold">배경 변경</label></div>}
                        <div onClick={() => { if(!isEditingProfile) { setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl); window.history.pushState({ page: 'fullImage' }, ''); } }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-5 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {(isMe ? myProfileImgUrl : profileImgUrl) ? <img src={isMe ? myProfileImgUrl : profileImgUrl} className="w-full h-full object-cover" /> : <DefaultAvatar />}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-2xl">📷</label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-tight">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] text-center mb-10 mt-3 mx-auto">
                            {isEditingProfile && isMe ? <input type="text" defaultValue={editStatus} onBlur={(e) => { setEditStatus(e.target.value); setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center shadow-inner outline-none" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-8 flex justify-around mx-auto">
                            {isEditingProfile ? <button onClick={() => { setIsEditingProfile(false); window.history.back(); }} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white text-3xl">💬</div><span className="text-[11px] font-bold tracking-wider text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');
            const [editingPostId, setEditingPostId] = useState(null);
            const [editingPostText, setEditingPostText] = useState('');
            const [editingCommentInfo, setEditingCommentInfo] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);

            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);
            const cropCanvasRef = useRef(null);

            // 🌟 히스토리 관리(앱 종료 방지) 함수
            const pushHistory = (stateName) => {
                window.history.pushState({ page: stateName }, '');
            };

            // 초기화
            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            // 🌟 뒤로가기 버튼(popstate) 핸들러 완벽 복구
            useEffect(() => {
                const handlePopState = () => {
                    if (showFullImage) setShowFullImage(null);
                    else if (isEditingProfile) setIsEditingProfile(false);
                    else if (profileTarget) setProfileTarget(null);
                    else if (showCallModal) setShowCallModal(false);
                    else if (showSettings) setShowSettings(false);
                    else if (view === 'chatRoom') setView('main');
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [showFullImage, isEditingProfile, profileTarget, showCallModal, showSettings, view]);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: m.imageUrl.includes('image/png') ? 'image/png' : 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                let lastError = "";
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error((data.error && data.error.message) || "API Error");
                        const candidate = data.candidates?.[0];
                        if (!candidate) return "(말문이 막힌 듯하다.)";
                        let generatedText = candidate.content?.parts?.[0]?.text || "";
                        generatedText = generatedText.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                        generatedText = generatedText.replace(/\.\s*([ㄱ-ㅎ]+)/g, ' $1').replace(/([ㄱ-ㅎ]+)\./g, '$1');
                        return generatedText;
                    } catch (err) { lastError = err.message; await new Promise(r => setTimeout(r, 1500)); }
                }
                return `통신 장애 났다. 음! (원인: ${lastError})`;
            };

            const generateImageAPI = async (theme) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${geminiKey}`;
                const payload = { instances: [{ prompt: `A photorealistic casual smartphone snapshot. Subject: ${theme || 'daily life'}. No text.` }], parameters: { sampleCount: 1 } };
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                return await compressBase64Image(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
            };

            // 🌟 방 이름 수정 (파란색 버튼으로 강조)
            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("새로운 채팅방 이름을 입력하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    const { doc: fdoc, updateDoc } = window.firebaseAPI;
                    await updateDoc(fdoc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: `(시스템 지침: 네가 방금 한 말에 이어서 한 마디 더 덧붙여봐.)` }] });
                    const resp = await fetchAPI(history, SYSTEM_PROMPT);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                    setIsTyping(false); return;
                }
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const handleCallSubmit = async () => {
                if(!callContent.trim()) { alert("통화 내용을 써줘!"); return; }
                setShowCallModal(false); setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: callCaller, type: 'call', duration: callDuration, time, date, createdAt: serverTimestamp() });
                const history = buildHistory(messages, 100);
                history.push({ role: 'user', parts: [{ text: `(시스템 지침: 방금 너랑 나랑 ${callDuration} 동안 통화했어. 내용은 "${callContent}" 였어. 통화 직후의 반응을 카톡으로 보내줘.)` }] });
                const resp = await fetchAPI(history);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                setIsTyping(false); setCallContent('');
            };

            const handleAddPost = async () => {
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const myContent = postInput.trim();
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: myContent, imageUrl: feedAttachedImage || null, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const promptParts = [{ text: `[피드 내용] "${myContent || '(내용 없음)'}". 방금 연지가 피드를 올렸어. 댓글 달아줘.` }];
                    if (feedAttachedImage) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: feedAttachedImage.split(',')[1] } });
                    const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } catch (e) { console.error(e); } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const postId = post.id; const commentText = commentInputs[postId]?.trim(); 
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                let context = `[이전 댓글]\n`;
                if (post.comments) post.comments.slice(-100).forEach(c => { context += `${c.author==='me'?'연지':'데이다라'}: ${c.content}\n`; });
                if (!commentText) {
                    setIsPosting(true);
                    const promptParts = [{ text: `[피드]\n"${post.content || ''}"\n\n${context}\n(지침: 이어서 댓글 달아줘.)` }];
                    if (post.imageUrl) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: post.imageUrl.split(',')[1] } });
                    const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''})); setIsPosting(true);
                const promptParts = [{ text: `[피드]\n"${post.content || ''}"\n\n${context}\n연지: ${commentText}\n(지침: 대댓글 달아줘.)` }];
                if (post.imageUrl) promptParts.push({ inlineData: { mimeType: "image/jpeg", data: post.imageUrl.split(',')[1] } });
                const resp = await fetchAPI([{role:'user', parts: promptParts}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { setCropModalData({ src: event.target.result, type: type, setterType: target }); };
                reader.readAsDataURL(file); e.target.value = '';
            };

            const handleFeedPhotoAttach = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (ev) => {
                    const b64 = await compressBase64Image(ev.target.result);
                    setFeedAttachedImage(b64);
                    e.target.value = '';
                };
            };

            const handleChatUploadMyPhoto = async (e) => {
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                setShowAttachMenu(false); setIsTyping(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (ev) => {
                    const b64 = await compressBase64Image(ev.target.result);
                    const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: '', imageUrl: b64, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: '[사진]', updatedAt: serverTimestamp() }, { merge: true });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "사진 보냈어." }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 연지가 방금 사진을 보냈어. 이 사진을 보고 어떻게 반응할지 틱틱거리며 대답해봐. 부끄러운 사진이라면 당황해.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, time, date, createdAt: serverTimestamp() });
                    setIsTyping(false);
                };
            };

            const handleRequestDeidaraPhoto = async () => {
                setShowAttachMenu(false);
                const theme = prompt("데이다라에게 어떤 사진을 요구할까요?\n(예: 과제물, 풍경 등)\n빈칸으로 두면 일상 사진을 알아서 보냅니다.");
                if (theme === null) return;
                setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                const myAskText = theme ? `야, ${theme} 사진 좀 보내봐.` : `지금 뭐해? 사진 좀 보내봐.`;
                try {
                    const b64Image = await generateImageAPI(theme);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{text: myAskText}] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 방금 연지가 위 내용처럼 사진을 요구했어. 요청에 맞는 사진을 찍어 보내면서 틱틱대며 한 마디 덧붙여봐.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, imageUrl: b64Image, time, date, createdAt: serverTimestamp() });
                } catch (err) { setAlertMsg(`이미지 생성 오류: ${err.message}`); } finally { setIsTyping(false); }
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0] relative">
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-md font-bold active:scale-95 transition-transform">구글로 시작하기</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-white'} overflow-hidden relative`}>
                    {/* 모달 레이어 */}
                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUI} setTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {showCallModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-lg font-bold mb-4">📞 통화 기록 남기기</h2>
                                <div className="space-y-4 mb-6">
                                    <select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-100 rounded-xl px-4 py-3 bg-gray-50 text-sm">
                                        <option value="me">연지가 걸음</option><option value="deidara">데이다라가 걸음</option>
                                    </select>
                                    <input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-100 rounded-xl bg-gray-50 px-4 py-3 text-sm" placeholder="통화 시간 (예: 0:08)" />
                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="통화 내용 요약" className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-sm h-24" />
                                </div>
                                <div className="flex gap-2"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-3.5 rounded-2xl bg-gray-100 font-bold text-gray-500">취소</button><button onClick={handleCallSubmit} className="flex-1 py-3.5 rounded-2xl bg-blue-500 text-white font-bold">기록 완료</button></div>
                            </div>
                        </div>
                    )}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                        <h2 className="text-xl font-bold mb-4">설정</h2>
                        <div className="flex items-center justify-between mb-6 bg-gray-50 px-4 py-3 rounded-2xl border border-gray-100"><span className="text-sm font-bold text-gray-700 font-semibold">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-5 h-5" /></div>
                        <p className="text-xs mb-1 font-bold text-gray-400 ml-1">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 mb-6 outline-none text-sm font-semibold" />
                        <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 shadow-sm active:scale-95 transition-transform text-gray-900">저장</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-transform">로그아웃</button>
                    </div></div>}

                    {/* 헤더 */}
                    <header className={`px-5 py-4 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white border-b border-gray-100':'bg-[#BACEE0]'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-bold text-xl text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <button onClick={() => { setShowSettings(true); pushHistory('settings'); }} className="text-xl">⚙️</button>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => { setView('main'); window.history.back(); }} className="p-2 -ml-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-9 h-9 rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm active:scale-95 transition-transform ml-1">{renderProfilePicCommon(profileImgUrl)}</div>
                                <h1 className="font-bold text-gray-800 text-[17px] ml-2 truncate max-w-[150px] flex-1">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                            </Fragment>
                        )}
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-medium">내 프로필</p>
                                            <div onClick={() => { setProfileTarget('me'); pushHistory('modal'); }} className="flex items-center gap-4 py-2 cursor-pointer active:scale-[0.99] transition-transform">
                                                <div className="w-14 h-14 rounded-[22px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-base">연지</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        {/* 🌟 회색 구분선 적용 */}
                                        <hr className="mx-4 border-gray-100/60 my-1" />
                                        <div className="px-5 py-3">
                                            <p className="text-[11px] text-gray-400 mb-2 font-medium">친구 1</p>
                                            <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="flex items-center gap-4 py-2 cursor-pointer active:scale-[0.99] transition-transform">
                                                <div className="w-12 h-12 rounded-[18px] bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[15px]">데이다라</h3><p className="text-[12px] text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1">
                                        {chatRooms.length === 0 ? (
                                            <div className="text-center text-gray-400 py-10 text-sm">상단 ➕ 버튼을 눌러 채팅방을 만들어보세요.</div>
                                        ) : chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); pushHistory('chatRoom'); }} className="flex items-center gap-4 px-5 py-4 bg-white hover:bg-gray-50 cursor-pointer relative group active:scale-[0.98] transition-all border-b border-gray-50/50">
                                                <div className="w-[50px] h-[50px] rounded-[18px] bg-gray-100 overflow-hidden shrink-0 border border-gray-100 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-20"><h3 className="font-bold text-gray-900 text-[16px] truncate">{room.name}</h3><p className="text-[12px] text-gray-500 truncate mt-1">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                {/* 🌟 2. 채팅방 이름 수정 버튼 우측 고정 배치 */}
                                                <div className="absolute right-4 flex gap-1">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="px-3 py-2 bg-blue-50 text-blue-600 rounded-xl font-bold text-[11px] shadow-sm active:scale-95 transition-transform">✎ 수정</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100">
                                        <div className="bg-white p-5 mb-4 shadow-sm">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="지금 이 기분은 어떤가요?" className="w-full bg-gray-50 rounded-xl p-4 text-[14px] outline-none resize-none focus:bg-white transition-all font-medium" rows="3" />
                                            {feedAttachedImage && <div className="relative inline-block mt-2"><img src={feedAttachedImage} className="w-20 h-20 object-cover rounded-xl shadow-sm border border-gray-200" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 text-xs">✕</button></div>}
                                            <div className="flex justify-between items-center mt-3">
                                                <div className="flex gap-2">
                                                    <button onClick={() => feedFileInputRef.current.click()} className="p-2 text-gray-400 bg-gray-50 rounded-xl active:scale-95"><div className="w-5 h-5"><IconCamera /></div></button>
                                                    <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                </div>
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-sm active:scale-95 transition-all shadow-sm">올리기</button>
                                            </div>
                                        </div>
                                        {/* 🌟 3. 피드 목록 여백 (p-8, space-y-10) 적용 */}
                                        <div className="space-y-10 px-4 pb-32">
                                            {posts.length === 0 ? (
                                                <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없습니다.</div>
                                            ) : posts.map(post=>(
                                                <div key={post.id || Math.random()} className="bg-white rounded-3xl shadow-sm p-8 relative msg-anim border border-gray-100/50">
                                                    <div className="flex items-center gap-3 mb-6">
                                                        <div onClick={() => { setProfileTarget(post.author==='me'?'me':'deidara'); pushHistory('modal'); }} className="w-10 h-10 rounded-full overflow-hidden border border-gray-100 shadow-sm cursor-pointer">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-bold text-sm text-gray-900">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400 font-medium">{safeDateStr(post.createdAt)}</div></div>
                                                        <button onClick={() => { if(confirm("삭제할까요?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="text-gray-300 p-2 hover:text-red-500">✕</button>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => { setShowFullImage(post.imageUrl); pushHistory('fullImage'); }} className="w-full h-auto rounded-2xl mb-6 shadow-sm active:scale-[0.99] transition-transform cursor-pointer" />}
                                                    {post.content && <p className="text-[15px] text-gray-800 leading-relaxed mb-8 whitespace-pre-wrap font-medium">{post.content}</p>}
                                                    
                                                    <div className="bg-gray-50 rounded-2xl p-6 shadow-inner">
                                                        <p className="text-[11px] font-bold text-gray-300 mb-5 ml-1 uppercase tracking-wider">Comments</p>
                                                        <div className="space-y-6 mb-8">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-3 items-start">
                                                                    <div className="w-[30px] h-[30px] rounded-full overflow-hidden shrink-0 mt-0.5 shadow-sm border border-gray-100">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1"><span className="font-bold text-[12px] text-gray-900 mb-0.5">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[13px] text-gray-700 leading-snug">{c.content}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 items-center"><input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글을 남겨보세요..." className="flex-1 bg-white border border-gray-100 rounded-xl px-4 py-3 text-[13px] outline-none shadow-sm focus:border-gray-300 transition-colors" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} /><button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-bold text-[13px] px-5 py-3 bg-gray-900 text-white rounded-xl active:scale-95 transition-all shadow-md">게시</button></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-6 space-y-4 custom-scrollbar pb-32" onClick={() => setShowAttachMenu(false)}>
                                {messages.length === 0 && !isTyping ? (
                                    <div className="flex justify-center items-center h-full text-sm text-gray-500 font-medium">메시지를 입력해 대화를 시작해보세요.</div>
                                ) : messages.map((msg, i) => (
                                    <div key={msg.id || i} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); pushHistory('modal'); }} className="w-10 h-10 rounded-[14px] bg-white mr-2 shrink-0 overflow-hidden shadow-sm cursor-pointer border border-orange-50 active:scale-95 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1.5 ml-1 font-bold">데이다라</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div className="flex flex-col gap-1">
                                                        {msg.imageUrl && <img src={msg.imageUrl} onClick={() => { setShowFullImage(msg.imageUrl); pushHistory('fullImage'); }} className={`max-w-[200px] w-full h-auto rounded-2xl shadow-sm border border-black/5 cursor-pointer active:opacity-90 ${msg.sender === 'me' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`} />}
                                                        {msg.type === 'call' ? (
                                                            <div className="px-5 py-3 rounded-xl bg-white border border-gray-100 shadow-sm flex items-center gap-3">
                                                                <div className="w-5 h-5 text-gray-700"><IconPhoneFilled /></div>
                                                                <span className="font-bold text-[15px]">{msg.duration}</span>
                                                            </div>
                                                        ) : (
                                                            msg.text && <div className={`px-4 py-2.5 text-[14px] shadow-sm font-medium ${msg.sender === 'me' ? 'bubble-me text-gray-900' : 'bubble-other text-gray-800'}`}>{msg.text}</div>
                                                        )}
                                                    </div>
                                                    <span className="text-[9px] text-gray-400 font-bold mb-0.5 whitespace-nowrap">{msg.time || "방금"}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-12 bg-white/50 px-4 py-2 rounded-xl text-[11px] w-fit animate-pulse text-gray-500 font-bold tracking-widest border border-black/5 shadow-sm">음...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 탭 바 / 채팅 하단 바 (카카오톡 스타일) */}
                    <nav className={`absolute bottom-0 w-full bg-white border-t border-gray-100 flex items-center h-[76px] pb-safe z-30 ${view==='main'?'justify-around':'px-3 gap-2'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='friends'?'tab-active':'tab-inactive'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-bold">친구</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='chat'?'tab-active':'tab-inactive'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-bold">채팅</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer transition-all ${activeTab==='feed'?'tab-active':'tab-inactive'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-bold">게시물</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                {showAttachMenu && (
                                    <div className="absolute bottom-[70px] left-3 bg-white border border-gray-100 rounded-2xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] p-2 w-48 flex flex-col gap-1 z-40 slide-in">
                                        <button onClick={() => chatFileInputRef.current.click()} className="text-left px-4 py-3 text-[13px] font-bold text-gray-700 hover:bg-gray-50 rounded-xl transition-colors">🖼️ 갤러리</button>
                                        <button onClick={handleRequestDeidaraPhoto} className="text-left px-4 py-3 text-[13px] font-bold text-gray-700 hover:bg-gray-50 rounded-xl transition-colors">📸 사진 요구하기</button>
                                        <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                    </div>
                                )}
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 shrink-0 flex items-center justify-center text-gray-400 active:scale-90 font-bold text-3xl mb-1.5">+</button>
                                <button onClick={() => { setShowCallModal(true); pushHistory('callModal'); }} className="w-10 h-10 shrink-0 flex items-center justify-center text-gray-400 active:scale-90 mb-0.5"><div className="w-6 h-6"><IconPhoneOutline /></div></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 border border-gray-200 focus:bg-white focus:border-gray-300 rounded-full px-5 py-2.5 text-[15px] outline-none transition-colors" placeholder="메시지 입력" />
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-sm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-800 ml-0.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
