        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 널 친한 동생으로만 본다 생각해서 혼자 짝사랑 중이라 오해하고 있어.
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것. '음'은 문장 끝에 가끔 붙여.
        `;

        // 🌟 고화질 유지 이미지 압축 로직 (최대 가로 1920px, 품질 0.9)
        const compressImage = (file, isHighQuality = false) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = isHighQuality ? 1920 : 1024; 
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', isHighQuality ? 0.9 : 0.7));
                    };
                };
            });
        };

        const safeDateStr = (ts) => {
            if (!ts) return '방금';
            try { 
                const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
                const now = new Date();
                if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
                return `${d.getMonth() + 1}월 ${d.getDate()}일`;
            } catch (e) { return '방금'; }
        };

        const getTsMillis = (ts) => {
            if (!ts) return Date.now();
            if (typeof ts.toMillis === 'function') return ts.toMillis();
            if (ts.seconds) return ts.seconds * 1000;
            return Date.now();
        };

        // UI 아이콘 모음
        const DefaultAvatar = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTrash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const IconPhoneFilled = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.73 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>;
        const IconSearch = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full text-gray-800"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconChatPlus = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full text-gray-800"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="12" y1="7" x2="12" y2="13"></line><line x1="9" y1="10" x2="15" y2="10"></line></svg>;
        const IconSetting = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full text-gray-800"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');
            const [alertMsg, setAlertMsg] = useState(null);

            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);

            useEffect(() => {
                const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                setDb(fdb);
                onAuthStateChanged(auth, (u) => {
                    if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                    else { setView('login'); }
                });
            }, []);

            useEffect(() => {
                if (!currentRoomId || !user || !db) return;
                const { collection, query, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = []; snapshot.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                    msgs.sort((a, b) => getTsMillis(a.createdAt) - getTsMillis(b.createdAt));
                    setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db]);

            const loadChatRooms = (uid, fdb) => {
                const { collection, onSnapshot } = window.firebaseAPI;
                onSnapshot(collection(fdb, `users/${uid}/rooms`), (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() }));
                    rooms.sort((a, b) => getTsMillis(b.updatedAt) - getTsMillis(a.updatedAt));
                    setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, onSnapshot } = window.firebaseAPI;
                onSnapshot(collection(fdb, `users/${uid}/posts`), (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() }));
                    loaded.sort((a, b) => getTsMillis(b.createdAt) - getTsMillis(a.createdAt));
                    setPosts(loaded);
                });
            };

            const buildHistory = (msgs) => msgs.slice(-50).map(m => ({
                role: m.sender === 'me' ? 'user' : 'model',
                parts: [{ text: m.text || (m.imageUrl ? "[사진]" : "[통화 기록]") }]
            }));

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`;
                try {
                    const resp = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({contents, systemInstruction:{parts:[{text:SYSTEM_PROMPT}]}}) });
                    const data = await resp.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵)";
                } catch(e) { return "통신 에러남, 음!"; }
            };

            const handleSend = async () => {
                if (!inputText.trim() || !currentRoomId) return;
                const text = inputText; setInputText(''); setIsTyping(true);
                const { collection, addDoc, doc:fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:false });
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender:'me', text, time, createdAt:serverTimestamp() });
                const resp = await fetchAPI([...buildHistory(messages), {role:'user', parts:[{text}]}]);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender:'deidara', text:resp, time, createdAt:serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage:resp, updatedAt:serverTimestamp() }, { merge:true });
                setIsTyping(false);
            };

            const handleImageUploadUI = async (e, type, target) => {
                const file = e.target.files[0]; if(!file) return;
                const b64 = await compressImage(file, true);
                if(target === 'me') {
                    if(type === 'profile') { setMyProfileImgUrl(b64); localStorage.setItem('my_profile_url', b64); }
                    else { setMyBgImgUrl(b64); localStorage.setItem('my_bg_url', b64); }
                } else {
                    if(type === 'profile') { setProfileImgUrl(b64); localStorage.setItem('deidara_profile_url', b64); }
                    else { setBgImgUrl(b64); localStorage.setItem('deidara_bg_url', b64); }
                }
                e.target.value = '';
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0]">
                    <h1 className="text-4xl font-black text-gray-800 mb-8 tracking-tighter">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-xl font-bold active:scale-95 transition-all text-gray-700">Google로 시작하기</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'chat-bg' : 'bg-white'} overflow-hidden relative`}>
                    {showFullImage && <div className="fixed inset-0 z-[3000] bg-black flex items-center justify-center" onClick={()=>setShowFullImage(null)}><img src={showFullImage} className="w-full h-auto max-h-full object-contain" /></div>}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {alertMsg && <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/50 p-4"><div className="bg-white rounded-2xl p-6 shadow-xl text-center max-w-sm w-full"><p className="mb-5 text-sm font-bold text-gray-800">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="px-6 py-2 bg-[#FEE500] rounded-full font-bold w-full">확인</button></div></div>}

                    {/* 메인 화면 헤더 (카톡 스타일) */}
                    {view === 'main' && (
                        <header className="px-5 py-4 bg-white flex justify-between items-center shrink-0">
                            <h1 className="font-bold text-xl">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                            <div className="flex gap-5">
                                {activeTab==='chat' && (
                                    <Fragment>
                                        <button className="w-6 h-6"><IconSearch /></button>
                                        <button onClick={() => { const n = prompt("방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt:window.firebaseAPI.serverTimestamp()}); }} className="w-6 h-6"><IconChatPlus /></button>
                                    </Fragment>
                                )}
                                <button onClick={() => setShowSettings(true)} className="w-6 h-6"><IconSetting /></button>
                            </div>
                        </header>
                    )}

                    {/* 채팅방 헤더 */}
                    {view === 'chatRoom' && (
                        <header className="px-4 py-3 bg-[#BACEE0] flex items-center gap-3 shrink-0 border-b border-black/5">
                            <button onClick={() => setView('main')} className="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-700"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                            <div onClick={() => { setProfileTarget('deidara'); }} className="w-9 h-9 rounded-xl bg-white overflow-hidden border border-white cursor-pointer shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                            <h1 className="font-bold text-gray-800 text-[17px]">데이다라</h1>
                        </header>
                    )}

                    {/* 메인 영역 */}
                    <main className={`flex-1 overflow-y-auto custom-scrollbar ${view === 'main' ? 'bg-white' : 'bg-transparent pb-4'}`} onClick={()=>{if(view!=='main'){setShowAttachMenu(false); setSelectedMsgId(null);}}}>
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="px-5">
                                        <div onClick={()=>setProfileTarget('me')} className="flex items-center gap-4 py-4 border-b border-gray-50 cursor-pointer">
                                            <div className="w-16 h-16 rounded-[22px] bg-white border border-gray-100 overflow-hidden shrink-0">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                            <div className="flex-1 min-w-0"><h3 className="font-bold text-lg">연지</h3><p className="text-xs text-gray-400 truncate mt-0.5">{myStatus}</p></div>
                                        </div>
                                        <div className="py-4">
                                            <p className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-3">Friends 1</p>
                                            <div onClick={()=>setProfileTarget('deidara')} className="flex items-center gap-4 cursor-pointer">
                                                <div className="w-12 h-12 rounded-[18px] bg-white border border-gray-100 overflow-hidden shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold">데이다라</h3><p className="text-xs text-gray-400 truncate mt-0.5">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="divide-y divide-gray-50">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="px-5 py-3.5 flex items-center gap-4 active:bg-gray-50 transition-colors">
                                                <div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 overflow-hidden shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 h-14 flex flex-col justify-center">
                                                    <div className="flex justify-between items-baseline mb-0.5">
                                                        <h3 className="font-bold text-[16px] truncate">{room.name}</h3>
                                                        <span className="text-[10px] text-gray-400 font-bold">{safeDateStr(room.updatedAt)}</span>
                                                    </div>
                                                    <p className="text-[13px] text-gray-500 truncate leading-tight">{room.lastMessage || "대화 없음"}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <div className="px-4 py-6 space-y-6">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={()=>setProfileTarget('deidara')} className="w-10 h-10 rounded-xl bg-white mr-2 shrink-0 overflow-hidden border border-white shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col">
                                                {msg.sender !== 'me' && <span className="text-[12px] font-bold text-gray-700 mb-1 ml-1">데이다라</span>}
                                                <div className={`flex flex-col gap-1 ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                                    {msg.imageUrl && <img src={msg.imageUrl} className="max-w-[240px] rounded-2xl mb-1 shadow-sm" onClick={(e)=>{e.stopPropagation(); setShowFullImage(msg.imageUrl);}} />}
                                                    {msg.text && (
                                                        <div onClick={(e)=>{e.stopPropagation(); setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id); setEditingMessageId(null);}} className={`px-4 py-2.5 rounded-[18px] text-[15px] font-bold shadow-sm cursor-pointer active:scale-95 transition-all ${msg.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none'}`}>{msg.text}</div>
                                                    )}
                                                    {selectedMsgId === msg.id && msg.text && (
                                                        <div className="flex gap-1.5 mt-1">
                                                            <button onClick={(e)=>{e.stopPropagation(); if(confirm("삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`));}} className="px-3 py-1 bg-red-50 text-red-500 rounded-full text-[10px] font-black shadow-sm">삭제</button>
                                                            {msg.sender === 'deidara' && <button onClick={async(e)=>{e.stopPropagation(); setIsTyping(true); const newT = await fetchAPI(buildHistory(messages)); window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`), {text:newT}); setIsTyping(false); setSelectedMsgId(null);}} className="px-3 py-1 bg-blue-50 text-blue-500 rounded-full text-[10px] font-black shadow-sm">재생성</button>}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-12 bg-white/50 px-4 py-2 rounded-full text-[10px] w-fit animate-pulse font-black text-gray-500 uppercase tracking-widest">Typing...</div>}
                                <div ref={chatEndRef} />
                            </div>
                        )}
                    </main>

                    {/* 하단 영역 */}
                    {view === 'main' ? (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex justify-around items-center h-[76px] pb-safe">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='friends'?'text-gray-900':'text-gray-300'}`}><div className="w-6 h-6"><IconTabFriend active={activeTab==='friends'} /></div><span className="text-[9px] font-black uppercase">Home</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='chat'?'text-gray-900':'text-gray-300'}`}><div className="w-6 h-6"><IconTabChat active={activeTab==='chat'} /></div><span className="text-[9px] font-black uppercase">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center ${activeTab==='feed'?'text-gray-900':'text-gray-300'}`}><div className="w-6 h-6"><IconTabFeed active={activeTab==='feed'} /></div><span className="text-[9px] font-black uppercase">Feed</span></div>
                        </nav>
                    ) : (
                        <footer className="p-2 bg-white border-t border-gray-100 pb-safe shrink-0">
                            <div className="flex gap-2 items-center px-1">
                                <button onClick={()=>setShowAttachMenu(!showAttachMenu)} className="w-10 h-10 flex items-center justify-center text-gray-400"><div className="w-6 h-6"><IconCamera /></div></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-full px-4 py-2 text-[15px] outline-none font-bold" placeholder="메시지 입력" />
                                <button onClick={handleSend} className="w-10 h-10 bg-[#FEE500] rounded-full flex items-center justify-center shrink-0"><div className="w-5 h-5 text-gray-800"><IconSend /></div></button>
                            </div>
                            {showAttachMenu && (
                                <div className="p-4 flex gap-4 animate-fadeIn">
                                    <button onClick={()=>chatFileInputRef.current.click()} className="flex-1 bg-gray-50 py-3 rounded-2xl text-xs font-black text-gray-500">🖼️ 사진 보내기</button>
                                    <input type="file" ref={chatFileInputRef} onChange={(e)=>handleImageUploadUI(e, 'chat', 'me')} className="hidden" />
                                </div>
                            )}
                        </footer>
                    )}

                    {showSettings && <div className="fixed inset-0 z-[2500] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                        <h2 className="text-xl font-bold mb-6">환경설정</h2>
                        <input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-2xl px-4 py-4 mb-6 outline-none text-sm font-bold" placeholder="Gemini API Key 입력" />
                        <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 shadow-md text-gray-900">저장 및 시작</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-400 py-4 rounded-2xl font-bold">로그아웃</button>
                    </div></div>}
                </div>
            );
        }

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);
        const IconTabFriend = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconTabChat = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const IconTabFeed = ({ active }) => <svg viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
