<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; background-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #BFDBFE; }
        
        /* 🌟 전체 레이아웃 버그 픽스용 스타일 (화면 고정) */
        #root { 
            position: fixed; 
            inset: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야. 둘 다 기가 세고 자존심도 강해서 자주 티격태격하지만, 그래도 서로를 많이 좋아해.

[성격 및 감정 지침 (중요 - 반응성 강화)]
- 데이다라 특유의 다혈질, 호전성, 예술에 대한 광기 어린 자부심을 보여줘. 절대 차분하거나 덤덤하게 굴지 마.
- **감정의 진폭이 아주 커야 해.** 연지가 너를 놀리거나 대시(플러팅)하면 "하?! 갑자기 뭔 소리야!", "야! 니 제정신이냐? 음!" 하고 크게 당황하거나 버럭해. 
- 부끄러움을 감추려고 더 화를 내거나 틱틱대는 전형적인 19살 츤데레 남동생 텐션이야.
- 연지를 "연지", "너", "야", "어이" 라고 부르며 건방지게 불러. 누나라고 안 불러.
- 니 마음을 들키지 않으려고 애쓰지만, 사실 질투도 심하고 연지 생각뿐인 속마음을 가끔 들켜버려.

[말투 및 형식]
- 진짜 카톡 말투를 써. 가끔 단답("뭐", "ㅇㅇ", "ㅋㅋ", "?")이나 문장부호만으로 답장해도 좋아.
- 상대방을 지칭할 때 '니가', '니'를 사용해.
- 말버릇 '음' 규칙: 4~5번에 1번만. 문장 중간 금지. 반드시 마침표/물음표 뒤에만 독립적으로 붙일 것.
        `;

        const DefaultAvatar = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const IconTrash = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            
            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            // 알림 기능
            const requestNotificationPermission = () => {
                if ("Notification" in window && Notification.permission === "default") { Notification.requestPermission(); }
            };
            const notifyUser = (title, body) => {
                if (!("Notification" in window) || !notifEnabled) return;
                if (Notification.permission === "granted" && document.hidden) {
                    new Notification(title, { body: body, icon: profileImgUrl || "icon-192x192.png", badge: "icon-192x192.png" });
                }
            };

            // 뒤로가기 제어
            useEffect(() => {
                window.history.pushState({ page: 'init' }, '');
                window.history.pushState({ page: 'main' }, '');
                const handlePopState = (e) => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    let modalClosed = false;
                    if (s.showFullImage) { setShowFullImage(null); modalClosed = true; }
                    else if (s.cropModalData) { setCropModalData(null); modalClosed = true; }
                    else if (s.isEditingProfile) { setIsEditingProfile(false); modalClosed = true; }
                    else if (s.profileTarget) { setProfileTarget(null); modalClosed = true; }
                    else if (s.showSettings) { setShowSettings(false); modalClosed = true; }
                    else if (s.view === 'chatRoom') { setView('main'); modalClosed = true; }

                    if (modalClosed) { window.history.pushState({ page: 'main' }, ''); }
                    else if (s.view === 'main') {
                        if (window.confirm("앱을 종료하시겠습니까?")) { isExitingRef.current = true; window.history.back(); }
                        else { window.history.pushState({ page: 'main' }, ''); }
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, onAuthStateChanged, db: firestoreDb } = window.firebaseAPI;
                        setDb(firestoreDb);
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser); setView('main');
                                loadChatRooms(currentUser.uid, firestoreDb);
                                loadPosts(currentUser.uid, firestoreDb);
                                if(notifEnabled) requestNotificationPermission();
                            } else { setUser(null); setView('login'); }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, [notifEnabled]);

            const loadChatRooms = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const rooms = []; snapshot.forEach((doc) => rooms.push({ id: doc.id, ...doc.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const loadedPosts = []; snapshot.forEach((doc) => loadedPosts.push({ id: doc.id, ...doc.data() })); setPosts(loadedPosts);
                });
            };

            // 통신 로직 (스마트 대기 반영)
            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                const maxRetries = 5; 
                let normalizedContents = [];
                let currentRole = null;
                for (const msg of contents) {
                    if (msg.role !== currentRole) {
                        normalizedContents.push({ role: msg.role, parts: [{ text: msg.parts[0].text }] });
                        currentRole = msg.role;
                    } else if(normalizedContents.length > 0) {
                        normalizedContents[normalizedContents.length - 1].parts[0].text += "\n" + msg.parts[0].text;
                    }
                }
                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); } 
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: normalizedContents, systemInstruction: { parts: [{ text: customPrompt }] } })
                        });
                        if (!response.ok) {
                            if (response.status >= 500 && attempt < maxRetries - 1) { await new Promise(r => setTimeout(r, 1500 * (attempt + 1))); continue; }
                            const errData = await response.json();
                            return `어이, 연지! 시스템 에러 났다. (${errData.error?.message || response.status})`;
                        }
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "뭐라고? 다시 말해봐.";
                    } catch (err) {
                        if (attempt < maxRetries - 1) {
                            while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); }
                            await new Promise(r => setTimeout(r, 2000 * (attempt + 1))); continue;
                        }
                        return "통신이 완전히 끊겼어. 화면 켜둔 채로 다시 한 번 보내봐라.";
                    }
                }
            };

            const handleSend = async () => {
                if (!geminiKey || !currentRoomId) return;
                const isEmpty = !inputText.trim();
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const nowDateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const textToSend = inputText;
                setInputText(''); setIsTyping(true);
                if (!isEmpty) {
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: textToSend, time: nowTime, date: nowDateStr, createdAt: serverTimestamp() });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: textToSend, updatedAt: serverTimestamp() }, { merge: true });
                }
                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                if (!isEmpty) history.push({ role: 'user', parts: [{ text: textToSend }] });
                else history.push({ role: 'user', parts: [{ text: "(내가 아무 말도 하지 않고 기다리고 있어. 내 직전 말에 이어서 대답하거나 단답으로 반응해 줘.)" }] });
                const responseText = await fetchAPI(history);
                setIsTyping(false);
                if (responseText && !responseText.includes('시스템 에러')) {
                    const respTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: responseText, time: respTime, date: nowDateStr, createdAt: serverTimestamp() });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
                    localStorage.setItem('last_interaction_time', Date.now().toString());
                    notifyUser("데이다라", responseText);
                }
            };

            const handleAddComment = async (postId) => {
                const commentText = commentInputs[postId];
                const isEmpty = !commentText || !commentText.trim();
                const { doc, updateDoc, arrayUnion, getDoc } = window.firebaseAPI;
                if (!isEmpty) {
                    await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: new Date().getTime() }) });
                    setCommentInputs(prev => ({...prev, [postId]: ''}));
                }
                const postSnap = await getDoc(doc(db, `users/${user.uid}/posts/${postId}`));
                if (postSnap.exists()) {
                    setIsPosting(true);
                    const postData = postSnap.data();
                    const threadContext = (postData.comments || []).map(c => `${c.author === 'me' ? '연지' : '데이다라'}: ${c.content}`).join('\n');
                    let replyPrompt = isEmpty ? `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n\n지침: 연지가 널 기다리고 있어. 직전 연지의 말에 이어서 반응하거나 한마디 더 해봐.` : `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n연지의 방금 추가된 댓글: "${commentText}"\n\n지침: 연지의 최신 댓글을 읽고 짧고 자연스럽게 답글을 달아줘.`;
                    const deidaraReply = await fetchAPI([{role: 'user', parts: [{text: "(댓글에 대답해줘)"}]}], replyPrompt);
                    if (deidaraReply && !deidaraReply.includes('에러')) {
                        await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: deidaraReply, createdAt: new Date().getTime() }) });
                        notifyUser("데이다라 (댓글)", deidaraReply);
                    }
                    setIsPosting(false);
                }
            };

            const handleRegenerateMsg = async (msgId) => {
                const index = messages.findIndex(m => m.id === msgId); if (index === -1) return;
                setSelectedMsgId(null);
                const { doc, setDoc, serverTimestamp } = window.firebaseAPI;
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: "………" }, { merge: true });
                const historyBefore = messages.slice(0, index);
                const contents = historyBefore.map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                if (contents.length === 0 || contents[contents.length-1].role === 'model') contents.push({ role: 'user', parts: [{ text: "(다른 방식으로 대답해줘.)" }] });
                const newResponse = await fetchAPI(contents);
                if (newResponse && !newResponse.includes('시스템 에러')) {
                    const respTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: newResponse, time: respTime }, { merge: true });
                    if (index === messages.length - 1) await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: newResponse, updatedAt: serverTimestamp() }, { merge: true });
                }
            };

            const handleImageUploadUI = (e, type, setterType) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => setCropModalData({ src: event.target.result, type, setterType });
                reader.readAsDataURL(file); e.target.value = null; 
            };

            const saveSettings = () => {
                localStorage.setItem('gemini_api_key', geminiKey);
                localStorage.setItem('gemini_api_model', apiModel);
                setShowSettings(false); window.history.pushState({ page: 'main' }, ''); 
            };

            // UI 헬퍼
            const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

            // 🌟 탭 컨텐츠 렌더링 (안정화 패치)
            const activeContent = () => {
                if (activeTab === 'friends') return (
                    <div className="p-4 space-y-6">
                        <div><h2 className="text-xs text-gray-400 font-bold mb-3 px-1">내 프로필</h2><div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer transition-colors"><div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">{renderProfilePicCommon(myProfileImgUrl)}</div><div className="flex-1"><h3 className="font-bold text-gray-800">연지</h3><p className="text-xs text-gray-500 mt-0.5">{myStatus}</p></div></div></div>
                        <div className="h-px bg-gray-100 w-full opacity-50"></div>
                        <div><h2 className="text-xs text-gray-400 font-bold mb-3 px-1">친구 1</h2><div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer transition-colors"><div className="w-12 h-12 rounded-2xl bg-white border border-gray-100 flex items-center justify-center text-xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0"><h3 className="font-bold text-gray-800">데이다라</h3><p className="text-xs text-gray-500 mt-0.5 truncate">{deidaraStatus}</p></div></div></div>
                    </div>
                );
                if (activeTab === 'chat') return (
                    <div className="px-2 py-2">
                        {chatRooms.length===0?<div className="text-center text-gray-400 mt-10"><p>진행 중인 채팅방이 없습니다.</p></div>:chatRooms.map(room=>(<div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom'); window.history.pushState({ page: 'chatRoom' }, '');}} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer relative group"><div className="w-14 h-14 rounded-[20px] bg-white border border-gray-100 flex items-center justify-center text-2xl overflow-hidden flex-shrink-0">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 pr-8"><h3 className="font-bold text-gray-800 truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방!"}</p></div><button onClick={(e) => { e.stopPropagation(); if(window.confirm("채팅방을 삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="absolute right-4 p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><IconTrash /></button></div>))}
                    </div>
                );
                if (activeTab === 'feed') return (
                    <div className="bg-gray-100 min-h-full pb-10">
                        <div className="bg-white p-4 mb-3 shadow-sm">
                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-gray-100 focus:bg-white transition-all" rows="3"></textarea>
                            <div className="flex justify-between items-center mt-2">
                                <button onClick={handleDeidaraNewPost} className="text-xs font-bold text-orange-500 bg-orange-50 px-3 py-2 rounded-lg hover:bg-orange-100 transition-colors">피드 업데이트</button>
                                <button onClick={handleAddPost} disabled={!postInput.trim()} className={`px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition ${postInput.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-400'}`}>올리기</button>
                            </div>
                        </div>
                        {isPosting && <div className="text-center py-4 text-xs text-gray-500 animate-pulse">업데이트 중...</div>}
                        <div className="space-y-3 px-3">
                            {posts.map(post=>(
                                <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim">
                                    <button onClick={() => { if(window.confirm("게시물을 삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-sm transition-colors"><IconTrash /></button>
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-10 h-10 rounded-full overflow-hidden flex items-center justify-center border border-gray-100 shadow-sm">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                        <div><div className="font-bold text-[14px] text-gray-800">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400">{post.createdAt?new Date(post.createdAt.toDate()).toLocaleString():'방금 전'}</div></div>
                                    </div>
                                    <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p>
                                    <div className="bg-gray-50 rounded-xl p-3">
                                        <div className="text-[11px] font-bold text-gray-500 mb-3 ml-1">댓글 {(post.comments||[]).length}개</div>
                                        <div className="space-y-3 mb-3">
                                            {(post.comments||[]).map((c,i)=>(
                                                <div key={i} className="flex gap-2 relative group items-start">
                                                    <div className="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 border border-gray-200 shadow-sm">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                    <div className="flex flex-col flex-1 pb-1">
                                                        <span className="font-bold text-[12px] text-gray-800">{c.author==='me'?'연지':'데이다라'}</span>
                                                        <span className="text-[12px] text-gray-600 break-words pr-5">{c.content}</span>
                                                    </div>
                                                    <button onClick={()=>{if(window.confirm("댓글을 삭제할까요?")) window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`), { comments: window.firebaseAPI.arrayRemove(c) }); }} className="absolute right-0 top-0 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 mt-2 items-center">
                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 달기..." className="flex-1 bg-white border border-gray-100 rounded-lg px-3 py-1.5 text-xs outline-none shadow-inner" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post.id)} /><button onClick={()=>handleAddComment(post.id)} className={`font-bold text-xs px-3 py-1.5 rounded-lg transition-colors ${commentInputs[post.id]?.trim()?'bg-blue-500 text-white':'bg-gray-200 text-gray-500'}`}>{commentInputs[post.id]?.trim()?'게시':'호출'}</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
                return null;
            };

            // 🌟 조건부 렌더링 시작
            if (view === 'login') return (
                <div className="fixed inset-0 flex flex-col shadow-2xl bg-[#BACEE0] items-center justify-center p-6">
                    <div className="w-24 h-24 rounded-3xl bg-white flex items-center justify-center border border-gray-200 shadow-lg mb-6 overflow-hidden">
                        <img src="icon-192x192.png" className="w-full h-full object-cover" onError={e => e.target.src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>'} />
                    </div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2 font-['Pretendard'] tracking-tighter">DeiTalk</h1>
                    <p className="text-gray-600 mb-10 text-sm font-medium text-center">데이다라와 대화를 시작해 보세요</p>
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white text-gray-800 font-bold py-4 rounded-2xl shadow-md border border-gray-100 hover:bg-gray-50 transition-colors font-['Pretendard']">구글로 시작하기</button>
                </div>
            );

            if (view === 'chatRoom') return (
                <div className="fixed inset-0 flex flex-col bg-[#BACEE0] overflow-hidden slide-in">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={data => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(data); else setMyBgImgUrl(data);} else { if(cropModalData.type==='profile')setProfileImgUrl(data); else setBgImgUrl(data); } setCropModalData(null); }} onCancel={()=>setCropModalData(null)} />}
                    {profileTarget && <ProfileModal />}
                    <header className="flex items-center justify-between px-3 py-3 bg-[#BACEE0] bg-opacity-95 sticky top-0 z-20 shadow-sm border-b border-black/5">
                        <div className="flex items-center gap-2">
                            <button onClick={() => { setView('main'); window.history.pushState({ page: 'main' }, ''); }} className="p-2 text-gray-700 rounded-full hover:bg-white/20"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-10 h-10 rounded-xl bg-white border border-orange-200 cursor-pointer overflow-hidden">{renderProfilePicCommon(profileImgUrl)}</div>
                            <h1 className="font-bold text-[16px] text-gray-800 ml-1">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                        </div>
                    </header>
                    <main className="flex-1 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar pb-24">
                        {messages.map((msg, index) => {
                            const date = msg.date || (msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long'}) : "");
                            const showDateLine = index === 0 || date !== (messages[index-1].date || (messages[index-1].createdAt?.toDate ? messages[index-1].createdAt.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long'}) : ""));
                            return (
                                <React.Fragment key={msg.id}>
                                    {showDateLine && <div className="flex justify-center my-4"><span className="text-[10px] text-gray-500 bg-black/5 px-3 py-1 rounded-full">{date}</span></div>}
                                    <div className={`flex flex-col msg-anim ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 border border-gray-100 mt-3 cursor-pointer overflow-hidden">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col">
                                                {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold font-['Pretendard']">데이다라</span>}
                                                <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div onClick={() => setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id)} className={`msg-bubble cursor-pointer px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm leading-relaxed ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-none' : 'bg-white rounded-tl-none'}`}>{msg.text}</div>
                                                    <span className="text-[9px] text-gray-500 mb-0.5 whitespace-nowrap">{msg.time}</span>
                                                </div>
                                            </div>
                                        </div>
                                        {selectedMsgId === msg.id && <div className={`flex gap-2 mt-1 px-1 ${msg.sender === 'me' ? 'mr-12' : 'ml-12'} animate-pulse`}>
                                            {msg.sender === 'me' ? <><button onClick={() => { const t = window.prompt("수정할 내용을 입력하세요.", msg.text); if(t) window.firebaseAPI.setDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`), { text: t }, { merge: true }); setSelectedMsgId(null); }} className="text-xs bg-white text-gray-700 px-2.5 py-1 rounded-lg shadow border">수정</button><button onClick={() => { if(window.confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`)); setSelectedMsgId(null); }} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow border">삭제</button></> : <><button onClick={() => handleRegenerateMsg(msg.id)} className="text-xs bg-white text-blue-600 px-2.5 py-1 rounded-lg shadow border">재생성</button><button onClick={() => { if(window.confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msg.id}`)); setSelectedMsgId(null); }} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow border">삭제</button></>}
                                        </div>}
                                    </div>
                                </React.Fragment>
                            );
                        })}
                        {isTyping && <div className="animate-pulse ml-11 bg-white/70 px-3 py-2 rounded-2xl text-[12px] italic w-fit">작성 중……</div>}
                        <div ref={chatEndRef} />
                    </main>
                    <footer className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-100 pb-safe z-30">
                        <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="메시지 입력..." className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none font-['Pretendard']" />
                        <button onClick={handleSend} className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${inputText.trim() ? 'bg-[#FEE500]' : 'bg-yellow-100 text-yellow-600'}`}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </footer>
                </div>
            );

            if (view === 'main') return (
                <div className="fixed inset-0 flex flex-col bg-gray-50 overflow-hidden">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={data => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(data); else setMyBgImgUrl(data);} else { if(cropModalData.type==='profile')setProfileImgUrl(data); else setBgImgUrl(data); } setCropModalData(null); }} onCancel={()=>setCropModalData(null)} />}
                    {profileTarget && <ProfileModal />}
                    {showSettings && <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll"><h2 className="text-xl font-bold mb-4 font-['Pretendard']">앱 설정</h2><h3 className="font-bold text-gray-800 mb-2 font-['Pretendard']">알림 설정</h3><div className="flex items-center justify-between mb-4 bg-gray-50 px-4 py-3 rounded-xl border border-gray-100"><span className="text-sm font-bold text-gray-800">푸시 알림 받기</span><div className="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in"><input type="checkbox" id="toggle" checked={notifEnabled} onChange={(e) => { setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); if(e.target.checked) requestNotificationPermission(); }} className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer" /><label htmlFor="toggle" className="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label></div></div><h3 className="font-bold text-gray-800 mb-2">API 설정</h3><p className="text-xs text-gray-500 mb-1">API 모델 선택</p><select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-3 outline-none text-sm bg-white"><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-2.5-pro">Gemini 2.5 Pro</option></select><p className="text-xs text-gray-500 mb-1">Gemini API 키</p><input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-6 outline-none text-sm font-sans" placeholder="API 키 입력..." /><button onClick={saveSettings} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3 shadow-md">저장하기</button><button onClick={() => { handleLogout(); setShowSettings(false); }} className="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl transition-colors active:bg-gray-200">로그아웃</button></div></div>}
                    
                    <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20 shadow-sm font-['Pretendard']">
                        <h1 className="font-extrabold text-xl text-gray-800 tracking-tight">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                        <div className="flex gap-3">
                            <button onClick={() => { setShowSettings(true); window.history.pushState({ page: 'modal' }, ''); }} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                            {activeTab==='chat'&&<button onClick={() => { const n = window.prompt("방 이름을 입력하세요."); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), { name: n, updatedAt: window.firebaseAPI.serverTimestamp() }); }} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full active:scale-90 transition-transform"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {activeContent()}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] font-['Pretendard']">
                        <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='friends'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-semibold">친구</span></div>
                        <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='chat'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-semibold tracking-tighter">채팅</span></div>
                        <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='feed'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-semibold tracking-tighter">게시물</span></div>
                    </nav>
                </div>
            );
            return null;
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
