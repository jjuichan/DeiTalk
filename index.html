        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 널 친한 동생으로만 본다 생각해서 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌이며 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격이며 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 과하게 문장부호를 남발하지 않는다면 물음표, 느낌표, 물결표 등을 자유롭게 사용해도 됨.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        // 이미지 압축 로직 (1MB 제한)
        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeDateStr = (ts) => {

            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }

        // 🌟 [복구 1] 하얀 화면 원인 1: 렌더링에 필수적인 프로필 이미지 출력 함수가 잘려있어 복구했습니다.

        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {

                            {isEditingProfile && isMe ? <input type="text" defaultValue={editStatus} onBlur={(e) => { setEditStatus(e.target.value); setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center shadow-inner outline-none" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}

                            {isEditingProfile ? <button onClick={() => { window.history.back(); }} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white text-3xl">💬</div><span className="text-[12px] font-bold tracking-wider text-shadow">1:1 채팅</span></div>}

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);

            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showAttachMenu, setShowAttachMenu] = useState(false);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');

            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingMessageText, setEditingMessageText] = useState('');
            const [editingPostId, setEditingPostId] = useState(null);
            const [editingPostText, setEditingPostText] = useState('');
            const [editingCommentInfo, setEditingCommentInfo] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);

            const chatEndRef = useRef(null);
            const chatFileInputRef = useRef(null);
            const feedFileInputRef = useRef(null);
            const cropCanvasRef = useRef(null);

            // 초기화
            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration} 동안 통화함]` });
                    else if (m.text) parts.push({ text: m.text });
                    else if (m.imageUrl) parts.push({ text: "[사진 전송됨]" });
                    if (m.imageUrl) parts.push({ inlineData: { mimeType: m.imageUrl.includes('image/png') ? 'image/png' : 'image/jpeg', data: m.imageUrl.split(',')[1] } });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                let lastError = "";
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error((data.error && data.error.message) || "API Error");
                        const candidate = data.candidates?.[0];
                        if (!candidate) return "(말문이 막힌 듯하다.)";
                        let generatedText = candidate.content?.parts?.[0]?.text || "";
                        generatedText = generatedText.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                        generatedText = generatedText.replace(/\.\s*([ㄱ-ㅎ]+)/g, ' $1').replace(/([ㄱ-ㅎ]+)\./g, '$1');
                        return generatedText;
                    } catch (err) { lastError = err.message; await new Promise(r => setTimeout(r, 1500)); }
                }
                return `통신 장애 났다. 음! (원인: ${lastError})`;
            };

            const generateImageAPI = async (theme) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${geminiKey}`;
                const payload = { instances: [{ prompt: `A photorealistic casual smartphone snapshot. Subject: ${theme || 'daily life'}. No text.` }], parameters: { sampleCount: 1 } };
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                return await compressBase64Image(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
            };

            // 🌟 2. 채팅방 이름 수정 기능 확실하게 배치
            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("새로운 채팅방 이름을 입력하세요.", currentName);
                if (newName && newName.trim() !== currentName) {
                    const { doc: fdoc, updateDoc } = window.firebaseAPI;
                    await updateDoc(fdoc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: `(시스템 지침: 네가 방금 한 말에 이어서 한 마디 더 덧붙여봐.)` }] });
                    const resp = await fetchAPI(history, SYSTEM_PROMPT);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                    setIsTyping(false); return;
                }
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const handleCallSubmit = async () => {
                if(!callContent.trim()) { alert("통화 내용을 써줘!"); return; }
                setShowCallModal(false); setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: callCaller, type: 'call', duration: callDuration, time, date, createdAt: serverTimestamp() });
                const history = buildHistory(messages, 100);
                history.push({ role: 'user', parts: [{ text: `(시스템 지침: 방금 너랑 나랑 ${callDuration} 동안 통화했어. 내용은 "${callContent}" 였어. 통화 직후의 반응을 카톡으로 보내줘.)` }] });
                const resp = await fetchAPI(history);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                setIsTyping(false); setCallContent('');
            };

            const handleAddPost = async () => {
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const myContent = postInput.trim();
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: myContent, imageUrl: feedAttachedImage || null, createdAt: serverTimestamp(), comments: [] });
                    setPostInput(''); setFeedAttachedImage(null);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어. 내용은 "${myContent || '(사진만 있음)'}" 야. 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                } finally { setIsPosting(false); }
            };

            const handleAddComment = async (post) => {
                const postId = post.id; const commentText = commentInputs[postId]?.trim(); 
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) {
                    setIsPosting(true);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `데이다라, 연지의 피드 "${post.content || ''}"에 댓글 남겨줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''})); setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 남겨줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { setCropModalData({ src: event.target.result, type: type, setterType: target }); };
                reader.readAsDataURL(file); e.target.value = '';
            };

            const handleFeedPhotoAttach = async (e) => {
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                const b64 = await compressImage(file); setFeedAttachedImage(b64);
            };

            const handleDeidaraNewPost = async () => {
                const theme = prompt("피드 주제? (이타치 험담 등)"); if (theme === null) return;
                setIsPosting(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                try {
                    let b64 = null; if (theme) b64 = await generateImageAPI(theme);
                    const resp = await fetchAPI([{role:'user', parts:[{text:'SNS 피드 하나 작성해줘.'}]}], `${SYSTEM_PROMPT}\n네 일상을 피드에 짧게 남겨봐.`);
                    await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'deidara', content: resp, imageUrl: b64, createdAt: serverTimestamp(), comments: [] });
                } catch (e) { setAlertMsg("이미지 생성 실패"); } finally { setIsPosting(false); }
            };

            // 🌟 [복구 2] 하얀 화면 원인 2: 사진 전송 및 사진 요구 함수가 없어서 크래시 났던 것 완벽 복구
            const handleChatUploadMyPhoto = async (e) => {
                const file = e.target.files[0]; if(!file) return; e.target.value = '';
                setShowAttachMenu(false); setIsTyping(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (ev) => {
                    const b64 = await compressBase64Image(ev.target.result);
                    const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                    const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: '', imageUrl: b64, time, date, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: '[사진]', updatedAt: serverTimestamp() }, { merge: true });
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "사진 보냈어." }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 연지가 방금 사진을 보냈어. 이 사진을 보고 어떻게 반응할지 틱틱거리며 대답해봐. 부끄러운 사진이라면 당황해.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, time, date, createdAt: serverTimestamp() });
                    setIsTyping(false);
                };
            };

            const handleRequestDeidaraPhoto = async () => {
                setShowAttachMenu(false);
                const theme = prompt("데이다라에게 어떤 사진을 요구할까요?\n(예: 과제물, 풍경 등)\n빈칸으로 두면 일상 사진을 알아서 보냅니다.");
                if (theme === null) return;
                setIsTyping(true);
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                const myAskText = theme ? `야, ${theme} 사진 좀 보내봐.` : `지금 뭐해? 사진 좀 보내봐.`;
                try {
                    const b64Image = await generateImageAPI(theme);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{text: myAskText}] });
                    const textResp = await fetchAPI(history, `${SYSTEM_PROMPT}\n(지침: 방금 연지가 위 내용처럼 사진을 요구했어. 요청에 맞는 사진을 찍어 보내면서 틱틱대며 한 마디 덧붙여봐.)`);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: textResp, imageUrl: b64Image, time, date, createdAt: serverTimestamp() });
                } catch (err) { setAlertMsg(`이미지 생성 오류: ${err.message}`); } finally { setIsTyping(false); }
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0] relative">
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-md font-bold active:scale-95 transition-transform">구글로 시작하기</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-gray-50'} overflow-hidden relative`}>
                    {/* 모달 레이어 - 프로필 모달 포함 */}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {alertMsg && <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/50 p-4"><div className="bg-white rounded-2xl p-6 shadow-xl text-center max-w-sm w-full"><p className="mb-5 text-sm text-gray-800 font-bold whitespace-pre-wrap">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="px-6 py-2 bg-[#FEE500] rounded-full font-bold text-sm w-full">확인</button></div></div>}
                    
                    {showCallModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-lg font-bold mb-4">📞 통화 기록 남기기</h2>
                                <div className="space-y-4 mb-6">
                                    <select value={callCaller} onChange={e=>setCallCaller(e.target.value)} className="w-full border border-gray-100 rounded-xl px-4 py-3 bg-gray-50 text-sm outline-none font-semibold">
                                        <option value="me">내가 (연지)</option><option value="deidara">데이다라가</option>
                                    </select>
                                    <input type="text" value={callDuration} onChange={e=>setCallDuration(e.target.value)} className="w-full border border-gray-100 rounded-xl bg-gray-50 px-4 py-3 text-sm outline-none font-semibold" placeholder="0:08" />
                                    <textarea value={callContent} onChange={e=>setCallContent(e.target.value)} placeholder="데이다라가 짜증냈음" className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-sm h-28 resize-none outline-none font-semibold" />
                                </div>
                                <div className="flex gap-3"><button onClick={()=>setShowCallModal(false)} className="flex-1 py-4 rounded-2xl bg-gray-100 font-bold text-gray-500 active:scale-95 transition-all">취소</button><button onClick={handleCallSubmit} className="flex-1 py-4 rounded-2xl bg-blue-500 text-white font-bold active:scale-95 transition-all">기록 완료</button></div>
                            </div>
                        </div>
                    )}

                    {showSettings && <div className="fixed inset-0 z-[2500] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                        <h2 className="text-xl font-bold mb-4">설정</h2>
                        <div className="flex items-center justify-between mb-6 bg-gray-50 px-4 py-3 rounded-2xl border border-gray-100"><span className="text-sm font-bold text-gray-700 font-semibold">푸시 알림</span><input type="checkbox" checked={notifEnabled} onChange={e=>{ setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked); }} className="w-5 h-5" /></div>
                        <p className="text-xs mb-1 font-bold text-gray-400 ml-1">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 mb-6 outline-none text-sm font-semibold" />
                        <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 shadow-sm active:scale-95 transition-transform text-gray-900">설정 저장</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-transform">로그아웃</button>
                    </div></div>}

                    {/* 상단 헤더 */}
                    {view === 'main' ? (
                        <header className="px-5 py-5 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-20 shadow-sm backdrop-blur-md bg-white/90">
                            <h1 className="font-extrabold text-xl tracking-tight text-gray-900">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                            <div className="flex gap-5">
                                <button onClick={() => setShowSettings(true)} className="text-xl active:scale-90 transition-transform">⚙️</button>
                                {activeTab==='chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }} className="text-xl active:scale-90 transition-transform">➕</button>}
                            </div>
                        </header>
                    ) : (
                        <header className="px-3 py-3 flex items-center gap-2 border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md">
                            <button onClick={() => setView('main')} className="p-2 active:bg-black/5 rounded-full transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-700"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-10 h-10 rounded-[14px] bg-white overflow-hidden border border-orange-100 cursor-pointer shadow-sm active:scale-95 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>
                            <h1 className="font-bold text-gray-800 text-lg ml-1 truncate tracking-tight">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                        </header>
                    )}

                    {/* 메인 컨텐츠 영역 */}
                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-6 py-5 border-b border-gray-50">
                                            <div className="text-[10px] font-bold text-gray-400 mb-4 ml-1 uppercase tracking-widest font-black">My Profile</div>
                                            <div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[68px] h-[68px] rounded-[26px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-xl tracking-tight">연지</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-6 py-5">
                                            <div className="text-[10px] font-bold text-gray-400 mb-4 ml-1 uppercase tracking-widest font-black">Friends</div>
                                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[60px] h-[60px] rounded-[22px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[18px] tracking-tight">데이다라</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-4 space-y-4">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); window.history.pushState({ page: 'chatRoom' }, ''); }} className="flex items-center gap-5 p-4 bg-white border border-gray-100 rounded-[36px] cursor-pointer active:scale-[0.98] transition-all shadow-sm relative">
                                                <div className="w-[58px] h-[58px] rounded-[22px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-24"><h3 className="font-bold text-gray-900 text-[17px] truncate tracking-tight">{room.name}</h3><p className="text-[13px] text-gray-500 truncate mt-1.5 font-medium leading-tight">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                
                                                <div className="absolute right-6 flex gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="p-3 text-blue-500 bg-blue-50/50 rounded-2xl active:scale-90 transition-transform font-bold text-lg">✎</button>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("방을 삭제할까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="p-3 text-red-400 bg-red-50/50 rounded-2xl active:scale-90 transition-transform font-bold text-lg">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100 pb-20">
                                        <div className="bg-white p-10 mb-8 shadow-sm border-b border-gray-100">
                                            {feedAttachedImage && <div className="relative inline-block mb-6"><img src={feedAttachedImage} className="w-32 h-32 object-cover rounded-[32px] shadow-md border border-gray-100" /><button onClick={() => setFeedAttachedImage(null)} className="absolute -top-2 -right-2 bg-gray-900 text-white rounded-full w-8 h-8 font-black flex items-center justify-center shadow-lg active:bg-red-500">✕</button></div>}
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="지금 이 기분, 데이다라한테 들려주기...!" className="w-full bg-gray-50 rounded-[32px] p-7 text-[16px] outline-none resize-none border-2 border-transparent focus:bg-white focus:border-gray-100 transition-all font-['Pretendard'] font-semibold" rows="4" />
                                            <div className="flex justify-between items-center mt-6 px-1">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-4.5 bg-gray-100 hover:bg-gray-200 text-gray-500 rounded-[24px] transition-colors active:scale-95 shadow-sm"><div className="w-7 h-7"><IconCamera /></div></button>
                                                <input type="file" accept="image/*" ref={feedFileInputRef} onChange={handleFeedPhotoAttach} className="hidden" />
                                                <button onClick={handleAddPost} disabled={isPosting} className={`px-16 py-4.5 rounded-[28px] text-[16px] font-black shadow-xl transition-all tracking-tight ${isPosting ? 'bg-gray-300 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white active:scale-95'}`}>올리기</button>
                                            </div>
                                        </div>

                                        <div className="space-y-12 px-8 pb-32">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-[56px] shadow-sm p-10 relative msg-anim border border-gray-100/50">
                                                    <div className="flex items-center gap-5 mb-8">
                                                        <div onClick={() => { setProfileTarget(post.author==='me'?'me':'deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-15 h-15 rounded-full overflow-hidden border border-gray-100 shadow-sm cursor-pointer active:scale-95 shrink-0 transition-transform">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-black text-[19px] text-gray-900 tracking-tighter">{post.author==='me'?'연지':'데이다라'}</div>
                                                            <div className="text-[11px] text-gray-400 font-black uppercase mt-1 tracking-widest">{safeDateStr(post.createdAt)}</div>
                                                        </div>
                                                        <div className="flex gap-3">
                                                            <button onClick={() => { setEditingPostId(post.id); setEditingPostText(post.content); }} className="p-2 text-gray-300 hover:text-blue-500 transition-colors"><div className="w-5 h-5"><IconEdit /></div></button>
                                                            <button onClick={() => { if(confirm("삭제할까요?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="p-2 text-gray-300 hover:text-red-500 transition-colors"><div className="w-5 h-5"><IconTrash /></div></button>
                                                        </div>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-[40px] mb-8 shadow-md active:scale-[0.99] transition-transform border border-gray-50" />}
                                                    {post.content && <p className="text-[17px] text-gray-800 leading-relaxed mb-10 whitespace-pre-wrap pr-4 font-bold tracking-tight">{post.content}</p>}
                                                    
                                                    <div className="bg-gray-50 rounded-[44px] p-8 border border-gray-100 shadow-inner">
                                                        <div className="text-[11px] font-black text-gray-400 mb-6 ml-3 uppercase tracking-[0.2em]">Comments</div>
                                                        <div className="space-y-7 mb-10">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-4.5 items-start">
                                                                    <div className="w-[40px] h-[40px] rounded-full overflow-hidden border border-gray-100 shadow-sm bg-white shrink-0 mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1 pr-4">
                                                                        <span className="font-black text-[14px] text-gray-900 mb-1 tracking-tight">{c.author==='me'?'연지':'데이다라'}</span>
                                                                        <span className="text-[15px] text-gray-700 leading-snug font-bold tracking-tight">{c.content}</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-3 items-center">
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글로 한 마디 건네기..." className="flex-1 bg-white border border-gray-200 rounded-[28px] px-7 py-4.5 text-[15px] outline-none shadow-sm focus:border-gray-300 transition-colors font-bold" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-black text-[15px] px-9 py-4.5 bg-gray-900 text-white rounded-[28px] active:scale-95 transition-all shadow-xl">게시</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar pb-24 relative" onClick={() => setShowAttachMenu(false)}>
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-10 h-10 rounded-[14px] bg-white mr-3 flex-shrink-0 overflow-hidden border border-orange-50 shadow-sm cursor-pointer active:scale-90 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[12px] text-gray-600 mb-1.5 ml-1 font-bold tracking-tight uppercase font-black">Deidara</span>}
                                                <div className={`flex flex-col items-${msg.sender === 'me' ? 'end' : 'start'} gap-2`}>
                                                    {msg.imageUrl && <img src={msg.imageUrl} onClick={() => setShowFullImage(msg.imageUrl)} className={`max-w-[240px] w-full h-auto rounded-[28px] shadow-sm border border-black/5 cursor-pointer active:opacity-90 ${msg.sender === 'me' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`} />}
                                                    {msg.type === 'call' ? (
                                                        <div className={`flex items-end gap-2.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                            <div className="px-6 py-4 rounded-[24px] shadow-sm flex items-center gap-3.5 border border-black/5 bg-white active:scale-95 transition-transform"><div className="w-6.5 h-6.5 text-gray-700"><IconPhoneFilled /></div><span className="text-[17px] font-black text-gray-800 tracking-tighter">{msg.duration}</span></div>
                                                            <span className="text-[10px] text-gray-500 mb-0.5 font-black uppercase">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                                        </div>
                                                    ) : (
                                                        msg.text && (
                                                            <div className={`flex items-end gap-2.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                                <div onClick={(e) => { e.stopPropagation(); setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id); setEditingMessageId(null); }} className={`px-5 py-3.5 rounded-[24px] text-[15px] shadow-sm cursor-pointer active:scale-[0.98] transition-transform font-bold tracking-tight ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-sm text-gray-900' : 'bg-white rounded-tl-sm border border-black/5 text-gray-800'}`}>{msg.text}</div>
                                                                <span className="text-[10px] text-gray-500 mb-0.5 font-black uppercase whitespace-nowrap">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                                            </div>
                                                        )
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-13 bg-white/70 px-5 py-3 rounded-2xl rounded-tl-sm text-[11px] w-fit animate-pulse shadow-sm text-gray-400 font-black border border-black/5 tracking-[0.2em] uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 네비게이션 및 푸터 (찌그러짐 방지) */}
                    {view === 'main' ? (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex justify-around items-center h-[82px] pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] backdrop-blur-md">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='friends'?'text-gray-900 scale-110':'text-gray-300 hover:text-gray-400'}`}><div className="w-[26px] h-[26px]"><IconTabFriend active={activeTab==='friends'} /></div><span className="text-[10px] font-black tracking-tighter uppercase">Home</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='chat'?'text-gray-900 scale-110':'text-gray-300 hover:text-gray-400'}`}><div className="w-[26px] h-[26px]"><IconTabChat active={activeTab==='chat'} /></div><span className="text-[10px] font-black tracking-tighter uppercase">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='feed'?'text-gray-900 scale-110':'text-gray-300 hover:text-gray-400'}`}><div className="w-[26px] h-[26px]"><IconTabFeed active={activeTab==='feed'} /></div><span className="text-[10px] font-black tracking-tighter uppercase">Feed</span></div>
                        </nav>
                    ) : (
                        <footer className="p-3.5 bg-white border-t border-gray-100 pb-safe flex flex-col relative z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                            {showAttachMenu && (
                                <div className="absolute bottom-[70px] left-3 bg-white border border-gray-100 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.2)] p-2.5 w-60 flex flex-col gap-1 z-40 slide-in">
                                    <button onClick={() => chatFileInputRef.current.click()} className="text-left px-5 py-4 text-[15px] font-bold text-gray-700 hover:bg-gray-50 rounded-2xl transition-colors">🖼️ 내 사진 보내기</button>
                                    <button onClick={handleRequestDeidaraPhoto} className="text-left px-5 py-4 text-[15px] font-bold text-blue-600 hover:bg-blue-50 rounded-2xl transition-colors">📸 데이다라 사진 요구</button>
                                    <input type="file" accept="image/*" ref={chatFileInputRef} onChange={handleChatUploadMyPhoto} className="hidden" />
                                </div>
                            )}
                            <div className="flex gap-3 items-center w-full px-1">
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-[38px] h-[38px] shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 active:scale-90 transition-all"><div className="w-[24px] h-[24px]"><IconCamera /></div></button>
                                <button onClick={() => { setShowCallModal(true); window.history.pushState({ page: 'callModal' }, ''); }} className="w-[38px] h-[38px] shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 active:scale-90 transition-all"><div className="w-[24px] h-[24px]"><IconPhoneOutline /></div></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 min-w-0 bg-gray-100 border border-transparent focus:bg-white focus:border-gray-200 rounded-full px-5 py-3 text-[15px] outline-none transition-all placeholder-gray-400 font-bold" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-[38px] h-[38px] shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 shadow-sm transition-transform"><div className="w-[20px] h-[20px] text-gray-800 ml-0.5"><IconSend /></div></button>
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
