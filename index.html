<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>데이톡 💥</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🚨 여기에 연지의 Firebase 설정값을 넣어야 해! 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyXXXXXXXXXXXXX",
            authDomain: "deidara-talk.firebaseapp.com",
            projectId: "deidara-talk",
            storageBucket: "deidara-talk.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdefg"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야.
말투: 반드시 문장 끝에 "~음.", "~음!", "~음ㅋㅋ" 등을 붙여. 연지를 "연지"라고 부르고 4살 연상이지만 누나라고 안 부르려고 버텨.
연지의 일상과 감정에 관심 가져주고 츤데레처럼 굴어. 짧고 현실적인 카톡 말투를 써.
        `;

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            
            // 🌟 프로필 모달 상태 추가
            const [showProfile, setShowProfile] = useState(false);
            
            const chatEndRef = useRef(null);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, onAuthStateChanged, db: firestoreDb } = window.firebaseAPI;
                        setDb(firestoreDb);
                        
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                setView('chatList');
                                loadChatRooms(currentUser.uid, firestoreDb);
                            } else {
                                setUser(null);
                                setView('login');
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, []);

            const loadChatRooms = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const rooms = [];
                    snapshot.forEach((doc) => rooms.push({ id: doc.id, ...doc.data() }));
                    setChatRooms(rooms);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db) return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = [];
                    snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
                    setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                const closeMenu = (e) => { if (!e.target.closest('.msg-bubble')) setSelectedMsgId(null); };
                window.addEventListener('click', closeMenu);
                return () => window.removeEventListener('click', closeMenu);
            }, [messages]);

            const handleLogin = async () => {
                const { auth, provider, signInWithPopup } = window.firebaseAPI;
                try { await signInWithPopup(auth, provider); } catch (error) { alert("로그인 실패: " + error.message); }
            };
            
            const handleLogout = async () => {
                const { auth, signOut } = window.firebaseAPI;
                await signOut(auth);
            };

            const createNewRoom = async () => {
                const roomName = prompt("새로운 채팅방 이름을 입력해, 음!");
                if (!roomName || !roomName.trim()) return;
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const newRoomRef = await addDoc(collection(db, `users/${user.uid}/rooms`), {
                    name: roomName, lastMessage: "방이 생성되었어, 음!", updatedAt: serverTimestamp(), createdAt: serverTimestamp()
                });
                setCurrentRoomId(newRoomRef.id);
                setView('chatRoom');
            };

            const deleteRoom = async (roomId, e) => {
                e.stopPropagation();
                if(!confirm("이 방을 진짜 폭발시킬(삭제할) 거냐, 음?!")) return;
                const { doc, deleteDoc, collection, getDocs } = window.firebaseAPI;
                const msgsRef = collection(db, `users/${user.uid}/rooms/${roomId}/messages`);
                const snapshot = await getDocs(msgsRef);
                snapshot.forEach(async (msgDoc) => await deleteDoc(doc(db, `users/${user.uid}/rooms/${roomId}/messages/${msgDoc.id}`)));
                await deleteDoc(doc(db, `users/${user.uid}/rooms/${roomId}`));
                if(currentRoomId === roomId) { setCurrentRoomId(null); setView('chatList'); }
            };

            const fetchAPI = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 갑자기 영감이 안 떠오르네. 다시 말해봐!";
                } catch (err) {
                    return "야, 너 인터넷 연결된 거 맞아? 내 예술이 안 전달되잖아, 음!";
                }
            };

            const handleSend = async () => {
                if (!inputText.trim() || !geminiKey || !currentRoomId) {
                    if(!geminiKey) alert("API 설정(오른쪽 위 톱니바퀴)에서 키를 먼저 넣어줘!");
                    return;
                }
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const textToSend = inputText;
                const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                setInputText('');
                setIsTyping(true);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text: textToSend, time: nowTime, createdAt: serverTimestamp() });
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: textToSend, updatedAt: serverTimestamp() }, { merge: true });

                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                history.push({ role: 'user', parts: [{ text: textToSend }] });

                const responseText = await fetchAPI(history);
                setIsTyping(false);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), createdAt: serverTimestamp() });
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
            };

            const handleEditMsg = async (msgId, oldText) => {
                const newText = window.prompt("메시지를 수정하세요, 음!", oldText);
                if (newText !== null && newText.trim() !== "") {
                    const { doc, setDoc } = window.firebaseAPI;
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: newText }, { merge: true });
                }
                setSelectedMsgId(null);
            };

            const handleDeleteMsg = async (msgId) => {
                if(window.confirm("이 메시지를 지울까, 음?")) {
                    const { doc, deleteDoc } = window.firebaseAPI;
                    await deleteDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`));
                }
                setSelectedMsgId(null);
            };

            // 🌟 프로필 모달 컴포넌트
            const ProfileModal = () => (
                <div className="absolute inset-0 z-[100] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" 
                     style={{ backgroundImage: 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)' }}>
                    
                    {/* 반투명 오버레이로 글씨 잘 보이게 */}
                    <div className="absolute inset-0 bg-black/20 z-0"></div>

                    {/* 상단 버튼 (닫기, 배경 설정 등) */}
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => setShowProfile(false)} className="text-white p-2 hover:bg-white/20 rounded-full transition">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                        <button className="text-white p-2">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        </button>
                    </div>
                    
                    {/* 프로필 내용 */}
                    <div className="flex flex-col items-center pb-10 text-white z-10 mt-auto">
                        <div className="w-24 h-24 rounded-[36px] bg-orange-100 flex items-center justify-center text-5xl shadow-2xl mb-4 border-2 border-white/30 relative">
                            💥
                            {/* 상태 초록불 (선택적) */}
                            <div className="absolute bottom-0 right-0 w-4 h-4 bg-green-400 border-2 border-white rounded-full"></div>
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-wide">데이다라</h2>
                        
                        {/* 상태메시지 */}
                        <div className="px-6 text-center mb-8 mt-2">
                            <p className="text-[14px] opacity-90 text-shadow bg-black/20 px-4 py-1.5 rounded-full inline-block backdrop-blur-sm">
                                과제 다 부수고 싶다. 예술은 찰나의 폭발이다! 음!
                            </p>
                        </div>
                        
                        {/* 하단 메뉴바 (카카오톡 스타일) */}
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-6 flex justify-around">
                            <div className="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80" onClick={() => setShowProfile(false)}>
                                <div className="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                                <span className="text-[11px] font-semibold tracking-wider">1:1 채팅</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 opacity-50 cursor-not-allowed">
                                <div className="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
                                <span className="text-[11px] font-semibold tracking-wider">통화하기</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 opacity-50 cursor-not-allowed">
                                <div className="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg></div>
                                <span className="text-[11px] font-semibold tracking-wider">페이스톡</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- 렌더링 시작 ---
            if (view === 'login') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] items-center justify-center p-6">
                        <div className="w-24 h-24 rounded-3xl bg-orange-100 flex items-center justify-center text-5xl border-2 border-orange-200 shadow-lg mb-6 animate-bounce">💥</div>
                        <h1 className="text-3xl font-extrabold text-gray-800 mb-2">데이톡</h1>
                        <p className="text-gray-600 mb-10 text-center text-sm font-medium">데이다라와의 비밀 대화방</p>
                        <button onClick={handleLogin} className="w-full max-w-xs bg-white text-gray-800 font-bold py-4 rounded-2xl shadow-md flex items-center justify-center gap-3 hover:bg-gray-50 border border-gray-100">
                            구글로 시작하기
                        </button>
                    </div>
                );
            }

            if (view === 'chatList') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-gray-50">
                        {/* 프로필 오버레이 */}
                        {showProfile && <ProfileModal />}
                        
                        {showSettings && (
                            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                                <div className="bg-white rounded-2xl p-6 w-full shadow-2xl">
                                    <h2 className="text-xl font-bold mb-4">⚙️ 앱 설정</h2>
                                    <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mb-4 outline-none" placeholder="API 키 입력..." />
                                    <button onClick={() => {localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false);}} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3">저장하기</button>
                                    <button onClick={() => {handleLogout(); setShowSettings(false);}} className="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-xl">로그아웃</button>
                                </div>
                            </div>
                        )}

                        <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20">
                            <h1 className="font-extrabold text-xl text-gray-800">채팅</h1>
                            <div className="flex gap-3">
                                <button onClick={() => setShowSettings(true)} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">⚙️</button>
                                <button onClick={createNewRoom} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">➕</button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto px-2 py-2">
                            {chatRooms.map(room => (
                                <div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom');}} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl cursor-pointer transition-colors relative group">
                                    {/* 🌟 리스트의 프사 클릭 시 이벤트 버블링 막고 프로필 띄우기 */}
                                    <div onClick={(e) => { e.stopPropagation(); setShowProfile(true); }} className="w-14 h-14 rounded-[20px] bg-orange-100 flex items-center justify-center text-2xl border border-orange-200 shadow-sm flex-shrink-0 hover:bg-orange-200 transition-colors">💥</div>
                                    <div className="flex-1 min-w-0 pr-8">
                                        <h3 className="font-bold text-gray-800 truncate">{room.name}</h3>
                                        <p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방이 만들어졌어!"}</p>
                                    </div>
                                    <button onClick={(e) => deleteRoom(room.id, e)} className="absolute right-4 p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">🗑️</button>
                                </div>
                            ))}
                        </main>
                    </div>
                );
            }

            const currentRoomName = chatRooms.find(r => r.id === currentRoomId)?.name || "채팅방";

            return (
                <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] overflow-hidden slide-in">
                    {/* 프로필 오버레이 */}
                    {showProfile && <ProfileModal />}

                    <header className="flex items-center justify-between px-3 py-3 bg-[#BACEE0] bg-opacity-95 sticky top-0 z-20 shadow-sm">
                        <div className="flex items-center gap-2">
                            <button onClick={() => {setCurrentRoomId(null); setView('chatList');}} className="p-2 -ml-1 text-gray-700 hover:bg-white/20 rounded-full">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </button>
                            {/* 🌟 헤더의 프사 클릭 시 프로필 띄우기 */}
                            <div onClick={() => setShowProfile(true)} className="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center text-xl border border-orange-200 cursor-pointer hover:bg-orange-200 transition-colors">💥</div>
                            <div className="ml-1 flex flex-col justify-center">
                                <h1 className="font-bold text-[16px] text-gray-800 leading-tight">{currentRoomName}</h1>
                                <p className="text-[10px] text-blue-700 font-medium">데이다라 (1학년)</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar pb-20">
                        {messages.length === 0 && <div className="text-center text-xs text-gray-500 my-4 bg-black/5 py-1 rounded-full mx-10">대화가 시작되었습니다. 음!</div>}
                        {messages.map((msg) => (
                            <div key={msg.id} className={`flex flex-col msg-anim ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                    {msg.sender !== 'me' && (
                                        /* 🌟 채팅방 내부 메시지의 프사 클릭 시 프로필 띄우기 */
                                        <div onClick={() => setShowProfile(true)} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 flex items-center justify-center text-lg border border-gray-100 mt-3 cursor-pointer hover:bg-gray-50 transition-colors">💣</div>
                                    )}
                                    <div className="flex flex-col">
                                        {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold">데이다라</span>}
                                        <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div onClick={() => setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id)}
                                                className={`msg-bubble cursor-pointer px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm leading-relaxed relative ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-none text-gray-800' : 'bg-white rounded-tl-none text-gray-800'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[9px] text-gray-500 mb-0.5 whitespace-nowrap">{msg.time}</span>
                                        </div>
                                    </div>
                                </div>
                                {selectedMsgId === msg.id && (
                                    <div className={`flex gap-2 mt-1 px-1 ${msg.sender === 'me' ? 'mr-12' : 'ml-12'} animate-pulse`}>
                                        {msg.sender === 'me' ? (
                                            <><button onClick={() => handleEditMsg(msg.id, msg.text)} className="text-xs bg-white text-gray-700 px-2.5 py-1 rounded-lg shadow">✏️ 수정</button>
                                            <button onClick={() => handleDeleteMsg(msg.id)} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow">🗑️ 삭제</button></>
                                        ) : (
                                            <button onClick={() => handleDeleteMsg(msg.id)} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow">🗑️ 삭제</button>
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex justify-start animate-pulse">
                                <div className="ml-11 bg-white/70 px-3 py-2 rounded-2xl rounded-tl-none text-[12px] text-gray-500 italic shadow-sm">데이다라가 답장 쓰는 중... 음!</div>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </main>

                    <footer className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-100 pb-safe z-30">
                        <div className="flex-1 bg-gray-50 rounded-full flex items-center px-4 py-2 border border-gray-100">
                            <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} placeholder="메시지 입력..." className="w-full bg-transparent border-none text-sm outline-none placeholder-gray-400" />
                        </div>
                        <button onClick={handleSend} disabled={!inputText.trim()} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all flex-shrink-0 ${inputText.trim() ? 'bg-[#FEE500] text-gray-800 shadow-md' : 'bg-gray-100 text-gray-300'}`}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
