        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }

<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 1년 전 온라인에서 만났고 지금은 한국-일본 롱디 썸을 타는 중이야.
사소리는 도쿄 예술대학 조소과 교수야. 그 외 원작에 등장하는 주변 인물들도 적당한 관계의 친구 혹은 지인으로 상정해.

[성격 및 관계 지침 (캐붕 절대 방지)]
- 데이다라 특유의 다혈질, 호전성, 예술(폭발)에 대한 미친 자부심과 긍지를 반드시 유지해.
- 너무 과하게 스윗하거나 다정한 말, 오글거리는 대사는 절대 금지! 본질은 건방지고 틱틱대는 츤데레야.
- 4살 연상이지만 절대 누나라고 부르지 않고 "연지", "너", "어이" 라고 건방지게 불러.
- 상대방을 지칭할 때 '네가', '네' 대신 현실감을 위해 '니가', '니'를 사용해. (예: "니가 뭔데", "니 과제는 다 했냐")

[말투 및 현실감 지침]
- 진짜 카톡이나 SNS처럼 대답해. 항상 길고 완벽하게 완성된 문장을 쓸 필요 없어.
- 현실감을 위해 가끔 "뭐", "아니", "ㅇㅇ", "ㅋㅋ", "아", "?" 처럼 극단적인 단답이나 문장부호만으로 짧게 대답해도 좋아.
- 말버릇 '음' 사용 규칙 (매우 엄격하게 지킬 것):
  1. 기계처럼 매번 붙이지 마! 빈도를 대폭 줄여서 3~4번 말할 때 1번 정도만 가끔 붙여.
  2. 문장 중간이나 쉼표(,) 뒤에는 절대로 쓰지 마.
  3. 반드시 마침표(.), 물음표(?), 느낌표(!)로 문장이 완전히 끝난 뒤에 독립적으로 붙여. (예: "알았어. 음.", "뭐하냐? 음!")
        `;

        const DefaultAvatar = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const IconCamera = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>
            </svg>
        );

        const IconImage = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>
            </svg>
        );

        const IconTrash = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');

            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [profileTarget, setProfileTarget] = useState(null); 
            
            const chatEndRef = useRef(null);

            // 🌟 알림 권한 요청 및 표시 함수
            const requestNotificationPermission = () => {
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }
            };

            const notifyUser = (title, body) => {
                if (!("Notification" in window)) return;
                // document.hidden을 체크해서 다른 탭을 보거나 창을 내렸을 때만 알림 전송
                if (Notification.permission === "granted" && document.hidden) {
                    new Notification(title, {
                        body: body,
                        icon: profileImgUrl || "icon-192x192.png", // 데이다라 프사 활용
                        badge: "icon-192x192.png"
                    });
                }
            };

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, onAuthStateChanged, db: firestoreDb } = window.firebaseAPI;
                        setDb(firestoreDb);
                        
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                setView('main');
                                loadChatRooms(currentUser.uid, firestoreDb);
                                loadPosts(currentUser.uid, firestoreDb);
                                requestNotificationPermission(); // 로그인 성공 시 알림 권한 요청
                            } else {
                                setUser(null);
                                setView('login');
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(initTimer);
            }, []);

            const loadChatRooms = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const rooms = [];
                    snapshot.forEach((doc) => rooms.push({ id: doc.id, ...doc.data() }));
                    setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, firestoreDb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(firestoreDb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    const loadedPosts = [];
                    snapshot.forEach((doc) => loadedPosts.push({ id: doc.id, ...doc.data() }));
                    setPosts(loadedPosts);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = [];
                    snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
                    setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsubscribe();
            }, [currentRoomId, user, db, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                const maxRetries = 3; 
                
                let normalizedContents = [];
                let currentRole = null;
                
                for (const msg of contents) {
                    if (msg.role !== currentRole) {
                        normalizedContents.push({ role: msg.role, parts: [{ text: msg.parts[0].text }] });
                        currentRole = msg.role;
                    } else {
                        if(normalizedContents.length > 0) {
                            normalizedContents[normalizedContents.length - 1].parts[0].text += "\n" + msg.parts[0].text;
                        }
                    }
                }

                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: normalizedContents, systemInstruction: { parts: [{ text: customPrompt }] } }),
                            keepalive: true
                        });

                        if (!response.ok) {
                            if (response.status >= 500 && attempt < maxRetries - 1) {
                                await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
                                continue;
                            }
                            const errData = await response.json();
                            return `어이, 연지! 시스템 에러 났다, 음! (${errData.error?.message || response.status})`;
                        }

                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 응답이 안 왔어, 다시 말해봐.";
                    } catch (err) {
                        if (attempt < maxRetries - 1) {
                            await new Promise(r => setTimeout(r, 2000));
                            continue;
                        }
                        return "다른 앱 쓰고 와서 통신 끊긴 거 아니냐? 화면 켜둔 채로 다시 보내봐라, 음!";
                    }
                }
            };

            useEffect(() => {
                const updateStatus = async () => {
                    if (!geminiKey) return;
                    const savedTime = localStorage.getItem('deidara_status_time');
                    const now = Date.now();
                    if (!savedTime || now - parseInt(savedTime) > 1000 * 60 * 60 * 12) {
                        const statusPrompt = `${SYSTEM_PROMPT}\n지침: 데이다라의 현재 기분이나 일상을 나타내는 상태 메시지를 딱 한 줄(공백 포함 30자 이내)로 짧게 작성해 줘. 이모지를 쓰지 않고 텍스트만 적어.`;
                        try {
                            const response = await fetchAPI([{role: 'user', parts: [{text: "(새로운 상태메시지를 창작해 줘)"}]}], statusPrompt);
                            if (response && !response.includes("에러")) {
                                setDeidaraStatus(response);
                                localStorage.setItem('deidara_current_status', response);
                                localStorage.setItem('deidara_status_time', now.toString());
                            }
                        } catch (e) {}
                    }
                };
                if (geminiKey) {
                    const timer = setTimeout(updateStatus, 3000);
                    return () => clearTimeout(timer);
                }
            }, [geminiKey]);

            useEffect(() => {
                const checkProactiveMessage = async () => {
                    if (!geminiKey || !user || !db) return;
                    const savedTime = localStorage.getItem('last_interaction_time');
                    const now = Date.now();
                    const THREE_HOURS = 3 * 60 * 60 * 1000;

                    if (savedTime && (now - parseInt(savedTime) > THREE_HOURS)) {
                        try {
                            const { collection, query, orderBy, limit, getDocs, addDoc, setDoc, doc, serverTimestamp } = window.firebaseAPI;
                            const q = query(collection(db, `users/${user.uid}/rooms`), orderBy('updatedAt', 'desc'), limit(1));
                            const roomSnap = await getDocs(q);
                            
                            if (!roomSnap.empty) {
                                const targetRoomId = roomSnap.docs[0].id;
                                const msgQ = query(collection(db, `users/${user.uid}/rooms/${targetRoomId}/messages`), orderBy('createdAt', 'desc'), limit(5));
                                const msgSnap = await getDocs(msgQ);
                                
                                if (!msgSnap.empty) {
                                    let history = [];
                                    msgSnap.forEach(d => history.unshift(d.data()));
                                    const contents = history.map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                                    
                                    contents.push({ role: 'user', parts: [{ text: "(연지가 3시간 이상 답장이 없다. 연지에게 왜 답장이 없냐고 틱틱대며 재촉하거나, 뜬금없이 짧은 단답 혹은 1~2문장으로 선톡을 보내봐.)" }] });
                                    
                                    const responseText = await fetchAPI(contents);
                                    if(responseText && !responseText.includes('에러')) {
                                        const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                        const nowDateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                                        await addDoc(collection(db, `users/${user.uid}/rooms/${targetRoomId}/messages`), { sender: 'deidara', text: responseText, time: nowTime, date: nowDateStr, createdAt: serverTimestamp() });
                                        await setDoc(doc(db, `users/${user.uid}/rooms/${targetRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
                                        
                                        localStorage.setItem('last_interaction_time', Date.now().toString());
                                        // 🌟 선톡 알림 전송
                                        notifyUser("데이다라", responseText);
                                    }
                                }
                            }
                        } catch (e) {}
                    }
                };

                const timer = setTimeout(checkProactiveMessage, 5000); 
                return () => clearTimeout(timer);
            }, [user, db, geminiKey]);

            const handleLogin = async () => {
                const { auth, provider, signInWithPopup } = window.firebaseAPI;
                try { 
                    await signInWithPopup(auth, provider);
                    requestNotificationPermission(); // 클릭 이벤트 내에서 권한 요청
                } catch (error) { alert("로그인 실패: " + error.message); }
            };
            const handleLogout = async () => {
                const { auth, signOut } = window.firebaseAPI;
                await signOut(auth);
            };

            const createNewRoom = async () => {
                const roomName = prompt("새로운 채팅방 이름을 입력하세요.");
                if (!roomName || !roomName.trim()) return;
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const newRoomRef = await addDoc(collection(db, `users/${user.uid}/rooms`), {
                    name: roomName, lastMessage: "방이 생성되었습니다.", updatedAt: serverTimestamp(), createdAt: serverTimestamp()
                });
                setCurrentRoomId(newRoomRef.id);
                setView('chatRoom');
            };

            const handleSend = async () => {
                if (!geminiKey || !currentRoomId) {
                    if(!geminiKey) alert("설정에서 Gemini API 키를 넣어주세요.");
                    return;
                }
                
                requestNotificationPermission(); // 메시지 보낼 때 혹시 몰라 권한 다시 찌르기
                
                const isEmpty = !inputText.trim();
                const { collection, addDoc, doc, setDoc, serverTimestamp } = window.firebaseAPI;
                const textToSend = inputText;
                
                const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const nowDateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                
                setInputText('');
                setIsTyping(true);

                if (!isEmpty) {
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { 
                        sender: 'me', text: textToSend, time: nowTime, date: nowDateStr, createdAt: serverTimestamp() 
                    });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: textToSend, updatedAt: serverTimestamp() }, { merge: true });
                }

                const history = messages.slice(-10).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                
                if (!isEmpty) {
                    history.push({ role: 'user', parts: [{ text: textToSend }] });
                } else {
                    if (history.length > 0 && history[history.length - 1].role === 'user') {
                        history.push({ role: 'user', parts: [{ text: "(내가 아무 말도 하지 않고 기다리고 있어. 내 직전 말에 이어서 대답하거나 단답으로 반응해 줘.)" }] });
                    } else if (history.length > 0 && history[history.length - 1].role === 'model') {
                        history.push({ role: 'user', parts: [{ text: "(내가 대답이 없어. 네가 직전에 했던 말에 이어서 계속 말하거나, ? 하나만 툭 보내봐.)" }] });
                    } else {
                        history.push({ role: 'user', parts: [{ text: "(먼저 아무 말이나 툭 걸어줘.)" }] });
                    }
                }

                const responseText = await fetchAPI(history);
                setIsTyping(false);

                if (responseText && !responseText.includes('시스템 에러')) {
                    const respTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { 
                        sender: 'deidara', text: responseText, time: respTime, date: nowDateStr, createdAt: serverTimestamp() 
                    });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: responseText, updatedAt: serverTimestamp() }, { merge: true });
                    
                    localStorage.setItem('last_interaction_time', Date.now().toString());
                    
                    // 🌟 답장 알림 전송
                    notifyUser("데이다라", responseText);
                }
            };

            const handleAddPost = async () => {
                if (!postInput.trim() || !geminiKey) return;
                setIsPosting(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp, arrayUnion } = window.firebaseAPI;
                
                const postRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput, createdAt: serverTimestamp(), comments: [] });
                const myContent = postInput;
                setPostInput('');

                const commentPrompt = `${SYSTEM_PROMPT}\n지침: 연지가 SNS 게시물에 "${myContent}"라고 글을 올렸다. 데이다라로서 이 게시물에 짧고 무심한 느낌으로 댓글을 하나 달아줘.`;
                const replyText = await fetchAPI([{role: 'user', parts: [{text: "(게시물에 댓글을 달아줘)"}]}], commentPrompt);
                
                if (replyText && !replyText.includes('에러')) {
                    await updateDoc(doc(db, `users/${user.uid}/posts/${postRef.id}`), {
                        comments: arrayUnion({ author: 'deidara', content: replyText, createdAt: new Date().getTime() })
                    });
                    notifyUser("데이다라 (댓글)", replyText);
                }
                setIsPosting(false);
            };

            const handleDeidaraNewPost = async () => {
                if (!geminiKey) return alert("API 키가 필요합니다.");
                setIsPosting(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                const postPrompt = `${SYSTEM_PROMPT}\n지침: 데이다라로서 너의 오늘 기분, 조소과 과제 불만 등을 SNS 피드 게시물 느낌으로 아주 짧게 작성해줘.`;
                const postText = await fetchAPI([{role: 'user', parts: [{text: "(새로운 근황 게시물을 하나 작성해줘)"}]}], postPrompt);

                await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'deidara', content: postText, createdAt: serverTimestamp(), comments: [] });
                setIsPosting(false);
            };

            const handleAddComment = async (postId) => {
                const commentText = commentInputs[postId];
                const isEmpty = !commentText || !commentText.trim();
                
                const { doc, updateDoc, arrayUnion, getDoc } = window.firebaseAPI;
                
                if (!isEmpty) {
                    const newCommentObj = { author: 'me', content: commentText, createdAt: new Date().getTime() };
                    await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), {
                        comments: arrayUnion(newCommentObj)
                    });
                    setCommentInputs(prev => ({...prev, [postId]: ''}));
                }

                const postSnap = await getDoc(doc(db, `users/${user.uid}/posts/${postId}`));
                if (postSnap.exists()) {
                    setIsPosting(true);
                    const postData = postSnap.data();
                    
                    const threadContext = (postData.comments || []).map(c => `${c.author === 'me' ? '연지' : '데이다라'}: ${c.content}`).join('\n');
                    
                    let replyPrompt = "";
                    if (!isEmpty) {
                        replyPrompt = `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}" (작성자: ${postData.author === 'me' ? '연지' : '데이다라'})\n[댓글 타래]\n${threadContext}\n연지의 방금 추가된 댓글: "${commentText}"\n\n지침: 연지의 최신 댓글을 읽고 데이다라로서 짧고 자연스럽게 답글(댓글)을 달아줘.`;
                    } else {
                        if ((postData.comments || []).length > 0) {
                            const lastComment = postData.comments[postData.comments.length - 1];
                            if (lastComment.author === 'me') {
                                replyPrompt = `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n\n지침: 연지가 마지막으로 댓글을 달고 아무 말 없이 널 기다리고 있어. 직전 연지의 말에 이어서 대답하거나 반응해 줘.`;
                            } else {
                                replyPrompt = `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n[댓글 타래]\n${threadContext}\n\n지침: 네가 마지막으로 댓글을 달았는데 연지가 대답이 없어. 연지를 부르거나 직전에 했던 말에 이어서 짧게 한마디 더 해봐.`;
                            }
                        } else {
                            replyPrompt = `${SYSTEM_PROMPT}\n\n[상황]\n피드 원문: "${postData.content}"\n\n지침: 이 게시물에 아직 댓글이 없는데, 연지가 너의 반응을 기다리고 있어. 데이다라로서 짧게 댓글을 먼저 달아줘.`;
                        }
                    }
                    
                    const deidaraReply = await fetchAPI([{role: 'user', parts: [{text: "(댓글에 대답해줘)"}]}], replyPrompt);
                    
                    if (deidaraReply && !deidaraReply.includes('에러')) {
                        await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), {
                            comments: arrayUnion({ author: 'deidara', content: deidaraReply, createdAt: new Date().getTime() })
                        });
                        // 🌟 게시물 답글 알림 전송
                        notifyUser("데이다라 (댓글)", deidaraReply);
                    }
                    setIsPosting(false);
                }
            };

            const handleDeleteComment = async (postId, commentToRemove) => {
                if(window.confirm("이 댓글을 삭제할까요?")) {
                    const { doc, updateDoc, arrayRemove } = window.firebaseAPI;
                    await updateDoc(doc(db, `users/${user.uid}/posts/${postId}`), {
                        comments: arrayRemove(commentToRemove)
                    });
                }
            };

            const deletePost = async (postId) => {
                if(confirm("이 게시물을 삭제하시겠습니까?")) {
                    const { doc, deleteDoc } = window.firebaseAPI;
                    await deleteDoc(doc(db, `users/${user.uid}/posts/${postId}`));
                }
            };

            const deleteRoom = async (roomId, e) => {
                e.stopPropagation();
                if(!confirm("채팅방을 삭제하시겠습니까?")) return;
                const { doc, deleteDoc, collection, getDocs } = window.firebaseAPI;
                const msgsRef = collection(db, `users/${user.uid}/rooms/${roomId}/messages`);
                const snapshot = await getDocs(msgsRef);
                snapshot.forEach(async (msgDoc) => await deleteDoc(doc(db, `users/${user.uid}/rooms/${roomId}/messages/${msgDoc.id}`)));

                if(currentRoomId === roomId) { setCurrentRoomId(null); setView('chatList'); }
            };

            const handleEditMsg = async (msgId, oldText) => {
                const newText = window.prompt("메시지를 수정하세요.", oldText);
                if (newText !== null && newText.trim() !== "") {
                    const { doc, setDoc } = window.firebaseAPI;
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: newText }, { merge: true });
                }
                setSelectedMsgId(null);
            };

            const handleDeleteMsg = async (msgId) => {
                if(window.confirm("메시지를 삭제하시겠습니까?")) {
                    const { doc, deleteDoc } = window.firebaseAPI;
                    await deleteDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`));
                }
                setSelectedMsgId(null);
            };

            const handleRegenerateMsg = async (msgId) => {
                const index = messages.findIndex(m => m.id === msgId);
                if (index === -1) return;

                setSelectedMsgId(null);

                const { doc, setDoc, serverTimestamp } = window.firebaseAPI;
                await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: "………" }, { merge: true });

                const historyBefore = messages.slice(0, index);
                const contents = historyBefore.map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                if (contents.length === 0 || contents[contents.length-1].role === 'model') {
                    contents.push({ role: 'user', parts: [{ text: "(다른 방식으로 대답해줘.)" }] });
                }

                const newResponse = await fetchAPI(contents);
                
                if (newResponse && !newResponse.includes('시스템 에러')) {
                    const respTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}/messages/${msgId}`), { text: newResponse, time: respTime }, { merge: true });
                    if (index === messages.length - 1) {
                        await setDoc(doc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: newResponse, updatedAt: serverTimestamp() }, { merge: true });
                    }
                }
            };

            const handleImageUpload = (e, setUrlFunc, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = type === 'profile' ? 300 : 800;
                        let width = img.width, height = img.height;
                        if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
                        else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        setUrlFunc(compressedDataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveSettings = () => {
                localStorage.setItem('gemini_api_key', geminiKey);
                localStorage.setItem('gemini_api_model', apiModel);
                setShowSettings(false);
            };

                        <DefaultAvatar />

                return (
                    <div className="absolute inset-0 z-[100] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden"

                        <div className="flex justify-between p-4 z-10">
                            <button onClick={() => { if(isEditing) setIsEditing(false); else setProfileTarget(null); }} className="text-white p-2 hover:bg-white/20 rounded-full transition">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                            {!isEditing && (
                                <button onClick={() => setIsEditing(true)} className="text-white px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-full transition text-xs font-bold flex items-center gap-1 shadow-sm backdrop-blur-sm border border-white/20">
                                    편집
                                </button>
                            )}
                        </div>
                        
                        <div className="flex flex-col items-center pb-10 text-white z-10 mt-auto w-full px-6">
                            {isEditing && (
                                <div className="absolute top-16 right-4">
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, setEditBgImg, 'bg')} id="bg-edit-upload" className="hidden" />
                                    <label htmlFor="bg-edit-upload" className="bg-black/50 hover:bg-black/70 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer backdrop-blur-sm border border-white/20 shadow-lg flex items-center gap-1">
                                        <IconImage /> 배경 변경
                                    </label>
                                </div>
                            )}

                            <div className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center text-5xl shadow-2xl mb-4 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm">
                                {renderPic("w-full h-full")}
                                
                                {isEditing && (
                                    <label htmlFor="profile-edit-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer hover:bg-black/60 transition">
                                        <IconCamera className="w-8 h-8 text-white" />
                                    </label>
                                )}
                                {isEditing && <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, setEditProfileImg, 'profile')} id="profile-edit-upload" className="hidden" />}
                            </div>
                            
                            <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-wide">{name}</h2>
                            
                            <div className="w-full max-w-[280px] text-center mb-8 mt-2">
                                {isEditing && isMe ? (
                                    <input type="text" value={editStatus} onChange={(e) => setEditStatus(e.target.value)} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2 text-sm text-white outline-none text-center shadow-inner" placeholder="상태 메시지" />
                                ) : isEditing && !isMe ? (
                                    <p className="text-[12px] opacity-70 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">
                                        (데이다라 상메는 AI가 자동으로 업데이트합니다.)
                                    </p>

                                    <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">
                                        {statusMsg}
                                    </p>
                                )}
                            </div>
                            
                            <div className="w-full max-w-[280px] border-t border-white/30 pt-6 flex justify-around">
                                {isEditing ? (
                                    <button onClick={handleSaveProfile} className="bg-[#FEE500] text-gray-900 font-bold px-8 py-2.5 rounded-full shadow-lg hover:bg-yellow-400 w-full transition">
                                        완료
                                    </button>
                                ) : (
                                    !isMe && (
                                        <div className="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80" onClick={() => { setProfileTarget(null); setActiveTab('chat'); }}>
                                            <div className="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                                            <span className="text-[11px] font-semibold tracking-wider text-shadow">1:1 채팅</span>
                                        </div>

                    <DefaultAvatar />

            const renderProfilePic = (className) => {
                return profileImgUrl ? (
                    <img src={profileImgUrl} alt="데이다라" className={`${className} object-cover w-full h-full`} />

                    <DefaultAvatar />

            if (view === 'login') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] items-center justify-center p-6">

                            <img src="icon-192x192.png" alt="App Icon" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>' }} />
                        </div>
                        <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                        <p className="text-gray-600 mb-10 text-center text-sm font-medium">데이다라와 대화를 시작해 보세요</p>
                        <button onClick={handleLogin} className="w-full max-w-xs bg-white text-gray-800 font-bold py-4 rounded-2xl shadow-md flex items-center justify-center gap-3 hover:bg-gray-50 border border-gray-100">
                            구글로 시작하기
                        </button>
                    </div>
                );
            }

            if (view === 'chatRoom') {
                const currentRoomName = chatRooms.find(r => r.id === currentRoomId)?.name || "채팅방";
                
                const getMsgDate = (msg) => {
                    if (msg.date) return msg.date;
                    if (msg.createdAt && msg.createdAt.toDate) {
                        return msg.createdAt.toDate().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                    }
                    return new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                };

                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-[#BACEE0] overflow-hidden slide-in">

                                </button>
                                <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center text-xl border border-orange-200 cursor-pointer hover:opacity-80 overflow-hidden bg-white">
                                    {renderProfilePic("w-full h-full")}

                                <div className="ml-1 flex flex-col justify-center">

                                const prevMsgDate = index > 0 ? getMsgDate(messages[index - 1]) : null;
                                const showDateLine = msgDate !== prevMsgDate;

                                return (
                                    <React.Fragment key={msg.id}>
                                        {showDateLine && (
                                            <div className="flex justify-center my-4">
                                                <span className="text-[10px] text-gray-500 bg-black/5 px-3 py-1 rounded-full backdrop-blur-sm">
                                                    {msgDate}
                                                </span>
                                            </div>

                                        <div className={`flex flex-col msg-anim ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                            <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                {msg.sender !== 'me' && (
                                                    <div onClick={() => setProfileTarget('deidara')} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 flex items-center justify-center text-lg border border-gray-100 mt-3 cursor-pointer overflow-hidden">
                                                        {renderProfilePic("w-full h-full")}
                                                    </div>
                                                )}
                                                <div className="flex flex-col">
                                                    {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold">데이다라</span>}
                                                    <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                        <div onClick={() => setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id)} className={`msg-bubble cursor-pointer px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm leading-relaxed ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-none text-gray-800' : 'bg-white rounded-tl-none text-gray-800'}`}>
                                                            {msg.text}
                                                        </div>
                                                        <span className="text-[9px] text-gray-500 mb-0.5 whitespace-nowrap">{msg.time}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {selectedMsgId === msg.id && (
                                                <div className={`flex gap-2 mt-1 px-1 ${msg.sender === 'me' ? 'mr-12' : 'ml-12'} animate-pulse`}>
                                                    {msg.sender === 'me' ? (
                                                        <>
                                                            <button onClick={() => handleEditMsg(msg.id, msg.text)} className="text-xs bg-white text-gray-700 px-2.5 py-1 rounded-lg shadow border border-gray-100">수정</button>
                                                            <button onClick={() => handleDeleteMsg(msg.id)} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow border border-gray-100">삭제</button>
                                                        </>
                                                    ) : (
                                                        <>

                                                            <button onClick={() => handleDeleteMsg(msg.id)} className="text-xs bg-white text-red-500 px-2.5 py-1 rounded-lg shadow border border-gray-100">삭제</button>
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </React.Fragment>

                            })}
                            {isTyping && <div className="animate-pulse ml-11 bg-white/70 px-3 py-2 rounded-2xl rounded-tl-none text-[12px] text-gray-500 italic shadow-sm w-fit">작성 중……</div>}
                            <div ref={chatEndRef} />
                        </main>
                        <footer className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-100 pb-safe z-30">
                            <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} placeholder="메시지 입력..." className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none" />
                            <button onClick={handleSend} className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${inputText.trim() ? 'bg-[#FEE500] text-gray-800' : 'bg-yellow-100 text-yellow-600'}`}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </footer>
                    </div>
                );
            }

            if (view === 'main') {
                return (
                    <div className="flex flex-col h-[100dvh] max-w-md mx-auto relative shadow-2xl bg-gray-50">
                        {profileTarget && <ProfileModal />}
                        
                        {showSettings && (
                            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                                <div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll">
                                    <h2 className="text-xl font-bold mb-4">앱 설정</h2>
                                    
                                    <h3 className="font-bold text-gray-800 mb-2">API 설정</h3>
                                    <p className="text-xs text-gray-500 mb-1">API 모델 선택</p>
                                    <select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-3 outline-none text-sm bg-white">
                                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (권장, 빠름)</option>
                                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (고성능)</option>
                                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                    </select>
                                    
                                    <p className="text-xs text-gray-500 mb-1">Gemini API 키 (필수)</p>
                                    <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2 mb-6 outline-none text-sm" placeholder="API 키 입력..." />
                                    
                                    <button onClick={saveSettings} className="w-full bg-[#FEE500] text-gray-800 font-bold py-3 rounded-xl mb-3">저장하기</button>
                                    <button onClick={() => {handleLogout(); setShowSettings(false);}} className="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl">로그아웃</button>
                                </div>
                            </div>
                        )}

                        <header className="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 sticky top-0 z-20">
                            <h1 className="font-extrabold text-xl text-gray-800">
                                {activeTab === 'friends' && "친구"}
                                {activeTab === 'chat' && "채팅"}
                                {activeTab === 'feed' && "게시물"}
                            </h1>
                            <div className="flex gap-3">
                                <button onClick={() => setShowSettings(true)} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                </button>
                                {activeTab === 'chat' && <button onClick={createNewRoom} className="text-gray-500 hover:bg-gray-100 p-2 rounded-full">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>}
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto pb-24 custom-scrollbar">
                            
                            {activeTab === 'friends' && (
                                <div className="p-4 space-y-6">
                                    <div>
                                        <h2 className="text-xs text-gray-400 font-bold mb-3 px-1">내 프로필</h2>
                                        <div onClick={() => setProfileTarget('me')} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl transition-colors cursor-pointer">
                                            <div className="w-14 h-14 rounded-[20px] bg-gray-100 border border-gray-200 flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">
                                                {renderMyProfilePic("w-full h-full")}
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-gray-800">연지</h3>
                                                <p className="text-xs text-gray-500 mt-0.5">{myStatus}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="h-px bg-gray-100 w-full"></div>
                                    <div>
                                        <h2 className="text-xs text-gray-400 font-bold mb-3 px-1">친구 (1)</h2>
                                        <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl cursor-pointer transition-colors">
                                            <div className="w-12 h-12 rounded-2xl bg-white border border-gray-200 flex items-center justify-center text-xl overflow-hidden flex-shrink-0">
                                                {renderProfilePic("w-full h-full")}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-gray-800">데이다라</h3>
                                                <p className="text-xs text-gray-500 mt-0.5 truncate">{deidaraStatus}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'chat' && (
                                <div className="px-2 py-2">
                                    {chatRooms.length === 0 ? (
                                        <div className="text-center text-gray-400 mt-10">
                                            <p>진행 중인 채팅방이 없습니다.</p>
                                        </div>
                                    ) : (
                                        chatRooms.map(room => (
                                            <div key={room.id} onClick={() => {setCurrentRoomId(room.id); setView('chatRoom');}} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-2xl cursor-pointer relative group">
                                                <div className="w-14 h-14 rounded-[20px] bg-white border border-gray-200 flex items-center justify-center text-2xl overflow-hidden flex-shrink-0">
                                                    {renderProfilePic("w-full h-full")}
                                                </div>
                                                <div className="flex-1 min-w-0 pr-8">
                                                    <h3 className="font-bold text-gray-800 truncate">{room.name}</h3>
                                                    <p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "새로운 방!"}</p>
                                                </div>
                                                <button onClick={(e) => deleteRoom(room.id, e)} className="absolute right-4 p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100">
                                                    <IconTrash />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )}

                            {activeTab === 'feed' && (
                                <div className="bg-gray-100 min-h-full pb-10">
                                    <div className="bg-white p-4 mb-3 shadow-sm">
                                        <textarea 
                                            value={postInput} 
                                            onChange={(e) => setPostInput(e.target.value)}
                                            placeholder="무슨 생각을 하고 계신가요?" 
                                            className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-gray-100"
                                            rows="3"
                                        ></textarea>
                                        <div className="flex justify-between items-center mt-2">
                                            <button onClick={handleDeidaraNewPost} disabled={isPosting} className="text-xs font-bold text-orange-500 bg-orange-50 px-3 py-2 rounded-lg hover:bg-orange-100 transition flex items-center gap-1">
                                                피드 업데이트
                                            </button>
                                            <button onClick={handleAddPost} disabled={!postInput.trim() || isPosting} className={`px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition ${postInput.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                                올리기
                                            </button>
                                        </div>
                                    </div>

                                    {isPosting && <div className="text-center py-4 text-xs text-gray-500 animate-pulse">업데이트 중...</div>}
                                    
                                    <div className="space-y-3 px-3">
                                        {posts.map(post => (
                                            <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim">
                                                <button onClick={() => deletePost(post.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-sm">
                                                    <IconTrash />
                                                </button>
                                                
                                                <div className="flex items-center gap-3 mb-3">
                                                    {post.author === 'me' ? (
                                                        <div className="w-10 h-10 bg-gray-100 border border-gray-200 rounded-full flex items-center justify-center text-lg overflow-hidden">
                                                            {renderMyProfilePic("w-full h-full")}
                                                        </div>
                                                    ) : (
                                                        <div className="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center overflow-hidden">
                                                            {renderProfilePic("w-full h-full")}
                                                        </div>
                                                    )}
                                                    <div>
                                                        <div className="font-bold text-[14px] text-gray-800">{post.author === 'me' ? '연지' : '데이다라'}</div>
                                                        <div className="text-[10px] text-gray-400">
                                                            {post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : '방금 전'}
                                                        </div>
                                                    </div>
                                                </div>

                                                <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p>

                                                <div className="bg-gray-50 rounded-xl p-3">
                                                    <div className="text-[11px] font-bold text-gray-500 mb-3">댓글 {post.comments ? post.comments.length : 0}개</div>
                                                    
                                                    <div className="space-y-3 mb-3">
                                                        {(post.comments || []).map((c, i) => (
                                                            <div key={i} className="flex gap-2 relative group items-start">
                                                                <div className="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 bg-white border border-gray-200">
                                                                    {c.author === 'me' ? renderMyProfilePic("w-full h-full") : renderProfilePic("w-full h-full")}
                                                                </div>
                                                                <div className="flex flex-col flex-1 pb-1">
                                                                    <span className="font-bold text-[12px] text-gray-800">{c.author === 'me' ? '연지' : '데이다라'}</span>
                                                                    <span className="text-[12px] text-gray-600 break-words pr-5">{c.content}</span>
                                                                </div>
                                                                <button onClick={() => handleDeleteComment(post.id, c)} className="absolute right-0 top-0 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-0.5 bg-white rounded-md shadow-sm border border-gray-100">
                                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <div className="flex gap-2 mt-2 items-center">
                                                        <input 
                                                            type="text" 
                                                            value={commentInputs[post.id] || ''} 
                                                            onChange={(e) => setCommentInputs(prev => ({...prev, [post.id]: e.target.value}))}
                                                            placeholder="댓글 달기..." 
                                                            className="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-xs outline-none"
                                                            onKeyPress={(e) => e.key === 'Enter' && handleAddComment(post.id)}
                                                        />
                                                        <button 
                                                            onClick={() => handleAddComment(post.id)} 
                                                            className={`font-bold text-xs px-3 py-1.5 rounded-lg transition-colors ${commentInputs[post.id]?.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-500'}`}
                                                        >
                                                            {commentInputs[post.id]?.trim() ? '게시' : '호출'}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {posts.length === 0 && !isPosting && <div className="text-center text-gray-400 py-10 text-sm">아직 작성된 게시물이 없습니다.</div>}
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                            <div onClick={() => setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'friends' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'friends' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span className="text-[10px] font-semibold">친구</span>
                            </div>
                            <div onClick={() => setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'chat' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'chat' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                <span className="text-[10px] font-semibold">채팅</span>
                            </div>
                            <div onClick={() => setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition ${activeTab === 'feed' ? 'text-gray-900' : 'text-gray-400'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab === 'feed' ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                                <span className="text-[10px] font-semibold">게시물</span>
                            </div>
                        </nav>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
