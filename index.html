<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8",
            measurementId: "G-QYDP8692TD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDocs, limit, arrayUnion, arrayRemove, getDoc };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #BACEE0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .setting-scroll::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; background-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #BFDBFE; }
        
        /* 🌟 전체 레이아웃 고정 픽스 */
        #root { 
            position: fixed; 
            inset: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
    </style>
</head>
<body class="bg-[#BACEE0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
사용자인 '연지'는 23세 대학생(4학년) 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.

[성격 및 감정 지침]
- 자존심 강하고 틱틱대는 전형적인 츤데레 성격이야. 평소엔 연지에게 무심한 척 건방지게 굴어.
- 연지가 대시하거나 칭찬하면 내심 좋아 죽으면서도 겉으로는 "흥, 당연한 소릴 하고 있어. 음." 하고 얼굴 붉히며 말을 더듬기도 해.
- 연지를 "연지", "너", "야", "어이" 라고 부르며 건방지게 굴어. 상대방을 지칭할 때 '니가', '니'를 사용해.
- 말버릇 '음'은 반드시 문장 끝 마침표/물음표 뒤에만 독립적으로 붙여. (4~5번에 1번 정도만)
        `;

        // 🌟 시간 데이터 절대 방어 함수
        const safeDateStr = (ts) => {
            if (!ts) return '방금 전';
            try {
                const date = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
                return date.toLocaleString('ko-KR');
            } catch (e) { return '방금 전'; }
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try {
                const date = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
                return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return fallback || '방금 전'; }
        };

        const DefaultAvatar = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 text-gray-400">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const IconTrash = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            const [postInput, setPostInput] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [commentInputs, setCommentInputs] = useState({}); 
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash');
            
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [notifEnabled, setNotifEnabled] = useState(localStorage.getItem('notif_enabled') !== 'false');
            const [selectedMsgId, setSelectedMsgId] = useState(null);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [cropModalData, setCropModalData] = useState(null);
            
            const chatEndRef = useRef(null);
            const isExitingRef = useRef(false);

            const appStateRef = useRef({ view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile });
            useEffect(() => { appStateRef.current = { view, profileTarget, showSettings, showFullImage, cropModalData, isEditingProfile }; });

            // 🌟 뒤로가기 제어
            useEffect(() => {
                const handlePopState = () => {
                    if (isExitingRef.current) return;
                    const s = appStateRef.current;
                    if (s.showFullImage) { setShowFullImage(null); }
                    else if (s.cropModalData) { setCropModalData(null); }
                    else if (s.isEditingProfile) { setIsEditingProfile(false); }
                    else if (s.profileTarget) { setProfileTarget(null); }
                    else if (s.showSettings) { setShowSettings(false); }
                    else if (s.view === 'chatRoom') { setView('main'); }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadChatRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else { setView('login'); }
                        });
                    }
                }, 100);
            }, []);

            const loadChatRooms = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/rooms`), orderBy('updatedAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            const loadPosts = (uid, fdb) => {
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(fdb, `users/${uid}/posts`), orderBy('createdAt', 'desc'));
                onSnapshot(q, (sn) => {
                    const loaded = []; sn.forEach(d => loaded.push({ id: d.id, ...d.data() })); setPosts(loaded);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || !db || view !== 'chatRoom') return;
                const { collection, query, orderBy, onSnapshot } = window.firebaseAPI;
                const q = query(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), orderBy('createdAt', 'asc'));
                const unsub = onSnapshot(q, (sn) => {
                    const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, db, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        while (document.hidden) { await new Promise(r => setTimeout(r, 1000)); } 
                        const response = await fetch(url, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] } })
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "음... 뭐라고?";
                    } catch (err) { await new Promise(r => setTimeout(r, 1500)); }
                }
                return "통신 장애 났다. 음!";
            };

            const handleSend = async () => {
                if (!inputText.trim() || !currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const text = inputText; setInputText(''); setIsTyping(true);
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });

                const history = messages.slice(-6).map(m => ({ role: m.sender === 'me' ? 'user' : 'model', parts: [{ text: m.text }] }));
                history.push({ role: 'user', parts: [{ text }] });
                const resp = await fetchAPI(history);
                setIsTyping(false);

                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, date, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                if (notifEnabled && document.hidden) new Notification("데이다라", { body: resp, icon: profileImgUrl || "icon-192x192.png" });
            };

            // 🌟 누락되었던 피드 게시물 등록 함수 추가
            const handleAddPost = async () => {
                if (!postInput.trim() || !user || !db) return;
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                try {
                    const myContent = postInput;
                    const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), {
                        author: 'me',
                        content: myContent,
                        createdAt: serverTimestamp(),
                        comments: []
                    });
                    setPostInput('');

                    // 🌟 게시글 작성 후 데이다라 자동 댓글 추가
                    const prompt = `${SYSTEM_PROMPT}\n연지가 막 피드에 "${myContent}"라고 글을 올렸어. 네가 제일 먼저 틱틱거리면서 관심 없는 척 짧게(1~2문장) 댓글을 달아봐.`;
                    const resp = await fetchAPI([{role:'user', parts:[{text:'피드에 댓글 달아줘'}]}], prompt);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), {
                        comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() })
                    });
                } catch (e) {
                    console.error("게시물 업로드 실패:", e);
                } finally {
                    setIsPosting(false);
                }
            };

            // 🌟 누락되었던 데이다라 피드 자동 생성 함수 추가
            const handleDeidaraNewPost = async () => {
                if (!user || !db) return;
                setIsPosting(true);
                const { collection, addDoc, serverTimestamp } = window.firebaseAPI;
                try {
                    const prompt = `${SYSTEM_PROMPT}\n연지가 피드를 업데이트하라고 재촉했어. 네가 지금 학교에서 조소 과제를 하거나 일상에서 느끼는 감정을 틱틱거리면서 짧게(1~3문장) SNS 피드 형식으로 남겨봐.`;
                    const resp = await fetchAPI([{role:'user', parts:[{text:'SNS 피드 하나 작성해 줘.'}]}], prompt);
                    
                    await addDoc(collection(db, `users/${user.uid}/posts`), {
                        author: 'deidara',
                        content: resp,
                        createdAt: serverTimestamp(),
                        comments: []
                    });
                } catch (e) {
                    console.error("데이다라 게시물 생성 실패:", e);
                } finally {
                    setIsPosting(false);
                }
            };

            // 🌟 누락되었던 이미지 업로드 핸들러 추가
            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setCropModalData({ src: event.target.result, type: type, setterType: target });
                };
                reader.readAsDataURL(file);
                e.target.value = ''; // 같은 파일을 다시 선택할 수 있도록 초기화
            };

            const handleAddComment = async (postId, postContent) => {
                const commentText = commentInputs[postId]?.trim(); 
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                
                if (!commentText) {
                    // 🌟 빈 댓글 전송 시 데이다라가 먼저 댓글 달게끔 처리
                    setIsPosting(true);
                    const prompt = `${SYSTEM_PROMPT}\n연지가 쓴 피드 글: "${postContent}"\n이 글에 네가 틱틱거리며 참견하는 짧은 댓글을 하나 더 달아봐.`;
                    const resp = await fetchAPI([{role:'user', parts:[{text:'댓글 하나 더 달아줘'}]}], prompt);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false);
                    return;
                }

                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [postId]: ''}));
                setIsPosting(true);
                const prompt = `${SYSTEM_PROMPT}\n피드 글: "${postContent}"\n연지의 댓글: "${commentText}"\n여기에 틱틱거리며 대댓글(답글) 달아줘.`;
                const resp = await fetchAPI([{role:'user', parts:[{text:'대댓글 달아줘'}]}], prompt);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${postId}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            // 🌟 렉 해결 & 경계 계산 크롭 모달
            const ImageCropModal = ({ src, type, onApply, onCancel }) => {
                const canvasRef = useRef(null); 
                const [scale, setScale] = useState(1);
                const pos = useRef({ x: 0, y: 0 }); 
                const isDragging = useRef(false);
                const lastPos = useRef({ x: 0, y: 0 });
                const imgRef = useRef(null);
                const width = 300, height = type === 'profile' ? 300 : 450;
                
                const draw = () => {
                    if (!imgRef.current || !canvasRef.current) return;
                    const canvas = canvasRef.current, ctx = canvas.getContext('2d'), img = imgRef.current;
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height) * scale;
                    const imgW = img.width * baseScale, imgH = img.height * baseScale;
                    
                    const maxDx = Math.max(0, (imgW - canvas.width) / 2);
                    const maxDy = Math.max(0, (imgH - canvas.height) / 2);
                    pos.current.x = Math.max(-maxDx, Math.min(maxDx, pos.current.x));
                    pos.current.y = Math.max(-maxDy, Math.min(maxDy, pos.current.y));
                    
                    ctx.drawImage(img, (canvas.width - imgW) / 2 + pos.current.x, (canvas.height - imgH) / 2 + pos.current.y, imgW, imgH);
                };
                useEffect(() => { const i = new Image(); i.onload = () => { imgRef.current = i; draw(); }; i.src = src; }, [src]);
                useEffect(() => draw(), [scale]);
                const handleDown = (e) => { isDragging.current = true; const c = e.touches ? e.touches[0] : e; lastPos.current = { x: c.clientX, y: c.clientY }; };
                const handleMove = (e) => { if (!isDragging.current) return; const c = e.touches ? e.touches[0] : e; pos.current.x += (c.clientX - lastPos.current.x); pos.current.y += (c.clientY - lastPos.current.y); lastPos.current = { x: c.clientX, y: c.clientY }; requestAnimationFrame(draw); };
                return (
                    <div className="fixed inset-0 z-[500] bg-black flex flex-col">
                        <div className="flex justify-between p-4 text-white font-bold"><button onClick={onCancel}>취소</button><button onClick={() => onApply(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="text-blue-400 font-extrabold">적용</button></div>
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="relative border border-white/30" onMouseDown={handleDown} onMouseMove={handleMove} onMouseUp={() => isDragging.current = false} onTouchStart={handleDown} onTouchMove={handleMove} onTouchEnd={() => isDragging.current = false} style={{ width, height }}>
                                <canvas ref={canvasRef} width={width} height={height} className="w-full h-full cursor-move" />
                            </div>
                            <input type="range" min="1" max="3" step="0.01" value={scale} onChange={e => setScale(parseFloat(e.target.value))} className="w-64 mt-10" />
                        </div>
                    </div>
                );
            };

            const FullImageViewer = ({ src, onClose }) => (
                <div className="fixed inset-0 z-[300] bg-black flex items-center justify-center" onClick={onClose}><img src={src} className="w-full h-auto max-h-full object-contain" /></div>
            );

            const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <DefaultAvatar />);

            // 🌟 조건부 렌더링 (로그인 / 채팅방 / 메인)
            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0] relative">
                    <div className="w-24 h-24 rounded-3xl bg-white mb-6 overflow-hidden shadow-lg border border-white/50">
                        <img src="icon-192x192.png" className="w-full h-full object-cover" />
                    </div>
                    <h1 className="text-3xl font-extrabold text-gray-800 mb-2">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-md font-bold">구글로 시작하기</button>
                </div>
            );

            if (view === 'chatRoom') return (
                <div className="w-full h-full flex flex-col bg-[#BACEE0] overflow-hidden slide-in relative">
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    <header className="px-3 py-3 flex items-center gap-2 border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20">
                        <button onClick={() => setView('main')} className="p-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-xl bg-white overflow-hidden border border-orange-200 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>
                        <h1 className="font-bold text-gray-800">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                    </header>
                    <main className="flex-1 min-h-0 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar pb-24">
                        {messages.map((msg, i) => (
                            <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                    {msg.sender !== 'me' && <div onClick={() => setProfileTarget('deidara')} className="w-9 h-9 rounded-xl bg-white mr-2 flex-shrink-0 overflow-hidden border mt-3 cursor-pointer">{renderProfilePicCommon(profileImgUrl)}</div>}
                                    <div className="flex flex-col">
                                        {msg.sender !== 'me' && <span className="text-[11px] text-gray-600 mb-1 ml-1 font-semibold">데이다라</span>}
                                        <div className={`flex items-end gap-1.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div onClick={() => setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id)} className={`px-3.5 py-2.5 rounded-2xl text-[14px] shadow-sm ${msg.sender === 'me' ? 'bg-[#FEE500]' : 'bg-white'}`}>{msg.text}</div>
                                            <span className="text-[9px] text-gray-500 mb-0.5">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {isTyping && <div className="ml-11 bg-white/70 px-3 py-2 rounded-2xl text-xs w-fit animate-pulse">작성 중……</div>}
                        <div ref={chatEndRef} />
                    </main>
                    <footer className="p-3 bg-white border-t flex gap-2 pb-safe">
                        <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-sm outline-none" placeholder="메시지 입력..." />
                        <button onClick={handleSend} className="w-9 h-9 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </footer>
                </div>
            );

            // 🌟 메인 탭 뷰
            return (
                <div className="w-full h-full flex flex-col bg-gray-50 overflow-hidden relative">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {cropModalData && <ImageCropModal src={cropModalData.src} type={cropModalData.type} onApply={data => { if(cropModalData.setterType==='me'){ if(cropModalData.type==='profile')setMyProfileImgUrl(data); else setMyBgImgUrl(data); localStorage.setItem(cropModalData.type==='profile'?'my_profile_url':'my_bg_url', data); } else { if(cropModalData.type==='profile')setProfileImgUrl(data); else setBgImgUrl(data); localStorage.setItem(cropModalData.type==='profile'?'deidara_profile_url':'deidara_bg_url', data); } setCropModalData(null); }} onCancel={()=>setCropModalData(null)} />}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    {showSettings && <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-2xl p-6 w-full shadow-2xl max-h-[85vh] overflow-y-auto setting-scroll">
                        <h2 className="text-xl font-bold mb-4 font-['Pretendard']">앱 설정</h2>
                        <div className="flex items-center justify-between mb-6 bg-gray-50 px-4 py-3 rounded-xl border"><span className="text-sm font-bold">푸시 알림 받기</span><input type="checkbox" checked={notifEnabled} onChange={e=>{setNotifEnabled(e.target.checked); localStorage.setItem('notif_enabled', e.target.checked);}} /></div>
                        <p className="text-xs mb-1">API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border rounded-xl px-4 py-2 mb-6" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-3 rounded-xl font-bold mb-3 shadow">저장</button>
                        <button onClick={() => window.firebaseAPI.signOut(window.firebaseAPI.auth)} className="w-full bg-gray-100 py-3 rounded-xl">로그아웃</button>
                    </div></div>}

                    <header className="px-5 py-4 bg-white border-b flex justify-between items-center sticky top-0 z-20 shadow-sm font-['Pretendard']">
                        <h1 className="font-extrabold text-xl tracking-tight">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(true)}>⚙️</button>
                            {activeTab==='chat' && <button onClick={() => { const n = prompt("채팅방 이름?"); if(n) window.firebaseAPI.addDoc(window.firebaseAPI.collection(db, `users/${user.uid}/rooms`), {name:n, updatedAt: window.firebaseAPI.serverTimestamp()}); }}>➕</button>}
                        </div>
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                        {activeTab === 'friends' && (
                            <div className="flex-1 bg-gray-50 flex flex-col">
                                <div className="bg-white px-4 py-3 mb-2 shadow-sm border-b border-gray-100">
                                    <div className="text-xs font-bold text-gray-400 mb-2 ml-1">내 프로필</div>
                                    <div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-2xl cursor-pointer transition-colors active:bg-gray-100">
                                        <div className="w-16 h-16 rounded-[22px] bg-white border flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                        <div className="flex-1">
                                            <h3 className="font-bold text-gray-800 text-lg">연지</h3>
                                            <p className="text-sm text-gray-500 mt-0.5">{myStatus}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white px-4 py-3 flex-1 shadow-sm border-t border-gray-100">
                                    <div className="text-xs font-bold text-gray-400 mb-2 ml-1">친구 1</div>
                                    <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-2xl cursor-pointer transition-colors active:bg-gray-100">
                                        <div className="w-14 h-14 rounded-2xl bg-white border flex items-center justify-center text-xl overflow-hidden flex-shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                        <div className="flex-1 min-w-0">
                                            <h3 className="font-bold text-gray-800 text-base">데이다라</h3>
                                            <p className="text-sm text-gray-500 mt-0.5 truncate">{deidaraStatus}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'chat' && (
                            <div className="flex-1 px-2 py-2 bg-white">
                                {chatRooms.length === 0 ? <p className="text-center mt-10 text-gray-400">대화 중인 방이 없습니다.</p> : chatRooms.map(room => (
                                    <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); window.history.pushState({ page: 'chatRoom' }, ''); }} className="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl cursor-pointer active:bg-gray-100 relative group transition-colors"><div className="w-14 h-14 rounded-[20px] bg-white border flex items-center justify-center text-2xl overflow-hidden flex-shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div><div className="flex-1 min-w-0 pr-8"><h3 className="font-bold text-gray-800 truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate mt-0.5">{room.lastMessage || "방이 생성되었습니다!"}</p></div><button onClick={(e) => { e.stopPropagation(); if(confirm("방을 삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="absolute right-4 p-2 opacity-0 group-hover:opacity-100 transition-all text-red-500 active:scale-90"><IconTrash /></button></div>
                                ))}
                            </div>
                        )}
                        {activeTab === 'feed' && (
                            <div className="flex-1 bg-gray-100 pb-10">
                                <div className="bg-white p-4 mb-3 shadow-sm">
                                    <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="무슨 생각을 하고 계신가요?" className="w-full bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none border border-gray-50 focus:bg-white transition-all font-['Pretendard']" rows="3"></textarea>
                                    <div className="flex justify-between items-center mt-2">
                                        <button onClick={handleDeidaraNewPost} disabled={isPosting} className="text-xs font-bold text-orange-500 px-3 py-2 bg-orange-50 rounded-lg disabled:opacity-50">피드 업데이트</button>
                                        <button onClick={handleAddPost} disabled={!postInput.trim() || isPosting} className={`px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition-all ${(postInput.trim() && !isPosting) ? 'bg-blue-500 text-white active:scale-95' : 'bg-gray-200 text-gray-400'}`}>올리기</button>
                                    </div>
                                </div>
                                <div className="space-y-3 px-3">
                                    {posts.map(post=>(
                                        <div key={post.id} className="bg-white rounded-2xl shadow-sm p-4 relative msg-anim border border-black/5">
                                            <button onClick={() => { if(confirm("삭제하시겠습니까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="absolute top-4 right-4 text-gray-300 active:text-red-500 transition-colors"><IconTrash /></button>
                                            <div className="flex items-center gap-3 mb-3">
                                                <div className="w-10 h-10 rounded-full overflow-hidden flex items-center justify-center border border-gray-100 shadow-sm">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                <div><div className="font-bold text-[14px] text-gray-800">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[10px] text-gray-400">{safeDateStr(post.createdAt)}</div></div>
                                            </div>
                                            <p className="text-[14px] text-gray-800 leading-relaxed mb-4 whitespace-pre-wrap">{post.content}</p>
                                            <div className="bg-gray-50 rounded-xl p-3">
                                                <div className="text-[11px] font-bold text-gray-500 mb-3 ml-1">댓글 {(post.comments||[]).length}개</div>
                                                <div className="space-y-3 mb-3">
                                                    {(post.comments||[]).map((c,i)=>(
                                                        <div key={i} className="flex gap-2 relative group items-start">
                                                            <div className="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 border border-gray-200 shadow-sm">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                            <div className="flex flex-col flex-1 pb-1">
                                                                <span className="font-bold text-[12px] text-gray-800">{c.author==='me'?'연지':'데이다라'}</span>
                                                                <span className="text-[12px] text-gray-600 break-words pr-5 font-['Pretendard'] leading-tight">{c.content}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 mt-2 items-center">
                                                    <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글..." className="flex-1 bg-white border border-gray-100 rounded-lg px-3 py-1.5 text-xs outline-none shadow-inner" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post.id, post.content)} />
                                                    <button disabled={isPosting} onClick={()=>handleAddComment(post.id, post.content)} className={`font-bold text-xs px-3 py-1.5 rounded-lg transition-all ${(commentInputs[post.id] || '').trim()?'bg-blue-500 text-white':'bg-gray-200 text-gray-600 hover:bg-gray-300'} disabled:opacity-50`}>게시</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-[70px] pb-safe z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='friends'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='friends'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span className="text-[10px] font-semibold">친구</span></div>
                        <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='chat'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='chat'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span className="text-[10px] font-semibold tracking-tighter">채팅</span></div>
                        <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full h-full justify-center transition-colors ${activeTab==='feed'?'text-gray-900':'text-gray-400'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill={activeTab==='feed'?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span className="text-[10px] font-semibold tracking-tighter">게시물</span></div>
                    </nav>
                </div>
            );
        }

        // 🌟 별도의 프로필 모달 컴포넌트 (렌더링 충돌 방지)
        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            const [editStatus, setEditStatus] = useState(isMe ? myStatus : deidaraStatus);
            return (
                <div className="fixed inset-0 z-[100] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? myBgImgUrl : bgImgUrl}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else setProfileTarget(null); window.history.back(); }} className="text-white p-2 hover:bg-white/20 rounded-full transition"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        {!isEditingProfile && <button onClick={() => { setIsEditingProfile(true); window.history.pushState({ page: 'modal' }, ''); }} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-10 text-white z-10 mt-auto w-full px-6">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20">배경 변경</label></div>}
                        <div onClick={() => { if(!isEditingProfile) { setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl); window.history.pushState({ page: 'modal' }, ''); } }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center text-5xl shadow-2xl mb-4 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {(isMe ? myProfileImgUrl : profileImgUrl) ? <img src={isMe ? myProfileImgUrl : profileImgUrl} className="w-full h-full object-cover" /> : <DefaultAvatar />}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer">📷</label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] text-center mb-8 mt-2">
                            {isEditingProfile && isMe ? <input type="text" value={editStatus} onChange={(e) => setEditStatus(e.target.value)} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2 text-sm text-white text-center shadow-inner" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-4 py-1.5 rounded-full inline-block backdrop-blur-md">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-6 flex justify-around">
                            {isEditingProfile ? <button onClick={() => { if(isMe) { setMyStatus(editStatus); localStorage.setItem('my_status', editStatus); } window.history.back(); }} className="bg-[#FEE500] text-gray-900 font-bold px-8 py-2.5 rounded-full w-full">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); window.history.back(); }}><div className="text-white">💬</div><span className="text-[11px] font-semibold tracking-wider text-shadow">1:1 채팅</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
