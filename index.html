<!DOCTYPE html>
<html lang="ko">
<head>

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        @keyframes blink { 0%, 100% { background-color: #3b82f6; } 50% { background-color: #ef4444; } }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 [최신 프롬프트: 주변 인물 설정 주입]
        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌. 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격. 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 문장부호(?, !, ~ 등)는 상황에 맞게 풍부하게 써도 좋아.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        const compressBase64Image = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);

        // 🌟 프로필 모달 컴포넌트
        const ProfileModal = ({ target, setTarget, isEditing, setIsEditing, myP, deiP, myB, deiB, myS, deiS, setMyS, setFull, uploadUI, setTab }) => {
            const isMe = target === 'me';
            return (
                <div className="fixed inset-0 z-[2000] bg-gray-900 flex flex-col profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? myB : deiB}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-5 z-10">
                        <button onClick={() => { if(isEditing) setIsEditing(false); else setTarget(null); }} className="text-white p-2 bg-black/20 rounded-full">✕</button>
                        {!isEditing && <button onClick={() => setIsEditing(true)} className="text-white px-4 py-2 bg-white/20 rounded-full text-xs font-bold border border-white/30">프로필 편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-16 text-white z-10 mt-auto w-full px-6 text-center">
                        <div onClick={() => { if(!isEditing) setFull(isMe ? myP : deiP); }} className="w-28 h-28 rounded-[40px] bg-white/20 flex items-center justify-center shadow-2xl mb-5 border-2 border-white/40 relative overflow-hidden backdrop-blur-md cursor-pointer">
                            {renderProfilePicCommon(isMe ? myP : deiP)}
                            {isEditing && <label htmlFor="p-up" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer">📷</label>}
                            {isEditing && <input type="file" id="p-up" onChange={(e) => uploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-3xl font-black mb-2 text-shadow">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[300px] mb-12 mt-3">
                            {isEditing && isMe ? <input type="text" defaultValue={myS} onBlur={(e) => { setMyS(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/50 border border-white/30 rounded-2xl px-5 py-3 text-sm text-white text-center shadow-inner outline-none font-bold" /> : <p className="text-[15px] font-bold text-shadow bg-black/40 px-6 py-2.5 rounded-full inline-block backdrop-blur-lg">{isMe ? myS : deiS}</p>}
                        </div>
                        <div className="w-full max-w-[300px] border-t border-white/30 pt-10 flex justify-around mx-auto">
                            {isEditing ? <button onClick={() => setIsEditing(false)} className="bg-[#FEE500] text-gray-900 font-black px-12 py-3.5 rounded-full w-full shadow-xl active:scale-95 transition-all">완료</button> : !isMe && <div className="flex flex-col items-center gap-3 cursor-pointer active:scale-90 transition-transform" onClick={() => { setTarget(null); setTab('chat'); }}><div className="text-3xl">💬</div><span className="text-xs font-black tracking-widest text-shadow uppercase">Chat</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));

            const chatEndRef = useRef(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(timer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else setView('login');
                        });
                    }
                }, 100);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            useEffect(() => {
                if (!currentRoomId || !user || view !== 'chatRoom') return;
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), window.firebaseAPI.orderBy('createdAt', 'asc'));
                const unsub = window.firebaseAPI.onSnapshot(q, (sn) => {
                    const m = []; sn.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
                return () => unsub();
            }, [currentRoomId, user, view]);

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                    });
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "(말문이 막혔다.)";
                    return text.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                } catch (e) { return "통신 장애 났다. 음!"; }
            };

            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("채팅방 이름을 뭘로 고칠까? 음!", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text: "(이어서 말해줘.)" }] }));
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                    setIsTyping(false); return;
                }
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration}]` });
                    else if (m.text) parts.push({ text: m.text });
                    if (m.imageUrl) parts.push({ text: "[사진]" });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const handleAddPost = async () => {
                if (!postInput.trim() && !feedAttachedImage) return;
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput.trim(), imageUrl: feedAttachedImage, createdAt: serverTimestamp(), comments: [] });
                setPostInput(''); setFeedAttachedImage(null);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어: "${postInput}". 댓글 달아줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleAddComment = async (post) => {
                const commentText = commentInputs[post.id]?.trim();
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) {
                    setIsPosting(true);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `데이다라, 연지의 피드에 댓글 달아줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [post.id]: ''}));
                setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 달아줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    if(target==='me') { if(type==='profile') setMyProfileImgUrl(b64); else setMyBgImgUrl(b64); localStorage.setItem(type==='profile'?'my_profile_url':'my_bg_url', b64); }
                    else { if(type==='profile') setProfileImgUrl(b64); else setBgImgUrl(b64); localStorage.setItem(type==='profile'?'deidara_profile_url':'deidara_bg_url', b64); }
                };
                reader.readAsDataURL(file);
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    <div className="w-32 h-32 rounded-[40px] bg-white mb-8 shadow-2xl flex items-center justify-center overflow-hidden border border-white/50"><img src="icon-192x192.png" className="w-full h-full object-cover" /></div>
                    <h1 className="text-4xl font-black text-gray-800 mb-4 tracking-tighter">DeiTalk</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-5 rounded-[24px] shadow-xl font-black text-lg active:scale-95 transition-all">구글로 시작하기</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-gray-50'} overflow-hidden relative`}>
                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUI} setTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl"><h2 className="text-2xl font-black mb-6">Settings</h2><p className="text-xs font-bold text-gray-400 mb-2 ml-1">API KEY</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-2xl px-5 py-4 mb-8 outline-none text-sm font-bold" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-3xl font-black text-gray-900 shadow-md">저장 및 시작</button></div></div>}

                    {/* 헤더 */}
                    <header className={`px-6 py-5 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white/90 backdrop-blur-md border-b border-gray-100':'bg-[#BACEE0]/95'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-black text-2xl tracking-tighter text-gray-900 flex items-center gap-2">DeiTalk <span className="text-[10px] bg-blue-500 text-white px-2 py-0.5 rounded-full v-badge tracking-widest uppercase">v2.3</span></h1>
                                <button onClick={() => setShowSettings(true)} className="text-2xl">⚙️</button>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setView('main')} className="p-2">🔙</button>
                                <div onClick={() => setProfileTarget('deidara')} className="w-11 h-11 rounded-[16px] bg-white border border-orange-100 overflow-hidden shadow-sm active:scale-90 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>
                                <h1 className="font-black text-gray-800 text-xl ml-2 truncate flex-1">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅"}</h1>
                            </Fragment>
                        )}
                    </header>

                    {/* 메인 컨텐츠 */}
                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-32 custom-scrollbar">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-8 py-6 border-b border-gray-50">
                                            <div onClick={() => setProfileTarget('me')} className="flex items-center gap-6 p-2 active:scale-[0.98] transition-all cursor-pointer">
                                                <div className="w-[72px] h-[72px] rounded-[28px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-md">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-2xl tracking-tight">연지</h3><p className="text-[14px] text-gray-500 mt-1.5 truncate font-semibold">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-8 py-6">
                                            <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-6 p-2 active:scale-[0.98] transition-all cursor-pointer">
                                                <div className="w-[64px] h-[64px] rounded-[24px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-md">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-black text-gray-900 text-[20px] tracking-tight">데이다라</h3><p className="text-[14px] text-gray-500 mt-1 truncate font-semibold">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-6 py-6 space-y-5">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-5 p-5 bg-white border border-gray-100 rounded-[36px] shadow-sm relative active:scale-[0.98] transition-all">
                                                <div className="w-[60px] h-[60px] rounded-[22px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-32"><h3 className="font-black text-gray-900 text-lg truncate">{room.name}</h3><p className="text-sm text-gray-500 truncate mt-1.5 font-bold">{room.lastMessage || "대화가 없어요."}</p></div>
                                                
                                                {/* 🌟 [수정 버튼: 항상 보이도록 파란색 배치] */}
                                                <div className="absolute right-6 flex gap-2 z-30">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="px-3 py-2.5 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-lg active:scale-90 transition-transform">이름수정 ✎</button>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("폭파할까?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="p-3 bg-red-100 text-red-500 rounded-2xl font-black">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100">
                                        <div className="bg-white p-12 mb-12 shadow-sm border-b border-gray-100">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="데이다라한테 예술에 대해 한 마디 해줄까...?" className="w-full bg-gray-50 rounded-[32px] p-8 text-lg outline-none resize-none focus:bg-white transition-all font-black shadow-inner" rows="4" />
                                            <div className="flex justify-between items-center mt-8">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-5 bg-gray-100 text-gray-500 rounded-3xl active:scale-90"><div className="w-8 h-8"><IconCamera /></div></button>
                                                <input type="file" accept="image/*" ref={feedFileInputRef} onChange={async (e) => { const b64 = await compressImage(e.target.files[0]); setFeedAttachedImage(b64); }} className="hidden" />
                                                <button onClick={handleAddPost} disabled={isPosting} className="px-16 py-5 bg-blue-600 text-white rounded-[28px] font-black text-xl shadow-xl active:scale-95 transition-all">POST</button>
                                            </div>
                                        </div>
                                        {/* 🌟 [피드 여백 대폭 강화: p-12, mb-16] */}
                                        <div className="space-y-16 px-10 pb-40">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-[64px] shadow-2xl p-12 relative msg-anim border border-gray-100/50 overflow-hidden">
                                                    <div className="flex items-center gap-6 mb-10">
                                                        <div className="w-16 h-16 rounded-[24px] overflow-hidden shadow-lg border-2 border-gray-100">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1"><div className="font-black text-2xl text-gray-900 tracking-tighter">{post.author==='me'?'연지':'데이다라'}</div><div className="text-[12px] text-gray-400 font-black mt-1 uppercase tracking-widest">{safeDateStr(post.createdAt)}</div></div>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-[48px] mb-12 shadow-2xl active:scale-[0.98] transition-transform" />}
                                                    {post.content && <p className="text-[20px] text-gray-800 leading-relaxed mb-12 whitespace-pre-wrap font-black tracking-tight">{post.content}</p>}
                                                    
                                                    {/* 댓글창 여백 */}
                                                    <div className="bg-gray-50 rounded-[48px] p-10 shadow-inner">
                                                        <div className="space-y-10 mb-12">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-5 items-start">
                                                                    <div className="w-12 h-12 rounded-2xl overflow-hidden shadow-md shrink-0 mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1"><span className="font-black text-[15px] text-gray-900 mb-1">{c.author==='me'?'연지':'데이다라'}</span><span className="text-[17px] text-gray-700 leading-snug font-black">{c.content}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-4 items-center">
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="댓글 남기기..." className="flex-1 bg-white border-2 border-gray-100 rounded-[32px] px-8 py-5 text-[16px] outline-none shadow-sm focus:border-blue-400 transition-all font-black" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-black text-lg px-10 py-5 bg-gray-900 text-white rounded-[32px] active:scale-95 shadow-xl">게시</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-6 py-8 space-y-8 custom-scrollbar pb-32">
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => setProfileTarget('deidara')} className="w-11 h-11 rounded-[16px] bg-white mr-3 shrink-0 overflow-hidden shadow-sm active:scale-90 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[13px] text-gray-700 mb-2 ml-1 font-black uppercase">Deidara</span>}
                                                <div className={`flex flex-col items-${msg.sender === 'me' ? 'end' : 'start'} gap-2.5`}>
                                                    {msg.text && (
                                                        <div className={`flex items-end gap-2.5 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                            <div className={`px-5 py-3.5 rounded-[28px] text-[16px] shadow-md font-black tracking-tight ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-sm' : 'bg-white rounded-tl-sm'}`}>{msg.text}</div>
                                                            <span className="text-[10px] text-gray-500 mb-0.5 font-black">{msg.time || "방금"}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-14 bg-white/70 px-5 py-3 rounded-3xl text-[12px] w-fit animate-pulse shadow-sm font-black tracking-widest uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 하단바 */}
                    <nav className={`absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex items-center h-[88px] pb-safe z-30 backdrop-blur-lg ${view==='main'?'justify-around':'px-4 gap-3'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer flex-1 transition-all ${activeTab==='friends'?'text-gray-900 scale-110 font-black':'text-gray-300'}`}>🏠<span className="text-[10px] uppercase font-black">Home</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer flex-1 transition-all ${activeTab==='chat'?'text-gray-900 scale-110 font-black':'text-gray-300'}`}>💬<span className="text-[10px] uppercase font-black">Chat</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer flex-1 transition-all ${activeTab==='feed'?'text-gray-900 scale-110 font-black':'text-gray-300'}`}>🖼️<span className="text-[10px] uppercase font-black">Feed</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setView('main')} className="w-12 h-12 shrink-0 bg-gray-100 rounded-full text-2xl active:scale-90">➕</button>
                                <button onClick={() => setShowCallModal(true)} className="w-12 h-12 shrink-0 bg-gray-100 rounded-full active:scale-90 flex items-center justify-center p-3 text-gray-500"><IconPhoneOutline /></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 rounded-full px-6 py-4 text-[16px] outline-none font-black" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-14 h-14 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 shadow-lg text-2xl">🔥</button>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
