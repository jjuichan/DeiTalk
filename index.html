<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <!-- 🌟 React & Tailwind 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- 🌟 Firebase Compat 라이브러리 (호환성 최우선) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; background-color: #BACEE0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // 🌟 Firebase 초기화 보호 로직
        let auth, db, provider;
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
            const firebaseConfig = JSON.parse(configStr);
            if (firebaseConfig.apiKey && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
            provider = new firebase.auth.GoogleAuthProvider();
        } catch (e) {
            console.error("Firebase Initialization Error:", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'deitalk-app';
        const apiKey = ""; 

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, '메신저 앱'의 채팅방이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
틱틱대지만 속으로는 잘 챙겨주는 츤데레 성격.
        `;

        // 🌟 초고화질 이미지 압축 엔진 (2560px)
        const compressBase64Image = (base64Str, maxSize = 2560, quality = 0.95) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => compressBase64Image(e.target.result).then(resolve);
            });
        };

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center bg-gray-100 text-gray-400 text-2xl font-black italic">D</div>);

        const IconSend = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconCamera = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;

        const ProfileModal = ({ profileTarget, setProfileTarget, isEditingProfile, setIsEditingProfile, myProfileImgUrl, profileImgUrl, myBgImgUrl, bgImgUrl, myStatus, deidaraStatus, setMyStatus, setShowFullImage, handleImageUploadUI, setActiveTab }) => {
            const isMe = profileTarget === 'me';
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col justify-between profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? (myBgImgUrl || '') : (bgImgUrl || '')}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditingProfile) setIsEditingProfile(false); else setProfileTarget(null); }} className="text-white p-2 active:bg-white/20 rounded-full transition font-black text-xl">✕</button>
                        {!isEditingProfile && <button onClick={() => setIsEditingProfile(true)} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        {isEditingProfile && <div className="absolute top-16 right-4"><input type="file" accept="image/*" onChange={(e) => handleImageUploadUI(e, 'bg', isMe ? 'me' : 'deidara')} id="bg-edit-upload" className="hidden" /><label htmlFor="bg-edit-upload" className="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs cursor-pointer border border-white/20 font-semibold">배경 변경</label></div>}
                        <div onClick={() => !isEditingProfile && setShowFullImage(isMe ? myProfileImgUrl : profileImgUrl)} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-5 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {(isMe ? myProfileImgUrl : profileImgUrl) ? <img src={isMe ? myProfileImgUrl : profileImgUrl} className="w-full h-full object-cover" /> : <div className="text-3xl opacity-50">👤</div>}
                            {isEditingProfile && <label htmlFor="p-upload" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer text-2xl">📷</label>}
                            {isEditingProfile && <input type="file" id="p-upload" onChange={(e) => handleImageUploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-2xl font-black mb-1 text-shadow tracking-tight">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-10 mt-2 flex justify-center mx-auto">
                            {isEditingProfile && isMe ? <input type="text" defaultValue={myStatus} onBlur={(e) => { setMyStatus(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center outline-none font-bold" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md font-bold">{isMe ? myStatus : deidaraStatus}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/20 pt-8 flex justify-around mx-auto">
                            {isEditingProfile ? <button onClick={() => setIsEditingProfile(false)} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setProfileTarget(null); setActiveTab('chat'); }}><div className="text-white text-3xl">💬</div><span className="text-[12px] font-bold text-shadow uppercase">Chat</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-pro'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");
            
            const [showSettings, setShowSettings] = useState(false);
            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const chatEndRef = useRef(null);

            // 🌟 인증 관리 (PWA 무한 로딩 방어)
            useEffect(() => {
                if (!auth) return;

                // 타임아웃 안전장치: 3초 후 강제로 로딩뷰 해제
                const emergencyTimer = setTimeout(() => {
                    if (view === 'loading') setView('login');
                }, 3000);

                const checkResult = async () => {
                    try { await auth.getRedirectResult(); } catch (e) { console.warn(e); }
                };
                checkResult();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    clearTimeout(emergencyTimer);
                    if (u) {
                        setUser(u); setView('main');
                        loadChatRooms(u.uid);
                    } else {
                        setView('login');
                    }
                });
                return () => unsubscribe();
            }, []);

            const getPath = (uid, col) => `/artifacts/${appId}/users/${uid}/${col}`;

            const loadChatRooms = (uid) => {
                db.collection(getPath(uid, 'rooms')).orderBy('updatedAt', 'desc').onSnapshot((sn) => {
                    const rooms = []; sn.forEach(d => rooms.push({ id: d.id, ...d.data() })); setChatRooms(rooms);
                });
            };

            useEffect(() => {
                if (view === 'chatRoom' && currentRoomId && user) {
                    const unsubscribe = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId).collection('messages')
                        .orderBy('createdAt', 'asc').onSnapshot((sn) => {
                            const msgs = []; sn.forEach(d => msgs.push({ id: d.id, ...d.data() })); setMessages(msgs);
                            setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                        });
                    return () => unsubscribe();
                }
            }, [view, currentRoomId, user]);

            const fetchAPI = async (contents) => {
                const activeModel = apiModel === 'gemini-2.5-pro' ? 'gemini-2.5-flash-preview-09-2025' : apiModel;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${geminiKey}`;
                try {
                    const resp = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] } }) });
                    const data = await resp.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵 중...)";
                } catch (e) { return "통신 장애 발생!"; }
            };

            const analyzeChat = async () => {
                if (messages.length < 5) return alert("대화가 부족해!");
                setIsAnalyzing(true);
                const history = messages.slice(-20).map(m => `${m.sender}: ${m.text}`).join('\n');
                const result = await fetchAPI([{role:'user', parts:[{text: `Analyze relationship: ${history}`}]}]);
                setAnalysisResult(result);
                setIsAnalyzing(false); 
            };

            const handleLogin = () => {
                setView('loading');
                auth.signInWithRedirect(provider).catch(() => setView('login'));
            };

            const handleGuestLogin = () => {
                setView('loading');
                auth.signInAnonymously().catch(() => setView('login'));
            };

            const handleSend = async () => {
                if (!currentRoomId || !user || !inputText.trim()) return;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const text = inputText; setInputText(''); setIsTyping(true);
                try {
                    const roomRef = db.collection(getPath(user.uid, 'rooms')).doc(currentRoomId);
                    await roomRef.collection('messages').add({ sender: 'me', text, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const resp = await fetchAPI(messages.slice(-20).map(m => ({role: m.sender==='me'?'user':'model', parts:[{text: m.text}]})).concat({role:'user', parts:[{text}]}));
                    await roomRef.collection('messages').add({ sender: 'deidara', text: resp, time, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await roomRef.set({ lastMessage: resp, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                } finally { setIsTyping(false); }
            };

            const handleImageUploadUI = async (e, mode, target) => {
                const file = e.target.files[0]; if (!file) return;
                const b64 = await compressImage(file);
                if (mode === 'profile') {
                    if (target === 'me') { setMyProfileImgUrl(b64); localStorage.setItem('my_profile_url', b64); }
                    else { setProfileImgUrl(b64); localStorage.setItem('deidara_profile_url', b64); }
                } else {
                    if (target === 'me') { setMyBgImgUrl(b64); localStorage.setItem('my_bg_url', b64); }
                    else { setBgImgUrl(b64); localStorage.setItem('deidara_bg_url', b64); }
                }
            };

            if (view === 'loading') return <div className="w-full h-full flex flex-col items-center justify-center bg-[#BACEE0]"><div className="w-10 h-10 border-4 border-white/30 border-t-white rounded-full animate-spin mb-4"></div><div className="font-black text-white/70 animate-pulse uppercase tracking-widest text-sm">DeiTalk Loading...</div></div>;

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-[#BACEE0]">
                    <div className="w-24 h-24 rounded-[32px] bg-white mb-8 shadow-xl flex items-center justify-center text-4xl">🎨</div>
                    <h1 className="text-3xl font-black text-gray-800 mb-10 tracking-tight">DeiTalk</h1>
                    <button onClick={handleLogin} className="w-full max-w-xs bg-white py-4 rounded-2xl shadow-md font-bold active:scale-95 transition-transform mb-4 text-gray-800">구글로 시작하기</button>
                    <button onClick={handleGuestLogin} className="w-full max-w-xs bg-black/10 py-4 rounded-2xl font-bold text-gray-600 text-sm active:scale-95 transition-transform">게스트로 입장</button>
                    <p className="mt-8 text-[11px] text-gray-500 font-bold opacity-70 text-center">로그인이 안 될 경우 게스트 버튼을 이용해주세요.</p>
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col overflow-hidden relative bg-[#BACEE0]">
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {profileTarget && <ProfileModal profileTarget={profileTarget} setProfileTarget={setProfileTarget} isEditingProfile={isEditingProfile} setIsEditingProfile={setIsEditingProfile} myProfileImgUrl={myProfileImgUrl} profileImgUrl={profileImgUrl} myBgImgUrl={myBgImgUrl} bgImgUrl={bgImgUrl} myStatus={myStatus} deidaraStatus={deidaraStatus} setMyStatus={setMyStatus} setShowFullImage={setShowFullImage} handleImageUploadUI={handleImageUploadUI} setActiveTab={setActiveTab} />}
                    
                    {analysisResult && (
                        <div className="fixed inset-0 z-[4000] bg-black/80 flex items-center justify-center p-6 backdrop-blur-md" onClick={() => setAnalysisResult(null)}>
                            <div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-xl font-black mb-4 text-orange-500">✨ 관계 분석</h3>
                                <div className="text-sm text-gray-700 leading-relaxed font-bold whitespace-pre-wrap">{analysisResult}</div>
                                <button onClick={() => setAnalysisResult(null)} className="w-full mt-8 py-4 bg-[#BACEE0] rounded-2xl font-black text-white active:scale-95">확인</button>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[2500] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-bold mb-6 text-gray-800">설정</h2>
                                <div className="bg-gray-100 p-4 rounded-2xl mb-6">
                                    <p className="text-[10px] font-black text-gray-400 uppercase mb-1">User Info</p>
                                    <p className="text-xs font-bold text-gray-700 truncate">{user?.email || `Guest (UID: ${user?.uid?.substring(0,8)}...)`}</p>
                                </div>
                                <div className="space-y-5 mb-8">
                                    <div><p className="text-[10px] font-black text-gray-400 mb-1 ml-1 uppercase font-bold">AI Model</p>
                                        {/* 🌟 Gemini 2.5 Pro 선택지 복구 */}
                                        <select value={apiModel} onChange={e=>{ setApiModel(e.target.value); localStorage.setItem('gemini_api_model', e.target.value); }} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 text-sm font-bold outline-none text-gray-800">
                                            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                        </select>
                                    </div>
                                    <div><p className="text-[10px] font-black text-gray-400 mb-1 ml-1 uppercase font-bold">Gemini API Key</p><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 outline-none text-sm font-semibold text-gray-800" /></div>
                                </div>
                                <button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-2xl font-bold mb-3 text-gray-900 shadow-sm active:scale-95 transition-transform">저장</button>
                                <button onClick={() => { auth.signOut(); setShowSettings(false); }} className="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-transform">로그아웃</button>
                            </div>
                        </div>
                    )}

                    {view === 'main' ? (
                        <Fragment>
                            <header className="px-5 py-5 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-20 bg-white/90 backdrop-blur-md">
                                <h1 className="font-extrabold text-xl tracking-tight text-gray-900 uppercase">{activeTab==='friends'?"친구":activeTab==='chat'?"채팅":"게시물"}</h1>
                                <div className="flex gap-4">
                                    {activeTab === 'chat' && <button onClick={() => { const n = prompt("새로운 방 이름?"); if(n) db.collection(getPath(user.uid, 'rooms')).add({name:n, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); }} className="text-xl">➕</button>}
                                    <button onClick={() => setShowSettings(true)} className="text-xl active:scale-90 transition-transform">⚙️</button>
                                </div>
                            </header>
                            <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-24 custom-scrollbar bg-white">
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-6 py-5 border-b border-gray-50">
                                            <div onClick={() => setProfileTarget('me')} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl cursor-pointer transition-all active:scale-[0.98]">
                                                <div className="w-[68px] h-[68px] rounded-[26px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-xl tracking-tight">연지</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-6 py-5">
                                            <div onClick={() => setProfileTarget('deidara')} className="flex items-center gap-5 p-2 hover:bg-gray-50 rounded-2xl cursor-pointer transition-all active:scale-[0.98]">
                                                <div className="w-[60px] h-[60px] rounded-[22px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[18px] tracking-tight">데이다라</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-4 space-y-4">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-5 p-4 bg-white border border-gray-100 rounded-[36px] cursor-pointer shadow-sm active:scale-95 transition-all">
                                                <div className="w-[58px] h-[58px] rounded-[22px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-6"><h3 className="font-bold text-gray-900 truncate tracking-tight">{room.name}</h3><p className="text-[13px] text-gray-500 truncate mt-1 font-medium">{room.lastMessage || "대화가 없습니다."}</p></div>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm("삭제?")) db.collection(getPath(user.uid, 'rooms')).doc(room.id).delete(); }} className="absolute right-6 p-2 text-red-400 bg-red-50 rounded-xl active:scale-90">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </Fragment>
                    ) : (
                        <Fragment>
                            {/* 🌟 채팅방: 파란 배경색 `#BACEE0` 고정 및 여백 완벽 제거 */}
                            <header className="px-3 py-3 flex items-center justify-between border-b border-black/5 bg-[#BACEE0]/95 sticky top-0 z-20 backdrop-blur-md">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setView('main')} className="p-2 active:bg-black/5 rounded-full font-black text-gray-700">←</button>
                                    <div onClick={() => setProfileTarget('deidara')} className="w-10 h-10 rounded-[14px] bg-white overflow-hidden shadow-sm shrink-0 cursor-pointer active:scale-95 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>
                                    <h1 className="font-bold text-gray-800 text-lg ml-1">데이다라</h1>
                                </div>
                                <button onClick={analyzeChat} disabled={isAnalyzing} className={`p-2 rounded-full bg-white/20 active:scale-90 transition-all font-black text-[10px] text-white shadow-sm flex flex-col items-center leading-none ${isAnalyzing?'animate-spin':''}`}>
                                    <span className="text-lg">✨</span>
                                </button>
                            </header>
                            <main className="flex-1 min-h-0 w-full overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar bg-[#BACEE0]">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'} msg-anim`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div className="w-10 h-10 rounded-[14px] bg-white mr-3 shrink-0 overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col">
                                                {msg.sender !== 'me' && <span className="text-[12px] text-gray-600 mb-1 ml-1 font-bold uppercase">데이다라</span>}
                                                <div className={`px-5 py-3.5 rounded-[24px] text-[15px] shadow-sm font-bold tracking-tight ${msg.sender === 'me' ? 'bg-[#FEE500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}>{msg.text}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-13 text-[11px] text-white/50 font-black animate-pulse uppercase tracking-widest">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-3 bg-white border-t border-gray-100 pb-safe flex items-center gap-3 relative z-30 mt-0">
                                <button className="w-10 h-10 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 active:scale-90 transition-all font-black">+</button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 bg-gray-100 border-none rounded-full px-5 py-3 text-sm outline-none font-bold focus:bg-white transition-all" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-10 h-10 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition-all"><IconSend /></button>
                            </footer>
                        </Fragment>
                    )}

                    {view === 'main' && (
                        <nav className="absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex justify-around items-center h-[82px] pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] backdrop-blur-md px-6">
                            <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='friends'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">👤</span><span className="text-[10px] font-black uppercase tracking-tighter">Friends</span></div>
                            <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='chat'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">💬</span><span className="text-[10px] font-black uppercase tracking-tighter">Chat</span></div>
                            <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1 cursor-pointer w-full transition-all ${activeTab==='feed'?'text-gray-900 scale-110':'text-gray-300'}`}><span className="text-xl">📋</span><span className="text-[10px] font-black uppercase tracking-tighter">Feed</span></div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
