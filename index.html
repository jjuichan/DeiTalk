<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#BACEE0">
    <title>DeiTalk v2.4 (ULTRA FIX)</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPKkpbvu1TQG8SChRCXfFT7G2TZKrWUNc",
            authDomain: "deitalk-9107c.firebaseapp.com",
            projectId: "deitalk-9107c",
            storageBucket: "deitalk-9107c.firebasestorage.app",
            messagingSenderId: "710740822953",
            appId: "1:710740822953:web:73416a2d69ff984efe92b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAPI = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, addDoc, serverTimestamp, getDoc, arrayUnion, arrayRemove };
    </script>

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #BACEE0; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
        .msg-anim { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-anim { animation: profileUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes profileUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        #root { position: fixed; inset: 0; width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        .neon-border { border: 2px solid #FEE500; box-shadow: 0 0 10px #FEE500; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const SYSTEM_PROMPT = `
너는 '데이다라'라는 이름의 19세 대학생이야. 도쿄 예술대학 조소과 1학년이지.
여기는 현실 대화나 전화 통화가 아니라, **'메신저 앱(카톡, 라인 등)의 채팅방'**이야! 행동 묘사는 하지 말고 카톡 말투를 써.
사용자인 '연지'는 23세 대학생 문예창작과 전공이야. 너희는 한국-일본 롱디 썸을 타는 중이야.
너는 연지가 너를 친한 동생으로만 보고 진심으로 좋아하진 않는다고 생각해 혼자 짝사랑 중이라 오해하고 있어.

[주변 인물 (현대 AU 설정)]
- 사소리: 도쿄 예술대학 조소과 교수. 데이다라의 전공 교수님이며 매우 깐깐하고 엄격함.
- 이타치: 엄청난 재능을 가진 엘리트 대학원생 선배. 데이다라의 일방적 라이벌. 매우 견제하고 증오한다.
- 사스케: 이타치의 동생. 도쿄대 부속 고등학교 학생. 건방진 성격. 이타치의 동생이라서 재수없어하고 싫어한다.
- 토비: 깐족거리고 시끄러운 철학과 동급생. 사실 아저씨라는 소문이 돌고 있지만, 데이다라를 '선배'라고 부르며 괴롭힘.

[AI 지침]
- 건방진 츤데레 성격. 연지와 유치하게 티격태격할 것.
- 칭찬받으면 극도로 으스대기.
- '니가', '너', '야', 'ㅅㅂ', '미친' 등 현실 대학생 말투 사용.
- 문장부호(?, !, ~ 등)는 상황에 맞게 풍부하게 써도 좋아.
- 초성 앞뒤 마침표 금지. 말버릇 '음'은 문장 끝에 가끔 붙여.
        `;

        const safeTimeStr = (ts, fallback) => {
            if (!ts) return fallback || '방금 전';
            try { return (ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); } catch (e) { return fallback || '방금 전'; }
        };

        const renderProfilePicCommon = (url) => (url ? <img src={url} className="w-full h-full object-cover" /> : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-1/2 h-1/2 text-gray-400"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);

        // 🌟 프로필 모달 컴포넌트
        const ProfileModal = ({ target, setTarget, isEditing, setIsEditing, myP, deiP, myB, deiB, myS, deiS, setMyS, setFull, uploadUI, setTab }) => {
            const isMe = target === 'me';
            return (
                <div className="fixed inset-0 z-[2500] bg-gray-900 flex flex-col profile-anim overflow-hidden" style={{ backgroundImage: `url('${isMe ? myB : deiB}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="flex justify-between p-4 z-10">
                        <button onClick={() => { if(isEditing) setIsEditing(false); else setTarget(null); }} className="text-white p-2 bg-black/20 rounded-full">✕</button>
                        {!isEditing && <button onClick={() => setIsEditing(true)} className="text-white px-3 py-1.5 bg-white/10 rounded-full text-xs font-bold border border-white/20">편집</button>}
                    </div>
                    <div className="flex flex-col items-center pb-12 text-white z-10 mt-auto w-full px-6 text-center">
                        <div onClick={() => { if(!isEditing) setFull(isMe ? myP : deiP); }} className="w-24 h-24 rounded-[36px] bg-white/20 flex items-center justify-center shadow-2xl mb-4 border-2 border-white/30 relative overflow-hidden backdrop-blur-sm cursor-pointer">
                            {renderProfilePicCommon(isMe ? myP : deiP)}
                            {isEditing && <label htmlFor="p-upload-inner" className="absolute inset-0 bg-black/50 flex items-center justify-center cursor-pointer">📷</label>}
                            {isEditing && <input type="file" id="p-upload-inner" onChange={(e) => uploadUI(e, 'profile', isMe ? 'me' : 'deidara')} className="hidden" />}
                        </div>
                        <h2 className="text-2xl font-extrabold mb-1 text-shadow tracking-tight">{isMe ? '연지' : '데이다라'}</h2>
                        <div className="w-full max-w-[280px] mb-10 mt-2 flex justify-center mx-auto">
                            {isEditing && isMe ? <input type="text" defaultValue={myS} onBlur={(e) => { setMyS(e.target.value); localStorage.setItem('my_status', e.target.value); }} className="w-full bg-black/40 border border-white/30 rounded-xl px-4 py-2.5 text-sm text-white text-center shadow-inner outline-none" placeholder="상태 메시지" /> : <p className="text-[14px] opacity-90 text-shadow bg-black/30 px-5 py-2.5 rounded-full inline-block backdrop-blur-md">{isMe ? myS : deiS}</p>}
                        </div>
                        <div className="w-full max-w-[280px] border-t border-white/30 pt-8 flex justify-around mx-auto">
                            {isEditing ? <button onClick={() => { setIsEditing(false); }} className="bg-[#FEE500] text-gray-900 font-bold px-10 py-3 rounded-full w-full active:scale-95 transition-all shadow-lg">완료</button> : !isMe && <div className="flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-95" onClick={() => { setTarget(null); setTab('chat'); }}><div className="text-white text-3xl">💬</div><span className="text-[12px] font-bold tracking-wider text-shadow uppercase">1:1 Chat</span></div>}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('friends');
            const [chatRooms, setChatRooms] = useState([]);
            const [currentRoomId, setCurrentRoomId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [posts, setPosts] = useState([]);
            
            const [inputText, setInputText] = useState('');
            const [postInput, setPostInput] = useState('');
            const [feedAttachedImage, setFeedAttachedImage] = useState(null);
            const [isPosting, setIsPosting] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [commentInputs, setCommentInputs] = useState({});

            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [apiModel, setApiModel] = useState(localStorage.getItem('gemini_api_model') || 'gemini-2.5-flash'); 
            const [profileImgUrl, setProfileImgUrl] = useState(localStorage.getItem('deidara_profile_url') || '');
            const [bgImgUrl, setBgImgUrl] = useState(localStorage.getItem('deidara_bg_url') || '');
            const [myProfileImgUrl, setMyProfileImgUrl] = useState(localStorage.getItem('my_profile_url') || '');
            const [myBgImgUrl, setMyBgImgUrl] = useState(localStorage.getItem('my_bg_url') || '');
            const [myStatus, setMyStatus] = useState(localStorage.getItem('my_status') || '문창과 4학년. 데이다라랑 썸타는 중!');
            const [deidaraStatus, setDeidaraStatus] = useState(localStorage.getItem('deidara_current_status') || "점토 빚는 중...");

            const [profileTarget, setProfileTarget] = useState(null); 
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [showFullImage, setShowFullImage] = useState(null);
            const [showCallModal, setShowCallModal] = useState(false);
            const [callCaller, setCallCaller] = useState('me');
            const [callDuration, setCallDuration] = useState('0:08');
            const [callContent, setCallContent] = useState('');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());

            const chatEndRef = useRef(null);
            const feedFileInputRef = useRef(null);

            useEffect(() => {
                const interval = setInterval(() => setCurrentTime(new Date().toLocaleTimeString()), 1000);
                const initTimer = setInterval(() => {
                    if (window.firebaseAPI) {
                        clearInterval(initTimer);
                        const { auth, db: fdb, onAuthStateChanged } = window.firebaseAPI;
                        setDb(fdb);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setView('main'); loadRooms(u.uid, fdb); loadPosts(u.uid, fdb); } 
                            else setView('login');
                        });
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            const loadRooms = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/rooms`), window.firebaseAPI.orderBy('updatedAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const r = []; sn.forEach(d => r.push({ id: d.id, ...d.data() })); setChatRooms(r);
                });
            };

            const loadPosts = (uid, fdb) => {
                const q = window.firebaseAPI.query(window.firebaseAPI.collection(fdb, `users/${uid}/posts`), window.firebaseAPI.orderBy('createdAt', 'desc'));
                window.firebaseAPI.onSnapshot(q, (sn) => {
                    const p = []; sn.forEach(d => p.push({ id: d.id, ...d.data() })); setPosts(p);
                });
            };

            const fetchAPI = async (contents, customPrompt = SYSTEM_PROMPT) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${geminiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: customPrompt }] }, safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }] })
                    });
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "(침묵한다.)";
                    return text.replace(/\(버전\s*\d.*?\)/gi, '').replace(/\*\*버전\s*\d.*?\*\*/gi, '').trim();
                } catch (e) { return "통신 장애 났다. 음!"; }
            };

            // 🌟 [방 이름 수정 로직]
            const handleUpdateRoomName = async (roomId, currentName) => {
                const newName = prompt("방 이름을 뭘로 바꿀까? 음!", currentName);
                if (newName && newName.trim() !== currentName) {
                    await window.firebaseAPI.updateDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${roomId}`), { name: newName.trim() });
                }
            };

            const handleSend = async () => {
                if (!currentRoomId) return;
                const { collection, addDoc, doc: fdoc, setDoc, serverTimestamp } = window.firebaseAPI;
                const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (!inputText.trim()) {
                    setIsTyping(true);
                    const history = buildHistory(messages, 100);
                    history.push({ role: 'user', parts: [{ text: "(이어서 한 마디 더 해줘.)" }] });
                    const resp = await fetchAPI(history, SYSTEM_PROMPT);
                    await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                    await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                    setIsTyping(false); return;
                }
                const text = inputText; setInputText(''); setIsTyping(true);
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'me', text, time, createdAt: serverTimestamp() });
                const resp = await fetchAPI(buildHistory(messages, 100).concat({ role: 'user', parts: [{ text }] }));
                await addDoc(collection(db, `users/${user.uid}/rooms/${currentRoomId}/messages`), { sender: 'deidara', text: resp, time, createdAt: serverTimestamp() });
                await setDoc(fdoc(db, `users/${user.uid}/rooms/${currentRoomId}`), { lastMessage: resp, updatedAt: serverTimestamp() }, { merge: true });
                setIsTyping(false);
            };

            const buildHistory = (msgs, limitNum = 100) => {
                return msgs.slice(-limitNum).map(m => {
                    const parts = [];
                    if (m.type === 'call') parts.push({ text: `[통화 기록: ${m.duration}]` });
                    else if (m.text) parts.push({ text: m.text });
                    if (m.imageUrl) parts.push({ text: "[사진]" });
                    return { role: m.sender === 'me' ? 'user' : 'model', parts };
                });
            };

            const handleAddPost = async () => {
                setIsPosting(true);
                const { collection, addDoc, doc: fdoc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseAPI;
                const docRef = await addDoc(collection(db, `users/${user.uid}/posts`), { author: 'me', content: postInput.trim(), imageUrl: feedAttachedImage, createdAt: serverTimestamp(), comments: [] });
                setPostInput(''); setFeedAttachedImage(null);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지가 피드를 올렸어. 댓글 달아줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${docRef.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleAddComment = async (post) => {
                const commentText = commentInputs[post.id]?.trim();
                const { doc: fdoc, updateDoc, arrayUnion } = window.firebaseAPI;
                if (!commentText) {
                    setIsPosting(true);
                    const resp = await fetchAPI([{role:'user', parts: [{text: `데이다라, 연지의 피드에 댓글 남겨줘.`}]}]);
                    await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                    setIsPosting(false); return;
                }
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'me', content: commentText, createdAt: Date.now() }) });
                setCommentInputs(prev => ({...prev, [post.id]: ''}));
                setIsPosting(true);
                const resp = await fetchAPI([{role:'user', parts: [{text: `연지의 댓글 "${commentText}"에 대댓글 달아줘.`}]}]);
                await updateDoc(fdoc(db, `users/${user.uid}/posts/${post.id}`), { comments: arrayUnion({ author: 'deidara', content: resp, createdAt: Date.now() }) });
                setIsPosting(false);
            };

            const handleImageUploadUI = (e, type, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    if(target==='me') { if(type==='profile') setMyProfileImgUrl(b64); else setMyBgImgUrl(b64); localStorage.setItem(type==='profile'?'my_profile_url':'my_bg_url', b64); }
                    else { if(type==='profile') setProfileImgUrl(b64); else setBgImgUrl(b64); localStorage.setItem(type==='profile'?'deidara_profile_url':'deidara_bg_url', b64); }
                };
                reader.readAsDataURL(file);
            };

            if (view === 'login') return (
                <div className="w-full h-full flex flex-col items-center justify-center p-8 bg-[#BACEE0]">
                    <h1 className="text-4xl font-black text-gray-800 mb-8">DeiTalk Login</h1>
                    <button onClick={() => window.firebaseAPI.signInWithPopup(window.firebaseAPI.auth, window.firebaseAPI.provider)} className="w-full max-w-xs bg-white py-5 rounded-3xl shadow-xl font-black text-lg">Google Login</button>
                </div>
            );

            return (
                <div className={`w-full h-full flex flex-col ${view === 'chatRoom' ? 'bg-[#BACEE0]' : 'bg-gray-50'} overflow-hidden relative`}>
                    {/* 🌟 시각적 확인용 전광판 */}
                    <div className="bg-yellow-400 text-black py-1 px-4 text-center text-[10px] font-black z-50 shadow-sm border-b border-yellow-500 overflow-hidden whitespace-nowrap">
                        🔥 v2.4 개발자 전용 확인용 전광판 - 현재시간: {currentTime} (상태: 정상 작동 중)
                    </div>

                    {profileTarget && <ProfileModal target={profileTarget} setTarget={setProfileTarget} isEditing={isEditingProfile} setIsEditing={setIsEditingProfile} myP={myProfileImgUrl} deiP={profileImgUrl} myB={myBgImgUrl} deiB={bgImgUrl} myS={myStatus} deiS={deidaraStatus} setMyS={setMyStatus} setFull={setShowFullImage} uploadUI={handleImageUploadUI} setTab={setActiveTab} />}
                    {showFullImage && <FullImageViewer src={showFullImage} onClose={() => setShowFullImage(null)} />}
                    {showSettings && <div className="fixed inset-0 z-[3000] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm"><div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl"><h2 className="text-2xl font-black mb-6">Settings</h2><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border border-gray-100 bg-gray-50 rounded-2xl px-5 py-4 mb-8 outline-none text-sm font-bold" /><button onClick={() => { localStorage.setItem('gemini_api_key', geminiKey); setShowSettings(false); }} className="w-full bg-[#FEE500] py-4 rounded-3xl font-black text-gray-900 shadow-md">저장</button></div></div>}

                    {/* 헤더 */}
                    <header className={`px-5 py-5 flex justify-between items-center sticky top-0 z-20 ${view==='main'?'bg-white/90 border-b border-gray-100':'bg-[#BACEE0]/95'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <h1 className="font-black text-2xl tracking-tighter text-gray-900">DeiTalk <span className="text-[10px] bg-blue-500 text-white px-2 py-0.5 rounded-full v-badge">v2.4</span></h1>
                                <button onClick={() => setShowSettings(true)} className="text-2xl">⚙️</button>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setView('main')} className="p-2">🔙</button>
                                <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-10 h-10 rounded-[14px] bg-white border border-orange-100 overflow-hidden shadow-sm active:scale-95 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>
                                <h1 className="font-bold text-gray-800 text-lg ml-1 truncate tracking-tight">{chatRooms.find(r=>r.id===currentRoomId)?.name || "채팅방"}</h1>
                            </Fragment>
                        )}
                    </header>

                    <main className="flex-1 min-h-0 w-full flex flex-col overflow-y-auto pb-32 custom-scrollbar">
                        {view === 'main' ? (
                            <Fragment>
                                {activeTab === 'friends' && (
                                    <div className="flex-1 bg-white">
                                        <div className="px-6 py-5 border-b border-gray-50">
                                            <div onClick={() => { setProfileTarget('me'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[68px] h-[68px] rounded-[26px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(myProfileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-xl tracking-tight">연지</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{myStatus}</p></div>
                                            </div>
                                        </div>
                                        <div className="px-6 py-5">
                                            <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="flex items-center gap-5 p-2 active:scale-[0.99] cursor-pointer transition-all">
                                                <div className="w-[60px] h-[60px] rounded-[22px] bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0"><h3 className="font-bold text-gray-900 text-[18px] tracking-tight">데이다라</h3><p className="text-[13px] text-gray-500 mt-1 truncate font-medium">{deidaraStatus}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'chat' && (
                                    <div className="flex-1 px-4 py-4 space-y-4">
                                        {chatRooms.map(room => (
                                            <div key={room.id} onClick={() => { setCurrentRoomId(room.id); setView('chatRoom'); }} className="flex items-center gap-4 p-5 bg-white border border-gray-100 rounded-[32px] cursor-pointer active:scale-[0.98] transition-all shadow-sm relative">
                                                <div className="w-[58px] h-[58px] rounded-[22px] bg-white border border-orange-50 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">{renderProfilePicCommon(profileImgUrl)}</div>
                                                <div className="flex-1 min-w-0 pr-24"><h3 className="font-bold text-gray-900 text-[17px] truncate tracking-tight">{room.name}</h3><p className="text-[13px] text-gray-500 truncate mt-1.5 font-medium leading-tight">{room.lastMessage || "새로운 대화를 시작해보세요!"}</p></div>
                                                
                                                {/* 🌟 2. 채팅방 이름 수정 버튼 (아이콘+글자로 명확하게 고정 노출) */}
                                                <div className="absolute right-6 flex gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); handleUpdateRoomName(room.id, room.name); }} className="px-4 py-3 bg-blue-600 text-white rounded-2xl active:scale-90 transition-transform font-black text-sm shadow-xl flex items-center gap-1.5 border border-blue-400">
                                                        <span>✎</span>
                                                        <span>이름수정</span>
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("방 삭제?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/rooms/${room.id}`)); }} className="p-3 text-red-400 bg-red-50 rounded-2xl active:scale-90 transition-transform font-bold text-lg">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'feed' && (
                                    <div className="flex-1 bg-gray-100 pb-20">
                                        {/* 🌟 3. 피드 작성 영역 여백 대폭 강화 */}
                                        <div className="bg-white p-12 mb-10 shadow-sm border-b border-gray-100">
                                            <textarea value={postInput} onChange={e=>setPostInput(e.target.value)} placeholder="데이다라한테 자랑할 조각이 있나...?" className="w-full bg-gray-50 rounded-[32px] p-8 text-[16px] outline-none resize-none border-2 border-transparent focus:bg-white focus:border-gray-100 transition-all font-['Pretendard'] font-semibold shadow-inner" rows="4" />
                                            <div className="flex justify-between items-center mt-6">
                                                <button onClick={() => feedFileInputRef.current.click()} className="p-4 bg-gray-100 text-gray-500 rounded-2xl transition-colors active:scale-95"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></button>
                                                <button onClick={handleAddPost} disabled={isPosting} className={`px-14 py-4 rounded-[26px] text-[16px] font-black shadow-xl transition-all ${isPosting ? 'bg-gray-300 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white active:scale-95'}`}>올리기</button>
                                            </div>
                                        </div>

                                        {/* 🌟 4. 피드 게시물 목록 여백 대폭 강화 (p-12, mb-16) */}
                                        <div className="space-y-16 px-8 pb-32">
                                            {posts.map(post=>(
                                                <div key={post.id} className="bg-white rounded-[56px] shadow-2xl p-12 relative msg-anim border border-gray-100/50">
                                                    <div className="flex items-center gap-5 mb-8">
                                                        <div onClick={() => { setProfileTarget(post.author==='me'?'me':'deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-15 h-15 rounded-full overflow-hidden border border-gray-100 shadow-sm cursor-pointer active:scale-95 shrink-0 transition-transform">{post.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-black text-[19px] text-gray-900 tracking-tighter">{post.author==='me'?'연지':'데이다라'}</div>
                                                            <div className="text-[11px] text-gray-400 font-black uppercase mt-1 tracking-widest">{safeDateStr(post.createdAt)}</div>
                                                        </div>
                                                        <div className="flex gap-3">
                                                            <button onClick={() => { setEditingPostId(post.id); setEditingPostText(post.content); }} className="p-2 text-gray-300 hover:text-blue-500 transition-colors">✎</button>
                                                            <button onClick={() => { if(confirm("삭제할까요?")) window.firebaseAPI.deleteDoc(window.firebaseAPI.doc(db, `users/${user.uid}/posts/${post.id}`)); }} className="p-2 text-gray-300 hover:text-red-500 transition-colors">✕</button>
                                                        </div>
                                                    </div>
                                                    {post.imageUrl && <img src={post.imageUrl} onClick={() => setShowFullImage(post.imageUrl)} className="w-full h-auto rounded-[40px] mb-8 shadow-md active:scale-[0.99] transition-transform border border-gray-50" />}
                                                    {post.content && <p className="text-[18px] text-gray-800 leading-relaxed mb-10 whitespace-pre-wrap pr-4 font-bold tracking-tight">{post.content}</p>}
                                                    
                                                    <div className="bg-gray-50 rounded-[44px] p-8 border border-gray-100 shadow-inner">
                                                        <div className="text-[11px] font-black text-gray-400 mb-6 ml-3 uppercase tracking-widest">Comments</div>
                                                        <div className="space-y-7 mb-10">
                                                            {(post.comments||[]).map((c,i)=>(
                                                                <div key={i} className="flex gap-4.5 items-start">
                                                                    <div className="w-[40px] h-[40px] rounded-full overflow-hidden border border-gray-100 shadow-sm bg-white shrink-0 mt-0.5">{c.author==='me'?renderProfilePicCommon(myProfileImgUrl):renderProfilePicCommon(profileImgUrl)}</div>
                                                                    <div className="flex flex-col flex-1 pr-10">
                                                                        <span className="font-black text-[14px] text-gray-900 mb-0.5 tracking-tight">{c.author==='me'?'연지':'데이다라'}</span>
                                                                        <span className="text-[15px] text-gray-700 leading-snug font-bold tracking-tight">{c.content}</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-3 items-center">
                                                            <input type="text" value={commentInputs[post.id]||''} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} placeholder="데이다라 괴롭히기..." className="flex-1 bg-white border border-gray-200 rounded-[28px] px-6 py-4 text-[15px] outline-none shadow-sm transition-colors font-bold" onKeyPress={e=>e.key==='Enter'&&handleAddComment(post)} />
                                                            <button disabled={isPosting} onClick={()=>handleAddComment(post)} className="font-black text-[14px] px-8 py-4 bg-gray-900 text-white rounded-[28px] active:scale-95 transition-all shadow-md">게시</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Fragment>
                        ) : (
                            <main className="flex-1 min-h-0 overflow-y-auto px-4 py-6 space-y-6 custom-scrollbar pb-24 relative" onClick={() => setShowAttachMenu(false)}>
                                {messages.map((msg, i) => (
                                    <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'}`}>
                                        <div className={`flex max-w-[85%] ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {msg.sender !== 'me' && <div onClick={() => { setProfileTarget('deidara'); window.history.pushState({ page: 'modal' }, ''); }} className="w-10 h-10 rounded-[14px] bg-white mr-3 flex-shrink-0 overflow-hidden border border-orange-50 shadow-sm cursor-pointer active:scale-90 transition-transform">{renderProfilePicCommon(profileImgUrl)}</div>}
                                            <div className="flex flex-col w-full">
                                                {msg.sender !== 'me' && <span className="text-[12px] text-gray-600 mb-1.5 ml-1 font-bold tracking-tight uppercase font-black">Deidara</span>}
                                                <div className={`flex flex-col items-${msg.sender === 'me' ? 'end' : 'start'} gap-2`}>
                                                    {msg.text && (
                                                        <div className={`flex items-end gap-2 ${msg.sender === 'me' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                            <div onClick={(e) => { e.stopPropagation(); setSelectedMsgId(selectedMsgId === msg.id ? null : msg.id); setEditingMessageId(null); }} className={`px-4.5 py-3 rounded-2xl text-[15px] shadow-sm cursor-pointer active:scale-[0.98] transition-transform font-medium ${msg.sender === 'me' ? 'bg-[#FEE500] rounded-tr-sm text-gray-900' : 'bg-white rounded-tl-sm border border-black/5 text-gray-800'}`}>{msg.text}</div>
                                                            <span className="text-[10px] text-gray-500 mb-0.5 font-bold whitespace-nowrap">{msg.time || safeTimeStr(msg.createdAt, '')}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="ml-12 bg-white/70 px-4 py-2.5 rounded-2xl rounded-tl-sm text-[11px] w-fit animate-pulse shadow-sm text-gray-400 font-bold border border-black/5 tracking-widest uppercase">Typing...</div>}
                                <div ref={chatEndRef} />
                            </main>
                        )}
                    </main>

                    {/* 네비게이션 및 푸터 */}
                    <nav className={`absolute bottom-0 w-full bg-white/95 border-t border-gray-100 flex items-center h-[88px] pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] backdrop-blur-md ${view==='main'?'justify-around':'px-5 gap-4'}`}>
                        {view === 'main' ? (
                            <Fragment>
                                <div onClick={()=>setActiveTab('friends')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='friends'?'text-gray-900 scale-110 font-bold':'text-gray-300'}`}>🏠<span className="text-[10px] uppercase font-black tracking-widest">Home</span></div>
                                <div onClick={()=>setActiveTab('chat')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='chat'?'text-gray-900 scale-110 font-bold':'text-gray-300'}`}>💬<span className="text-[10px] uppercase font-black tracking-widest">Chat</span></div>
                                <div onClick={()=>setActiveTab('feed')} className={`flex flex-col items-center gap-1.5 cursor-pointer w-full h-full justify-center transition-all ${activeTab==='feed'?'text-gray-900 scale-110 font-bold':'text-gray-300'}`}>🖼️<span className="text-[10px] uppercase font-black tracking-widest">Feed</span></div>
                            </Fragment>
                        ) : (
                            <Fragment>
                                <button onClick={() => setShowAttachMenu(!showAttachMenu)} className="w-12 h-12 shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 active:scale-90 transition-all font-black text-2xl">➕</button>
                                <button onClick={() => setShowCallModal(true)} className="w-12 h-12 shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 active:scale-90 transition-all font-black"><IconPhoneOutline /></button>
                                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleSend()} className="flex-1 min-w-0 bg-gray-100 border border-transparent focus:bg-white focus:border-gray-200 rounded-full px-6 py-4 text-[16px] outline-none transition-all placeholder-gray-400 font-black" placeholder="메시지 입력..." />
                                <button onClick={handleSend} className="w-12 h-12 shrink-0 bg-[#FEE500] rounded-full flex items-center justify-center active:scale-90 shadow-lg text-2xl">🔥</button>
                            </Fragment>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
